<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jazz Critic</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Georgia',serif;background:#0a0a0f;color:#e0d5c0;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px}
h1{font-size:2.2em;color:#c9a84c;margin:20px 0 5px;text-align:center}
.subtitle{color:#8a7a5a;font-style:italic;margin-bottom:30px;text-align:center}
.record-btn{width:120px;height:120px;border-radius:50%;border:3px solid #c9a84c;background:rgba(201,168,76,0.1);color:#c9a84c;font-size:1.1em;cursor:pointer;transition:all 0.3s;display:flex;align-items:center;justify-content:center;flex-direction:column}
.record-btn:hover{background:rgba(201,168,76,0.2);transform:scale(1.05)}
.record-btn.recording{border-color:#ff4444;background:rgba(255,68,68,0.15);color:#ff4444;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,68,68,0.4)}50%{box-shadow:0 0 0 15px rgba(255,68,68,0)}}
.mic-icon{font-size:2em;margin-bottom:5px}
.critique-card{background:linear-gradient(135deg,#1a1a25,#12121a);border:1px solid #2a2a35;border-radius:12px;padding:25px;margin-top:30px;max-width:500px;width:100%;opacity:0;transform:translateY(20px);transition:all 0.5s}
.critique-card.show{opacity:1;transform:translateY(0)}
.verdict{font-size:1.3em;color:#c9a84c;text-align:center;margin:20px 0 15px;font-style:italic;line-height:1.4}
.detail{color:#9a9080;font-size:0.95em;line-height:1.6;margin-top:10px}
.bars{margin:15px 0}
.bar-row{display:flex;align-items:center;margin:6px 0}
.bar-label{width:140px;font-size:0.85em;color:#8a7a5a}
.bar-bg{flex:1;height:8px;background:#1a1a25;border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width 1s ease}
.note{text-align:center;color:#5a5a6a;font-size:0.8em;margin-top:20px}
</style>
</head>
<body>
<h1>Jazz Critic</h1>
<p class="subtitle">Record any sound. Receive pretentious judgment.</p>
<button class="record-btn" id="recBtn" onclick="toggleRecord()">
<span class="mic-icon">&#127908;</span>
<span id="btnText">Record</span>
</button>
<div class="critique-card" id="critique"></div>
<p class="note">Uses your microphone to analyze audio. All processing is local.</p>
<script>
const critiques=[
{verdict:"This lacks modal interchange.",detail:"Your sound exists in a single tonal center, refusing to explore the rich harmonic landscape that Coltrane mapped decades ago. It is as if you have never heard of tritone substitution."},
{verdict:"Interesting use of silence. Unfortunately, unintentional.",detail:"Miles Davis understood that the notes you do not play matter more. You seem to understand neither the notes you play nor the ones you do not."},
{verdict:"The rhythm section would be weeping. If it existed.",detail:"There is a conspicuous absence of swing feel. What you have produced is closer to a metronome with anxiety than anything approaching groove."},
{verdict:"Ah, the Ornette Coleman school of 'anything goes.' But worse.",detail:"Free jazz requires mastery of conventional forms before their deconstruction. This skips straight to deconstruction without the prerequisite construction."},
{verdict:"This has all the harmonic sophistication of a car alarm.",detail:"Where one might expect extended chord voicings or altered dominants, we instead find what can only be described as tonal monotony dressed in accidental dissonance."},
{verdict:"I hear influences of... a garbage disposal in B-flat.",detail:"The timbral choices here suggest either a deliberate provocation or a fundamental misunderstanding of what constitutes musicality in the post-bop tradition."},
{verdict:"Charlie Parker did not die for this.",detail:"The bebop revolution was about liberating jazz from commercial constraints. What you have done is liberate sound from the constraints of pleasantness."},
{verdict:"Bold choice to ignore all 12 notes simultaneously.",detail:"In a chromatic universe of infinite harmonic possibility, you have managed to find the one combination that makes the listener question the entire Western tonal system."},
{verdict:"This swings like a pendulum in concrete.",detail:"The temporal feel here lacks what Ellington called 'that thing.' In fact, it lacks several things, beginning with any discernible pulse."},
{verdict:"Post-modern. Post-tonal. Post-listenable.",detail:"There is a fine line between avant-garde expression and audio assault. You have not so much crossed that line as obliterated it."},
{verdict:"The attack is interesting. The sustain is questionable. The release is a mercy.",detail:"Each sonic event here overstays its welcome like a guest who does not read social cues. Brevity, as Monk proved, is the soul of jazz wit."},
{verdict:"Coltrane did sheets of sound. This is more... napkins of noise.",detail:"The density of your sonic output recalls A Love Supreme in the same way a crayon drawing recalls the Sistine Chapel."},
{verdict:"I detect traces of talent. Trace amounts. Homeopathic levels.",detail:"Somewhere beneath the surface chaos lies what might, with decades of dedicated practice, become the faintest whisper of musicality."},
{verdict:"This has the blue note energy of a corporate team-building exercise.",detail:"Real blues comes from suffering. This sounds like it comes from a moderate inconvenience, like a delayed Amazon package."},
{verdict:"Ah yes, the 'I just discovered the sustain pedal' school.",detail:"Letting everything ring together does not create harmonic richness. It creates what acousticians technically term 'a mess.'"},
{verdict:"Mingus would have thrown a bass at you.",detail:"Charles Mingus was known for his exacting standards and volatile temperament. This performance would have tested both to their absolute limits."},
{verdict:"The phrasing suggests someone who learned jazz from Wikipedia.",detail:"Jazz phrasing requires a deep internalization of the tradition. What I am hearing suggests a skim-read of the introduction paragraph."},
{verdict:"Your dynamics range from 'loud' to 'slightly less loud.'",detail:"The masters understood pianissimo as a weapon. You wield fortissimo like a tourist wielding a selfie stick."},
{verdict:"I have heard more swing from a screen door in a hurricane.",detail:"Swing is not merely a rhythmic concept. It is a philosophical stance. Your philosophical stance appears to be nihilism."},
{verdict:"This occupies the rare space between 'experimental' and 'accidental.'",detail:"The distinction between intentional avant-garde and unintentional chaos is usually evident. Here, it remains genuinely ambiguous."},
{verdict:"The voicings are... certainly choices.",detail:"When Bill Evans reimagined chord voicings, he drew from deep harmonic knowledge. These voicings suggest a deep knowledge of randomness."},
{verdict:"Art Blakey's ghost just asked me to turn it off.",detail:"The Jazz Messengers carried a torch for hard bop. This extinguishes that torch and buries it in a shallow grave."},
{verdict:"It is giving 'smooth jazz hold music for a dentist office.'",detail:"Somewhere between Kenny G and genuine discomfort lies this sonic experience. It numbs without soothing and persists without purpose."},
{verdict:"The only scale you have mastered is the scale of disappointment.",detail:"From Dorian to Mixolydian, the modal universe offers infinite color. You have chosen the sonic equivalent of beige."},
{verdict:"Herbie Hancock's Headhunters wept, and not from nostalgia.",detail:"Quartal harmony opened new vistas for jazz piano. You have managed to close those vistas and board up the windows."},
{verdict:"This redefines 'cool jazz.' In that it makes me feel nothing.",detail:"The West Coast cool school aimed for emotional restraint, not emotional vacancy. There is a canyon-wide difference."},
{verdict:"Your approach to harmony is democratically incorrect.",detail:"Not every note deserves equal time. Some notes should be featured. Others should be gently escorted from the premises."},
{verdict:"I am reminded of Bitches Brew. The bewilderment, not the genius.",detail:"Miles Davis confused audiences intentionally, from a place of mastery. This confusion appears to originate from a very different place."},
{verdict:"The tone suggests a saxophone left in a hot car.",detail:"Timbral warmth requires cultivated embouchure and years of practice. This timbre suggests neither cultivation nor practice of any kind."},
{verdict:"Wayne Shorter would compose a horror suite about this.",detail:"Shorter's compositional genius found beauty in complexity. He would find only complexity here, of the 'what went wrong' variety."},
{verdict:"This has less groove than a flat tire on gravel.",detail:"Groove is the heartbeat of jazz. What I am hearing is closer to cardiac arrest, musically speaking."},
{verdict:"The musical equivalent of mansplaining at a party.",detail:"It is confident, persistent, takes up space, and seems genuinely unaware that everyone wants it to stop."},
{verdict:"Even Yoko Ono would ask you to dial it back.",detail:"There is a place in the avant-garde for challenging sounds. That place has boundaries, and you have found a way to be outside even those."},
{verdict:"This solo goes nowhere, but takes the scenic route.",detail:"A good improvisation tells a story. This tells a story too, but the narrator loses their place and starts over repeatedly."},
{verdict:"Your sense of time is more 'cubist' than 'swing.'",detail:"Playing outside the beat intentionally is an art. Playing outside the beat accidentally is what is happening here."},
{verdict:"I detect the influence of literally no one who practiced.",detail:"Influence in jazz is a lineage. This exists outside all lineage, like a musical cryptid."},
{verdict:"The dissonance is resolved by the track ending.",detail:"Classical resolution of tension is foundational. Your approach to resolution is simply: stop making the sound."},
{verdict:"Ornithology? More like ornithological disaster.",detail:"Parker's composition demands technical mastery and creative fire. What you have brought is a lukewarm creative drizzle."},
{verdict:"This belongs in a museum. Of cautionary tales.",detail:"Some performances are preserved for posterity. This should be preserved as a warning to future generations."},
{verdict:"Your rubato is less 'stolen time' and more 'time served.'",detail:"Expressive timing requires a deep internal clock. Your internal clock appears to be running on a different battery entirely."},
{verdict:"The comping is giving 'random number generator in C major.'",detail:"Rhythmic accompaniment should support and inspire the soloist. This would inspire the soloist to consider a career change."},
{verdict:"McCoy Tyner's quartal voicings are rolling in their harmonic grave.",detail:"Quartal harmony revolutionized jazz piano. You have managed to devolve it back to before the revolution."},
{verdict:"It is jazz. The same way a hot dog is cuisine.",detail:"Technically, it meets the minimum definition. Spiritually, it misses by a distance that would require scientific notation to express."},
{verdict:"The articulation suggests someone playing with oven mitts.",detail:"Clean articulation separates the professional from the amateur. This articulation separates the amateur from the beginner."},
{verdict:"This has the forward motion of a shopping cart with a stuck wheel.",detail:"Jazz thrives on momentum and conversational flow. This has the conversational quality of someone talking to themselves in an elevator."}
];
let mediaRecorder,audioContext,isRecording=false,chunks=[];
async function toggleRecord(){
const btn=document.getElementById('recBtn'),txt=document.getElementById('btnText');
if(!isRecording){
try{
const stream=await navigator.mediaDevices.getUserMedia({audio:true});
audioContext=new AudioContext();
const analyser=audioContext.createAnalyser();
const src=audioContext.createMediaStreamSource(stream);
src.connect(analyser);
mediaRecorder=new MediaRecorder(stream);
chunks=[];
mediaRecorder.ondataavailable=e=>chunks.push(e.data);
mediaRecorder.onstop=()=>{stream.getTracks().forEach(t=>t.stop());generateCritique()};
mediaRecorder.start();
isRecording=true;
btn.classList.add('recording');
txt.textContent='Stop';
setTimeout(()=>{if(isRecording){mediaRecorder.stop();isRecording=false;btn.classList.remove('recording');txt.textContent='Record'}},10000);
}catch(e){alert('Microphone access needed for jazz criticism.')}
}else{mediaRecorder.stop();isRecording=false;btn.classList.remove('recording');txt.textContent='Record';}
}
function generateCritique(){
const c=critiques[Math.floor(Math.random()*critiques.length)];
const scores={'Harmonic Sophistication':Math.floor(Math.random()*25)+5,'Rhythmic Integrity':Math.floor(Math.random()*30)+5,'Tonal Warmth':Math.floor(Math.random()*20)+8,'Swing Factor':Math.floor(Math.random()*25)+3,'Overall Pretentiousness':Math.floor(Math.random()*30)+70};
const colors=['#ff4444','#ff6644','#ffaa44','#c9a84c','#44aa88'];
let html='<div class="verdict">"'+c.verdict+'"</div><div class="bars">';
Object.entries(scores).forEach(([k,v])=>{const ci=v<20?0:v<35?1:v<50?2:v<70?3:4;html+='<div class="bar-row"><span class="bar-label">'+k+'</span><div class="bar-bg"><div class="bar-fill" style="width:'+v+'%;background:'+colors[ci]+'"></div></div></div>';});
html+='</div><div class="detail">'+c.detail+'</div>';
const card=document.getElementById('critique');card.innerHTML=html;card.classList.add('show');
setTimeout(()=>{document.querySelectorAll('.bar-fill').forEach(b=>{const w=b.style.width;b.style.width='0%';setTimeout(()=>b.style.width=w,50)})},100);
}
</script>
</body>
</html>
