<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STAT PADDER | Your Life. ESPN'd.</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Roboto+Condensed:wght@400;700&family=Bebas+Neue&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --espn-red: #c00;
    --espn-dark: #111;
    --espn-darker: #0a0a0a;
    --espn-gray: #1a1a1a;
    --espn-light: #f0f0f0;
    --espn-yellow: #ffcc00;
    --espn-blue: #006bb6;
    --espn-green: #00c853;
    --ticker-speed: 30s;
  }

  body {
    background: var(--espn-darker);
    color: var(--espn-light);
    font-family: 'Roboto Condensed', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── TOP BAR ── */
  .top-bar {
    background: var(--espn-red);
    padding: 6px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .top-bar .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 4px;
    color: white;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
  }
  .top-bar .logo span { color: var(--espn-yellow); }
  .top-bar .tagline {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    opacity: 0.9;
  }

  /* ── TICKER TAPE ── */
  .ticker-wrap {
    background: var(--espn-dark);
    border-bottom: 2px solid var(--espn-red);
    overflow: hidden;
    height: 36px;
    position: relative;
  }
  .ticker-label {
    position: absolute;
    left: 0;
    top: 0;
    height: 100%;
    background: var(--espn-red);
    color: white;
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: 12px;
    padding: 0 14px;
    display: flex;
    align-items: center;
    z-index: 10;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .ticker-label::after {
    content: '';
    position: absolute;
    right: -12px;
    top: 0;
    border-left: 12px solid var(--espn-red);
    border-top: 18px solid transparent;
    border-bottom: 18px solid transparent;
  }
  .ticker {
    display: flex;
    animation: ticker-scroll var(--ticker-speed) linear infinite;
    padding-left: 130px;
    height: 100%;
    align-items: center;
  }
  .ticker-item {
    white-space: nowrap;
    padding: 0 40px;
    font-size: 13px;
    font-family: 'Roboto Condensed', sans-serif;
    color: #ccc;
  }
  .ticker-item .name { color: white; font-weight: 700; }
  .ticker-item .stat { color: var(--espn-yellow); font-weight: 700; }
  .ticker-item .trend-up { color: var(--espn-green); }
  .ticker-item .trend-down { color: var(--espn-red); }
  @keyframes ticker-scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  /* ── MAIN ── */
  .main-content {
    max-width: 800px;
    margin: 0 auto;
    padding: 30px 16px;
  }

  /* ── INPUT AREA ── */
  .input-section {
    background: var(--espn-gray);
    border: 1px solid #333;
    border-radius: 8px;
    padding: 24px;
    margin-bottom: 30px;
    position: relative;
    overflow: hidden;
  }
  .input-section::before {
    content: 'PLAY-BY-PLAY';
    position: absolute;
    top: 0;
    left: 0;
    background: var(--espn-red);
    color: white;
    font-family: 'Oswald', sans-serif;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 14px;
    letter-spacing: 2px;
    border-radius: 8px 0 8px 0;
  }
  .input-section label {
    display: block;
    font-family: 'Oswald', sans-serif;
    font-size: 18px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
    margin-top: 20px;
    color: #aaa;
  }
  .input-row {
    display: flex;
    gap: 10px;
  }
  #activity-input {
    flex: 1;
    background: #222;
    border: 2px solid #444;
    border-radius: 6px;
    color: white;
    font-size: 18px;
    padding: 14px 16px;
    font-family: 'Roboto Condensed', sans-serif;
    transition: border-color 0.2s;
  }
  #activity-input:focus {
    outline: none;
    border-color: var(--espn-red);
  }
  #activity-input::placeholder { color: #555; }
  .analyze-btn {
    background: var(--espn-red);
    color: white;
    border: none;
    border-radius: 6px;
    padding: 14px 28px;
    font-family: 'Oswald', sans-serif;
    font-size: 18px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .analyze-btn:hover { background: #e00; transform: scale(1.02); }
  .analyze-btn:active { transform: scale(0.98); }

  .examples {
    margin-top: 14px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .example-chip {
    background: #222;
    border: 1px solid #444;
    color: #aaa;
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .example-chip:hover { background: #333; color: white; border-color: var(--espn-red); }

  /* ── STAT CARD ── */
  .stat-card {
    display: none;
    background: var(--espn-gray);
    border: 1px solid #333;
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 20px;
    animation: card-in 0.5s ease-out;
  }
  .stat-card.visible { display: block; }
  @keyframes card-in {
    from { opacity: 0; transform: translateY(20px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .card-header {
    background: linear-gradient(135deg, var(--espn-red), #900);
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: relative;
  }
  .card-header .breaking {
    position: absolute;
    top: 0;
    right: 0;
    background: var(--espn-yellow);
    color: black;
    font-family: 'Oswald', sans-serif;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 10px;
    letter-spacing: 2px;
    animation: flash 1.5s infinite;
  }
  @keyframes flash {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  .card-header h2 {
    font-family: 'Oswald', sans-serif;
    font-size: 26px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    line-height: 1.1;
  }
  .card-header .category {
    font-family: 'Oswald', sans-serif;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    opacity: 0.8;
    background: rgba(0,0,0,0.3);
    padding: 3px 10px;
    border-radius: 3px;
    white-space: nowrap;
  }

  .stat-hero {
    display: flex;
    align-items: center;
    padding: 24px 20px;
    gap: 24px;
    border-bottom: 1px solid #333;
  }
  .hero-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 80px;
    line-height: 1;
    color: var(--espn-yellow);
    text-shadow: 3px 3px 0 rgba(0,0,0,0.5);
    min-width: 100px;
    text-align: center;
  }
  .hero-details {
    flex: 1;
  }
  .hero-details .unit {
    font-family: 'Oswald', sans-serif;
    font-size: 22px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: white;
  }
  .hero-details .context {
    color: #888;
    font-size: 14px;
    margin-top: 4px;
  }

  .stat-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: #333;
  }
  .stat-box {
    background: var(--espn-gray);
    padding: 16px;
    text-align: center;
  }
  .stat-box .label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #888;
    font-family: 'Oswald', sans-serif;
    margin-bottom: 6px;
  }
  .stat-box .value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: white;
  }
  .stat-box .value.green { color: var(--espn-green); }
  .stat-box .value.yellow { color: var(--espn-yellow); }
  .stat-box .value.red { color: var(--espn-red); }

  .stat-bar-section {
    padding: 16px 20px;
    border-top: 1px solid #333;
  }
  .stat-bar-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    text-transform: uppercase;
    font-family: 'Oswald', sans-serif;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .stat-bar-label .pct { color: var(--espn-yellow); }
  .stat-bar-track {
    background: #333;
    border-radius: 4px;
    height: 10px;
    overflow: hidden;
  }
  .stat-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--espn-red), var(--espn-yellow));
    border-radius: 4px;
    width: 0;
    transition: width 1s ease-out;
  }

  .commentary {
    padding: 16px 20px;
    border-top: 1px solid #333;
    font-style: italic;
    color: #aaa;
    font-size: 14px;
    line-height: 1.5;
  }
  .commentary .analyst {
    color: var(--espn-yellow);
    font-weight: 700;
    font-style: normal;
    font-family: 'Oswald', sans-serif;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 20px;
    border-top: 1px solid #333;
    background: #151515;
  }
  .card-footer .timestamp {
    font-size: 11px;
    color: #555;
    text-transform: uppercase;
    font-family: 'Oswald', sans-serif;
    letter-spacing: 1px;
  }
  .share-btns {
    display: flex;
    gap: 8px;
  }
  .share-btn {
    background: #333;
    border: none;
    color: #aaa;
    padding: 6px 14px;
    border-radius: 4px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'Roboto Condensed', sans-serif;
    transition: all 0.2s;
  }
  .share-btn:hover { background: var(--espn-red); color: white; }

  /* ── HISTORY ── */
  .history-section {
    margin-top: 30px;
  }
  .history-header {
    font-family: 'Oswald', sans-serif;
    font-size: 16px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #666;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .history-header::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #333;
  }
  .history-item {
    background: var(--espn-gray);
    border: 1px solid #282828;
    border-radius: 6px;
    padding: 12px 16px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    transition: all 0.2s;
  }
  .history-item:hover { border-color: var(--espn-red); }
  .history-item .h-activity {
    font-family: 'Oswald', sans-serif;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .history-item .h-stat {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--espn-yellow);
  }

  /* ── SOUND TOGGLE ── */
  .sound-toggle {
    position: fixed;
    bottom: 16px;
    right: 16px;
    background: var(--espn-gray);
    border: 1px solid #333;
    color: #aaa;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 50;
    transition: all 0.2s;
  }
  .sound-toggle:hover { background: var(--espn-red); color: white; }
  .sound-toggle.muted { opacity: 0.4; }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 70px;
    right: 16px;
    background: var(--espn-green);
    color: black;
    padding: 10px 20px;
    border-radius: 6px;
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-size: 13px;
    transform: translateY(20px);
    opacity: 0;
    transition: all 0.3s;
    z-index: 200;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .top-bar .tagline { display: none; }
    .input-row { flex-direction: column; }
    .analyze-btn { width: 100%; }
    .stat-grid { grid-template-columns: repeat(2, 1fr); }
    .hero-number { font-size: 56px; min-width: 70px; }
    .card-header h2 { font-size: 20px; }
    .stat-hero { padding: 16px; gap: 16px; }
    .card-footer { flex-direction: column; gap: 10px; }
  }
</style>
</head>

// ── PARSE & MATCH ──
function parseInput(text) {
  for (const tpl of TEMPLATES) {
    for (const pat of tpl.patterns) {
      const m = text.match(pat);
      if (m) {
        const num = parseInt(m[1]);
        if (!isNaN(num) && num > 0) return { template: tpl, count: num, raw: text };
      }
    }
  }
  // try to find any number
  const numMatch = text.match(/(\d+)/);
  if (numMatch) {
    const num = parseInt(numMatch[1]);
    if (num > 0) {
      // try to extract activity name
      const cleaned = text.replace(/\d+/g, '').replace(/\b(i|my|the|a|an|some|did|had|was|got|took|made|went)\b/gi, '').trim();
      const actName = cleaned.length > 2 ? cleaned.toUpperCase().replace(/\s+/g, ' ').substring(0, 30) : 'ACTIVITY';
      const gen = { ...GENERIC, activity: actName, unit: actName };
      return { template: gen, count: num, raw: text };
    }
  }
  return null;
}

function randBetween(a, b) { return +(a + Math.random() * (b - a)).toFixed(1); }
function randInt(a, b) { return Math.floor(a + Math.random() * (b - a + 1)); }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function generateStats(parsed) {
  const t = parsed.template;
  const count = parsed.count;
  const seasonAvg = randBetween(t.seasonAvg[0], t.seasonAvg[1]);
  const leagueRank = randInt(t.leagueRank[0], t.leagueRank[1]);
  const careerHigh = randInt(t.careerHigh[0], t.careerHigh[1]);
  const careerHighEvent = pick(t.careerHighEvent);

  // derived stats
  const vsAvg = ((count / seasonAvg - 1) * 100).toFixed(0);
  const streak = randInt(1, 8);
  const percentile = Math.max(1, Math.min(99, 100 - leagueRank));

  return {
    activity: t.activity,
    unit: t.unit,
    category: t.category,
    count,
    seasonAvg,
    leagueRank,
    careerHigh,
    careerHighEvent,
    vsAvg,
    streak,
    percentile,
    commentary: pick(t.commentary),
    analyst: pick(ANALYSTS),
    isCareerHigh: count >= careerHigh,
    barPct: Math.min(100, Math.round((count / careerHigh) * 100))
  };
}

// ── SHARE FUNCTIONS ──
let lastStats = null;

function getShareText() {
  if (!lastStats) return '';
  return `${lastStats.activity}: ${lastStats.count} ${lastStats.unit}\nSeason Avg: ${lastStats.seasonAvg} | League Rank: Top ${lastStats.leagueRank}% | Career High: ${lastStats.careerHigh}\n"${lastStats.commentary}" - ${lastStats.analyst}\n\nvia STATPADDER`;
}

function copyStats() {
  navigator.clipboard.writeText(getShareText()).then(() => showToast('Copied to clipboard!'));
}

function shareStats() {
  if (navigator.share) {
    navigator.share({ title: 'STATPADDER', text: getShareText() }).catch(() => {});
  } else {
    copyStats();
  }
}

function tweetStats() {
  const text = encodeURIComponent(getShareText());
  window.open(`https://twitter.com/intent/tweet?text=${text}`, '_blank');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function toggleSound() {
  soundEnabled = !soundEnabled;
  const btn = document.getElementById('sound-toggle');
  btn.innerHTML = soundEnabled ? '&#x1f50a;' : '&#x1f507;';
  btn.classList.toggle('muted', !soundEnabled);
}

function playHighlightSound() {
  if (!soundEnabled) return;
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    // ESPN-style dramatic stinger
    const now = audioCtx.currentTime;
    // bass hit
    const osc1 = audioCtx.createOscillator();
    const gain1 = audioCtx.createGain();
    osc1.type = 'sine';
    osc1.frequency.setValueAtTime(80, now);
    osc1.frequency.exponentialRampToValueAtTime(40, now + 0.3);
    gain1.gain.setValueAtTime(0.6, now);
    gain1.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
    osc1.connect(gain1).connect(audioCtx.destination);
    osc1.start(now);
    osc1.stop(now + 0.4);

    // rising synth
    const osc2 = audioCtx.createOscillator();
    const gain2 = audioCtx.createGain();
    osc2.type = 'sawtooth';
    osc2.frequency.setValueAtTime(200, now + 0.05);
    osc2.frequency.exponentialRampToValueAtTime(600, now + 0.25);
    gain2.gain.setValueAtTime(0.15, now + 0.05);
    gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.35);
    osc2.connect(gain2).connect(audioCtx.destination);
    osc2.start(now + 0.05);
    osc2.stop(now + 0.35);

    // high chime
    const osc3 = audioCtx.createOscillator();
    const gain3 = audioCtx.createGain();
    osc3.type = 'triangle';
    osc3.frequency.setValueAtTime(880, now + 0.15);
    gain3.gain.setValueAtTime(0.2, now + 0.15);
    gain3.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
    osc3.connect(gain3).connect(audioCtx.destination);
    osc3.start(now + 0.15);
    osc3.stop(now + 0.6);

    // second chime (higher)
    const osc4 = audioCtx.createOscillator();
    const gain4 = audioCtx.createGain();
    osc4.type = 'triangle';
    osc4.frequency.setValueAtTime(1100, now + 0.3);
    gain4.gain.setValueAtTime(0.15, now + 0.3);
    gain4.gain.exponentialRampToValueAtTime(0.01, now + 0.7);
    osc4.connect(gain4).connect(audioCtx.destination);
    osc4.start(now + 0.3);
    osc4.stop(now + 0.7);

  } catch(e) {}
}

// ── ANALYZE ──
function analyze() {
  const input = document.getElementById('activity-input');
  const text = input.value.trim();
  if (!text) return;

  const parsed = parseInput(text);
  if (!parsed) {
    showToast('No stat detected. Try: "I ate 3 tacos"');
    return;
  }

  const stats = generateStats(parsed);
  lastStats = stats;
  renderCard(stats);
  playHighlightSound();

  // save to history
  history.unshift({ text, stats, timestamp: Date.now() });
  if (history.length > 20) history = history.slice(0, 20);
  localStorage.setItem('statpadder_history', JSON.stringify(history));
  renderHistory();

  input.value = '';
  input.focus();

  // scroll to card on mobile
  if (window.innerWidth < 600) {
    document.getElementById('stat-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

// ── HISTORY ──
function renderHistory() {
  const el = document.getElementById('history-list');
  if (history.length === 0) {
    el.innerHTML = '<div style="color:#444;text-align:center;padding:20px;font-style:italic;">No stats recorded yet. Start padding.</div>';
    return;
  }
  el.innerHTML = history.map((h, i) => {
    const ago = timeAgo(h.timestamp);
    return `<div class="history-item" onclick="replayHistory(${i})">
      <div class="h-activity">${h.stats.activity}</div>
      <div style="display:flex;align-items:center;gap:12px;">
        <span style="color:#555;font-size:11px;">${ago}</span>
        <div class="h-stat">${h.stats.count}</div>
      </div>
    </div>`;
  }).join('');
}

function replayHistory(idx) {
  const h = history[idx];
  lastStats = h.stats;
  renderCard(h.stats);
  playHighlightSound();
  document.getElementById('stat-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function timeAgo(ts) {
  const diff = Date.now() - ts;
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  const days = Math.floor(hrs / 24);
  return days + 'd ago';
}
