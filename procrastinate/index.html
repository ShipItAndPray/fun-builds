<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Procrastination Guilt Timer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #0a0a0f;
    color: #e0e0e0;
    min-height: 100vh;
    overflow-x: hidden;
  }
  .container { max-width: 600px; margin: 0 auto; padding: 20px; }
  h1 {
    text-align: center;
    font-size: 1.8rem;
    margin: 20px 0 8px;
    background: linear-gradient(135deg, #ff6b6b, #ffa500);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle { text-align: center; color: #666; font-size: 0.9rem; margin-bottom: 30px; }

  /* Input Section */
  .input-section {
    display: flex;
    gap: 10px;
    margin-bottom: 30px;
  }
  .input-section input {
    flex: 1;
    padding: 14px 18px;
    border: 2px solid #222;
    border-radius: 12px;
    background: #111;
    color: #fff;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.3s;
  }
  .input-section input:focus { border-color: #ff6b6b; }
  .input-section input::placeholder { color: #444; }
  .btn-start {
    padding: 14px 24px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #ff6b6b, #ee5a24);
    color: #fff;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    white-space: nowrap;
  }
  .btn-start:hover { transform: scale(1.05); box-shadow: 0 4px 20px rgba(255,107,107,0.4); }

  /* Timer Display */
  .timer-section { display: none; text-align: center; }
  .timer-section.active { display: block; }
  .task-name-display {
    font-size: 1.1rem;
    color: #888;
    margin-bottom: 8px;
  }
  .task-name-display span { color: #ff6b6b; font-weight: 600; }
  .timer-display {
    font-size: 3.5rem;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    letter-spacing: 2px;
    margin: 10px 0 20px;
    transition: color 1s;
  }

  /* Guilt Meter */
  .guilt-meter-label {
    font-size: 0.85rem;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .guilt-meter-wrap {
    background: #151520;
    border-radius: 20px;
    height: 28px;
    overflow: hidden;
    margin-bottom: 24px;
    position: relative;
    border: 1px solid #222;
  }
  .guilt-meter-bar {
    height: 100%;
    width: 0%;
    border-radius: 20px;
    transition: width 2s ease, background 2s ease;
  }
  .guilt-meter-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 0.75rem;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    white-space: nowrap;
  }

  /* Guilt Message */
  .guilt-message {
    background: #111118;
    border-left: 4px solid #ff6b6b;
    border-radius: 0 12px 12px 0;
    padding: 16px 20px;
    margin: 20px 0;
    font-size: 1rem;
    line-height: 1.5;
    min-height: 60px;
    transition: border-color 1s;
    text-align: left;
  }

  /* Victory Button */
  .btn-victory {
    display: inline-block;
    padding: 18px 48px;
    border: none;
    border-radius: 16px;
    background: linear-gradient(135deg, #00b894, #00cec9);
    color: #fff;
    font-size: 1.3rem;
    font-weight: 800;
    cursor: pointer;
    margin: 20px 0;
    transition: transform 0.2s, box-shadow 0.2s;
    animation: pulse 2s infinite;
  }
  .btn-victory:hover {
    transform: scale(1.08);
    box-shadow: 0 6px 30px rgba(0,184,148,0.5);
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(0,184,148,0.4); }
    50% { box-shadow: 0 0 0 12px rgba(0,184,148,0); }
  }

  .btn-cancel {
    background: none;
    border: none;
    color: #444;
    cursor: pointer;
    font-size: 0.85rem;
    margin-top: 8px;
    padding: 8px;
  }
  .btn-cancel:hover { color: #888; }

  /* Victory Screen */
  .victory-screen {
    display: none;
    text-align: center;
    padding: 40px 0;
  }
  .victory-screen.active { display: block; }
  .victory-screen h2 {
    font-size: 2.5rem;
    margin-bottom: 10px;
    background: linear-gradient(135deg, #00b894, #fdcb6e, #e17055);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .victory-stats { color: #888; font-size: 1rem; margin-bottom: 20px; }
  .btn-new {
    padding: 12px 30px;
    border: 2px solid #333;
    border-radius: 12px;
    background: transparent;
    color: #aaa;
    font-size: 0.95rem;
    cursor: pointer;
    transition: border-color 0.3s, color 0.3s;
  }
  .btn-new:hover { border-color: #ff6b6b; color: #ff6b6b; }

  /* Task History */
  .history-section { margin-top: 40px; }
  .history-section h3 {
    font-size: 1rem;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .history-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    background: #111118;
    border-radius: 10px;
    margin-bottom: 8px;
    font-size: 0.9rem;
  }
  .history-item .task { color: #ccc; flex: 1; }
  .history-item .time {
    color: #ff6b6b;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    margin: 0 12px;
    white-space: nowrap;
  }
  .history-item .status { font-size: 1.1rem; }
  .no-history { color: #333; text-align: center; padding: 20px; font-style: italic; }

  .clear-history {
    background: none;
    border: 1px solid #222;
    color: #444;
    padding: 6px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.75rem;
    margin-left: auto;
  }
  .clear-history:hover { border-color: #ff6b6b; color: #ff6b6b; }

  /* Confetti Canvas */
  #confetti-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 9999;
  }

  /* Screen shake */
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-3px); }
    75% { transform: translateX(3px); }
  }
  .shake { animation: shake 0.3s ease-in-out; }

  /* Responsive */
  @media (max-width: 480px) {
    .container { padding: 12px; }
    h1 { font-size: 1.4rem; }
    .timer-display { font-size: 2.5rem; }
    .input-section { flex-direction: column; }
    .btn-start { width: 100%; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>Procrastination Guilt Timer</h1>
  <p class="subtitle">Track how long you've been avoiding the inevitable</p>

  <!-- Input -->
  <div class="input-section" id="inputSection">
    <input type="text" id="taskInput" placeholder="What are you avoiding?" maxlength="80" autofocus>
    <button class="btn-start" id="startBtn">Start Avoiding</button>
  </div>

  <!-- Timer -->
  <div class="timer-section" id="timerSection">
    <p class="task-name-display">Avoiding: <span id="taskLabel"></span></p>
    <div class="timer-display" id="timerDisplay">00:00:00</div>

    <div class="guilt-meter-label">Guilt Level</div>
    <div class="guilt-meter-wrap">
      <div class="guilt-meter-bar" id="guiltBar"></div>
      <div class="guilt-meter-text" id="guiltText">Innocent... for now</div>
    </div>

    <div class="guilt-message" id="guiltMessage">The clock is ticking. Your task awaits.</div>

    <button class="btn-victory" id="victoryBtn">I DID IT</button>
    <br>
    <button class="btn-cancel" id="cancelBtn">Abandon task (coward)</button>
  </div>

  <!-- Victory -->
  <div class="victory-screen" id="victoryScreen">
    <h2>YOU ACTUALLY DID IT</h2>
    <p class="victory-stats" id="victoryStats"></p>
    <button class="btn-new" id="newTaskBtn">Procrastinate something else</button>
  </div>

  <!-- History -->
  <div class="history-section">
    <h3>
      <span>Shame Log</span>
      <button class="clear-history" id="clearHistoryBtn">Clear</button>
    </h3>
    <div id="historyList"></div>
  </div>
</div>

<canvas id="confetti-canvas"></canvas>

<script>
// ---- Audio Context for ominous sounds ----
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playOminousTone(level) {
  // level 0-1: higher = more ominous
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);

    const baseFreq = 120 - level * 80; // Lower = more ominous
    osc.frequency.value = baseFreq;
    osc.type = level > 0.7 ? 'sawtooth' : level > 0.4 ? 'triangle' : 'sine';

    const vol = 0.05 + level * 0.1;
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.5 + level);

    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 1.5 + level);

    // Add a second detuned oscillator for creepiness at higher levels
    if (level > 0.3) {
      const osc2 = ctx.createOscillator();
      const gain2 = ctx.createGain();
      osc2.connect(gain2);
      gain2.connect(ctx.destination);
      osc2.frequency.value = baseFreq * 1.01;
      osc2.type = 'sine';
      gain2.gain.setValueAtTime(vol * 0.5, ctx.currentTime);
      gain2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 2);
      osc2.start(ctx.currentTime);
      osc2.stop(ctx.currentTime + 2);
    }
  } catch (e) { /* audio not supported, no problem */ }
}

function playVictorySound() {
  try {
    const ctx = getAudioCtx();
    const notes = [523, 659, 784, 1047]; // C5 E5 G5 C6
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.12, ctx.currentTime + i * 0.15);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.15 + 0.5);
      osc.start(ctx.currentTime + i * 0.15);
      osc.stop(ctx.currentTime + i * 0.15 + 0.5);
    });
  } catch (e) {}
}

// ---- Guilt Messages (40+ templates, escalating) ----
const guiltMessages = [
  // Tier 1: 0-5 min (Gentle)
  [
    "You just started procrastinating. There's still hope for you.",
    "The task is patiently waiting. Like a dog at the door.",
    "It's fine. You're just... warming up. Right?",
    "Five minutes. Not even a record. Yet.",
    "Your task politely clears its throat.",
    "Every journey of a thousand miles begins with not starting.",
  ],
  // Tier 2: 5-15 min (Mild concern)
  [
    "Okay, it's been a bit. The task is starting to wonder.",
    "Your future self just sighed. You can't hear it, but it happened.",
    "The procrastination is strong with this one.",
    "Somewhere, a productivity guru just felt a disturbance in the force.",
    "You've now spent more time NOT doing the task than it would take to START it.",
    "Your task sent you a text. You left it on read.",
    "A motivational poster just caught fire somewhere.",
  ],
  // Tier 3: 15-30 min (Growing concern)
  [
    "Fifteen minutes. Your task is pacing back and forth now.",
    "The guilt meter is rising. Can you feel it? That's shame.",
    "Your task has started a support group with other abandoned tasks.",
    "Historians will refer to this period as 'The Great Avoidance.'",
    "Your task just updated its LinkedIn to 'Open to New Owners.'",
    "If procrastination were an Olympic sport, you'd still be too lazy to compete.",
    "Your task is writing a memoir: 'Waiting: A Story of Neglect.'",
  ],
  // Tier 4: 30-60 min (Dramatic)
  [
    "Half an hour. The task has begun composing a strongly worded letter.",
    "Your task has hired a lawyer. This is getting serious.",
    "The task is now trending on Twitter. #Abandoned",
    "At this point, the task has more commitment issues than you do.",
    "Your task just filed a missing persons report... for your motivation.",
    "Thirty minutes of your finite existence, gone. The task remains.",
    "A tumbleweed just rolled across your to-do list.",
    "Your task has started seeing other people.",
  ],
  // Tier 5: 1-2 hours (Existential)
  [
    "It's been over an hour. The task is now sentient and disappointed in you.",
    "Your procrastination has achieved a level scientists thought impossible.",
    "The task has gained consciousness, contemplated existence, and concluded you're the problem.",
    "One hour. That's 1/24th of a day. 1/8760th of a year. Wasted. Beautifully wasted.",
    "Your task just won an award for 'Most Patient Entity in the Universe.'",
    "At this rate, the heat death of the universe will arrive before you start.",
    "The task has evolved. It now has feelings. They are hurt.",
    "Congratulations: you've procrastinated longer than some mammals live.",
  ],
  // Tier 6: 2-4 hours (Absurd)
  [
    "Two hours. Your task has started a religion. You are the cautionary tale.",
    "The task has written, directed, and starred in a documentary about your avoidance.",
    "Your procrastination is now visible from space.",
    "The task has achieved enlightenment. It pities you now.",
    "At this point, archaeologists will one day study this procrastination event.",
    "Your task has unionized with other neglected responsibilities. They're striking.",
    "Two hours. The task is no longer angry. It's just... disappointed.",
    "NASA has detected your procrastination field. It's warping spacetime.",
  ],
  // Tier 7: 4+ hours (Nuclear)
  [
    "FOUR HOURS. This isn't procrastination anymore. This is performance art.",
    "Your task has filed for emancipation and been approved.",
    "The United Nations has issued a formal statement about your procrastination.",
    "Your avoidance has been classified as a natural disaster.",
    "Scientists are studying you. You are now a cautionary exhibit.",
    "The task has moved on. It's doing great, actually. Better without you.",
    "Your procrastination has its own Wikipedia page now.",
    "Legends say if you listen closely, you can hear your potential weeping.",
    "At this point, just tell people you're a professional procrastinator. Own it.",
    "The task has evolved beyond needing you. It completed itself out of spite.",
  ],
];

const guiltLevels = [
  { name: "Innocent... for now", color: "#00b894" },
  { name: "Mildly Guilty", color: "#00cec9" },
  { name: "Moderately Ashamed", color: "#fdcb6e" },
  { name: "Deeply Guilty", color: "#e17055" },
  { name: "Existential Crisis", color: "#d63031" },
  { name: "Beyond Redemption", color: "#6c5ce7" },
  { name: "Cosmic Shame", color: "#a029f0" },
  { name: "NUCLEAR GUILT", color: "#ff0044" },
];

// ---- State ----
let taskName = '';
let startTime = null;
let timerInterval = null;
let lastMessageIndex = -1;
let lastTier = -1;
let messageInterval = null;
let history = JSON.parse(localStorage.getItem('procrastinate-history') || '[]');

// ---- Elements ----
const inputSection = document.getElementById('inputSection');
const taskInput = document.getElementById('taskInput');
const startBtn = document.getElementById('startBtn');
const timerSection = document.getElementById('timerSection');
const taskLabel = document.getElementById('taskLabel');
const timerDisplay = document.getElementById('timerDisplay');
const guiltBar = document.getElementById('guiltBar');
const guiltText = document.getElementById('guiltText');
const guiltMessage = document.getElementById('guiltMessage');
const victoryBtn = document.getElementById('victoryBtn');
const cancelBtn = document.getElementById('cancelBtn');
const victoryScreen = document.getElementById('victoryScreen');
const victoryStats = document.getElementById('victoryStats');
const newTaskBtn = document.getElementById('newTaskBtn');
const historyList = document.getElementById('historyList');
const clearHistoryBtn = document.getElementById('clearHistoryBtn');

// ---- Functions ----
function formatTime(ms) {
  const totalSec = Math.floor(ms / 1000);
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function formatTimeHuman(ms) {
  const totalSec = Math.floor(ms / 1000);
  if (totalSec < 60) return `${totalSec} second${totalSec !== 1 ? 's' : ''}`;
  const m = Math.floor(totalSec / 60);
  const s = totalSec % 60;
  if (m < 60) return `${m} minute${m !== 1 ? 's' : ''} and ${s} second${s !== 1 ? 's' : ''}`;
  const h = Math.floor(m / 60);
  const rm = m % 60;
  return `${h} hour${h !== 1 ? 's' : ''} and ${rm} minute${rm !== 1 ? 's' : ''}`;
}

function getTier(elapsedMs) {
  const mins = elapsedMs / 60000;
  if (mins < 5) return 0;
  if (mins < 15) return 1;
  if (mins < 30) return 2;
  if (mins < 60) return 3;
  if (mins < 120) return 4;
  if (mins < 240) return 5;
  return 6;
}

function getGuiltPercent(elapsedMs) {
  const mins = elapsedMs / 60000;
  return Math.min(100, (mins / 240) * 100);
}

function getGuiltLevelIndex(elapsedMs) {
  const pct = getGuiltPercent(elapsedMs);
  return Math.min(guiltLevels.length - 1, Math.floor(pct / (100 / guiltLevels.length)));
}

function getTimerColor(elapsedMs) {
  const mins = elapsedMs / 60000;
  if (mins < 5) return '#00b894';
  if (mins < 15) return '#fdcb6e';
  if (mins < 30) return '#e17055';
  if (mins < 60) return '#d63031';
  if (mins < 120) return '#6c5ce7';
  return '#ff0044';
}

function pickMessage(tier) {
  const tierMsgs = guiltMessages[Math.min(tier, guiltMessages.length - 1)];
  let idx;
  do {
    idx = Math.floor(Math.random() * tierMsgs.length);
  } while (idx === lastMessageIndex && tierMsgs.length > 1);
  lastMessageIndex = idx;
  return tierMsgs[idx];
}

function updateDisplay() {
  const elapsed = Date.now() - startTime;
  timerDisplay.textContent = formatTime(elapsed);
  timerDisplay.style.color = getTimerColor(elapsed);

  const pct = getGuiltPercent(elapsed);
  const lvlIdx = getGuiltLevelIndex(elapsed);
  const lvl = guiltLevels[lvlIdx];
  guiltBar.style.width = pct + '%';
  guiltBar.style.background = `linear-gradient(90deg, ${lvl.color}88, ${lvl.color})`;
  guiltText.textContent = lvl.name;
  guiltMessage.style.borderColor = lvl.color;
}

function showNewMessage() {
  const elapsed = Date.now() - startTime;
  const tier = getTier(elapsed);
  const msg = pickMessage(tier);
  guiltMessage.style.opacity = '0';
  setTimeout(() => {
    guiltMessage.textContent = msg;
    guiltMessage.style.opacity = '1';
  }, 300);

  // Play sound
  const level = Math.min(1, elapsed / (4 * 3600000));
  playOminousTone(level);

  // Screen shake at higher tiers
  if (tier >= 3) {
    document.body.classList.add('shake');
    setTimeout(() => document.body.classList.remove('shake'), 300);
  }
}

function startTimer() {
  const name = taskInput.value.trim();
  if (!name) { taskInput.focus(); return; }

  taskName = name;
  startTime = Date.now();
  lastMessageIndex = -1;
  lastTier = -1;

  taskLabel.textContent = taskName;
  inputSection.style.display = 'none';
  victoryScreen.classList.remove('active');
  timerSection.classList.add('active');
  guiltMessage.style.opacity = '1';
  guiltMessage.textContent = 'The clock is ticking. Your task awaits.';

  timerInterval = setInterval(updateDisplay, 1000);
  // New message every 5 minutes (first one at 30s for quick feedback, then every 5min)
  setTimeout(() => {
    showNewMessage();
    messageInterval = setInterval(showNewMessage, 5 * 60 * 1000);
  }, 30000);

  updateDisplay();
}

function endTask(completed) {
  clearInterval(timerInterval);
  clearInterval(messageInterval);
  timerInterval = null;
  messageInterval = null;

  const elapsed = Date.now() - startTime;

  // Save to history
  history.unshift({
    task: taskName,
    elapsed,
    completed,
    date: new Date().toISOString(),
  });
  if (history.length > 50) history.length = 50;
  localStorage.setItem('procrastinate-history', JSON.stringify(history));

  timerSection.classList.remove('active');

  if (completed) {
    playVictorySound();
    launchConfetti();
    victoryStats.textContent = `You completed "${taskName}" after procrastinating for ${formatTimeHuman(elapsed)}. We're so proud. Mostly relieved.`;
    victoryScreen.classList.add('active');
  } else {
    showScreen('input');
  }

  renderHistory();
}

function showScreen(screen) {
  inputSection.style.display = screen === 'input' ? 'flex' : 'none';
  timerSection.classList.toggle('active', screen === 'timer');
  victoryScreen.classList.toggle('active', screen === 'victory');
  if (screen === 'input') taskInput.value = '';
}

function renderHistory() {
  if (history.length === 0) {
    historyList.innerHTML = '<div class="no-history">No procrastination recorded yet. Lucky you.</div>';
    return;
  }
  historyList.innerHTML = history.map(h => {
    const icon = h.completed ? '<span title="Completed">&#10004;</span>' : '<span title="Abandoned">&#128128;</span>';
    return `<div class="history-item">
      <span class="task">${escapeHtml(h.task)}</span>
      <span class="time">${formatTime(h.elapsed)}</span>
      <span class="status">${icon}</span>
    </div>`;
  }).join('');
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ---- Confetti ----
function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const pieces = [];
  const colors = ['#ff6b6b','#00b894','#fdcb6e','#6c5ce7','#e17055','#00cec9','#fd79a8','#ffeaa7'];

  for (let i = 0; i < 200; i++) {
    pieces.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height - canvas.height,
      w: Math.random() * 10 + 5,
      h: Math.random() * 6 + 3,
      color: colors[Math.floor(Math.random() * colors.length)],
      vx: (Math.random() - 0.5) * 6,
      vy: Math.random() * 4 + 2,
      rot: Math.random() * 360,
      rotV: (Math.random() - 0.5) * 10,
      life: 1,
    });
  }

  let frame = 0;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;
    pieces.forEach(p => {
      if (p.life <= 0) return;
      alive = true;
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.08;
      p.rot += p.rotV;
      if (p.y > canvas.height + 20) { p.life = 0; return; }
      if (frame > 120) p.life -= 0.02;

      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot * Math.PI / 180);
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      ctx.restore();
    });
    frame++;
    if (alive) requestAnimationFrame(draw);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  draw();
}

// ---- Events ----
startBtn.addEventListener('click', startTimer);
taskInput.addEventListener('keydown', e => { if (e.key === 'Enter') startTimer(); });
victoryBtn.addEventListener('click', () => endTask(true));
cancelBtn.addEventListener('click', () => endTask(false));
newTaskBtn.addEventListener('click', () => showScreen('input'));
clearHistoryBtn.addEventListener('click', () => {
  history = [];
  localStorage.removeItem('procrastinate-history');
  renderHistory();
});

// Init
renderHistory();
</script>
