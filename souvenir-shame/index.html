<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Souvenir Shame</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#0f0a1a;color:#ddd;min-height:100vh;padding:20px;display:flex;flex-direction:column;align-items:center}
h1{font-size:2em;color:#e67e22;margin:15px 0 5px}
.subtitle{color:#777;margin-bottom:25px}
.form{max-width:420px;width:100%;display:flex;flex-direction:column;gap:12px}
label{color:#888;font-size:0.85em}
input,select{background:#1a1525;border:1px solid #2a2540;border-radius:8px;padding:12px;color:#ddd;font-size:1em;width:100%}
button{background:#e67e22;color:#fff;border:none;padding:14px;border-radius:8px;font-size:1.1em;font-weight:bold;cursor:pointer}
.result{max-width:420px;width:100%;margin-top:25px;display:none}
.result.show{display:block;animation:pop 0.3s}
@keyframes pop{from{transform:scale(0.95);opacity:0}to{transform:scale(1);opacity:1}}
.scale{display:flex;height:30px;border-radius:15px;overflow:hidden;margin:15px 0;position:relative}
.scale-fill{height:100%;transition:width 0.8s}
.scale-labels{display:flex;justify-content:space-between;font-size:0.75em;color:#666}
.verdict-card{background:#1a1525;border-radius:12px;padding:25px;text-align:center}
.verdict-emoji{font-size:3em;margin-bottom:10px}
.verdict-text{font-size:1.3em;font-weight:bold;margin-bottom:10px;line-height:1.3}
.verdict-detail{color:#999;font-size:0.9em;line-height:1.5}
.shame-score{font-size:2em;font-weight:bold;margin:10px 0}
.tag{display:inline-block;padding:4px 10px;border-radius:12px;font-size:0.8em;margin:3px;background:#2a2540}
</style>
</head>
<body>
<h1>Souvenir Shame</h1>
<p class="subtitle">Rate your travel purchases. Face the truth.</p>
<div class="form">
<div><label>What did you buy?</label><input id="item" placeholder="e.g., miniature Eiffel Tower"></div>
<div><label>How much did you pay?</label><input id="price" type="number" placeholder="USD"></div>
<div><label>Where did you buy it?</label>
<select id="where"><option value="airport">Airport gift shop</option><option value="tourist">Tourist attraction gift shop</option><option value="market">Local market</option><option value="street">Street vendor</option><option value="museum">Museum shop</option><option value="online">Online (after returning home)</option><option value="fancy">Boutique/gallery</option></select></div>
<div><label>Who is it for?</label>
<select id="who"><option value="self">Myself</option><option value="family">Family member</option><option value="friend">Friend</option><option value="coworker">Coworker (obligation)</option><option value="nobody">Nobody... yet</option></select></div>
<button onclick="judge()">JUDGE MY SOUVENIR</button>
</div>
<div class="result" id="result"></div>
<script>
const verdicts=[
{min:0,max:10,emoji:"&#127942;",text:"Legitimately Meaningful Purchase",detail:"Against all odds, you bought something with actual cultural value. This will not collect dust. Probably.",tags:["Authentic","Tasteful","Actually useful"]},
{min:10,max:20,emoji:"&#128077;",text:"Respectable Souvenir",detail:"A solid choice. You will display this for at least 6 months before it migrates to a drawer.",tags:["Decent","Will mention once","Drawer-bound"]},
{min:20,max:35,emoji:"&#128528;",text:"Standard Tourist Purchase",detail:"You bought exactly what the tourism industry designed you to buy. The machine works perfectly.",tags:["Predictable","Mass-produced","Instagram only"]},
{min:35,max:50,emoji:"&#128556;",text:"Questionable Decision",detail:"At some point during this purchase, a small voice said 'don't.' You ignored it. You shouldn't have.",tags:["Impulse buy","Regret pending","Overpriced"]},
{min:50,max:65,emoji:"&#128561;",text:"Full Tourist Trap",detail:"You walked directly into the trap. The vendor's children will go to college because of you.",tags:["Tourist tax","Vendor's dream","Shameful"]},
{min:65,max:80,emoji:"&#128166;",text:"Souvenir Rock Bottom",detail:"This purchase will haunt you. Every time you see it, you will remember your weakness.",tags:["Junk","Landfill-bound","Why"]},
{min:80,max:100,emoji:"&#128369;",text:"International Shame Incident",detail:"This souvenir is so bad it transcends personal shame and becomes a cautionary tale for future travelers.",tags:["Legendary bad","Story material","Return it"]}
];
const comments=[
"The 'I Heart [City]' shirt industrial complex thanks you for your contribution.",
"This will sit on a shelf until you move, at which point it goes directly in the trash.",
"The person who made this was laughing the entire time.",
"Your suitcase weeps at the space this will occupy.",
"Future you will pick this up, sigh heavily, and put it back down.",
"This is the souvenir equivalent of a participation trophy.",
"At least it was cheaper than therapy. But only slightly.",
"The manufacturing cost of this was approximately 3 cents.",
"In 6 months, you will not remember buying this. But your credit card will.",
"This purchase has 'airport desperation' written all over it.",
"Congratulations on funding the global tchotchke economy.",
"The dust this will collect could form its own ecosystem.",
"Made in [definitely not the country you bought it in].",
"Your grandchildren will find this and be deeply confused.",
"This is what happens when vacation brain meets a credit card.",
"The souvenir-to-regret pipeline is fully operational.",
"At least you did not get a tattoo. That is the silver lining.",
"This will make an excellent re-gift. For someone you do not like.",
"The markup on this item could fund a small space program.",
"You bought a physical manifestation of FOMO.",
"This is peak 'I went somewhere and all I got was this' energy.",
"The 'made with love' sticker is doing heavy lifting.",
"Future archaeologists will be deeply confused by this artifact.",
"Your carbon footprint just increased for THIS.",
"A fridge magnet: the bare minimum of evidence you traveled.",
"This keychain will outlive the memory of the trip itself.",
"Shot glass collection: the souvenir equivalent of a cry for help.",
"Snow globe: because nothing says 'tropical vacation' like fake snow.",
"The miniature version is never as good. NEVER.",
"You have become a data point in the tourism industry's quarterly report."
];
function judge(){
const item=document.getElementById('item').value.trim();
const price=parseFloat(document.getElementById('price').value);
const where=document.getElementById('where').value;
const who=document.getElementById('who').value;
if(!item){alert('What did you buy?');return}
const whereMod={airport:25,tourist:20,market:5,street:8,museum:10,online:15,fancy:12};
const whoMod={self:5,family:-5,friend:0,coworker:10,nobody:20};
let shame=30+whereMod[where]+whoMod[who]+Math.min(20,(price||10)/5);
const keywords={magnet:15,keychain:15,shotglass:20,'shot glass':20,snowglobe:25,'snow globe':25,miniature:15,tshirt:10,'t-shirt':10,mug:12,hat:8,postcard:-5,art:-10,book:-15,jewelry:0,spices:-8,print:5};
const lower=item.toLowerCase();
Object.entries(keywords).forEach(([k,v])=>{if(lower.includes(k))shame+=v});
shame=Math.max(0,Math.min(99,shame));
const v=verdicts.find(x=>shame>=x.min&&shame<x.max)||verdicts[verdicts.length-1];
const comment=comments[Math.floor(Math.random()*comments.length)];
const color=shame<20?'#44cc44':shame<40?'#88cc44':shame<60?'#cccc44':shame<80?'#ff8844':'#ff4444';
const res=document.getElementById('result');
res.innerHTML='<div class="verdict-card"><div class="verdict-emoji">'+v.emoji+'</div><div class="shame-score" style="color:'+color+'">Shame Score: '+Math.round(shame)+'/100</div><div class="verdict-text" style="color:'+color+'">'+v.text+'</div>'
+'<div class="scale" style="background:#1a1020"><div class="scale-fill" style="width:'+shame+'%;background:'+color+'"></div></div>'
+'<div class="scale-labels"><span>Meaningful</span><span>Tourist Trap</span></div>'
+'<div>'+v.tags.map(t=>'<span class="tag">'+t+'</span>').join('')+'</div>'
+'<div class="verdict-detail" style="margin-top:15px">'+v.detail+'</div>'
+'<div class="verdict-detail" style="margin-top:10px;font-style:italic">"'+comment+'"</div></div>';
res.classList.add('show');
}
</script>
</body>
</html>
