<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Fan Speed Negotiator</title><meta name="description" content="Resolve the nightly conflict between too cold, too loud, and just enough wind noise."><style>:root{--ink:#1f2937;--muted:#6b7280;--line:rgba(31,41,55,.12);--accent:#0284c7;--accent2:#14b8a6}*{box-sizing:border-box}body{margin:0;font-family:"Avenir Next","Trebuchet MS",sans-serif;color:var(--ink);background:linear-gradient(180deg,#ecfeff,#f8fafc);padding:24px 18px 48px}.shell{max-width:1040px;margin:0 auto}.back{display:inline-block;margin-bottom:16px;color:var(--ink);text-decoration:none;font-weight:800}.hero,.grid,.row{display:grid;gap:18px}.hero{grid-template-columns:1.06fr .94fr;margin-bottom:18px}.grid{grid-template-columns:.95fr 1.05fr}.row{grid-template-columns:1fr 1fr;gap:12px}.panel{background:rgba(255,255,255,.86);border:1px solid rgba(255,255,255,.8);border-radius:28px;backdrop-filter:blur(14px)}.hero-copy,.controls,.results{padding:26px}.eyebrow{display:inline-block;padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.92);font-size:.74rem;letter-spacing:.08em;text-transform:uppercase;font-weight:800;color:var(--muted)}h1{font-size:clamp(2.45rem,5vw,4.1rem);line-height:.95;margin:16px 0 12px;letter-spacing:-.05em}p{color:var(--muted);line-height:1.6}label{display:block;font-weight:800;margin:14px 0 8px}select{width:100%;border:1px solid var(--line);border-radius:16px;padding:12px 14px;font:inherit;background:rgba(255,255,255,.92)}button{border:none;border-radius:999px;padding:12px 18px;font:inherit;font-weight:800;cursor:pointer}.primary{color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent2))}.secondary{background:rgba(31,41,55,.08);color:var(--ink);margin-left:10px}.card{background:rgba(255,255,255,.94);border:1px solid var(--line);border-radius:22px;padding:18px;margin-bottom:12px}.badge{display:inline-block;margin-bottom:10px;padding:7px 10px;border-radius:999px;background:rgba(2,132,199,.12);color:#0284c7;font-size:.78rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em}.headline{font-size:1.32rem;font-weight:900;margin-bottom:8px}@media(max-width:900px){.hero,.grid,.row{grid-template-columns:1fr}.secondary{margin-left:0;margin-top:10px}}</style></head><body><div class="shell"><a class="back" href="../">← Back to Fun Builds</a><section class="hero"><div class="panel hero-copy"><div class="eyebrow">Fan Speed Negotiator</div><h1>Settle the air dispute properly.</h1><p>Choose the room conditions and get a negotiated fan speed agreement between comfort, noise, and personal delusion.</p></div><div class="panel hero-copy"><p><strong>Designed for:</strong> bedrooms where “medium” means four different things to four different moods.</p></div></section><section class="grid"><div class="panel controls"><div class="row"><div><label for="heat">Room heat</label><select id="heat"><option value="1">mild</option><option value="3">sticky</option><option value="5">hostile</option></select></div><div><label for="noise">Noise tolerance</label><select id="noise"><option value="1">high</option><option value="3">medium</option><option value="5">delicate</option></select></div></div><label for="sleep">Need for wind noise</label><select id="sleep"><option value="1">low</option><option value="3">helpful</option><option value="5">mission critical</option></select><div style="margin-top:16px"><button class="primary" id="deal">Negotiate speed</button><button class="secondary" id="melt">Heat emergency</button></div></div><div class="panel results"><div id="out"></div></div></section></div><script>function render(){const score=Number(heat.value)*8-Number(noise.value)*5+Number(sleep.value)*6;const speed=score>=32?'High':'Medium';out.innerHTML=`<div class="card"><div class="badge">Agreement</div><div class="headline">${speed} speed</div><p>The negotiating parties considered ${heat.selectedOptions[0].text} heat, ${noise.selectedOptions[0].text} noise tolerance, and ${sleep.selectedOptions[0].text} wind-noise demand.</p></div><div class="card"><div class="badge">Concession</div><p>If anyone complains after accepting this agreement, they lose speaking rights for one full pillow adjustment.</p></div>`}deal.onclick=render;melt.onclick=()=>{heat.selectedIndex=2;sleep.selectedIndex=2;render()};render();</script></body></html>
