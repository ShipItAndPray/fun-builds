<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Stamp Bureau</title><meta name="description" content="Generate absurd approval stamps for ordinary life paperwork."><style>:root{--ink:#1f2937;--muted:#6b7280;--line:rgba(31,41,55,.12);--accent:#dc2626;--accent2:#7c2d12}*{box-sizing:border-box}body{margin:0;font-family:"Avenir Next","Trebuchet MS",sans-serif;color:var(--ink);background:linear-gradient(180deg,#fef2f2,#fff7ed);padding:24px 18px 48px}.shell{max-width:1040px;margin:0 auto}.back{display:inline-block;margin-bottom:16px;color:var(--ink);text-decoration:none;font-weight:800}.hero,.grid{display:grid;gap:18px}.hero{grid-template-columns:1.06fr .94fr;margin-bottom:18px}.grid{grid-template-columns:.95fr 1.05fr}.panel{background:rgba(255,255,255,.86);border:1px solid rgba(255,255,255,.8);border-radius:28px;backdrop-filter:blur(14px)}.hero-copy,.controls,.results{padding:26px}.eyebrow{display:inline-block;padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.92);font-size:.74rem;letter-spacing:.08em;text-transform:uppercase;font-weight:800;color:var(--muted)}h1{font-size:clamp(2.45rem,5vw,4.1rem);line-height:.95;margin:16px 0 12px;letter-spacing:-.05em}p{color:var(--muted);line-height:1.6}label{display:block;font-weight:800;margin:14px 0 8px}input,select{width:100%;border:1px solid var(--line);border-radius:16px;padding:12px 14px;font:inherit;background:rgba(255,255,255,.92)}button{border:none;border-radius:999px;padding:12px 18px;font:inherit;font-weight:800;cursor:pointer}.primary{color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent2))}.stamp{border:3px solid rgba(220,38,38,.32);border-radius:24px;padding:24px;text-align:center;background:rgba(255,255,255,.94)}.headline{font-size:1.5rem;font-weight:900;margin-bottom:8px}.small{color:var(--muted)}@media(max-width:900px){.hero,.grid{grid-template-columns:1fr}}</style></head><body><div class="shell"><a class="back" href="../">← Back to Fun Builds</a><section class="hero"><div class="panel hero-copy"><div class="eyebrow">Stamp Bureau</div><h1>Everything deserves a stamp.</h1><p>Submit any ordinary task and receive an absurd official approval mark with jurisdiction, severity, and totally invented authority.</p></div><div class="panel hero-copy"><p><strong>Output:</strong> a big fake stamp ready for screenshot duty.</p></div></section><section class="grid"><div class="panel controls"><label for="task">Task or document</label><input id="task" value="went outside and bought one banana"><label for="status">Desired stamp</label><select id="status"><option>approved</option><option>pending</option><option>administratively tragic</option><option>begrudgingly allowed</option></select><div style="margin-top:16px"><button class="primary" id="stampIt">Issue stamp</button></div></div><div class="panel results"><div class="stamp" id="out"></div></div></section></div><script>function render(){const seals=['Department of Minor Affairs','Office of Unclear Necessity','Civic Bureau of Tiny Errands','Board of Needless Documentation'];const i=(task.value.length+status.selectedIndex)%seals.length;out.innerHTML=`<div class="headline">${status.value.toUpperCase()}</div><p>${task.value}</p><p class="small">${seals[i]}</p>`}stampIt.onclick=render;render();</script></body></html>
