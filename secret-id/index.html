<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SECRET IDENTITY GENERATOR</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Courier+Prime:wght@400;700&family=Playfair+Display:wght@700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    color: #c8b87a;
    font-family: 'Courier Prime', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(30,20,10,0.8) 0%, transparent 70%),
      radial-gradient(ellipse at 80% 20%, rgba(40,25,5,0.5) 0%, transparent 60%),
      repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(200,184,122,0.015) 2px, rgba(200,184,122,0.015) 4px);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 700px;
    margin: 0 auto;
    padding: 30px 20px;
    position: relative;
    z-index: 1;
  }

  .header {
    text-align: center;
    margin-bottom: 40px;
    position: relative;
  }

  .header::before {
    content: 'TOP SECRET';
    display: block;
    font-family: 'Special Elite', cursive;
    font-size: 14px;
    letter-spacing: 8px;
    color: #8b0000;
    border: 2px solid #8b0000;
    display: inline-block;
    padding: 4px 20px;
    transform: rotate(-3deg);
    margin-bottom: 20px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 6vw, 48px);
    color: #e8d8a0;
    text-transform: uppercase;
    letter-spacing: 4px;
    text-shadow: 0 2px 20px rgba(200,180,100,0.3);
    line-height: 1.1;
  }

  .subtitle {
    font-family: 'Special Elite', cursive;
    font-size: 13px;
    color: #8a7a50;
    letter-spacing: 3px;
    margin-top: 10px;
  }

  .input-section {
    background: rgba(20,18,12,0.9);
    border: 1px solid #3a3020;
    padding: 30px;
    margin-bottom: 30px;
    position: relative;
  }

  .input-section::before {
    content: 'CLASSIFIED INTAKE FORM';
    position: absolute;
    top: -10px;
    left: 20px;
    background: #0a0a0a;
    padding: 0 10px;
    font-size: 11px;
    letter-spacing: 3px;
    color: #6a5a30;
  }

  .input-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 20px;
  }

  label {
    font-family: 'Special Elite', cursive;
    font-size: 13px;
    color: #8a7a50;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  input[type="text"] {
    background: rgba(10,10,8,0.9);
    border: 1px solid #3a3020;
    border-bottom: 2px solid #6a5a30;
    color: #e8d8a0;
    font-family: 'Special Elite', cursive;
    font-size: 20px;
    padding: 12px 15px;
    outline: none;
    transition: all 0.3s;
    width: 100%;
  }

  input[type="text"]:focus {
    border-bottom-color: #c8b87a;
    box-shadow: 0 4px 20px rgba(200,180,100,0.1);
  }

  input[type="text"]::placeholder {
    color: #4a4020;
    font-style: italic;
  }

  .btn {
    font-family: 'Special Elite', cursive;
    font-size: 16px;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 14px 30px;
    border: none;
    cursor: pointer;
    transition: all 0.3s;
    width: 100%;
  }

  .btn-generate {
    background: linear-gradient(135deg, #2a2210, #4a3a18);
    color: #e8d8a0;
    border: 1px solid #6a5a30;
  }

  .btn-generate:hover {
    background: linear-gradient(135deg, #3a3218, #5a4a28);
    box-shadow: 0 0 30px rgba(200,180,100,0.2);
    transform: translateY(-1px);
  }

  .btn-generate:active { transform: translateY(1px); }

  /* DOSSIER */
  .dossier {
    display: none;
    animation: fadeInDossier 0.8s ease;
  }

  .dossier.active { display: block; }

  @keyframes fadeInDossier {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .dossier-header {
    text-align: center;
    padding: 20px;
    border-bottom: 1px dashed #3a3020;
    margin-bottom: 0;
  }

  .dossier-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 14px;
    letter-spacing: 6px;
    color: #8b0000;
  }

  .id-card {
    background: linear-gradient(160deg, #1a1810 0%, #12100a 50%, #1a1810 100%);
    border: 2px solid #4a3a18;
    margin: 25px 0;
    overflow: hidden;
    position: relative;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(200,180,100,0.1);
  }

  .id-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      45deg, transparent, transparent 20px,
      rgba(200,180,100,0.02) 20px, rgba(200,180,100,0.02) 21px
    );
    pointer-events: none;
  }

  .id-card-top {
    background: linear-gradient(90deg, #8b0000, #6b0000, #8b0000);
    padding: 10px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .id-card-top span {
    font-size: 11px;
    letter-spacing: 4px;
    color: #e8d0a0;
    font-family: 'Special Elite', cursive;
  }

  .id-card-body {
    padding: 25px;
    display: grid;
    grid-template-columns: 120px 1fr;
    gap: 20px;
  }

  @media (max-width: 500px) {
    .id-card-body {
      grid-template-columns: 1fr;
      text-align: center;
    }
  }

  .id-photo {
    width: 120px;
    height: 150px;
    background: #0a0908;
    border: 1px solid #3a3020;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 60px;
    color: #3a3020;
    position: relative;
    overflow: hidden;
  }

  .id-photo::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(0deg, transparent 0px, transparent 3px, rgba(200,180,100,0.05) 3px, rgba(200,180,100,0.05) 4px);
  }

  .id-info { display: flex; flex-direction: column; gap: 8px; }

  .id-field {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .id-field .field-label {
    font-size: 9px;
    letter-spacing: 2px;
    color: #6a5a30;
    text-transform: uppercase;
  }

  .id-field .field-value {
    font-family: 'Special Elite', cursive;
    font-size: 16px;
    color: #e8d8a0;
  }

  .id-card-bottom {
    border-top: 1px solid #2a2210;
    padding: 10px 25px;
    display: flex;
    justify-content: space-between;
    font-size: 9px;
    color: #4a3a18;
    letter-spacing: 2px;
  }

  /* DOSSIER FIELDS */
  .dossier-section {
    background: rgba(20,18,12,0.7);
    border: 1px solid #2a2210;
    margin-bottom: 15px;
    overflow: hidden;
  }

  .dossier-section-header {
    background: rgba(30,25,15,0.8);
    padding: 10px 20px;
    font-size: 10px;
    letter-spacing: 4px;
    color: #8a7a50;
    text-transform: uppercase;
    border-bottom: 1px solid #2a2210;
  }

  .dossier-section-body {
    padding: 15px 20px;
  }

  .dossier-field {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 8px 0;
    border-bottom: 1px dotted #1a1810;
    flex-wrap: wrap;
    gap: 5px;
  }

  .dossier-field:last-child { border-bottom: none; }

  .dossier-field .d-label {
    font-size: 11px;
    color: #6a5a30;
    letter-spacing: 2px;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .dossier-field .d-value {
    font-family: 'Special Elite', cursive;
    font-size: 15px;
    color: #e8d8a0;
    text-align: right;
    flex: 1;
    min-width: 0;
  }

  .catchphrase {
    text-align: center;
    padding: 25px 20px;
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-style: italic;
    color: #c8b87a;
    border-top: 1px dashed #3a3020;
    border-bottom: 1px dashed #3a3020;
    margin: 20px 0;
    position: relative;
  }

  .catchphrase::before { content: '\201C'; font-size: 40px; color: #4a3a18; position: absolute; top: 10px; left: 15px; }
  .catchphrase::after { content: '\201D'; font-size: 40px; color: #4a3a18; position: absolute; bottom: -5px; right: 15px; }

  /* BACKSTORY */
  .backstory {
    font-family: 'Special Elite', cursive;
    font-size: 14px;
    line-height: 1.8;
    color: #a89a60;
    padding: 20px;
    background: rgba(15,13,8,0.8);
    border-left: 3px solid #8b0000;
  }

  /* BUTTONS */
  .action-buttons {
    display: flex;
    gap: 15px;
    margin-top: 25px;
    flex-wrap: wrap;
  }

  .btn-share {
    flex: 1;
    min-width: 140px;
    background: linear-gradient(135deg, #1a2a1a, #2a3a2a);
    color: #a0c8a0;
    border: 1px solid #3a5a3a;
  }

  .btn-share:hover {
    background: linear-gradient(135deg, #2a3a2a, #3a4a3a);
    box-shadow: 0 0 20px rgba(100,200,100,0.15);
  }

  .btn-burn {
    flex: 1;
    min-width: 140px;
    background: linear-gradient(135deg, #2a1010, #3a1818);
    color: #e8a0a0;
    border: 1px solid #5a2a2a;
    position: relative;
    overflow: hidden;
  }

  .btn-burn:hover {
    background: linear-gradient(135deg, #3a1818, #4a2020);
    box-shadow: 0 0 30px rgba(200,50,50,0.2);
  }

  .btn-reroll {
    flex: 1;
    min-width: 140px;
    background: linear-gradient(135deg, #1a1a2a, #2a2a3a);
    color: #a0a0e8;
    border: 1px solid #3a3a5a;
  }

  .btn-reroll:hover {
    background: linear-gradient(135deg, #2a2a3a, #3a3a4a);
    box-shadow: 0 0 20px rgba(100,100,200,0.15);
  }

  /* BURN ANIMATION */
  .burning {
    position: relative;
    animation: burnShake 0.5s ease;
  }

  @keyframes burnShake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-5px) rotate(-0.5deg); }
    40% { transform: translateX(5px) rotate(0.5deg); }
    60% { transform: translateX(-3px) rotate(-0.3deg); }
    80% { transform: translateX(3px) rotate(0.3deg); }
  }

  .flame-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 100;
    display: none;
  }

  .flame-overlay.active { display: block; }

  .flame-particle {
    position: absolute;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    animation: flameRise 1.5s ease-out forwards;
  }

  @keyframes flameRise {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    50% { opacity: 0.8; }
    100% { opacity: 0; transform: translateY(-300px) scale(0.2); }
  }

  .burn-text {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Special Elite', cursive;
    font-size: clamp(20px, 5vw, 36px);
    color: #ff4400;
    text-shadow: 0 0 30px #ff4400, 0 0 60px #ff2200;
    z-index: 101;
    text-align: center;
    letter-spacing: 5px;
    display: none;
    animation: burnTextPulse 0.5s ease infinite alternate;
  }

  @keyframes burnTextPulse {
    from { opacity: 0.8; text-shadow: 0 0 30px #ff4400, 0 0 60px #ff2200; }
    to { opacity: 1; text-shadow: 0 0 50px #ff6600, 0 0 80px #ff4400, 0 0 120px #ff2200; }
  }

  .stamp {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(-15deg);
    font-family: 'Special Elite', cursive;
    font-size: 48px;
    color: #8b0000;
    border: 5px solid #8b0000;
    padding: 10px 30px;
    opacity: 0;
    pointer-events: none;
  }

  .stamp.visible {
    opacity: 0.8;
    animation: stampIn 0.3s ease;
  }

  @keyframes stampIn {
    from { transform: translate(-50%, -50%) rotate(-15deg) scale(3); opacity: 0; }
    to { transform: translate(-50%, -50%) rotate(-15deg) scale(1); opacity: 0.8; }
  }

  /* SHARE MODAL */
  .share-modal {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.85);
    z-index: 200;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }

  .share-modal.active { display: flex; }

  .share-content {
    background: #12100a;
    border: 1px solid #3a3020;
    padding: 30px;
    max-width: 500px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
  }

  .share-content h3 {
    font-family: 'Special Elite', cursive;
    color: #e8d8a0;
    margin-bottom: 15px;
    letter-spacing: 3px;
  }

  .share-text {
    background: #0a0908;
    border: 1px solid #2a2210;
    padding: 15px;
    color: #c8b87a;
    font-family: 'Courier Prime', monospace;
    font-size: 13px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
    margin-bottom: 15px;
    max-height: 300px;
    overflow-y: auto;
  }

  .share-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .share-actions .btn {
    flex: 1;
    min-width: 100px;
    font-size: 13px;
    padding: 10px;
  }

  .btn-copy {
    background: #2a2210;
    color: #c8b87a;
    border: 1px solid #4a3a18;
  }

  .btn-close-share {
    background: #1a1010;
    color: #c8a0a0;
    border: 1px solid #3a2020;
  }

  .copied-toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: #2a3a2a;
    color: #a0e8a0;
    padding: 10px 25px;
    font-family: 'Special Elite', cursive;
    letter-spacing: 2px;
    border: 1px solid #3a5a3a;
    z-index: 300;
    display: none;
    animation: toastIn 0.3s ease;
  }

  @keyframes toastIn {
    from { opacity: 0; transform: translateX(-50%) translateY(20px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  .typewriter {
    overflow: hidden;
    border-right: 2px solid #c8b87a;
    animation: blink-caret 0.7s step-end infinite;
  }

  @keyframes blink-caret {
    from, to { border-color: transparent; }
    50% { border-color: #c8b87a; }
  }

  .scanline {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: rgba(200,180,100,0.08);
    z-index: 50;
    animation: scanMove 4s linear infinite;
    pointer-events: none;
  }

  @keyframes scanMove {
    from { top: -2px; }
    to { top: 100vh; }
  }
</style>
</head>

<div class="container">

  <div class="dossier" id="dossier">

    <div class="dossier-section">

      <div class="dossier-section-body">
        <div class="backstory" id="backstory"></div>
      </div>
    </div>

    <div class="action-buttons">
      <button class="btn btn-reroll" onclick="generateIdentity()">RE-ROLL</button>
      <button class="btn btn-share" onclick="shareIdentity()">SHARE IDENTITY</button>
      <button class="btn btn-burn" onclick="burnIdentity()">BURN THIS IDENTITY</button>
    </div>
  </div>
</div>

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function pickN(arr, n) {
  const shuffled = [...arr].sort(() => Math.random() - 0.5);
  return shuffled.slice(0, n);
}

let currentIdentity = null;

function generateBackstory(alias, coverJob) {
  const template = pick(DATA.backstoryTemplates);
  const replacements = {
    '{origin}': pick(DATA.origins),
    '{age}': pick(DATA.ages),
    '{event}': pick(DATA.events),
    '{facility}': pick(DATA.facilities),
    '{trainer}': pick(DATA.trainers),
    '{firstMission}': pick(DATA.firstMissions),
    '{count}': Math.floor(Math.random() * 30 + 15),
    '{continents}': Math.floor(Math.random() * 4 + 3),
    '{threat}': pick(DATA.threats),
    '{prevJob}': pick(DATA.prevJobs),
    '{city}': pick(DATA.cities),
    '{turningPoint}': pick(DATA.turningPoints),
    '{agency}': pick(DATA.agencies),
    '{months}': Math.floor(Math.random() * 18 + 6),
    '{specialty}': pick(DATA.specialties),
    '{adjective}': pick(['fearsome','legendary','whispered','notorious','enigmatic']),
    '{habit}': pick(DATA.habits),
    '{birthPlace}': pick(DATA.birthPlaces),
    '{orphanAge}': Math.floor(Math.random() * 8 + 5),
    '{tragedy}': pick(DATA.tragedies),
    '{guardian}': pick(DATA.guardians),
    '{discovery}': pick(DATA.discoveries),
    '{quality}': pick(DATA.qualities),
    '{survivalCount}': Math.floor(Math.random() * 5 + 2),
    '{place}': pick(DATA.safeHouses).split(',')[0],
    '{military}': pick(DATA.militaryBranches),
    '{incident}': pick(DATA.incidents),
    '{years}': Math.floor(Math.random() * 5 + 2),
    '{purpose}': pick(DATA.purposes),
    '{cover}': coverJob.toLowerCase(),
    '{caveat}': pick(DATA.caveats),
  };
  let result = template;
  for (const [key, val] of Object.entries(replacements)) {
    result = result.replace(key, val);
  }
  return result;
}

function generateIdentity() {
  const realName = document.getElementById('realName').value.trim();
  if (!realName) {
    document.getElementById('realName').focus();
    document.getElementById('realName').style.borderBottomColor = '#8b0000';
    setTimeout(() => document.getElementById('realName').style.borderBottomColor = '#6a5a30', 1000);
    return;
  }

  const alias = pick(DATA.firstNames) + ' ' + pick(DATA.lastNames);
  const coverJob = pick(DATA.coverJobs);
  const codeName = pick(DATA.codeNames);
  const handler = pick(DATA.handlerNames);
  const safeHouse = pick(DATA.safeHouses);
  const skills = pickN(DATA.specialSkills, 2).join('; ');
  const weakness = pick(DATA.weaknesses);
  const catchphrase = pick(DATA.catchphrases);
  const clearance = pick(DATA.clearanceLevels);
  const backstory = generateBackstory(alias, coverJob);
  const serial = 'AGT-' + Math.random().toString(36).substr(2, 8).toUpperCase();
  const photo = pick(DATA.emojis);

  currentIdentity = { realName, alias, coverJob, codeName, handler, safeHouse, skills, weakness, catchphrase, clearance, backstory, serial, photo };

  // Populate ID card
  document.getElementById('cardAlias').textContent = alias;
  document.getElementById('cardCodeName').textContent = codeName;
  document.getElementById('cardCover').textContent = coverJob;
  document.getElementById('cardClearance').textContent = clearance;
  document.getElementById('cardDate').textContent = new Date().toISOString().split('T')[0];
  document.getElementById('cardSerial').textContent = serial;
  document.getElementById('idPhoto').innerHTML = photo;

  // Populate dossier
  document.getElementById('handler').textContent = handler;
  document.getElementById('safeHouse').textContent = safeHouse;
  document.getElementById('specialSkills').textContent = skills;
  document.getElementById('weakness').textContent = weakness;
  document.getElementById('catchphrase').textContent = catchphrase;
  document.getElementById('backstory').textContent = backstory;

  // Reset burn state
  document.getElementById('burnStamp').classList.remove('visible');
  document.getElementById('idCard').style.filter = '';
  document.getElementById('idCard').style.opacity = '';

  // Show dossier
  const dossier = document.getElementById('dossier');
  dossier.classList.remove('active');
  void dossier.offsetWidth;
  dossier.classList.add('active');

  dossier.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function copyIdentity() {
  const text = document.getElementById('shareText').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const toast = document.getElementById('copiedToast');
    toast.style.display = 'block';
    setTimeout(() => toast.style.display = 'none', 2000);
  });
}

function closeShare() {
  document.getElementById('shareModal').classList.remove('active');
}

function burnIdentity() {
  if (!currentIdentity) return;

  const overlay = document.getElementById('flameOverlay');
  overlay.classList.add('active');
  overlay.innerHTML = '';

  const card = document.getElementById('idCard');
  card.classList.add('burning');

  // Create flame particles
  const cardRect = card.getBoundingClientRect();
  for (let i = 0; i < 80; i++) {
    setTimeout(() => {
      const particle = document.createElement('div');
      particle.className = 'flame-particle';
      const x = cardRect.left + Math.random() * cardRect.width;
      const y = cardRect.top + Math.random() * cardRect.height;
      particle.style.left = x + 'px';
      particle.style.top = y + 'px';
      const colors = ['#ff4400', '#ff6600', '#ff8800', '#ffaa00', '#ffcc00', '#ff2200'];
      particle.style.background = pick(colors);
      particle.style.boxShadow = `0 0 ${Math.random() * 10 + 5}px ${particle.style.background}`;
      particle.style.width = (Math.random() * 12 + 4) + 'px';
      particle.style.height = particle.style.width;
      overlay.appendChild(particle);
    }, i * 20);
  }

  // Show burn text
  const burnText = document.getElementById('burnText');
  setTimeout(() => {
    burnText.style.display = 'block';
  }, 400);

  // Apply burn effects to card
  setTimeout(() => {
    card.style.filter = 'sepia(1) brightness(0.3) contrast(1.5)';
    card.style.opacity = '0.4';
    document.getElementById('burnStamp').classList.add('visible');
  }, 800);

  // Clean up
  setTimeout(() => {
    overlay.classList.remove('active');
    burnText.style.display = 'none';
    card.classList.remove('burning');
    currentIdentity = null;
  }, 2500);
}

// Enter key to generate
document.getElementById('realName').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') generateIdentity();
});

// Close share modal on outside click
document.getElementById('shareModal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('shareModal')) closeShare();
});
