<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Receipt Oracle</title><meta name="description" content="Turn any receipt into a fake domestic prophecy about your week."><style>:root{--ink:#1f2937;--muted:#6b7280;--line:rgba(31,41,55,.12);--accent:#7c3aed;--accent2:#f59e0b}*{box-sizing:border-box}body{margin:0;font-family:"Avenir Next","Trebuchet MS",sans-serif;color:var(--ink);background:linear-gradient(180deg,#faf5ff,#fff7ed);padding:24px 18px 48px}.shell{max-width:1040px;margin:0 auto}.back{display:inline-block;margin-bottom:16px;color:var(--ink);text-decoration:none;font-weight:800}.hero,.grid{display:grid;gap:18px}.hero{grid-template-columns:1.06fr .94fr;margin-bottom:18px}.grid{grid-template-columns:.95fr 1.05fr}.panel{background:rgba(255,255,255,.86);border:1px solid rgba(255,255,255,.8);border-radius:28px;backdrop-filter:blur(14px)}.hero-copy,.controls,.results{padding:26px}.eyebrow{display:inline-block;padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.92);font-size:.74rem;letter-spacing:.08em;text-transform:uppercase;font-weight:800;color:var(--muted)}h1{font-size:clamp(2.45rem,5vw,4.1rem);line-height:.95;margin:16px 0 12px;letter-spacing:-.05em}p{color:var(--muted);line-height:1.6}label{display:block;font-weight:800;margin:14px 0 8px}textarea{width:100%;min-height:170px;border:1px solid var(--line);border-radius:16px;padding:12px 14px;font:inherit;background:rgba(255,255,255,.92)}button{border:none;border-radius:999px;padding:12px 18px;font:inherit;font-weight:800;cursor:pointer}.primary{color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent2))}.card{background:rgba(255,255,255,.94);border:1px solid var(--line);border-radius:22px;padding:18px;margin-bottom:12px}.badge{display:inline-block;margin-bottom:10px;padding:7px 10px;border-radius:999px;background:rgba(124,58,237,.12);color:#6d28d9;font-size:.78rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em}.headline{font-size:1.32rem;font-weight:900;margin-bottom:8px}@media(max-width:900px){.hero,.grid{grid-template-columns:1fr}}</style></head><body><div class="shell"><a class="back" href="../">← Back to Fun Builds</a><section class="hero"><div class="panel hero-copy"><div class="eyebrow">Receipt Oracle</div><h1>Your spending has spoken.</h1><p>Paste a receipt or shopping list and receive a dramatic household prophecy for the week ahead.</p></div><div class="panel hero-copy"><p><strong>Good for:</strong> over-reading grocery choices and assigning mystical meaning to paper totals.</p></div></section><section class="grid"><div class="panel controls"><label for="receipt">Receipt text</label><textarea id="receipt">milk
frozen dumplings
two candles
late-night chocolate</textarea><div style="margin-top:16px"><button class="primary" id="read">Read prophecy</button></div></div><div class="panel results"><div id="out"></div></div></section></div><script>function render(){const text=receipt.value.trim()||'one lonely item';const lines=text.split(/\n+/).filter(Boolean);const total=lines.length;const prophecy=total>=6?'A chaotic but nourishing week approaches.':'A focused domestic plotline is forming.';out.innerHTML=`<div class="card"><div class="badge">Oracle reading</div><div class="headline">${prophecy}</div><p>Your receipt contains ${total} omens, led by ${lines[0]||'mystery spending'}.</p></div><div class="card"><div class="badge">Interpretation</div><p>${lines.join(', ')} suggests one comfort purchase, one practical correction, and one late-evening choice you will defend too strongly.</p></div><div class="card"><div class="badge">Household warning</div><p>Do not pretend the candles were accidental. The oracle noticed.</p></div>`}read.onclick=render;render();</script></body></html>
