<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Radio</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  @keyframes twinkle{0%,100%{opacity:.2}50%{opacity:1}}
  @keyframes drift{0%{transform:translateY(0)}100%{transform:translateY(-20px)}}
  @keyframes fadein{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadeout{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-12px)}}
  @keyframes pulse{0%,100%{box-shadow:0 0 8px rgba(100,180,255,.3)}50%{box-shadow:0 0 20px rgba(100,180,255,.6)}}
  @keyframes orbit{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
  @keyframes scanline{0%{top:-2px}100%{top:100%}}

  html,body{width:100%;height:100%;overflow:hidden;font-family:'Courier New',monospace;background:#000}

  #space{position:fixed;inset:0;background:radial-gradient(ellipse at 50% 0%,#0a0a2e 0%,#050510 40%,#000 100%)}

  .star{position:absolute;border-radius:50%;background:#fff}
  .star.small{width:1px;height:1px}
  .star.med{width:2px;height:2px}
  .star.large{width:3px;height:3px;box-shadow:0 0 4px #fff}

  .nebula{position:absolute;border-radius:50%;filter:blur(80px);opacity:.08;pointer-events:none}

  #ui{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;padding:20px}

  #title{font-size:clamp(1.4rem,4vw,2.4rem);letter-spacing:.3em;text-transform:uppercase;color:rgba(140,180,255,.7);text-shadow:0 0 30px rgba(100,140,255,.3);margin-bottom:8px}
  #subtitle{font-size:clamp(.6rem,1.8vw,.85rem);letter-spacing:.5em;color:rgba(140,180,255,.3);margin-bottom:30px}

  #iss-panel{background:rgba(10,15,40,.6);border:1px solid rgba(100,160,255,.15);border-radius:12px;padding:20px 28px;max-width:460px;width:90%;backdrop-filter:blur(8px);animation:pulse 4s ease-in-out infinite;position:relative;overflow:hidden}
  #iss-panel::before{content:'';position:absolute;left:0;width:100%;height:1px;background:linear-gradient(90deg,transparent,rgba(100,180,255,.3),transparent);animation:scanline 3s linear infinite;pointer-events:none}

  .panel-title{font-size:.65rem;letter-spacing:.4em;color:rgba(100,180,255,.4);text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px}
  .panel-title .dot{width:6px;height:6px;border-radius:50%;background:#4f8;animation:twinkle 2s ease-in-out infinite}

  .coord-row{display:flex;justify-content:space-between;margin-bottom:6px}
  .coord-label{color:rgba(140,180,255,.4);font-size:.7rem}
  .coord-val{color:rgba(180,220,255,.9);font-size:.9rem;font-weight:bold}

  #iss-country{margin-top:10px;font-size:.75rem;color:rgba(160,200,255,.6);text-align:center;min-height:1.2em}
  #iss-speed{margin-top:4px;font-size:.65rem;color:rgba(120,160,220,.4);text-align:center}

  #distance-panel{margin-top:14px;padding-top:10px;border-top:1px solid rgba(100,160,255,.1);text-align:center}
  #distance-btn{background:none;border:1px solid rgba(100,160,255,.25);color:rgba(140,180,255,.6);padding:6px 16px;border-radius:20px;font-family:inherit;font-size:.65rem;letter-spacing:.15em;cursor:pointer;transition:all .3s}
  #distance-btn:hover{border-color:rgba(100,160,255,.5);color:rgba(180,220,255,.9)}
  #distance-result{margin-top:8px;font-size:.8rem;color:rgba(160,200,255,.7);min-height:1.2em}

  #fact-container{margin-top:24px;max-width:500px;width:90%;text-align:center;min-height:60px;position:relative}
  #fact{font-size:clamp(.7rem,2vw,.85rem);color:rgba(160,190,255,.5);line-height:1.6;font-style:italic}
  #fact.entering{animation:fadein .8s ease forwards}
  #fact.exiting{animation:fadeout .8s ease forwards}

  #controls{position:fixed;bottom:20px;right:20px;z-index:20;display:flex;gap:10px}
  #sound-toggle{background:rgba(10,15,40,.6);border:1px solid rgba(100,160,255,.2);color:rgba(140,180,255,.5);width:44px;height:44px;border-radius:50%;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s;backdrop-filter:blur(4px)}
  #sound-toggle:hover{border-color:rgba(100,160,255,.5);color:rgba(180,220,255,.9)}
  #sound-toggle.active{border-color:rgba(80,255,140,.4);color:rgba(80,255,140,.7)}

  #vis{position:fixed;bottom:0;left:0;right:0;height:60px;z-index:5;opacity:.3;pointer-events:none}

  #crew-count{position:fixed;top:16px;right:20px;font-size:.6rem;letter-spacing:.2em;color:rgba(100,160,255,.3);z-index:20}

  @media(max-width:480px){
    #iss-panel{padding:14px 18px}
    #controls{bottom:12px;right:12px}
    #crew-count{top:10px;right:12px}
  }
</style>
</head>
<body>
<div id="space"></div>

<div id="ui">
  <div id="title">Space Radio</div>
  <div id="subtitle">Live from orbit</div>

  <div id="iss-panel">
    <div class="panel-title"><span class="dot"></span> ISS Position &mdash; Live</div>
    <div class="coord-row">
      <span class="coord-label">LAT</span>
      <span class="coord-val" id="lat">---.----</span>
    </div>
    <div class="coord-row">
      <span class="coord-label">LON</span>
      <span class="coord-val" id="lon">---.----</span>
    </div>
    <div id="iss-country">Locating...</div>
    <div id="iss-speed">Orbital velocity: 27,600 km/h (17,150 mph)</div>

    <div id="distance-panel">
      <button id="distance-btn">How far is the ISS from me?</button>
      <div id="distance-result"></div>
    </div>
  </div>

  <div id="fact-container">
    <div id="fact" class="entering"></div>
  </div>
</div>

<canvas id="vis"></canvas>
<div id="crew-count"></div>

<div id="controls">
  <button id="sound-toggle" title="Toggle ambient sound">&#9834;</button>
</div>

// --- Stars ---
(function createStars(){
  const space=document.getElementById('space');
  const count=window.innerWidth<600?150:300;
  for(let i=0;i<count;i++){
    const s=document.createElement('div');
    s.className='star '+(Math.random()<.6?'small':Math.random()<.7?'med':'large');
    s.style.left=Math.random()*100+'%';
    s.style.top=Math.random()*100+'%';
    s.style.animationName='twinkle';
    s.style.animationDuration=(2+Math.random()*6)+'s';
    s.style.animationDelay=Math.random()*6+'s';
    s.style.animationTimingFunction='ease-in-out';
    s.style.animationIterationCount='infinite';
    space.appendChild(s);
  }
  // nebulae
  const colors=['#3040a0','#602060','#204080','#105050'];
  for(let i=0;i<3;i++){
    const n=document.createElement('div');
    n.className='nebula';
    n.style.width=(200+Math.random()*400)+'px';
    n.style.height=(200+Math.random()*400)+'px';
    n.style.left=Math.random()*100+'%';
    n.style.top=Math.random()*100+'%';
    n.style.background=colors[i%colors.length];
    space.appendChild(n);
  }
})();

let currentFact=0;
const factEl=document.getElementById('fact');

function showFact(){

  setTimeout(()=>{
    currentFact=(currentFact+1)%facts.length;
    factEl.textContent=facts[currentFact];
    factEl.className='fact entering';

// --- ISS Position ---
const latEl=document.getElementById('lat');
const lonEl=document.getElementById('lon');
const countryEl=document.getElementById('iss-country');
let issLat=0,issLon=0;

async function fetchISS(){
  try{
    const r=await fetch('http://api.open-notify.org/iss-now.json');
    const d=await r.json();
    issLat=parseFloat(d.iss_position.latitude);
    issLon=parseFloat(d.iss_position.longitude);
    latEl.textContent=issLat.toFixed(4)+'°';
    lonEl.textContent=issLon.toFixed(4)+'°';
    const loc=getCountryFromCoords(issLat,issLon);
    countryEl.textContent='Currently over: '+loc;
  }catch(e){
    countryEl.textContent='Signal interrupted...';
  }
}
fetchISS();
setInterval(fetchISS,5000);

// --- Crew count ---
async function fetchCrew(){
  try{
    const r=await fetch('http://api.open-notify.org/astros.json');
    const d=await r.json();
    const iss=d.people.filter(p=>p.craft==='ISS');
    document.getElementById('crew-count').textContent='ISS CREW: '+iss.length+' HUMANS IN ORBIT';
  }catch(e){}
}
fetchCrew();

// --- Distance calculator ---
function haversine(lat1,lon1,lat2,lon2){
  const R=6371;
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  const c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
  return R*c;
}

document.getElementById('distance-btn').addEventListener('click',()=>{
  const resultEl=document.getElementById('distance-result');
  if(!navigator.geolocation){
    resultEl.textContent='Geolocation not supported';
    return;
  }
  resultEl.textContent='Locating you...';
  navigator.geolocation.getCurrentPosition(pos=>{
    const ground=haversine(pos.coords.latitude,pos.coords.longitude,issLat,issLon);
    const altitude=420; // ISS altitude ~420km
    const dist=Math.sqrt(ground**2+altitude**2);
    resultEl.textContent=Math.round(dist).toLocaleString()+' km away ('+Math.round(dist*0.621371).toLocaleString()+' mi)';
  },()=>{
    resultEl.textContent='Location access denied';
  });
});

// --- Web Audio API: Ambient Space Sounds ---
let audioCtx=null;
let soundOn=false;
let masterGain=null;
let nodes=[];

function createAudio(){
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  masterGain=audioCtx.createGain();
  masterGain.gain.value=0.4;
  masterGain.connect(audioCtx.destination);

  // 1. Deep bass drone
  const bass=audioCtx.createOscillator();
  bass.type='sine';
  bass.frequency.value=40;
  const bassGain=audioCtx.createGain();
  bassGain.gain.value=0.3;
  bass.connect(bassGain);
  bassGain.connect(masterGain);
  bass.start();
  nodes.push(bass);

  // Sub-bass LFO for movement
  const lfo=audioCtx.createOscillator();
  lfo.type='sine';
  lfo.frequency.value=0.05;
  const lfoGain=audioCtx.createGain();
  lfoGain.gain.value=8;
  lfo.connect(lfoGain);
  lfoGain.connect(bass.frequency);
  lfo.start();
  nodes.push(lfo);

  // 2. Ethereal pad (detuned oscillators)
  const padFreqs=[110,165,220,330];
  padFreqs.forEach(f=>{
    const osc=audioCtx.createOscillator();
    osc.type='sine';
    osc.frequency.value=f+Math.random()*2-1;
    const g=audioCtx.createGain();
    g.gain.value=0.02;
    // Slow tremolo
    const trem=audioCtx.createOscillator();
    trem.type='sine';
    trem.frequency.value=0.1+Math.random()*0.2;
    const tremG=audioCtx.createGain();
    tremG.gain.value=0.01;
    trem.connect(tremG);
    tremG.connect(g.gain);
    trem.start();
    osc.connect(g);
    g.connect(masterGain);
    osc.start();
    nodes.push(osc,trem);
  });

  // 3. Filtered noise layer (distant cosmic hiss)
  const bufferSize=audioCtx.sampleRate*2;
  const noiseBuffer=audioCtx.createBuffer(1,bufferSize,audioCtx.sampleRate);
  const data=noiseBuffer.getChannelData(0);
  for(let i=0;i<bufferSize;i++) data[i]=Math.random()*2-1;
  const noise=audioCtx.createBufferSource();
  noise.buffer=noiseBuffer;
  noise.loop=true;
  const noiseFilter=audioCtx.createBiquadFilter();
  noiseFilter.type='bandpass';
  noiseFilter.frequency.value=800;
  noiseFilter.Q.value=0.5;
  const noiseGain=audioCtx.createGain();
  noiseGain.gain.value=0.015;
  noise.connect(noiseFilter);
  noiseFilter.connect(noiseGain);
  noiseGain.connect(masterGain);
  noise.start();
  nodes.push(noise);

  // 4. Occasional ping (sonar-like)
  function schedulePing(){
    if(!soundOn)return;
    const osc=audioCtx.createOscillator();
    osc.type='sine';
    osc.frequency.value=800+Math.random()*1600;
    const g=audioCtx.createGain();
    const now=audioCtx.currentTime;
    g.gain.setValueAtTime(0,now);
    g.gain.linearRampToValueAtTime(0.06+Math.random()*0.04,now+0.02);
    g.gain.exponentialRampToValueAtTime(0.001,now+1.5+Math.random()*2);
    // Reverb via delay
    const delay=audioCtx.createDelay();
    delay.delayTime.value=0.15+Math.random()*0.3;
    const fbGain=audioCtx.createGain();
    fbGain.gain.value=0.3;
    osc.connect(g);
    g.connect(delay);
    delay.connect(fbGain);
    fbGain.connect(delay);
    g.connect(masterGain);
    delay.connect(masterGain);
    osc.start(now);
    osc.stop(now+4);
    setTimeout(schedulePing,3000+Math.random()*12000);
  }
  setTimeout(schedulePing,2000);

  // 5. Radio static crackle
  function scheduleCrackle(){
    if(!soundOn)return;
    const dur=0.05+Math.random()*0.15;
    const buf=audioCtx.createBuffer(1,Math.floor(audioCtx.sampleRate*dur),audioCtx.sampleRate);
    const ch=buf.getChannelData(0);
    for(let i=0;i<ch.length;i++) ch[i]=(Math.random()*2-1)*Math.random();
    const src=audioCtx.createBufferSource();
    src.buffer=buf;
    const g=audioCtx.createGain();
    const now=audioCtx.currentTime;
    g.gain.setValueAtTime(0.08+Math.random()*0.06,now);
    g.gain.exponentialRampToValueAtTime(0.001,now+dur);
    const hp=audioCtx.createBiquadFilter();
    hp.type='highpass';
    hp.frequency.value=2000+Math.random()*3000;
    src.connect(hp);
    hp.connect(g);
    g.connect(masterGain);
    src.start(now);
    setTimeout(scheduleCrackle,1000+Math.random()*8000);
  }
  setTimeout(scheduleCrackle,1000);
}

// --- Visualizer ---
const canvas=document.getElementById('vis');
const ctx=canvas.getContext('2d');
let analyser=null;

function setupVis(){
  canvas.width=window.innerWidth;
  canvas.height=60;
  if(audioCtx){
    analyser=audioCtx.createAnalyser();
    analyser.fftSize=256;
    masterGain.connect(analyser);
  }
}

function drawVis(){
  requestAnimationFrame(drawVis);
  if(!analyser)return;
  const bufLen=analyser.frequencyBinCount;
  const dataArr=new Uint8Array(bufLen);
  analyser.getByteFrequencyData(dataArr);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const barW=canvas.width/bufLen;
  for(let i=0;i<bufLen;i++){
    const v=dataArr[i]/255;
    const h=v*canvas.height;
    ctx.fillStyle=`rgba(80,140,255,${v*0.6})`;
    ctx.fillRect(i*barW,canvas.height-h,barW-1,h);
  }
}
drawVis();

window.addEventListener('resize',()=>{
  canvas.width=window.innerWidth;
  canvas.height=60;
});

// --- Sound toggle ---
const toggleBtn=document.getElementById('sound-toggle');
toggleBtn.addEventListener('click',()=>{
  if(!soundOn){
    if(!audioCtx) createAudio();
    if(audioCtx.state==='suspended') audioCtx.resume();
    soundOn=true;
    toggleBtn.classList.add('active');
    toggleBtn.innerHTML='&#9835;';
    setupVis();
  }else{
    soundOn=false;
    if(audioCtx) audioCtx.suspend();
    toggleBtn.classList.remove('active');
    toggleBtn.innerHTML='&#9834;';
  }
});
</script>
