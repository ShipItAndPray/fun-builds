<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Excuse Escalator</title>
<style>body{margin:0;font-family:Inter,system-ui,sans-serif;background:#13110a;color:#fffcec}main{max-width:920px;margin:auto;padding:28px}a{color:#fde68a;text-decoration:none}.card{background:#231f11;border:1px solid #554a1f;border-radius:22px;padding:22px;margin-top:18px}.step{background:#17140d;border-radius:16px;padding:14px;margin-top:10px;line-height:1.6}textarea,button{font:inherit}textarea{width:100%;min-height:110px;background:#17140d;border:1px solid #6d5b1f;color:#fffcec;border-radius:14px;padding:12px}button{border:none;border-radius:14px;padding:12px 16px;font-weight:800;background:#facc15;color:#271e00;cursor:pointer;margin-top:12px}</style>
</head>
<body><main><a href="../">← Back</a><div class="card"><h1>Excuse Escalator</h1><p>Start with a small problem. Watch it evolve into a cinematic defense.</p><textarea id="input">I forgot to send the file.</textarea><button id="go">Escalate</button><div id="out"></div></div></main>
<script>
const ramps=["There was a slight oversight.","Then timing became hostile.","Then communication infrastructure collapsed.","Then destiny entered the chat.","At that point it became a saga, not an errand."];
function render(){const t=input.value.trim();out.innerHTML=ramps.map((r,i)=>`<div class="step"><strong>Level ${i+1}</strong><br>${r} Specifically: "${t}"</div>`).join('')}
go.onclick=render;render();
</script></body></html>
