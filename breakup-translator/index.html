</div>

let selectedStyle='shakespearean';

document.querySelectorAll('.style-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.style-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    selectedStyle=btn.dataset.style;
  });
});

document.getElementById('dramatizeBtn').addEventListener('click',()=>{
  const input=document.getElementById('inputText').value.trim();
  if(!input){showToast('Type something passive-aggressive first!');return;}
  startCountdown(input);
});

function startCountdown(input){
  const overlay=document.getElementById('countdown');
  const numEl=document.getElementById('countNum');
  overlay.classList.add('show');
  document.getElementById('dramatizeBtn').disabled=true;
  let count=5;
  numEl.textContent=count;
  const timer=setInterval(()=>{
    count--;
    if(count<=0){
      clearInterval(timer);
      overlay.classList.remove('show');
      document.getElementById('dramatizeBtn').disabled=false;
      showResults(input);
    }else{
      numEl.textContent=count;
      numEl.style.animation='none';
      void numEl.offsetWidth;
      numEl.style.animation='countPop .5s ease';
    }
  },1000);
}

function translate(text,style){
  const transforms=TRANSFORMS[style];
  const fallbacks=FALLBACK_FRAGMENTS[style];
  const sentences=text.split(/[.!?\n]+/).map(s=>s.trim()).filter(s=>s.length>0);
  const results=[];
  for(const sentence of sentences){
    const sentLower=sentence.toLowerCase().trim();
    let matched=false;
    for(const [phrase,replacement] of transforms){
      if(sentLower===phrase||sentLower===phrase+'.'||sentLower===phrase+'!'){
        results.push(replacement);
        matched=true;
        break;
      }
    }
    if(!matched){
      let bestMatch=null;let bestLen=0;
      for(const [phrase,replacement] of transforms){
        if(sentLower.includes(phrase)&&phrase.length>bestLen){
          bestMatch=replacement;bestLen=phrase.length;
        }
      }
      if(bestMatch){results.push(bestMatch);matched=true;}
    }
    if(!matched){
      for(const [regex,replacement] of fallbacks){
        if(regex.test(sentLower)){results.push(replacement);matched=true;break;}
      }
    }
    if(!matched&&sentence.length>2){
      const generics={
        shakespearean:'"'+sentence+'" \u2014 Thus spake the architect of my undoing, each syllable a fresh wound upon the tapestry of my tattered dignity!',
        corporate:'Re: "'+sentence+'" \u2014 This has been escalated to Priority 1 in our emotional incident management system. A cross-functional response team has been assembled.',
        reality:'*looks directly into camera after hearing "'+sentence+'"* Did everyone at home just HEAR that?! Rewind your DVRs! I need WITNESSES!',
        soap:'*gasps, clutches staircase railing* "'+sentence+'"... The same words your father spoke the night the east wing caught fire. History repeats itself, darling.',
        sports:'AND THEY HIT US WITH "'+sentence.toUpperCase()+'"! UNBELIEVABLE! In all my years of commentary, I have NEVER seen a play like that! The crowd is on their FEET!'
      };
      results.push(generics[style]);
    }
  }
  return results.join('\n\n');
}

function showResults(input){
  const dramatic=translate(input,selectedStyle);
  document.getElementById('originalOut').textContent=input;
  document.getElementById('dramaticOut').textContent=dramatic;
  document.getElementById('results').classList.add('show');
  document.getElementById('results').scrollIntoView({behavior:'smooth',block:'start'});
}

document.getElementById('speakBtn').addEventListener('click',()=>{
  if(isSpeaking){
    speechSynthesis.cancel();isSpeaking=false;
    document.getElementById('speakBtn').classList.remove('speaking');
    document.getElementById('speakBtn').innerHTML='&#128266; Speak';
    return;
  }
  const text=document.getElementById('dramaticOut').textContent;
  if(!text)return;
  const utter=new SpeechSynthesisUtterance(text);
  utter.rate=0.85;utter.pitch=1.1;
  utter.onend=()=>{
    isSpeaking=false;
    document.getElementById('speakBtn').classList.remove('speaking');
    document.getElementById('speakBtn').innerHTML='&#128266; Speak';
  };
  speechSynthesis.speak(utter);isSpeaking=true;
  document.getElementById('speakBtn').classList.add('speaking');
  document.getElementById('speakBtn').innerHTML='&#128264; Stop';
});

document.getElementById('copyBtn').addEventListener('click',()=>{
  const text=document.getElementById('dramaticOut').textContent;
  if(!text)return;
  navigator.clipboard.writeText(text).then(()=>showToast('Dramatic monologue copied!')).catch(()=>{
    const ta=document.createElement('textarea');ta.value=text;
    document.body.appendChild(ta);ta.select();document.execCommand('copy');
    document.body.removeChild(ta);showToast('Copied!');
  });
});

document.getElementById('shareBtn').addEventListener('click',()=>{
  const text=document.getElementById('dramaticOut').textContent;
  if(!text)return;
  if(navigator.share){navigator.share({title:'Breakup Translator',text}).catch(()=>{});}
  else{navigator.clipboard.writeText(text).then(()=>showToast('Copied to clipboard for sharing!'));}
});

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
