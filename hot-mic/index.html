      "I accidentally emailed my professor a meme instead of my assignment. They responded with a better meme. We have an understanding now.",
      "The reason I always sit in the back is so nobody sees that my textbook is actually a novel with a textbook cover on it",
      "I have been telling my parents I am pre-med for three semesters. I am an art history major. The reveal will be cinematic.",
      "My honors thesis started as an argument at a party that I refused to lose"
    ]
  ]
};

var currentContext = 'office';
var escalationLevel = 0;
var pressCount = 0;
var soundEnabled = true;
var usedConfessions = {};
var audioCtx = null;

document.querySelectorAll('.context-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelector('.context-btn.active').classList.remove('active');
    btn.classList.add('active');
    currentContext = btn.dataset.ctx;
  });
});

document.getElementById('soundToggle').addEventListener('click', function() {
  soundEnabled = !soundEnabled;
  document.getElementById('soundToggle').textContent = soundEnabled ? '\u{1F50A}' : '\u{1F507}';
});

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playStatic(duration) {
  if (!soundEnabled) return;
  duration = duration || 0.6;
  var ctx = getAudioCtx();
  var bufferSize = Math.floor(ctx.sampleRate * duration);
  var buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  var data = buffer.getChannelData(0);
  for (var i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() * 2 - 1) * 0.15;
  }
  var source = ctx.createBufferSource();
  source.buffer = buffer;
  var filter = ctx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = 3000;
  filter.Q.value = 0.5;
  var gain = ctx.createGain();
  gain.gain.setValueAtTime(0.3, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
  source.connect(filter);
  filter.connect(gain);
  gain.connect(ctx.destination);
  source.start();
}

function speakConfession(text) {
  if (!soundEnabled) return;
  if (!('speechSynthesis' in window)) return;
  var utter = new SpeechSynthesisUtterance(text);
  utter.rate = 1.1;
  utter.pitch = 0.9;
  utter.volume = 0.8;
  var voices = speechSynthesis.getVoices();
  if (voices.length > 0) {
    var english = voices.filter(function(v) { return v.lang.startsWith('en'); });
    if (english.length > 0) utter.voice = english[Math.floor(Math.random() * english.length)];
  }
  utter.onend = function() {
    document.getElementById('mainBtn').classList.remove('speaking');
  };
  speechSynthesis.speak(utter);
}

function getConfessionKey(ctx, tier, idx) {
  return ctx + '-' + tier + '-' + idx;
}

function getConfession() {
  var tiers = CONFESSIONS[currentContext];
  var tier = tiers[escalationLevel];
  if (!usedConfessions[currentContext]) usedConfessions[currentContext] = {};

  var available = [];
  for (var i = 0; i < tier.length; i++) {
    var key = getConfessionKey(currentContext, escalationLevel, i);
    if (!usedConfessions[currentContext][key]) {
      available.push(i);
    }
  }

  if (available.length === 0) {
    for (var j = 0; j < tier.length; j++) {
      delete usedConfessions[currentContext][getConfessionKey(currentContext, escalationLevel, j)];
    }
    return getConfession();
  }

  var pickIdx = available[Math.floor(Math.random() * available.length)];
  usedConfessions[currentContext][getConfessionKey(currentContext, escalationLevel, pickIdx)] = true;
  return tier[pickIdx];
}

function updateDamage() {
  var bar = document.getElementById('damageBar');
  var text = document.getElementById('damageText');
  var pct = Math.min(pressCount * 8, 100);
  bar.style.width = pct + '%';
  bar.classList.remove('low', 'medium', 'high', 'critical');
  if (pct < 25) {
    bar.classList.add('low');
    text.textContent = 'Mild Awkwardness';
  } else if (pct < 50) {
    bar.classList.add('medium');
    text.textContent = 'Social Damage';
  } else if (pct < 75) {
    bar.classList.add('high');
    text.textContent = 'Reputation Ruined';
  } else {
    bar.classList.add('critical');
    text.textContent = 'CAREER OVER';
  }
  if (pressCount >= 8) escalationLevel = 2;
  else if (pressCount >= 4) escalationLevel = 1;
  else escalationLevel = 0;
}

function addBubble(text) {
  var area = document.getElementById('chatArea');
  var bubble = document.createElement('div');
  bubble.className = 'chat-bubble';
  var tierLabels = ['Mildly Embarrassing', 'Professionally Questionable', 'Absolutely Catastrophic'];
  var warning = document.createElement('div');
  warning.className = 'mic-warning';
  warning.textContent = 'MIC STILL ON';
  var confText = document.createElement('div');
  confText.className = 'confession-text';
  confText.textContent = '\u201C' + text + '\u201D';
  var tag = document.createElement('div');
  tag.className = 'escalation-tag';
  tag.textContent = tierLabels[escalationLevel] + ' | Press #' + pressCount;
  var shareBtn = document.createElement('button');
  shareBtn.className = 'share-btn';
  shareBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg> Share';
  shareBtn.addEventListener('click', function() { shareConfession(this); });
  bubble.appendChild(warning);
  bubble.appendChild(confText);
  bubble.appendChild(tag);
  bubble.appendChild(shareBtn);
  area.insertBefore(bubble, area.firstChild);
}

function shareConfession(btn) {
  var text = btn.closest('.chat-bubble').querySelector('.confession-text').textContent;
  var shareText = text + '\n\n[mic still on] -- Hot Mic';
  if (navigator.share) {
    navigator.share({ text: shareText }).catch(function(){});
  } else {
    navigator.clipboard.writeText(shareText).then(function() {
      var toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(function() { toast.classList.remove('show'); }, 2000);
    });
  }
}

document.getElementById('mainBtn').addEventListener('click', function() {
  var btn = document.getElementById('mainBtn');
  var overlay = document.getElementById('staticOverlay');
  btn.disabled = true;
  pressCount++;
  updateDamage();
  overlay.classList.add('active');
  playStatic(0.7);
  setTimeout(function() {
    overlay.classList.remove('active');
    var confession = getConfession();
    addBubble(confession);
    btn.classList.add('speaking');
    setTimeout(function() { speakConfession(confession); }, 200);
    btn.disabled = false;
  }, 800);
});

document.getElementById('resetBtn').addEventListener('click', function() {
  pressCount = 0;
  escalationLevel = 0;
  usedConfessions = {};
  document.getElementById('chatArea').innerHTML = '';
  updateDamage();
});

if ('speechSynthesis' in window) {
  speechSynthesis.getVoices();
  speechSynthesis.onvoiceschanged = function() { speechSynthesis.getVoices(); };
}
</script>
</body>
</html>
