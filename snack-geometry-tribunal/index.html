<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Snack Geometry Tribunal</title><meta name="description" content="Decide whether a snack was broken, sliced, shattered, or spiritually fragmented with legal seriousness."><style>
:root{--ink:#1f2937;--muted:#6b7280;--line:rgba(31,41,55,.12);--accent:#ea580c;--accent2:#eab308}*{box-sizing:border-box}body{margin:0;font-family:"Avenir Next","Trebuchet MS",sans-serif;color:var(--ink);background:linear-gradient(180deg,#fff7ed,#fefce8);padding:24px 18px 48px}.shell{max-width:1040px;margin:0 auto}.back{display:inline-block;margin-bottom:16px;color:var(--ink);text-decoration:none;font-weight:800}.hero,.grid,.row{display:grid;gap:18px}.hero{grid-template-columns:1.06fr .94fr;margin-bottom:18px}.grid{grid-template-columns:.95fr 1.05fr}.row{grid-template-columns:1fr 1fr;gap:12px}.panel{background:rgba(255,255,255,.86);border:1px solid rgba(255,255,255,.8);border-radius:28px;backdrop-filter:blur(14px);box-shadow:0 22px 60px rgba(234,88,12,.1)}.hero-copy,.controls,.results{padding:26px}.eyebrow{display:inline-block;padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.92);font-size:.74rem;letter-spacing:.08em;text-transform:uppercase;font-weight:800;color:var(--muted)}h1{font-size:clamp(2.45rem,5vw,4.1rem);line-height:.95;margin:16px 0 12px;letter-spacing:-.05em}p{color:var(--muted);line-height:1.6}label{display:block;font-weight:800;margin:14px 0 8px}select,input{width:100%;border:1px solid var(--line);border-radius:16px;padding:12px 14px;font:inherit;background:rgba(255,255,255,.92)}button{border:none;border-radius:999px;padding:12px 18px;font:inherit;font-weight:800;cursor:pointer}.primary{color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent2))}.secondary{background:rgba(31,41,55,.08);color:var(--ink);margin-left:10px}.card{background:rgba(255,255,255,.94);border:1px solid var(--line);border-radius:22px;padding:18px;margin-bottom:12px}.badge{display:inline-block;margin-bottom:10px;padding:7px 10px;border-radius:999px;background:rgba(234,88,12,.12);color:#c2410c;font-size:.78rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em}.headline{font-size:1.32rem;font-weight:900;margin-bottom:8px}@media(max-width:900px){.hero,.grid,.row{grid-template-columns:1fr}.secondary{margin-left:0;margin-top:10px}}
</style></head><body><div class="shell"><a class="back" href="../">← Back to Fun Builds</a><section class="hero"><div class="panel hero-copy"><div class="eyebrow">Snack Geometry Tribunal</div><h1>The shape of the damage matters.</h1><p>Describe the snack incident and receive a formal ruling on whether the break was lawful, tragic, or architecturally reckless.</p></div><div class="panel hero-copy"><p><strong>Artifact:</strong> a snack verdict suitable for screenshot, repost, or immediate table debate.</p></div></section><section class="grid"><div class="panel controls"><label for="snack">Snack type</label><select id="snack"><option>chip</option><option>cookie</option><option>cracker</option><option>granola bar</option></select><div class="row"><div><label for="event">Event</label><select id="event"><option value="1">clean break</option><option value="3">irregular fracture</option><option value="5">dust cloud collapse</option></select></div><div><label for="witnesses">Witnesses</label><select id="witnesses"><option value="0">none</option><option value="2">one person</option><option value="4">an entire room</option></select></div></div><label for="stakes">Emotional stakes</label><select id="stakes"><option value="1">minor</option><option value="3">noticeable</option><option value="5">snack betrayal</option></select><div style="margin-top:16px"><button class="primary" id="rule">Issue ruling</button><button class="secondary" id="overreact">Maximum drama</button></div></div><div class="panel results"><div id="out"></div></div></section></div><script>
function render(){const score=Number(event.value)*8+Number(witnesses.value)*6+Number(stakes.value)*7;const verdict=score>=72?'catastrophic fragmentation':score>=52?'structural failure':score>=32?'ordinary snack damage':'acceptable break pattern';out.innerHTML=`<div class="card"><div class="badge">Tribunal ruling</div><div class="headline">${verdict}</div><p>The ${snack.value} experienced ${event.selectedOptions[0].text} conditions under ${witnesses.selectedOptions[0].text} witness exposure.</p></div><div class="card"><div class="badge">Legal note</div><p>Emotional impact has been assessed as ${stakes.selectedOptions[0].text}. Compensation may include one replacement snack and a short speech about resilience.</p></div><div class="card"><div class="badge">Precedent</div><p>Future handling should involve less confidence, more plate usage, and a realistic respect for crumb physics.</p></div>`}
rule.onclick=render;overreact.onclick=()=>{event.selectedIndex=2;witnesses.selectedIndex=2;stakes.selectedIndex=2;render()};render();
</script></body></html>
