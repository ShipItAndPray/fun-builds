<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Crowd Boo Machine</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0f;
    --surface: #151520;
    --border: #2a2a3a;
    --text: #e0e0e8;
    --text-dim: #888;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  header {
    text-align: center;
    padding: 20px 16px 10px;
  }

  header h1 {
    font-size: 2rem;
    background: linear-gradient(135deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-transform: uppercase;
    letter-spacing: 3px;
    text-shadow: none;
  }

  header p {
    color: var(--text-dim);
    font-size: 0.85rem;
    margin-top: 4px;
  }

  .room-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 10px 16px;
    flex-wrap: wrap;
  }

  .room-code {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 14px;
    font-family: 'Courier New', monospace;
    font-size: 1.1rem;
    letter-spacing: 4px;
    color: #ffd93d;
    cursor: pointer;
    transition: background 0.2s;
  }

  .room-code:hover { background: #1e1e2e; }

  .room-code-label {
    font-size: 0.75rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .stealth-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.8rem;
    color: var(--text-dim);
    cursor: pointer;
    user-select: none;
  }

  .stealth-toggle input { display: none; }

  .toggle-track {
    width: 40px;
    height: 22px;
    background: var(--border);
    border-radius: 11px;
    position: relative;
    transition: background 0.3s;
  }

  .stealth-toggle input:checked + .toggle-track {
    background: #6b5bff;
  }

  .toggle-track::after {
    content: '';
    width: 18px;
    height: 18px;
    background: #fff;
    border-radius: 50%;
    position: absolute;
    top: 2px;
    left: 2px;
    transition: transform 0.3s;
  }

  .stealth-toggle input:checked + .toggle-track::after {
    transform: translateX(18px);
  }

  .buttons-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 14px;
    padding: 14px 16px;
    max-width: 700px;
    margin: 0 auto;
  }

  .sound-btn {
    position: relative;
    border: none;
    border-radius: 16px;
    padding: 22px 10px 16px;
    font-size: 1rem;
    font-weight: 700;
    color: #fff;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.1s, box-shadow 0.15s, filter 0.15s;
    text-transform: uppercase;
    letter-spacing: 1px;
    overflow: hidden;
    text-shadow: 0 2px 4px rgba(0,0,0,0.4);
  }

  .sound-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 16px;
    border: 2px solid rgba(255,255,255,0.15);
    pointer-events: none;
  }

  .sound-btn:active {
    transform: scale(0.92);
    filter: brightness(1.3);
  }

  .sound-btn .emoji {
    display: block;
    font-size: 2rem;
    margin-bottom: 6px;
  }

  .sound-btn .count {
    position: absolute;
    top: 6px;
    right: 10px;
    font-size: 0.7rem;
    background: rgba(0,0,0,0.4);
    padding: 2px 7px;
    border-radius: 10px;
    font-weight: 600;
  }

  /* Button colors */
  .btn-boo        { background: linear-gradient(145deg, #e74c3c, #c0392b); box-shadow: 0 6px 20px rgba(231,76,60,0.4); }
  .btn-applause   { background: linear-gradient(145deg, #27ae60, #1e8449); box-shadow: 0 6px 20px rgba(39,174,96,0.4); }
  .btn-airhorn    { background: linear-gradient(145deg, #f39c12, #d68910); box-shadow: 0 6px 20px rgba(243,156,18,0.4); }
  .btn-laugh      { background: linear-gradient(145deg, #8e44ad, #6c3483); box-shadow: 0 6px 20px rgba(142,68,173,0.4); }
  .btn-trombone   { background: linear-gradient(145deg, #2980b9, #1a5276); box-shadow: 0 6px 20px rgba(41,128,185,0.4); }
  .btn-rimshot    { background: linear-gradient(145deg, #e67e22, #ba4a00); box-shadow: 0 6px 20px rgba(230,126,34,0.4); }
  .btn-cricket    { background: linear-gradient(145deg, #16a085, #0e6655); box-shadow: 0 6px 20px rgba(22,160,133,0.4); }

  .sound-btn.flash {
    animation: flash-glow 0.35s ease-out;
  }

  @keyframes flash-glow {
    0%   { filter: brightness(2); transform: scale(0.92); }
    100% { filter: brightness(1); transform: scale(1); }
  }

  .feed {
    max-width: 700px;
    margin: 10px auto 30px;
    padding: 0 16px;
  }

  .feed h3 {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-dim);
    margin-bottom: 8px;
    padding-left: 4px;
  }

  .feed-list {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    max-height: 200px;
    overflow-y: auto;
    padding: 8px;
  }

  .feed-item {
    padding: 6px 10px;
    font-size: 0.85rem;
    border-radius: 6px;
    animation: slide-in 0.25s ease-out;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .feed-item:nth-child(odd) { background: rgba(255,255,255,0.02); }

  .feed-item .time {
    color: var(--text-dim);
    font-size: 0.75rem;
    white-space: nowrap;
    margin-left: 12px;
  }

  @keyframes slide-in {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .feed-list::-webkit-scrollbar { width: 4px; }
  .feed-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .copy-toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: #333;
    color: #fff;
    padding: 8px 20px;
    border-radius: 20px;
    font-size: 0.85rem;
    pointer-events: none;
    opacity: 0;
    transition: transform 0.3s, opacity 0.3s;
  }

  .copy-toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  @media (max-width: 480px) {
    .buttons-grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      padding: 10px 12px;
    }
    header h1 { font-size: 1.5rem; }
    .sound-btn { padding: 18px 8px 14px; }
    .sound-btn .emoji { font-size: 1.6rem; }
    .sound-btn { font-size: 0.85rem; }
  }
</style>
</head>
<body>

<header>
  <h1>Crowd Boo Machine</h1>
  <p>Smash buttons. Make noise. Heckle together.</p>
</header>

<div class="room-bar">
  <span class="room-code-label">Room</span>
  <span class="room-code" id="roomCode" title="Click to copy"></span>
  <label class="stealth-toggle">
    <input type="checkbox" id="stealthMode">
    <span class="toggle-track"></span>
    Stealth
  </label>
</div>

<div class="buttons-grid" id="buttonsGrid"></div>

<div class="feed">
  <h3>Live Reactions</h3>
  <div class="feed-list" id="feedList">
    <div class="feed-item" style="color:var(--text-dim); text-align:center; justify-content:center;">Waiting for someone to start heckling...</div>
  </div>
</div>

<div class="copy-toast" id="copyToast">Room code copied!</div>

<script>
// --- Config ---
const SOUNDS = [
  { id: 'boo',      label: 'Boo',          emoji: '\u{1F44E}', cls: 'btn-boo' },
  { id: 'applause', label: 'Applause',      emoji: '\u{1F44F}', cls: 'btn-applause' },
  { id: 'airhorn',  label: 'Air Horn',      emoji: '\u{1F3BA}', cls: 'btn-airhorn' },
  { id: 'laugh',    label: 'Laugh',         emoji: '\u{1F602}', cls: 'btn-laugh' },
  { id: 'trombone', label: 'Sad Trombone',  emoji: '\u{1F3B5}', cls: 'btn-trombone' },
  { id: 'rimshot',  label: 'Rimshot',       emoji: '\u{1F941}', cls: 'btn-rimshot' },
  { id: 'cricket',  label: 'Cricket',       emoji: '\u{1F997}', cls: 'btn-cricket' },
];

const counts = {};
SOUNDS.forEach(s => counts[s.id] = 0);

let stealthMode = false;
let audioCtx = null;

function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

// --- Room code ---
function genRoomCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = '';
  for (let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return code;
}

const params = new URLSearchParams(location.search);
const roomCode = params.get('room') || genRoomCode();
document.getElementById('roomCode').textContent = roomCode;

document.getElementById('roomCode').addEventListener('click', () => {
  const url = location.origin + location.pathname + '?room=' + roomCode;
  navigator.clipboard.writeText(url).then(() => {
    const toast = document.getElementById('copyToast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1800);
  }).catch(() => {});
});

// --- BroadcastChannel ---
let channel = null;
try { channel = new BroadcastChannel('crowd-boo-' + roomCode); } catch(e) {}
if (channel) {
  channel.onmessage = (e) => {
    if (e.data && e.data.type === 'reaction') {
      playSound(e.data.soundId, false);
    }
  };
}

// --- Stealth ---
document.getElementById('stealthMode').addEventListener('change', (e) => {
  stealthMode = e.target.checked;
});

// --- Sound Synthesis ---
function getGain() {
  return stealthMode ? 0.08 : 0.45;
}

function playBoo(ctx) {
  const g = getGain();
  const dur = 1.2;
  const t = ctx.currentTime;

  // Low rumble with multiple detuned oscillators
  for (let i = 0; i < 5; i++) {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.value = 80 + Math.random() * 40;
    osc.detune.value = (Math.random() - 0.5) * 50;
    gain.gain.setValueAtTime(g * 0.3, t);
    gain.gain.linearRampToValueAtTime(g * 0.5, t + 0.1);
    gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
    osc.connect(gain).connect(ctx.destination);
    osc.start(t);
    osc.stop(t + dur);
  }

  // Noise component for crowd texture
  const bufSize = ctx.sampleRate * dur;
  const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * 0.3;
  const noise = ctx.createBufferSource();
  noise.buffer = buf;
  const lp = ctx.createBiquadFilter();
  lp.type = 'lowpass';
  lp.frequency.value = 300;
  const ng = ctx.createGain();
  ng.gain.setValueAtTime(g * 0.4, t);
  ng.gain.exponentialRampToValueAtTime(0.001, t + dur);
  noise.connect(lp).connect(ng).connect(ctx.destination);
  noise.start(t);
  noise.stop(t + dur);
}

function playApplause(ctx) {
  const g = getGain();
  const dur = 1.5;
  const t = ctx.currentTime;
  const sr = ctx.sampleRate;
  const bufSize = sr * dur;
  const buf = ctx.createBuffer(1, bufSize, sr);
  const data = buf.getChannelData(0);

  // Shaped noise bursts to mimic clapping
  for (let i = 0; i < bufSize; i++) {
    const env = Math.sin(Math.PI * i / bufSize); // overall envelope
    // Rapid bursts (~8-15 Hz modulation for clap texture)
    const burstFreq = 10 + Math.random() * 5;
    const burst = Math.abs(Math.sin(2 * Math.PI * burstFreq * i / sr));
    data[i] = (Math.random() * 2 - 1) * env * burst;
  }

  const noise = ctx.createBufferSource();
  noise.buffer = buf;
  const hp = ctx.createBiquadFilter();
  hp.type = 'highpass';
  hp.frequency.value = 800;
  const bp = ctx.createBiquadFilter();
  bp.type = 'bandpass';
  bp.frequency.value = 3000;
  bp.Q.value = 0.5;
  const gain = ctx.createGain();
  gain.gain.value = g * 1.2;
  noise.connect(hp).connect(bp).connect(gain).connect(ctx.destination);
  noise.start(t);
  noise.stop(t + dur);
}

function playAirHorn(ctx) {
  const g = getGain();
  const t = ctx.currentTime;

  // Stacked sine waves sweeping up
  [1, 1.5, 2, 3].forEach((mult, idx) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(200 * mult, t);
    osc.frequency.linearRampToValueAtTime(600 * mult, t + 0.15);
    osc.frequency.setValueAtTime(580 * mult, t + 0.15);
    osc.frequency.linearRampToValueAtTime(600 * mult, t + 0.8);
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(g * (0.4 - idx * 0.08), t + 0.05);
    gain.gain.setValueAtTime(g * (0.4 - idx * 0.08), t + 0.6);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 1.0);
    osc.connect(gain).connect(ctx.destination);
    osc.start(t);
    osc.stop(t + 1.0);
  });

  // Distortion via waveshaper for that classic horn bite
  const osc2 = ctx.createOscillator();
  const dist = ctx.createWaveShaper();
  const dGain = ctx.createGain();
  osc2.type = 'square';
  osc2.frequency.setValueAtTime(300, t);
  osc2.frequency.linearRampToValueAtTime(880, t + 0.15);
  const curve = new Float32Array(256);
  for (let i = 0; i < 256; i++) { const x = (i / 128) - 1; curve[i] = Math.tanh(x * 3); }
  dist.curve = curve;
  dGain.gain.setValueAtTime(g * 0.15, t);
  dGain.gain.exponentialRampToValueAtTime(0.001, t + 0.9);
  osc2.connect(dist).connect(dGain).connect(ctx.destination);
  osc2.start(t);
  osc2.stop(t + 1.0);
}

function playLaugh(ctx) {
  const g = getGain();
  const t = ctx.currentTime;
  const sr = ctx.sampleRate;
  const dur = 1.8;
  const bufSize = sr * dur;
  const buf = ctx.createBuffer(1, bufSize, sr);
  const data = buf.getChannelData(0);

  // "Ha ha ha" bursts - amplitude modulated noise
  for (let i = 0; i < bufSize; i++) {
    const time = i / sr;
    // Each "ha" is ~0.15s, with gaps
    const haFreq = 6; // 6 "ha"s per second
    const ha = Math.pow(Math.max(0, Math.sin(2 * Math.PI * haFreq * time)), 3);
    const overall = 1 - (time / dur) * 0.7; // fade out
    data[i] = (Math.random() * 2 - 1) * ha * overall;
  }

  const noise = ctx.createBufferSource();
  noise.buffer = buf;

  // Formant-like filtering for voice quality
  const bp1 = ctx.createBiquadFilter();
  bp1.type = 'bandpass';
  bp1.frequency.value = 800;
  bp1.Q.value = 2;

  const bp2 = ctx.createBiquadFilter();
  bp2.type = 'peaking';
  bp2.frequency.value = 2500;
  bp2.gain.value = 6;
  bp2.Q.value = 1;

  const gain = ctx.createGain();
  gain.gain.value = g * 1.5;

  noise.connect(bp1).connect(bp2).connect(gain).connect(ctx.destination);
  noise.start(t);
  noise.stop(t + dur);

  // Add a pitched component for the vocal tone
  const osc = ctx.createOscillator();
  const oscGain = ctx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.value = 180;
  oscGain.gain.setValueAtTime(g * 0.1, t);
  oscGain.gain.exponentialRampToValueAtTime(0.001, t + dur);
  osc.connect(oscGain).connect(ctx.destination);
  osc.start(t);
  osc.stop(t + dur);
}

function playSadTrombone(ctx) {
  const g = getGain();
  const t = ctx.currentTime;

  // Classic "wah wah wah wahhhhh" - Bb, A, Ab, G(long)
  const notes = [
    { freq: 466, start: 0,    dur: 0.35 },
    { freq: 440, start: 0.38, dur: 0.35 },
    { freq: 415, start: 0.76, dur: 0.35 },
    { freq: 349, start: 1.14, dur: 0.9  },
  ];

  notes.forEach((note, idx) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(note.freq, t + note.start);
    // Vibrato on the last note
    if (idx === 3) {
      osc.frequency.linearRampToValueAtTime(note.freq * 0.92, t + note.start + note.dur);
      // Add vibrato
      const lfo = ctx.createOscillator();
      const lfoGain = ctx.createGain();
      lfo.frequency.value = 5;
      lfoGain.gain.value = 8;
      lfo.connect(lfoGain).connect(osc.frequency);
      lfo.start(t + note.start);
      lfo.stop(t + note.start + note.dur);
    }

    gain.gain.setValueAtTime(0, t + note.start);
    gain.gain.linearRampToValueAtTime(g * 0.4, t + note.start + 0.03);
    gain.gain.setValueAtTime(g * 0.4, t + note.start + note.dur * 0.6);
    gain.gain.exponentialRampToValueAtTime(0.001, t + note.start + note.dur);

    // Mute effect (wah)
    const lp = ctx.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.setValueAtTime(2000, t + note.start);
    lp.frequency.exponentialRampToValueAtTime(400, t + note.start + note.dur);

    osc.connect(lp).connect(gain).connect(ctx.destination);
    osc.start(t + note.start);
    osc.stop(t + note.start + note.dur + 0.05);
  });
}

function playRimshot(ctx) {
  const g = getGain();
  const t = ctx.currentTime;

  // Snare hit - short noise burst
  const sr = ctx.sampleRate;
  const noiseDur = 0.08;
  const nBuf = ctx.createBuffer(1, sr * noiseDur, sr);
  const nData = nBuf.getChannelData(0);
  for (let i = 0; i < nBuf.length; i++) nData[i] = Math.random() * 2 - 1;
  const nSrc = ctx.createBufferSource();
  nSrc.buffer = nBuf;
  const nGain = ctx.createGain();
  nGain.gain.setValueAtTime(g * 0.8, t);
  nGain.gain.exponentialRampToValueAtTime(0.001, t + noiseDur);
  const hp = ctx.createBiquadFilter();
  hp.type = 'highpass';
  hp.frequency.value = 1000;
  nSrc.connect(hp).connect(nGain).connect(ctx.destination);
  nSrc.start(t);
  nSrc.stop(t + noiseDur);

  // Drum body - pitched down
  const osc = ctx.createOscillator();
  const oGain = ctx.createGain();
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(200, t);
  osc.frequency.exponentialRampToValueAtTime(80, t + 0.06);
  oGain.gain.setValueAtTime(g * 0.7, t);
  oGain.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
  osc.connect(oGain).connect(ctx.destination);
  osc.start(t);
  osc.stop(t + 0.1);

  // Cymbal - longer noise
  const cDur = 0.5;
  const cBuf = ctx.createBuffer(1, sr * cDur, sr);
  const cData = cBuf.getChannelData(0);
  for (let i = 0; i < cBuf.length; i++) cData[i] = Math.random() * 2 - 1;
  const cSrc = ctx.createBufferSource();
  cSrc.buffer = cBuf;
  const cGain = ctx.createGain();
  cGain.gain.setValueAtTime(0, t + 0.08);
  cGain.gain.linearRampToValueAtTime(g * 0.3, t + 0.1);
  cGain.gain.exponentialRampToValueAtTime(0.001, t + 0.08 + cDur);
  const bp = ctx.createBiquadFilter();
  bp.type = 'bandpass';
  bp.frequency.value = 6000;
  bp.Q.value = 0.8;
  cSrc.connect(bp).connect(cGain).connect(ctx.destination);
  cSrc.start(t + 0.08);
  cSrc.stop(t + 0.08 + cDur);
}

function playCricket(ctx) {
  const g = getGain();
  const t = ctx.currentTime;

  // Multiple chirps with silence between them
  const chirps = [0, 0.35, 0.7, 1.4, 1.75, 2.1];
  chirps.forEach(offset => {
    // Each chirp is a rapid oscillation burst
    const chirpDur = 0.08;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.type = 'sine';
    osc.frequency.value = 4200 + Math.random() * 400;

    // AM modulation for the "chirp" texture
    const am = ctx.createOscillator();
    const amGain = ctx.createGain();
    am.frequency.value = 55; // rapid on-off
    amGain.gain.value = g * 0.2;
    am.connect(amGain);

    gain.gain.setValueAtTime(0, t + offset);
    gain.gain.linearRampToValueAtTime(g * 0.2, t + offset + 0.01);
    gain.gain.setValueAtTime(g * 0.2, t + offset + chirpDur - 0.01);
    gain.gain.linearRampToValueAtTime(0, t + offset + chirpDur);

    osc.connect(gain).connect(ctx.destination);
    osc.start(t + offset);
    osc.stop(t + offset + chirpDur);
    am.start(t + offset);
    am.stop(t + offset + chirpDur);

    // Second harmonic
    const osc2 = ctx.createOscillator();
    const g2 = ctx.createGain();
    osc2.type = 'sine';
    osc2.frequency.value = 5800 + Math.random() * 300;
    g2.gain.setValueAtTime(0, t + offset);
    g2.gain.linearRampToValueAtTime(getGain() * 0.1, t + offset + 0.01);
    g2.gain.linearRampToValueAtTime(0, t + offset + chirpDur);
    osc2.connect(g2).connect(ctx.destination);
    osc2.start(t + offset);
    osc2.stop(t + offset + chirpDur);
  });
}

const soundPlayers = { boo: playBoo, applause: playApplause, airhorn: playAirHorn, laugh: playLaugh, trombone: playSadTrombone, rimshot: playRimshot, cricket: playCricket };

// --- UI ---
const grid = document.getElementById('buttonsGrid');
const feedList = document.getElementById('feedList');
const feedItems = [];
let firstReaction = true;

SOUNDS.forEach(s => {
  const btn = document.createElement('button');
  btn.className = `sound-btn ${s.cls}`;
  btn.dataset.id = s.id;
  btn.innerHTML = `<span class="emoji">${s.emoji}</span>${s.label}<span class="count" id="count-${s.id}">0</span>`;
  btn.addEventListener('click', () => triggerSound(s.id));
  // Prevent double-tap zoom on mobile
  btn.addEventListener('touchend', (e) => { e.preventDefault(); triggerSound(s.id); });
  grid.appendChild(btn);
});

function triggerSound(id) {
  playSound(id, true);
  if (channel) channel.postMessage({ type: 'reaction', soundId: id });
}

function playSound(id, isLocal) {
  const ctx = getAudio();
  const player = soundPlayers[id];
  if (player) player(ctx);

  // Update count
  counts[id]++;
  const countEl = document.getElementById('count-' + id);
  if (countEl) countEl.textContent = counts[id];

  // Flash button
  const btn = document.querySelector(`.sound-btn[data-id="${id}"]`);
  if (btn) {
    btn.classList.remove('flash');
    void btn.offsetWidth; // reflow
    btn.classList.add('flash');
  }

  // Add to feed
  const sound = SOUNDS.find(s => s.id === id);
  if (!sound) return;

  if (firstReaction) {
    feedList.innerHTML = '';
    firstReaction = false;
  }

  const item = { id, emoji: sound.emoji, label: sound.label, time: Date.now(), source: isLocal ? 'You' : 'Someone' };
  feedItems.unshift(item);
  if (feedItems.length > 50) feedItems.pop();

  renderFeed();
}

function renderFeed() {
  const now = Date.now();
  feedList.innerHTML = feedItems.slice(0, 20).map(item => {
    const ago = timeAgo(now - (now - item.time));
    return `<div class="feed-item"><span>${item.emoji} ${item.label} <span style="color:var(--text-dim)">- ${item.source}</span></span><span class="time">${ago}</span></div>`;
  }).join('');
}

function timeAgo(ts) {
  const diff = Date.now() - ts;
  if (diff < 1000) return 'just now';
  const secs = Math.floor(diff / 1000);
  if (secs < 60) return secs + 's ago';
  const mins = Math.floor(secs / 60);
  return mins + 'm ago';
}

// Update timestamps every second
setInterval(renderFeed, 1000);
</script>
