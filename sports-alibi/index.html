}

function generate() {
  const cats = selectedCategory === 'all'
    ? Object.keys(TEMPLATES)
    : [selectedCategory];
  const cat = pick(cats);
  const template = pick(TEMPLATES[cat]);
  const text = fillTemplate(template, selectedSport);

  // Delusion score: conspiracy/karma = higher, refs = mid, weather/equipment = lower
  const baseScores = { refs: [35,70], weather: [20,55], conspiracy: [65,98], equipment: [25,60], karma: [45,85] };
  const [lo, hi] = baseScores[cat];
  const score = Math.floor(lo + Math.random() * (hi - lo));

  const card = document.getElementById('alibiCard');
  const catEl = document.getElementById('alibiCategory');
  const textEl = document.getElementById('alibiText');
  const meterFill = document.getElementById('meterFill');
  const meterPct = document.getElementById('meterPercent');
  const delusionLabel = document.getElementById('delusionLabel');

  card.classList.remove('visible');
  void card.offsetWidth; // force reflow
  card.classList.add('visible');

  catEl.textContent = cat.toUpperCase();
  catEl.className = 'alibi-category ' + cat;
  textEl.textContent = text;

  const level = DELUSION_LEVELS.find(l => score <= l.max);
  meterFill.style.width = score + '%';
  meterFill.style.background = `linear-gradient(90deg, var(--meter-green), ${level.color})`;
  meterPct.textContent = score + '%';
  delusionLabel.textContent = level.label;
  delusionLabel.style.color = level.color;

  lastAlibi = text;

  // History
  history.unshift({ text, sport: SPORT_TERMS[selectedSport].sport, cat });
  if (history.length > 5) history.pop();
  renderHistory();
}

function renderHistory() {
  const section = document.getElementById('historySection');
  const list = document.getElementById('historyList');
  if (history.length === 0) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  list.innerHTML = history.map(h =>
    `<div class="history-item"><span class="hist-sport">${h.sport} / ${h.cat}</span><br>${h.text}</div>`
  ).join('');
}

// Sport selector
document.getElementById('sportSelector').addEventListener('click', e => {
  const btn = e.target.closest('.sport-btn');
  if (!btn) return;
  document.querySelectorAll('.sport-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedSport = btn.dataset.sport;
});

// Category filter
document.getElementById('categoryRow').addEventListener('click', e => {
  const chip = e.target.closest('.cat-chip');
  if (!chip) return;
  document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  selectedCategory = chip.dataset.cat;
});

// Generate
document.getElementById('generateBtn').addEventListener('click', generate);

// Copy
document.getElementById('copyBtn').addEventListener('click', () => {
  if (!lastAlibi) return;
  const full = `"${lastAlibi}" — Sports Alibi Generator`;
  navigator.clipboard.writeText(full).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy Alibi', 1500);
  });
});

// Tweet
document.getElementById('tweetBtn').addEventListener('click', () => {
  if (!lastAlibi) return;
  const tweet = encodeURIComponent(`"${lastAlibi}"\n\n— Sports Alibi Generator`);
  window.open(`https://twitter.com/intent/tweet?text=${tweet}`, '_blank');
});

// Generate one on load
generate();
</script>
</body>
</html>
