<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ego Deflator - Cosmic Perspective Generator</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  @keyframes twinkle{0%,100%{opacity:.3}50%{opacity:1}}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  @keyframes fadeInUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
  @keyframes deflate{0%{transform:scale(1)}30%{transform:scale(1.1)}100%{transform:scale(0.05)}}
  @keyframes meterDrain{from{width:var(--start-w)}to{width:var(--end-w)}}
  @keyframes confettiFall{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
  @keyframes pulseGlow{0%,100%{box-shadow:0 0 20px rgba(138,43,226,.3)}50%{box-shadow:0 0 40px rgba(138,43,226,.6)}}
  @keyframes slideIn{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}

  body{
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    background:#0a0a1a;
    color:#e0e0ff;
    min-height:100vh;
    overflow-x:hidden;
    position:relative;
  }

  .stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
  .star{position:absolute;background:#fff;border-radius:50%}

  .container{
    max-width:700px;
    margin:0 auto;
    padding:30px 20px;
    position:relative;
    z-index:1;
  }

  h1{
    text-align:center;
    font-size:2.4em;
    background:linear-gradient(135deg,#ff6b6b,#a855f7,#6bc5ff);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    background-clip:text;
    margin-bottom:8px;
    animation:float 4s ease-in-out infinite;
  }
  .subtitle{text-align:center;color:#8888bb;font-size:1em;margin-bottom:35px}

  .input-area{
    background:rgba(255,255,255,.05);
    border:1px solid rgba(138,43,226,.3);
    border-radius:16px;
    padding:25px;
    margin-bottom:30px;
    animation:pulseGlow 3s ease-in-out infinite;
  }
  .input-area label{display:block;font-size:1.1em;margin-bottom:12px;color:#c0c0ff}
  .input-area input{
    width:100%;padding:14px 18px;
    background:rgba(0,0,0,.4);border:1px solid rgba(138,43,226,.4);
    border-radius:10px;color:#fff;font-size:1.05em;
    outline:none;transition:border-color .3s;
  }
  .input-area input:focus{border-color:#a855f7}
  .input-area input::placeholder{color:#555}

  .deflate-btn{
    display:block;width:100%;margin-top:16px;padding:16px;
    background:linear-gradient(135deg,#7c3aed,#a855f7);
    border:none;border-radius:10px;color:#fff;
    font-size:1.15em;font-weight:700;cursor:pointer;
    transition:transform .2s,box-shadow .2s;
  }
  .deflate-btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(138,43,226,.4)}
  .deflate-btn:active{transform:translateY(0)}

  .ego-meter-wrap{
    background:rgba(255,255,255,.05);border-radius:16px;
    padding:20px 25px;margin-bottom:25px;display:none;
  }
  .ego-meter-wrap.show{display:block;animation:fadeInUp .5s ease}
  .ego-meter-label{display:flex;justify-content:space-between;margin-bottom:10px;font-size:.95em}
  .ego-meter-label span:first-child{color:#ff6b6b}
  .ego-meter-label span:last-child{color:#6bc5ff;font-weight:700}
  .ego-meter-track{
    height:28px;background:rgba(0,0,0,.4);border-radius:14px;
    overflow:hidden;position:relative;
  }
  .ego-meter-fill{
    height:100%;border-radius:14px;
    background:linear-gradient(90deg,#6bc5ff,#a855f7,#ff6b6b);
    transition:width 2s cubic-bezier(.4,0,.2,1);
    position:relative;
  }
  .ego-meter-fill::after{
    content:'';position:absolute;right:0;top:0;bottom:0;width:6px;
    background:#fff;border-radius:3px;opacity:.7;
  }
  .ego-pct{text-align:center;margin-top:8px;font-size:1.5em;font-weight:700;color:#a855f7}

  .result-card{
    background:rgba(255,255,255,.05);border:1px solid rgba(138,43,226,.2);
    border-radius:16px;padding:25px;margin-bottom:20px;display:none;
  }
  .result-card.show{display:block;animation:fadeInUp .6s ease}

  .humbling-response{font-size:1.15em;line-height:1.6;margin-bottom:20px;color:#d0d0ff}
  .humbling-response .achievement{color:#a855f7;font-weight:600}

  .scale-comparison{
    background:rgba(0,0,0,.3);border-radius:12px;padding:18px;margin-bottom:18px;
  }
  .scale-comparison h3{color:#6bc5ff;font-size:.9em;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
  .scale-item{
    display:flex;align-items:center;gap:12px;padding:8px 0;
    border-bottom:1px solid rgba(255,255,255,.05);
    animation:slideIn .5s ease backwards;
  }
  .scale-item:last-child{border-bottom:none}
  .scale-icon{font-size:1.4em;min-width:35px;text-align:center}
  .scale-text{font-size:.92em;color:#b0b0dd;line-height:1.4}
  .scale-text strong{color:#e0e0ff}

  .balloon-container{text-align:center;margin:20px 0;font-size:4em;transition:transform 2s cubic-bezier(.4,0,.2,1)}
  .balloon-container.deflated{animation:deflate 2s forwards}

  .recovery-btn{
    display:none;width:100%;padding:14px;margin-top:10px;
    background:linear-gradient(135deg,#059669,#10b981);
    border:none;border-radius:10px;color:#fff;
    font-size:1.05em;font-weight:700;cursor:pointer;
    transition:transform .2s;
  }
  .recovery-btn.show{display:block;animation:fadeInUp .5s ease}
  .recovery-btn:hover{transform:translateY(-2px)}

  .share-btn{
    display:none;width:100%;padding:14px;margin-top:10px;
    background:linear-gradient(135deg,#1d4ed8,#3b82f6);
    border:none;border-radius:10px;color:#fff;
    font-size:1.05em;font-weight:700;cursor:pointer;
    transition:transform .2s;
  }
  .share-btn.show{display:block;animation:fadeInUp .6s ease}
  .share-btn:hover{transform:translateY(-2px)}

  .confetti-piece{
    position:fixed;width:10px;height:10px;z-index:999;
    pointer-events:none;animation:confettiFall 3s linear forwards;
  }

  .history{margin-top:30px;display:none}
  .history.show{display:block}
  .history h3{color:#8888bb;font-size:.85em;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
  .history-item{
    background:rgba(255,255,255,.03);border-radius:8px;padding:10px 14px;
    margin-bottom:6px;font-size:.85em;color:#8080aa;cursor:pointer;
    transition:background .2s;
  }
  .history-item:hover{background:rgba(255,255,255,.07)}

  .fun-facts{
    text-align:center;color:#666;font-size:.8em;margin-top:40px;
    padding:15px;border-top:1px solid rgba(255,255,255,.05);
  }

  @media(max-width:600px){
    h1{font-size:1.8em}
    .container{padding:20px 15px}
    .input-area,.result-card,.ego-meter-wrap{padding:18px}
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="container">

  <div class="input-area">

    <div class="ego-meter-track"><div class="ego-meter-fill" id="egoFill" style="width:100%"></div></div>
    <div class="ego-pct" id="egoPct"></div>
  </div>

  <div class="balloon-container" id="balloon">&#127880;</div>

  <div class="result-card" id="resultCard">
    <div class="humbling-response" id="humblingText"></div>
    <div class="scale-comparison" id="scaleComparison"></div>
  </div>

  <button class="recovery-btn" id="recoveryBtn">Actually, I Feel Fine</button>
  <button class="share-btn" id="shareBtn">Share My Humbling</button>

  <div class="history" id="history">
    <h3>Previous Deflations</h3>
    <div id="historyList"></div>

  <div class="fun-facts">
    You are 1 of 8 billion humans on a pale blue dot orbiting an average star<br>

</div>

const scaleComparisons = [

const egoDeflateAmounts = [
  { pct: 3, label: "Cosmically Negligible" },
  { pct: 7, label: "Subatomically Humble" },
  { pct: 5, label: "Existentially Microscopic" },
  { pct: 2, label: "Quantum Insignificant" },
  { pct: 12, label: "Galactically Modest" },
  { pct: 1, label: "Planck-Scale Important" },
  { pct: 8, label: "Geologically Momentary" },
  { pct: 4, label: "Bacterially Outnumbered" },
];

let audioCtx = null;
let deflationHistory = [];

function initStars() {
  const c = document.getElementById('stars');
  for (let i = 0; i < 150; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    s.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;opacity:${Math.random()*.7+.3};animation:twinkle ${Math.random()*3+2}s ease-in-out ${Math.random()*3}s infinite`;
    c.appendChild(s);
  }
}

function playDeflateSound() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const now = audioCtx.currentTime;
    // Balloon deflating: descending pitch with noise
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const filter = audioCtx.createBiquadFilter();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(800, now);
    osc.frequency.exponentialRampToValueAtTime(80, now + 1.5);
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(2000, now);
    filter.frequency.exponentialRampToValueAtTime(200, now + 1.5);
    gain.gain.setValueAtTime(0.15, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 1.8);
    osc.connect(filter);
    filter.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(now);
    osc.stop(now + 2);

    // Raspberry / flatulence undertone
    const osc2 = audioCtx.createOscillator();
    const gain2 = audioCtx.createGain();
    osc2.type = 'square';
    osc2.frequency.setValueAtTime(120, now + 0.3);
    osc2.frequency.exponentialRampToValueAtTime(40, now + 1.6);
    gain2.gain.setValueAtTime(0.05, now + 0.3);
    gain2.gain.exponentialRampToValueAtTime(0.001, now + 1.6);
    osc2.connect(gain2);
    gain2.connect(audioCtx.destination);
    osc2.start(now + 0.3);
    osc2.stop(now + 1.8);
  } catch(e) {}
}

function playConfettiSound() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const now = audioCtx.currentTime;
    // Happy sparkle ascending
    [0, 0.1, 0.2, 0.3, 0.4].forEach((t, i) => {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(500 + i * 200, now + t);
      g.gain.setValueAtTime(0.1, now + t);
      g.gain.exponentialRampToValueAtTime(0.001, now + t + 0.3);
      o.connect(g);
      g.connect(audioCtx.destination);
      o.start(now + t);
      o.stop(now + t + 0.3);
    });
  } catch(e) {}
}

function launchConfetti() {
  const colors = ['#ff6b6b','#a855f7','#6bc5ff','#10b981','#f59e0b','#ec4899','#fff'];
  const shapes = ['square','circle'];
  for (let i = 0; i < 80; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    const shape = shapes[Math.floor(Math.random()*shapes.length)];
    const color = colors[Math.floor(Math.random()*colors.length)];
    const size = Math.random() * 8 + 5;
    el.style.cssText = `
      left:${Math.random()*100}%;top:-10px;
      width:${size}px;height:${size}px;
      background:${color};
      border-radius:${shape==='circle'?'50%':'2px'};
      animation-duration:${Math.random()*2+2}s;
      animation-delay:${Math.random()*0.5}s;

    document.body.appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }
}

function getRandomItems(arr, n) {
  const shuffled = [...arr].sort(() => 0.5 - Math.random());
  return shuffled.slice(0, n);
}

function deflate() {
  const input = document.getElementById('achievement').value.trim();
  if (!input) {
    document.getElementById('achievement').style.borderColor = '#ff6b6b';
    setTimeout(() => document.getElementById('achievement').style.borderColor = 'rgba(138,43,226,.4)', 1000);
    return;
  }

  const template = humblingTemplates[Math.floor(Math.random() * humblingTemplates.length)];
  const humbling = template(input);

  // Show ego meter
  const meterWrap = document.getElementById('egoMeter');
  const fill = document.getElementById('egoFill');
  const pctEl = document.getElementById('egoPct');
  const levelText = document.getElementById('egoLevelText');
  meterWrap.classList.add('show');

  // Reset meter
  fill.style.transition = 'none';
  fill.style.width = '100%';
  fill.offsetHeight; // force reflow

  const deflateInfo = egoDeflateAmounts[Math.floor(Math.random() * egoDeflateAmounts.length)];
  const targetPct = deflateInfo.pct;

  // Animate meter drain
  fill.style.transition = 'width 2s cubic-bezier(.4,0,.2,1)';
  requestAnimationFrame(() => {
    fill.style.width = targetPct + '%';
  });

  // Animate percentage counter
  let currentPct = 100;
  const pctInterval = setInterval(() => {
    currentPct -= 2;
    if (currentPct <= targetPct) {
      currentPct = targetPct;
      clearInterval(pctInterval);
    }
    levelText.textContent = `EGO: ${currentPct}%`;
    pctEl.textContent = currentPct <= targetPct ? deflateInfo.label : '';
  }, 40);

  // Balloon deflate
  const balloon = document.getElementById('balloon');
  balloon.classList.remove('deflated');
  balloon.offsetHeight;
  balloon.classList.add('deflated');

  // Play sound
  playDeflateSound();

  // Show result
  const resultCard = document.getElementById('resultCard');
  const humblingText = document.getElementById('humblingText');
  humblingText.innerHTML = humbling;
  resultCard.classList.add('show');

  // Scale comparisons
  const scaleDiv = document.getElementById('scaleComparison');
  const comparisons = getRandomItems(scaleComparisons, 3);
  scaleDiv.innerHTML = '<h3>Scale Comparisons</h3>';
  comparisons.forEach((c, i) => {
    const item = document.createElement('div');
    item.className = 'scale-item';
    item.style.animationDelay = `${0.3 + i * 0.2}s`;
    item.innerHTML = `<span class="scale-icon">${c.icon}</span><span class="scale-text">${c.text}</span>`;
    scaleDiv.appendChild(item);
  });

  // Show buttons
  document.getElementById('recoveryBtn').classList.add('show');
  document.getElementById('shareBtn').classList.add('show');

  // Add to history
  deflationHistory.unshift({ achievement: input, response: humbling, pct: targetPct, label: deflateInfo.label });
  updateHistory();
}

function updateHistory() {
  if (deflationHistory.length === 0) return;
  const historyDiv = document.getElementById('history');
  const list = document.getElementById('historyList');
  historyDiv.classList.add('show');
  list.innerHTML = '';
  deflationHistory.slice(0, 5).forEach(h => {
    const item = document.createElement('div');
    item.className = 'history-item';
    item.textContent = `"${h.achievement}" - Ego: ${h.pct}% (${h.label})`;
    list.appendChild(item);
  });
}

function recover() {
  launchConfetti();
  playConfettiSound();
  const fill = document.getElementById('egoFill');
  const levelText = document.getElementById('egoLevelText');
  const pctEl = document.getElementById('egoPct');
  fill.style.width = '100%';
  levelText.textContent = 'EGO: 100%';
  pctEl.textContent = 'Fully Restored. You matter!';
  pctEl.style.color = '#10b981';
  setTimeout(() => { pctEl.style.color = '#a855f7'; }, 3000);

  const balloon = document.getElementById('balloon');
  balloon.classList.remove('deflated');
  balloon.style.transform = 'scale(1)';
}

function shareHumbling() {
  const text = document.getElementById('humblingText').innerText;
  const shareText = text + '\n\n-- Ego Deflator: Cosmic Perspective Generator';
  if (navigator.share) {
    navigator.share({ title: 'Ego Deflator', text: shareText }).catch(() => {});
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(shareText).then(() => {
      const btn = document.getElementById('shareBtn');
      btn.textContent = 'Copied to clipboard!';
      setTimeout(() => { btn.textContent = 'Share My Humbling'; }, 2000);
    });
  }
}

// Events
document.getElementById('deflateBtn').addEventListener('click', deflate);
document.getElementById('achievement').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') deflate();
});
document.getElementById('recoveryBtn').addEventListener('click', recover);
document.getElementById('shareBtn').addEventListener('click', shareHumbling);

// Init
initStars();
</script>
