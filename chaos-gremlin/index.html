<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHAOS GREMLIN</title>
<style>
  :root {
    --bg: #1a1a2e;
    --text: #eee;
    --accent: #e94560;
    --panel: #16213e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
    overflow-x: hidden;
  }

  h1 {
    font-size: clamp(2rem, 6vw, 4rem);
    margin-bottom: 0.5rem;
    text-shadow: 0 0 20px rgba(233,69,96,0.5);
  }

  .subtitle {
    font-size: 1.1rem;
    opacity: 0.7;
    margin-bottom: 2rem;
  }

  #chaos-btn {
    width: clamp(180px, 50vw, 300px);
    height: clamp(180px, 50vw, 300px);
    border-radius: 50%;
    border: 6px solid #ff2244;
    background: radial-gradient(circle at 35% 35%, #ff4466, #aa0022);
    color: white;
    font-size: clamp(1.8rem, 5vw, 2.8rem);
    font-weight: 900;
    cursor: pointer;
    box-shadow: 0 0 40px rgba(255,34,68,0.5), inset 0 -8px 20px rgba(0,0,0,0.3);
    transition: transform 0.15s, box-shadow 0.15s;
    text-transform: uppercase;
    letter-spacing: 2px;
    position: relative;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  #chaos-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 0 60px rgba(255,34,68,0.8), inset 0 -8px 20px rgba(0,0,0,0.3);
  }

  #chaos-btn:active {
    transform: scale(0.95);
  }

  .controls {
    margin-top: 2rem;
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  .controls button {
    padding: 12px 24px;
    border: 2px solid;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  #undo-btn {
    background: #0a3d0a;
    color: #44ff44;
    border-color: #44ff44;
  }
  #undo-btn:hover { background: #44ff44; color: #000; }

  #max-btn {
    background: #3d0a3d;
    color: #ff44ff;
    border-color: #ff44ff;
  }
  #max-btn:hover { background: #ff44ff; color: #000; }

  .counter {
    margin-top: 1.5rem;
    font-size: 1.4rem;
    font-weight: 700;
  }

  .counter span {
    color: var(--accent);
    font-size: 2rem;
  }

  .active-effects {
    margin-top: 1rem;
    font-size: 0.85rem;
    opacity: 0.6;
    max-width: 90vw;
    text-align: center;
    min-height: 1.5em;
  }

  .gremlin-face {
    font-size: 3rem;
    margin-bottom: 0.5rem;
  }

  /* ---- Chaos CSS classes ---- */
  .chaos-rotate { transform: rotate(5deg) !important; }
  .chaos-invert { filter: invert(1) !important; }
  .chaos-comic-sans * { font-family: 'Comic Sans MS', 'Comic Sans', cursive !important; }
  .chaos-flip { transform: scaleY(-1) !important; }
  .chaos-blur { filter: blur(2px) !important; }
  .chaos-big-text { font-size: 200% !important; }
  .chaos-italic * { font-style: italic !important; }
  .chaos-mirror { transform: scaleX(-1) !important; }
  .chaos-skew { transform: skew(10deg, 3deg) !important; }
  .chaos-saturate { filter: saturate(5) !important; }
  .chaos-grayscale { filter: grayscale(1) !important; }
  .chaos-sepia { filter: sepia(1) !important; }
  .chaos-hue-rotate { filter: hue-rotate(180deg) !important; }
  .chaos-contrast { filter: contrast(3) !important; }
  .chaos-tiny { transform: scale(0.5) !important; }
  .chaos-sideways { transform: rotate(90deg) !important; }
  .chaos-uppercase * { text-transform: uppercase !important; }
  .chaos-spacing * { letter-spacing: 8px !important; }
  .chaos-border * { border: 2px solid red !important; }
  .chaos-shadow { text-shadow: 5px 5px 0 red, -5px -5px 0 cyan !important; }
  .chaos-outline * { -webkit-text-stroke: 1px lime !important; color: transparent !important; }
  .chaos-wavy { animation: chaos-wave 0.3s infinite !important; }

  .chaos-rainbow {
    background: linear-gradient(124deg, #ff2400, #e81d1d, #e8b71d, #e3e81d,
      #1de840, #1ddde8, #2b1de8, #dd00f3, #dd00f3) !important;
    background-size: 1800% 1800% !important;
    animation: chaos-rainbow-shift 2s ease infinite !important;
  }

  .chaos-wiggle { animation: chaos-wiggle-anim 0.15s infinite !important; }

  .chaos-disco {
    animation: chaos-disco-anim 0.2s infinite !important;
  }

  .chaos-drunk {
    animation: chaos-drunk-anim 2s ease-in-out infinite !important;
  }

  @keyframes chaos-wave {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  @keyframes chaos-rainbow-shift {
    0% { background-position: 0% 82%; }
    50% { background-position: 100% 19%; }
    100% { background-position: 0% 82%; }
  }

  @keyframes chaos-wiggle-anim {
    0% { transform: translate(0, 0) rotate(0deg); }
    25% { transform: translate(5px, -3px) rotate(2deg); }
    50% { transform: translate(-3px, 5px) rotate(-1deg); }
    75% { transform: translate(3px, 2px) rotate(1deg); }
    100% { transform: translate(0, 0) rotate(0deg); }
  }

  @keyframes chaos-disco-anim {
    0% { background-color: #ff0000; }
    16% { background-color: #ff8800; }
    33% { background-color: #ffff00; }
    50% { background-color: #00ff00; }
    66% { background-color: #0088ff; }
    83% { background-color: #8800ff; }
    100% { background-color: #ff0000; }
  }

  @keyframes chaos-drunk-anim {
    0% { transform: rotate(0deg) translateX(0); }
    25% { transform: rotate(3deg) translateX(20px); }
    50% { transform: rotate(-2deg) translateX(-15px); }
    75% { transform: rotate(4deg) translateX(10px); }
    100% { transform: rotate(0deg) translateX(0); }
  }
</style>
</head>
<body>
  <div class="gremlin-face" id="gremlin">&#x1F47F;</div>
  <h1>CHAOS GREMLIN</h1>
  <p class="subtitle">Every click makes it worse.</p>

  <button id="chaos-btn" onclick="unleashChaos()">CHAOS</button>

  <div class="controls">
    <button id="undo-btn" onclick="undoAll()">Undo All</button>
    <button id="max-btn" onclick="maxChaos()">Maximum Chaos</button>
  </div>

  <div class="counter">Chaos Level: <span id="level">0</span></div>
  <div class="active-effects" id="effects-list"></div>

<script>
// Gremlin giggle via Web Audio API (synthesized)
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;

function ensureAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
}

function gremlinGiggle() {
  ensureAudio();
  const now = audioCtx.currentTime;
  // Quick sequence of pitch-shifting oscillators = giggle
  for (let i = 0; i < 6; i++) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.value = 600 + Math.random() * 800;
    osc.frequency.linearRampToValueAtTime(300 + Math.random() * 400, now + 0.05 + i * 0.07);
    gain.gain.value = 0.08;
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.06 + i * 0.07);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(now + i * 0.07);
    osc.stop(now + 0.08 + i * 0.07);
  }
}

function maxChaosSound() {
  ensureAudio();
  const now = audioCtx.currentTime;
  for (let i = 0; i < 20; i++) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = ['square','sawtooth','triangle'][Math.floor(Math.random()*3)];
    osc.frequency.value = 200 + Math.random() * 2000;
    gain.gain.value = 0.04;
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5 + i * 0.03);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(now + i * 0.02);
    osc.stop(now + 0.6 + i * 0.03);
  }
}

function undoSound() {
  ensureAudio();
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.value = 800;
  osc.frequency.linearRampToValueAtTime(200, now + 0.3);
  gain.gain.value = 0.1;
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(now);
  osc.stop(now + 0.35);
}

// Effects registry
const effects = [
  { name: 'Rotate', cls: 'chaos-rotate' },
  { name: 'Invert Colors', cls: 'chaos-invert' },
  { name: 'Comic Sans', cls: 'chaos-comic-sans' },
  { name: 'Flip Upside Down', cls: 'chaos-flip' },
  { name: 'Blur', cls: 'chaos-blur' },
  { name: 'Giant Text', cls: 'chaos-big-text' },
  { name: 'Rainbow BG', cls: 'chaos-rainbow' },
  { name: 'Everything Italic', cls: 'chaos-italic' },
  { name: 'Mirror', cls: 'chaos-mirror' },
  { name: 'Wiggle', cls: 'chaos-wiggle' },
  { name: 'Skew', cls: 'chaos-skew' },
  { name: 'Hypersaturate', cls: 'chaos-saturate' },
  { name: 'Grayscale', cls: 'chaos-grayscale' },
  { name: 'Sepia', cls: 'chaos-sepia' },
  { name: 'Hue Shift', cls: 'chaos-hue-rotate' },
  { name: 'Max Contrast', cls: 'chaos-contrast' },
  { name: 'Tiny Mode', cls: 'chaos-tiny' },
  { name: 'Sideways', cls: 'chaos-sideways' },
  { name: 'ALL CAPS', cls: 'chaos-uppercase' },
  { name: 'W I D E  T E X T', cls: 'chaos-spacing' },
  { name: 'Border Everything', cls: 'chaos-border' },
  { name: '3D Shadow', cls: 'chaos-shadow' },
  { name: 'Outline Only', cls: 'chaos-outline' },
  { name: 'Wavy', cls: 'chaos-wavy' },
  { name: 'Disco', cls: 'chaos-disco' },
  { name: 'Drunk Mode', cls: 'chaos-drunk' },
];

let chaosLevel = 0;
let activeEffects = [];

const gremlins = ['\u{1F47F}','\u{1F608}','\u{1F479}','\u{1F47A}','\u{1F4A5}','\u{1F525}','\u{1F92F}','\u{1F921}','\u{1F47B}','\u{1FA78}'];

function updateDisplay() {
  document.getElementById('level').textContent = chaosLevel;
  document.getElementById('effects-list').textContent = activeEffects.length
    ? activeEffects.join(' | ')
    : '';
  document.getElementById('gremlin').textContent = gremlins[Math.min(chaosLevel, gremlins.length - 1)] || gremlins[gremlins.length - 1];
}

function unleashChaos() {
  // Pick a random effect not yet active
  const available = effects.filter(e => !document.body.classList.contains(e.cls));
  if (available.length === 0) {
    // All applied, just wiggle harder
    gremlinGiggle();
    return;
  }
  const pick = available[Math.floor(Math.random() * available.length)];
  document.body.classList.add(pick.cls);
  chaosLevel++;
  activeEffects.push(pick.name);
  updateDisplay();
  gremlinGiggle();

  // Shake the button
  const btn = document.getElementById('chaos-btn');
  btn.style.animation = 'none';
  btn.offsetHeight; // reflow
  btn.style.animation = 'chaos-wiggle-anim 0.2s 2';
}

function undoAll() {
  effects.forEach(e => document.body.classList.remove(e.cls));
  chaosLevel = 0;
  activeEffects = [];
  updateDisplay();
  undoSound();
  // Reset button animation
  document.getElementById('chaos-btn').style.animation = '';
}

function maxChaos() {
  effects.forEach(e => {
    if (!document.body.classList.contains(e.cls)) {
      document.body.classList.add(e.cls);
      chaosLevel++;
      activeEffects.push(e.name);
    }
  });
  updateDisplay();
  maxChaosSound();
}

updateDisplay();
</script>
</body>
</html>
