<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Cringe Vault</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0d0d0d;
    --surface: #1a1a1a;
    --surface2: #242424;
    --pink: #ff4d8a;
    --pink-dim: #cc3d6e;
    --pink-glow: rgba(255, 77, 138, 0.3);
    --text: #e8e8e8;
    --text-dim: #888;
    --danger: #ff3333;
    --comfort: #44cc88;
  }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Pink flash overlay */
  .flash-overlay {
    position: fixed;
    inset: 0;
    background: var(--pink);
    opacity: 0;
    pointer-events: none;
    z-index: 9999;
    transition: opacity 0.05s;
  }
  .flash-overlay.active {
    animation: pinkFlash 0.6s ease-out;
  }
  @keyframes pinkFlash {
    0% { opacity: 0.5; }
    20% { opacity: 0; }
    35% { opacity: 0.3; }
    50% { opacity: 0; }
    65% { opacity: 0.15; }
    100% { opacity: 0; }
  }

  /* Header */
  .header {
    text-align: center;
    padding: 2rem 1rem 1rem;
    border-bottom: 1px solid #333;
  }
  .header h1 {
    font-size: 2.5rem;
    font-weight: 900;
    background: linear-gradient(135deg, var(--pink), #ff8fab);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 0.3rem;
  }
  .header .subtitle {
    color: var(--text-dim);
    font-size: 0.9rem;
  }

  /* Score bar */
  .score-bar {
    display: flex;
    justify-content: center;
    gap: 2rem;
    padding: 1rem;
    background: var(--surface);
    flex-wrap: wrap;
  }
  .score-item {
    text-align: center;
  }
  .score-item .num {
    font-size: 1.8rem;
    font-weight: 900;
    color: var(--pink);
  }
  .score-item .label {
    font-size: 0.7rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  /* Incoming cringe panel */
  .incoming-panel {
    max-width: 600px;
    margin: 1.5rem auto;
    padding: 0 1rem;
  }
  .incoming-btn {
    width: 100%;
    padding: 1rem;
    background: linear-gradient(135deg, #1a0a10, #2a0a18);
    border: 2px solid var(--pink-dim);
    border-radius: 12px;
    color: var(--pink);
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .incoming-btn:hover {
    background: linear-gradient(135deg, #2a0a18, #3a1028);
    border-color: var(--pink);
    box-shadow: 0 0 20px var(--pink-glow);
    transform: scale(1.02);
  }

  /* Surfaced memory */
  .surfaced {
    max-width: 600px;
    margin: 0 auto 1.5rem;
    padding: 0 1rem;
    display: none;
  }
  .surfaced.visible { display: block; }
  .surfaced-card {
    background: var(--surface);
    border: 2px solid var(--pink);
    border-radius: 12px;
    padding: 1.5rem;
    position: relative;
    animation: slideIn 0.4s ease-out;
    box-shadow: 0 0 30px var(--pink-glow);
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-20px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .surfaced-warning {
    color: var(--pink);
    font-weight: 900;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: 0.5rem;
    animation: blink 0.5s ease-in-out 3;
  }
  @keyframes blink {
    50% { opacity: 0.3; }
  }
  .surfaced-text {
    font-size: 1.1rem;
    line-height: 1.5;
    margin-bottom: 0.8rem;
  }
  .surfaced-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 0.5rem;
  }
  .surfaced-severity {
    font-weight: 700;
    font-size: 0.85rem;
  }
  .surfaced-years {
    color: var(--text-dim);
    font-size: 0.85rem;
  }
  .badge-nightmare {
    display: inline-block;
    background: var(--danger);
    color: #fff;
    padding: 0.2rem 0.6rem;
    border-radius: 6px;
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 5px rgba(255,51,51,0.5); }
    50% { box-shadow: 0 0 15px rgba(255,51,51,0.8); }
  }
  .comfort-btn {
    width: 100%;
    margin-top: 1rem;
    padding: 0.7rem;
    background: transparent;
    border: 1px solid var(--comfort);
    border-radius: 8px;
    color: var(--comfort);
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .comfort-btn:hover {
    background: rgba(68, 204, 136, 0.1);
  }
  .comfort-msg {
    text-align: center;
    color: var(--comfort);
    font-size: 0.85rem;
    margin-top: 0.5rem;
    display: none;
  }

  /* Add form */
  .add-section {
    max-width: 600px;
    margin: 0 auto 2rem;
    padding: 0 1rem;
  }
  .add-section h2 {
    font-size: 1.1rem;
    margin-bottom: 1rem;
    color: var(--pink);
  }
  .form-card {
    background: var(--surface);
    border-radius: 12px;
    padding: 1.5rem;
  }
  .form-group {
    margin-bottom: 1rem;
  }
  .form-group label {
    display: block;
    font-size: 0.8rem;
    color: var(--text-dim);
    margin-bottom: 0.3rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  textarea, input[type="number"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid #333;
    border-radius: 8px;
    padding: 0.7rem;
    color: var(--text);
    font-family: inherit;
    font-size: 0.95rem;
    resize: vertical;
  }
  textarea:focus, input[type="number"]:focus {
    outline: none;
    border-color: var(--pink-dim);
  }
  textarea { min-height: 80px; }
  input[type="number"] { width: 80px; }
  .severity-row {
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }
  .severity-row input[type="range"] {
    flex: 1;
    accent-color: var(--pink);
  }
  .severity-val {
    font-weight: 900;
    font-size: 1.3rem;
    color: var(--pink);
    min-width: 30px;
    text-align: center;
  }
  .add-btn {
    width: 100%;
    padding: 0.8rem;
    background: var(--pink);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .add-btn:hover {
    background: var(--pink-dim);
    transform: scale(1.02);
  }

  /* Memory list */
  .vault-section {
    max-width: 600px;
    margin: 0 auto 3rem;
    padding: 0 1rem;
  }
  .vault-section h2 {
    font-size: 1.1rem;
    margin-bottom: 1rem;
    color: var(--text-dim);
  }
  .memory-card {
    background: var(--surface);
    border-radius: 10px;
    padding: 1rem 1.2rem;
    margin-bottom: 0.7rem;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 0.8rem;
    transition: all 0.2s;
    border-left: 3px solid transparent;
  }
  .memory-card:hover {
    background: var(--surface2);
  }
  .memory-card.severity-high {
    border-left-color: var(--danger);
  }
  .memory-card.severity-mid {
    border-left-color: var(--pink);
  }
  .memory-card.severity-low {
    border-left-color: #666;
  }
  .memory-content {
    flex: 1;
  }
  .memory-text {
    font-size: 0.95rem;
    line-height: 1.4;
    margin-bottom: 0.3rem;
  }
  .memory-info {
    font-size: 0.75rem;
    color: var(--text-dim);
  }
  .memory-info .nightmare-tag {
    color: var(--danger);
    font-weight: 700;
  }
  .delete-btn {
    background: none;
    border: none;
    color: #555;
    cursor: pointer;
    font-size: 1.1rem;
    padding: 0.2rem;
    transition: color 0.2s;
    flex-shrink: 0;
  }
  .delete-btn:hover { color: var(--danger); }

  .empty-state {
    text-align: center;
    color: var(--text-dim);
    padding: 2rem;
    font-size: 0.9rem;
  }

  /* Random interval indicator */
  .auto-cringe {
    text-align: center;
    padding: 0.5rem;
    font-size: 0.7rem;
    color: var(--text-dim);
  }
  .auto-cringe .dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    background: var(--pink);
    border-radius: 50%;
    margin-right: 4px;
    animation: pulse 2s infinite;
  }

  @media (max-width: 480px) {
    .header h1 { font-size: 1.8rem; }
    .score-bar { gap: 1rem; }
    .score-item .num { font-size: 1.4rem; }
  }
</style>
</head>
<body>

<div class="flash-overlay" id="flashOverlay"></div>

<div class="header">
  <h1>The Cringe Vault</h1>
  <div class="subtitle">Where your worst memories come to haunt you</div>
</div>

<div class="score-bar">
  <div class="score-item">
    <div class="num" id="totalMemories">0</div>
    <div class="label">Memories Stored</div>
  </div>
  <div class="score-item">
    <div class="num" id="totalCringe">0</div>
    <div class="label">Total Cringe Score</div>
  </div>
  <div class="score-item">
    <div class="num" id="nightmareCount">0</div>
    <div class="label">Keeps Me Up</div>
  </div>
  <div class="score-item">
    <div class="num" id="avgSeverity">0</div>
    <div class="label">Avg Severity</div>
  </div>
</div>

<div class="auto-cringe">
  <span class="dot"></span> Random cringe will surface automatically. Brace yourself.
</div>

<div class="incoming-panel">
  <button class="incoming-btn" id="surfaceBtn">SURFACE A RANDOM CRINGE</button>
</div>

<div class="surfaced" id="surfacedPanel">
  <div class="surfaced-card">
    <div class="surfaced-warning">!! INCOMING CRINGE !!</div>
    <div class="surfaced-text" id="surfacedText"></div>
    <div class="surfaced-meta">
      <span class="surfaced-severity" id="surfacedSeverity"></span>
      <span class="surfaced-years" id="surfacedYears"></span>
      <span class="badge-nightmare" id="surfacedBadge" style="display:none">This Keeps Me Up At Night</span>
    </div>
    <button class="comfort-btn" id="comfortBtn">Actually, Everyone Forgot About This</button>
    <div class="comfort-msg" id="comfortMsg"></div>
  </div>
</div>

<div class="add-section">
  <h2>Add to the Vault</h2>
  <div class="form-card">
    <div class="form-group">
      <label>The Memory</label>
      <textarea id="memoryInput" placeholder="I waved back at someone who wasn't waving at me..."></textarea>
    </div>
    <div class="form-group">
      <label>Cringe Severity</label>
      <div class="severity-row">
        <span style="font-size:0.8rem;color:var(--text-dim)">Mild</span>
        <input type="range" id="severitySlider" min="1" max="10" value="5">
        <span style="font-size:0.8rem;color:var(--text-dim)">Fatal</span>
        <span class="severity-val" id="severityVal">5</span>
      </div>
    </div>
    <div class="form-group">
      <label>Years Ago</label>
      <input type="number" id="yearsInput" min="0" max="99" value="5" placeholder="5">
    </div>
    <button class="add-btn" id="addBtn">Seal It In The Vault</button>
  </div>
</div>

<div class="vault-section">
  <h2>All Stored Cringe (<span id="listCount">0</span>)</h2>
  <div id="memoryList"></div>
</div>

<script>
const PRELOADED = [
  { text: "I waved back at someone who wasn't waving at me", severity: 7, yearsAgo: 3 },
  { text: "Said 'you too' when the waiter said 'enjoy your meal'", severity: 6, yearsAgo: 2 },
  { text: "Tried to push a pull door while people watched", severity: 5, yearsAgo: 1 },
  { text: "Called my teacher 'mom' in front of the whole class", severity: 9, yearsAgo: 15 },
  { text: "Laughed at something that wasn't a joke during a serious conversation", severity: 7, yearsAgo: 4 },
  { text: "Sent a text complaining about someone... to that someone", severity: 10, yearsAgo: 6 },
  { text: "Walked into a glass door at a fancy restaurant", severity: 8, yearsAgo: 5 },
  { text: "Went for a handshake when they were going for a hug. Then switched. They also switched.", severity: 8, yearsAgo: 2 },
  { text: "Said 'I love you' to end a phone call with my boss", severity: 9, yearsAgo: 3 },
  { text: "Confidently answered a question in class. It was wrong. Very wrong.", severity: 7, yearsAgo: 10 },
  { text: "Tripped on absolutely nothing on a flat surface in public", severity: 5, yearsAgo: 1 },
  { text: "Held a door open for someone who was way too far away. We both had to endure their awkward jog.", severity: 6, yearsAgo: 2 },
  { text: "Replied 'good thanks, how are you?' to someone who said 'happy birthday'", severity: 6, yearsAgo: 4 },
  { text: "Spent 5 minutes talking to someone before realizing they were on a phone call", severity: 8, yearsAgo: 7 },
  { text: "Accidentally liked a 3-year-old photo while deep-stalking someone's Instagram", severity: 10, yearsAgo: 1 },
  { text: "Voice cracked while introducing myself to an entire room of people", severity: 7, yearsAgo: 8 },
  { text: "Showed up to a party on the wrong day. Alone. They weren't ready.", severity: 9, yearsAgo: 5 },
  { text: "Told an entire story to a group and nobody laughed or responded. Just silence.", severity: 8, yearsAgo: 3 },
  { text: "Walked the wrong way, realized it, but kept going to not look lost. Walked 10 extra minutes.", severity: 5, yearsAgo: 2 },
  { text: "Autocorrect sent something wildly inappropriate to my work group chat", severity: 9, yearsAgo: 1 },
  { text: "Started eating before realizing everyone was waiting to say grace", severity: 6, yearsAgo: 6 },
  { text: "Practiced a conversation in the mirror and someone walked in", severity: 8, yearsAgo: 4 },
  { text: "Forgot someone's name 30 seconds after they told me. Had to ask again. Forgot again.", severity: 7, yearsAgo: 1 },
  { text: "Tried to be funny in a group photo. Everyone else was normal. I looked unhinged.", severity: 6, yearsAgo: 5 },
];

const COMFORT_MESSAGES = [
  "Statistically, nobody remembers this. You're the only one still suffering.",
  "Everyone was too busy worrying about their own cringe to notice yours.",
  "The witnesses have all moved on with their lives. Only you remain.",
  "This memory has a 0% chance of coming up at your funeral. Probably.",
  "The universe has experienced heat death-level events less awkward than this, and it moved on.",
  "Fun fact: the other person involved cringes about their own thing from that day.",
  "Your brain stored this in 4K HDR but everyone else deleted it immediately.",
  "Nobody is lying awake at 3am thinking about this. Except you. Right now.",
  "If it helps, worse things have happened to better people.",
  "This is stored in your brain's blooper reel. Nobody else has a copy.",
];

const STORAGE_KEY = 'cringe-vault-memories';

function loadMemories() {
  const stored = localStorage.getItem(STORAGE_KEY);
  if (stored) return JSON.parse(stored);
  // First time: seed with preloaded
  const seeded = PRELOADED.map((m, i) => ({
    id: Date.now() + i,
    text: m.text,
    severity: m.severity,
    yearsAgo: m.yearsAgo,
    preloaded: true
  }));
  saveMemories(seeded);
  return seeded;
}

function saveMemories(memories) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(memories));
}

let memories = loadMemories();

// UI refs
const totalMemoriesEl = document.getElementById('totalMemories');
const totalCringeEl = document.getElementById('totalCringe');
const nightmareCountEl = document.getElementById('nightmareCount');
const avgSeverityEl = document.getElementById('avgSeverity');
const listCountEl = document.getElementById('listCount');
const memoryListEl = document.getElementById('memoryList');
const surfaceBtn = document.getElementById('surfaceBtn');
const surfacedPanel = document.getElementById('surfacedPanel');
const surfacedText = document.getElementById('surfacedText');
const surfacedSeverity = document.getElementById('surfacedSeverity');
const surfacedYears = document.getElementById('surfacedYears');
const surfacedBadge = document.getElementById('surfacedBadge');
const comfortBtn = document.getElementById('comfortBtn');
const comfortMsg = document.getElementById('comfortMsg');
const flashOverlay = document.getElementById('flashOverlay');
const severitySlider = document.getElementById('severitySlider');
const severityVal = document.getElementById('severityVal');
const memoryInput = document.getElementById('memoryInput');
const yearsInput = document.getElementById('yearsInput');
const addBtn = document.getElementById('addBtn');

function updateStats() {
  totalMemoriesEl.textContent = memories.length;
  const total = memories.reduce((s, m) => s + m.severity, 0);
  totalCringeEl.textContent = total;
  const nightmares = memories.filter(m => m.severity >= 9).length;
  nightmareCountEl.textContent = nightmares;
  avgSeverityEl.textContent = memories.length ? (total / memories.length).toFixed(1) : '0';
  listCountEl.textContent = memories.length;
}

function severityColor(s) {
  if (s >= 9) return 'var(--danger)';
  if (s >= 6) return 'var(--pink)';
  return 'var(--text-dim)';
}

function severityClass(s) {
  if (s >= 9) return 'severity-high';
  if (s >= 5) return 'severity-mid';
  return 'severity-low';
}

function renderList() {
  if (memories.length === 0) {
    memoryListEl.innerHTML = '<div class="empty-state">The vault is empty. Lucky you... for now.</div>';
    return;
  }
  const sorted = [...memories].sort((a, b) => b.severity - a.severity);
  memoryListEl.innerHTML = sorted.map(m => `
    <div class="memory-card ${severityClass(m.severity)}">
      <div class="memory-content">
        <div class="memory-text">${escHtml(m.text)}</div>
        <div class="memory-info">
          <span style="color:${severityColor(m.severity)}">Severity: ${m.severity}/10</span>
          &middot; ${m.yearsAgo} year${m.yearsAgo === 1 ? '' : 's'} ago
          ${m.severity >= 9 ? '<span class="nightmare-tag"> &middot; KEEPS ME UP AT NIGHT</span>' : ''}
        </div>
      </div>
      <button class="delete-btn" onclick="deleteMemory(${m.id})" title="Remove">&times;</button>
    </div>
  `).join('');
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function triggerFlash() {
  flashOverlay.classList.remove('active');
  void flashOverlay.offsetWidth;
  flashOverlay.classList.add('active');
}

function surfaceRandom() {
  if (memories.length === 0) return;
  const m = memories[Math.floor(Math.random() * memories.length)];
  triggerFlash();
  surfacedPanel.classList.remove('visible');
  void surfacedPanel.offsetWidth;

  surfacedText.textContent = m.text;
  surfacedSeverity.textContent = `Severity: ${'*'.repeat(m.severity)} (${m.severity}/10)`;
  surfacedSeverity.style.color = severityColor(m.severity);
  surfacedYears.textContent = `${m.yearsAgo} year${m.yearsAgo === 1 ? '' : 's'} ago`;
  surfacedBadge.style.display = m.severity >= 9 ? 'inline-block' : 'none';
  comfortMsg.style.display = 'none';

  setTimeout(() => {
    surfacedPanel.classList.add('visible');
  }, 100);
}

surfaceBtn.addEventListener('click', surfaceRandom);

comfortBtn.addEventListener('click', () => {
  const msg = COMFORT_MESSAGES[Math.floor(Math.random() * COMFORT_MESSAGES.length)];
  comfortMsg.textContent = msg;
  comfortMsg.style.display = 'block';
});

severitySlider.addEventListener('input', () => {
  severityVal.textContent = severitySlider.value;
});

addBtn.addEventListener('click', () => {
  const text = memoryInput.value.trim();
  if (!text) {
    memoryInput.focus();
    return;
  }
  const m = {
    id: Date.now(),
    text,
    severity: parseInt(severitySlider.value),
    yearsAgo: parseInt(yearsInput.value) || 0,
    preloaded: false
  };
  memories.push(m);
  saveMemories(memories);
  updateStats();
  renderList();
  memoryInput.value = '';
  severitySlider.value = 5;
  severityVal.textContent = '5';
  yearsInput.value = 5;
  triggerFlash();
});

window.deleteMemory = function(id) {
  memories = memories.filter(m => m.id !== id);
  saveMemories(memories);
  updateStats();
  renderList();
};

// Random auto-surface every 30-90 seconds
function scheduleAutoSurface() {
  const delay = 30000 + Math.random() * 60000;
  setTimeout(() => {
    surfaceRandom();
    scheduleAutoSurface();
  }, delay);
}
scheduleAutoSurface();

// Init
updateStats();
renderList();
</script>
</body>
</html>
