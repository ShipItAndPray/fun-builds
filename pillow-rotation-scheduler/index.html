<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Pillow Rotation Scheduler</title><meta name="description" content="Generate a highly unnecessary but satisfying rotation calendar for peak bedtime symmetry."><style>:root{--ink:#1f2937;--muted:#6b7280;--line:rgba(31,41,55,.12);--accent:#7c3aed;--accent2:#ec4899}*{box-sizing:border-box}body{margin:0;font-family:"Avenir Next","Trebuchet MS",sans-serif;color:var(--ink);background:linear-gradient(180deg,#faf5ff,#fdf2f8);padding:24px 18px 48px}.shell{max-width:1040px;margin:0 auto}.back{display:inline-block;margin-bottom:16px;color:var(--ink);text-decoration:none;font-weight:800}.hero,.grid,.row{display:grid;gap:18px}.hero{grid-template-columns:1.06fr .94fr;margin-bottom:18px}.grid{grid-template-columns:.95fr 1.05fr}.row{grid-template-columns:1fr 1fr;gap:12px}.panel{background:rgba(255,255,255,.86);border:1px solid rgba(255,255,255,.8);border-radius:28px;backdrop-filter:blur(14px)}.hero-copy,.controls,.results{padding:26px}.eyebrow{display:inline-block;padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.92);font-size:.74rem;letter-spacing:.08em;text-transform:uppercase;font-weight:800;color:var(--muted)}h1{font-size:clamp(2.45rem,5vw,4.1rem);line-height:.95;margin:16px 0 12px;letter-spacing:-.05em}p{color:var(--muted);line-height:1.6}label{display:block;font-weight:800;margin:14px 0 8px}select{width:100%;border:1px solid var(--line);border-radius:16px;padding:12px 14px;font:inherit;background:rgba(255,255,255,.92)}button{border:none;border-radius:999px;padding:12px 18px;font:inherit;font-weight:800;cursor:pointer}.primary{color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent2))}.calendar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.day{padding:16px;border-radius:18px;background:rgba(124,58,237,.08);text-align:center;font-weight:800}.card{background:rgba(255,255,255,.94);border:1px solid var(--line);border-radius:22px;padding:18px;margin-top:12px}.badge{display:inline-block;margin-bottom:10px;padding:7px 10px;border-radius:999px;background:rgba(124,58,237,.12);color:#6d28d9;font-size:.78rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em}.headline{font-size:1.32rem;font-weight:900;margin-bottom:8px}@media(max-width:900px){.hero,.grid,.row,.calendar{grid-template-columns:1fr}}</style></head><body><div class="shell"><a class="back" href="../">← Back to Fun Builds</a><section class="hero"><div class="panel hero-copy"><div class="eyebrow">Pillow Rotation Scheduler</div><h1>Rotate with intention.</h1><p>Choose your pillow conditions and generate an unnecessarily formal rotation schedule for maximum bedtime equilibrium.</p></div><div class="panel hero-copy"><p><strong>For people who know:</strong> there is always a better side, and it must be documented.</p></div></section><section class="grid"><div class="panel controls"><div class="row"><div><label for="heat">Pillow heat level</label><select id="heat"><option value="1">cool enough</option><option value="3">warming quickly</option><option value="5">volatile</option></select></div><div><label for="loyalty">Attachment to favorite side</label><select id="loyalty"><option value="1">low</option><option value="3">strong</option><option value="5">irrational</option></select></div></div><label for="count">Pillow count</label><select id="count"><option value="1">one</option><option value="2">two</option><option value="3">full pillow economy</option></select><div style="margin-top:16px"><button class="primary" id="schedule">Generate schedule</button></div></div><div class="panel results"><div class="calendar" id="cal"></div><div class="card" id="out"></div></div></section></div><script>function render(){const steps=['flip','rotate','side-swap','cooling break'];cal.innerHTML=Array.from({length:8},(_,i)=>`<div class="day">Night ${i+1}<br>${steps[(i+Number(count.value))%steps.length]}</div>`).join('');out.innerHTML=`<div class="badge">Rotation memo</div><div class="headline">Nightly compliance plan</div><p>Heat pressure is ${heat.selectedOptions[0].text} with ${loyalty.selectedOptions[0].text} side loyalty across ${count.value} pillow unit(s).</p><p>Do not improvise after midnight. That is how pillow governance collapses.</p>`}schedule.onclick=render;render();</script></body></html>
