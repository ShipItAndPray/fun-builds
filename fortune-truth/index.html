<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fortune Truth - Uncomfortably Real Fortune Cookies</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --red: #C41E3A;
    --dark-red: #8B0000;
    --gold: #FFD700;
    --dark-gold: #DAA520;
    --cream: #FFF8DC;
    --cookie: #E8C872;
    --cookie-dark: #D4A843;
    --cookie-shadow: #B8922E;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #1a0000 0%, var(--dark-red) 40%, var(--red) 70%, #1a0000 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    color: var(--cream);
    overflow-x: hidden;
  }

  /* Chinese pattern overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 20% 50%, rgba(255,215,0,0.03) 0%, transparent 50%),
      radial-gradient(circle at 80% 20%, rgba(255,215,0,0.03) 0%, transparent 50%),
      radial-gradient(circle at 50% 80%, rgba(255,215,0,0.03) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  header {
    text-align: center;
    padding: 2rem 1rem 1rem;
    position: relative;
    z-index: 1;
  }

  h1 {
    font-family: 'Crimson Text', serif;
    font-size: 2.5rem;
    color: var(--gold);
    text-shadow: 0 2px 10px rgba(255,215,0,0.3);
    letter-spacing: 2px;
  }

  h1 .cn {
    font-family: 'Ma Shan Zheng', cursive;
    display: block;
    font-size: 1.2rem;
    color: var(--dark-gold);
    margin-top: 4px;
    letter-spacing: 8px;
  }

  .subtitle {
    font-size: 0.85rem;
    color: rgba(255,248,220,0.5);
    margin-top: 0.5rem;
    font-style: italic;
  }

  /* Controls bar */
  .controls {
    display: flex;
    gap: 1rem;
    align-items: center;
    justify-content: center;
    margin: 1rem 0;
    flex-wrap: wrap;
    position: relative;
    z-index: 1;
  }

  .toggle-wrap {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.85rem;
    color: var(--dark-gold);
    cursor: pointer;
    user-select: none;
  }

  .toggle-wrap input { display: none; }

  .toggle-track {
    width: 40px;
    height: 22px;
    background: rgba(255,215,0,0.15);
    border: 1px solid var(--dark-gold);
    border-radius: 11px;
    position: relative;
    transition: background 0.3s;
  }

  .toggle-track::after {
    content: '';
    width: 16px;
    height: 16px;
    background: var(--dark-gold);
    border-radius: 50%;
    position: absolute;
    top: 2px;
    left: 2px;
    transition: transform 0.3s;
  }

  .toggle-wrap input:checked + .toggle-track {
    background: rgba(255,215,0,0.35);
  }

  .toggle-wrap input:checked + .toggle-track::after {
    transform: translateX(18px);
  }

  .history-btn {
    background: none;
    border: 1px solid var(--dark-gold);
    color: var(--dark-gold);
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.3s;
  }

  .history-btn:hover {
    background: rgba(255,215,0,0.1);
    color: var(--gold);
    border-color: var(--gold);
  }

  /* Cookie area */
  .cookie-stage {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 500px;
    height: 340px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 1rem auto;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .cookie-stage .hint {
    position: absolute;
    bottom: 10px;
    font-size: 0.75rem;
    color: rgba(255,215,0,0.4);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  /* Whole cookie (before crack) */
  .cookie-whole {
    position: relative;
    transition: transform 0.3s;
  }

  .cookie-whole:hover { transform: scale(1.05); }

  .cookie-whole svg { filter: drop-shadow(0 8px 20px rgba(0,0,0,0.4)); }

  /* Cracked state */
  .cookie-cracked {
    display: none;
    position: relative;
    width: 300px;
    height: 200px;
  }

  .cookie-half {
    position: absolute;
    transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .cookie-half.left {
    left: 0;
    transform-origin: right center;
  }

  .cookie-half.right {
    right: 0;
    transform-origin: left center;
  }

  .cookie-half.left.open { transform: translateX(-30px) rotate(-15deg); }
  .cookie-half.right.open { transform: translateX(30px) rotate(15deg); }

  .cookie-half svg { filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3)); }

  /* Fortune paper */
  .fortune-paper {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scaleY(0);
    background: var(--cream);
    color: #333;
    padding: 1.2rem 1.5rem;
    border-radius: 4px;
    max-width: 320px;
    width: 90%;
    text-align: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s;
    z-index: 2;
  }

  .fortune-paper.show { transform: translate(-50%, -50%) scaleY(1); }

  .fortune-text {
    font-family: 'Crimson Text', serif;
    font-size: 1.05rem;
    line-height: 1.5;
    color: #222;
    font-style: italic;
    margin-bottom: 0.8rem;
  }

  .fortune-text .in-bed {
    color: var(--red);
    font-weight: 600;
  }

  .lucky-numbers {
    font-size: 0.7rem;
    color: #999;
    letter-spacing: 1px;
    border-top: 1px solid #ddd;
    padding-top: 0.6rem;
    margin-top: 0.4rem;
  }

  .fortune-actions {
    display: flex;
    gap: 0.5rem;
    justify-content: center;
    margin-top: 0.6rem;
  }

  .fortune-actions button {
    background: none;
    border: 1px solid #ccc;
    color: #666;
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 0.7rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .fortune-actions button:hover {
    border-color: var(--red);
    color: var(--red);
  }

  .share-toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #333;
    color: white;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 0.85rem;
    transition: transform 0.3s;
    z-index: 100;
  }

  .share-toast.show { transform: translateX(-50%) translateY(0); }

  /* New cookie button */
  .new-cookie-btn {
    display: none;
    background: linear-gradient(135deg, var(--gold), var(--dark-gold));
    color: var(--dark-red);
    border: none;
    padding: 12px 28px;
    border-radius: 30px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    margin: 0.5rem auto;
    position: relative;
    z-index: 1;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 15px rgba(255,215,0,0.3);
  }

  .new-cookie-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 20px rgba(255,215,0,0.4);
  }

  .new-cookie-btn.visible { display: block; }

  /* History panel */
  .history-panel {
    position: fixed;
    top: 0;
    right: -380px;
    width: 360px;
    max-width: 90vw;
    height: 100vh;
    background: linear-gradient(180deg, #1a0000 0%, #2a0000 100%);
    border-left: 2px solid var(--dark-gold);
    z-index: 50;
    transition: right 0.4s ease;
    overflow-y: auto;
    padding: 1.5rem;
  }

  .history-panel.open { right: 0; }

  .history-panel h2 {
    font-family: 'Crimson Text', serif;
    color: var(--gold);
    font-size: 1.3rem;
    margin-bottom: 1rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .history-close {
    background: none;
    border: none;
    color: var(--gold);
    font-size: 1.5rem;
    cursor: pointer;
    line-height: 1;
  }

  .history-item {
    background: rgba(255,215,0,0.05);
    border: 1px solid rgba(255,215,0,0.1);
    border-radius: 6px;
    padding: 0.8rem;
    margin-bottom: 0.6rem;
    font-family: 'Crimson Text', serif;
    font-size: 0.9rem;
    font-style: italic;
    color: var(--cream);
    line-height: 1.4;

    font-family: 'Inter', sans-serif;
    font-style: normal;
    font-size: 0.65rem;
    color: rgba(255,215,0,0.4);
    margin-top: 0.4rem;

    font-style: normal;
    font-size: 0.6rem;
    color: rgba(255,248,220,0.3);
    margin-top: 0.3rem;

    color: rgba(255,248,220,0.3);
    font-style: italic;
    font-size: 0.85rem;
    text-align: center;
    margin-top: 2rem;

  /* Overlay for history */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 40;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s;
  }

  .overlay.show { opacity: 1; pointer-events: auto; }

  /* Cookie counter */
  .counter {
    font-size: 0.7rem;
    color: rgba(255,215,0,0.3);
    text-align: center;
    margin-top: 0.5rem;

    z-index: 1;
  }

  /* Decorative border top */
  .border-top {
    width: 200px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--dark-gold), transparent);
    margin: 0.5rem auto;
    position: relative;
    z-index: 1;

  /* Particles */
  .particle {
    position: fixed;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 30;
    animation: particleFall 1s ease-out forwards;
  }

  @keyframes particleFall {
    0% { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: translateY(80px) scale(0); }
  }

  /* Responsive */
  @media (max-width: 500px) {
    h1 { font-size: 1.8rem; }
    .cookie-stage { height: 280px; }
    .fortune-paper { padding: 1rem; max-width: 280px; }

  footer {
    margin-top: auto;
    padding: 1.5rem;
    text-align: center;
    font-size: 0.65rem;
    color: rgba(255,248,220,0.2);
    position: relative;
    z-index: 1;
  }
</style>

// Crack sound using Web Audio API
function playCrackSound() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const ctx = audioCtx;

  // Short noise burst for crack
  const bufferSize = ctx.sampleRate * 0.15;
  const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  const data = buffer.getChannelData(0);

  for (let i = 0; i < bufferSize; i++) {
    const t = i / bufferSize;
    // Sharp attack, quick decay with some crunchiness
    const envelope = Math.exp(-t * 30) * (1 - t);
    data[i] = (Math.random() * 2 - 1) * envelope * 0.6;
    // Add some low-frequency crunch
    if (i % 3 === 0) data[i] *= 1.5;
  }

  const source = ctx.createBufferSource();
  source.buffer = buffer;

  const filter = ctx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = 800;
  filter.Q.value = 1;

  const gain = ctx.createGain();
  gain.gain.value = 0.4;

  source.connect(filter);
  filter.connect(gain);
  gain.connect(ctx.destination);
  source.start();
}

    const offset = Math.floor(Math.random() * 3) + 1;
    nums.push(bases[i] + off * offset);
  }
  return `Lucky numbers: ${nums.join(' - ')}`;
}

// Spawn particles on crack
function spawnParticles(x, y) {
  const colors = ['#FFD700', '#E8C872', '#D4A843', '#FFF8DC', '#C41E3A'];
  for (let i = 0; i < 12; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = (x + (Math.random() - 0.5) * 60) + 'px';
    p.style.top = (y + (Math.random() - 0.5) * 40) + 'px';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.width = (4 + Math.random() * 6) + 'px';
    p.style.height = p.style.width;
    const angle = Math.random() * Math.PI * 2;
    const dist = 30 + Math.random() * 60;
    p.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
    p.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
    p.animate([
      { transform: 'scale(1) translate(0,0)', opacity: 1 },
      { transform: `scale(0) translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist + 40}px)`, opacity: 0 }
    ], { duration: 600 + Math.random() * 400, easing: 'ease-out' });
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1000);
  }
}

// Pick a random fortune avoiding recent repeats
function pickFortune() {
  const recent = history.slice(0, 10).map(h => h.text);
  let fortune;
  let attempts = 0;
  do {
    fortune = FORTUNES[Math.floor(Math.random() * FORTUNES.length)];
    attempts++;
  } while (recent.includes(fortune) && attempts < 50);
  return fortune;
}

// Crack the cookie
function crackCookie(e) {
  if (cracked) return;
  cracked = true;

  const rect = cookieStage.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;

  playCrackSound();
  spawnParticles(cx, cy);

  // Hide whole, show cracked
  cookieWhole.style.display = 'none';
  cookieCracked.style.display = 'block';
  hint.style.display = 'none';

  // Animate halves apart
  requestAnimationFrame(() => {
    halfLeft.classList.add('open');
    halfRight.classList.add('open');
  });

  // Show fortune
  const fortune = pickFortune();
  const inBed = inBedCheck.checked;
  const numbers = generateLuckyNumbers();

  if (inBed) {
    fortuneText.innerHTML = fortune.replace(/\.$/, '') + ' <span class="in-bed">...in bed.</span>';
  } else {
    fortuneText.textContent = fortune;
  }
  luckyNumbers.textContent = numbers;

  setTimeout(() => {
    fortunePaper.classList.add('show');
  }, 200);

  // Save to history
  const entry = {
    text: fortune,
    inBed: inBed,
    numbers: numbers,
    time: new Date().toISOString()
  };
  history.unshift(entry);
  if (history.length > 50) history = history.slice(0, 50);
  localStorage.setItem('fortuneHistory', JSON.stringify(history));

  crackCount++;
  localStorage.setItem('crackCount', crackCount.toString());
  updateCounter();
  updateHistoryCount();

  // Show new cookie button
  setTimeout(() => newCookieBtn.classList.add('visible'), 800);
}

function resetCookie() {
  cracked = false;
  cookieWhole.style.display = '';
  cookieCracked.style.display = 'none';
  halfLeft.classList.remove('open');
  halfRight.classList.remove('open');
  fortunePaper.classList.remove('show');
  hint.style.display = '';
  newCookieBtn.classList.remove('visible');
}

function updateCounter() {
  if (crackCount > 0) {
    counterEl.textContent = `${crackCount} cookie${crackCount === 1 ? '' : 's'} cracked`;
  }
}

function updateHistoryCount() {
  historyCountEl.textContent = history.length;
}

function renderHistory() {
  if (history.length === 0) {
    historyList.innerHTML = '<div class="history-empty">No fortunes yet. Crack a cookie!</div>';
    return;
  }
  historyList.innerHTML = history.map(h => {
    const text = h.inBed ? h.text.replace(/\.$/, '') + ' ...in bed.' : h.text;
    const time = new Date(h.time).toLocaleDateString('en-US', {
      month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit'
    });
    return `<div class="history-item">
      "${text}"
      <div class="h-numbers">${h.numbers}</div>
      <div class="h-time">${time}</div>
    </div>`;
  }).join('');
}

function getShareText() {
  const raw = fortuneText.textContent || fortuneText.innerText;
  return `"${raw}"\n${luckyNumbers.textContent}\n\n-- Fortune Truth`;
}

async function shareFortune() {
  const text = getShareText();
  if (navigator.share) {
    try {
      await navigator.share({ title: 'Fortune Truth', text });
      return;
    } catch(e) { /* fallback to copy */ }
  }
  await copyFortune();
}

async function copyFortune() {
  const text = getShareText();
  try {
    await navigator.clipboard.writeText(text);
  } catch(e) {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    ta.remove();
  }
  shareToast.classList.add('show');
  setTimeout(() => shareToast.classList.remove('show'), 2000);
}

// Event listeners
cookieStage.addEventListener('click', crackCookie);
newCookieBtn.addEventListener('click', resetCookie);
shareBtn.addEventListener('click', (e) => { e.stopPropagation(); shareFortune(); });
copyBtn.addEventListener('click', (e) => { e.stopPropagation(); copyFortune(); });

historyBtn.addEventListener('click', () => {
  renderHistory();
  historyPanel.classList.add('open');
  overlay.classList.add('show');
});

function closeHistory() {
  historyPanel.classList.remove('open');
  overlay.classList.remove('show');
}

historyClose.addEventListener('click', closeHistory);
overlay.addEventListener('click', closeHistory);

// Keyboard
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeHistory();
  if (e.key === ' ' || e.key === 'Enter') {
    if (cracked) resetCookie();
    else crackCookie();
  }
});
</script>
</body>
