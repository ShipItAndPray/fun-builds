<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Overthink Optimizer</title>
<style>body{margin:0;font-family:Inter,system-ui,sans-serif;background:#0b0f18;color:#eff6ff}main{max-width:880px;margin:auto;padding:28px}a{color:#93c5fd;text-decoration:none}.card{background:#121928;border:1px solid #334155;border-radius:22px;padding:22px;margin-top:18px}.bar{height:14px;background:#0c1320;border-radius:999px;overflow:hidden;margin-top:8px}.fill{height:100%;background:linear-gradient(90deg,#60a5fa,#a78bfa)}input,button{font:inherit}input{width:100%;background:#0c1320;border:1px solid #3b4e6f;color:#eff6ff;border-radius:14px;padding:12px}button{border:none;border-radius:14px;padding:12px 16px;font-weight:800;background:#818cf8;color:#0d1430;cursor:pointer;margin-top:12px}.row{margin-top:12px}</style>
</head>
<body><main><a href="../">← Back</a><div class="card"><h1>Overthink Optimizer</h1><p>Measure how efficiently you are spiraling.</p><input id="input" value="Should I send a second follow-up email?"><button id="go">Optimize Spiral</button><div id="out"></div></div></main>
<script>
function render(){const t=input.value.trim();const seed=[...t].reduce((a,c)=>a+c.charCodeAt(0),0);const rows=[["Risk inflation",(seed*3)%100],["Imaginary future arguments",(seed*5)%100],["Actual usefulness",Math.max(8,100-((seed*7)%100))],["Need for sleep",(seed*11)%100]];out.innerHTML=rows.map(([n,v])=>`<div class="row"><strong>${n}</strong> ${v}%<div class="bar"><div class="fill" style="width:${v}%"></div></div></div>`).join('')}go.onclick=render;render();
</script></body></html>
