<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Elevator Button Ethics Board</title><meta name="description" content="Analyze whether pressing the close-door button was helpful, symbolic, or morally compromised."><style>
:root{--ink:#1f2937;--muted:#6b7280;--line:rgba(31,41,55,.12);--accent:#475569;--accent2:#22c55e}*{box-sizing:border-box}body{margin:0;font-family:"Avenir Next","Trebuchet MS",sans-serif;color:var(--ink);background:linear-gradient(180deg,#f8fafc,#f0fdf4);padding:24px 18px 48px}.shell{max-width:1040px;margin:0 auto}.back{display:inline-block;margin-bottom:16px;color:var(--ink);text-decoration:none;font-weight:800}.hero,.grid,.row{display:grid;gap:18px}.hero{grid-template-columns:1.06fr .94fr;margin-bottom:18px}.grid{grid-template-columns:.95fr 1.05fr}.row{grid-template-columns:1fr 1fr;gap:12px}.panel{background:rgba(255,255,255,.86);border:1px solid rgba(255,255,255,.8);border-radius:28px;backdrop-filter:blur(14px);box-shadow:0 22px 60px rgba(71,85,105,.1)}.hero-copy,.controls,.results{padding:26px}.eyebrow{display:inline-block;padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.92);font-size:.74rem;letter-spacing:.08em;text-transform:uppercase;font-weight:800;color:var(--muted)}h1{font-size:clamp(2.45rem,5vw,4.1rem);line-height:.95;margin:16px 0 12px;letter-spacing:-.05em}p{color:var(--muted);line-height:1.6}label{display:block;font-weight:800;margin:14px 0 8px}select{width:100%;border:1px solid var(--line);border-radius:16px;padding:12px 14px;font:inherit;background:rgba(255,255,255,.92)}button{border:none;border-radius:999px;padding:12px 18px;font:inherit;font-weight:800;cursor:pointer}.primary{color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent2))}.secondary{background:rgba(31,41,55,.08);color:var(--ink);margin-left:10px}.card{background:rgba(255,255,255,.94);border:1px solid var(--line);border-radius:22px;padding:18px;margin-bottom:12px}.badge{display:inline-block;margin-bottom:10px;padding:7px 10px;border-radius:999px;background:rgba(71,85,105,.12);color:#475569;font-size:.78rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em}.headline{font-size:1.32rem;font-weight:900;margin-bottom:8px}@media(max-width:900px){.hero,.grid,.row{grid-template-columns:1fr}.secondary{margin-left:0;margin-top:10px}}
</style></head><body><div class="shell"><a class="back" href="../">← Back to Fun Builds</a><section class="hero"><div class="panel hero-copy"><div class="eyebrow">Elevator Button Ethics Board</div><h1>Not every button press is innocent.</h1><p>Submit the elevator scenario and receive an ethical ruling on your close-door conduct.</p></div><div class="panel hero-copy"><p><strong>Ideal for:</strong> lobbies, suspicious timing, and moments when courtesy and efficiency begin open conflict.</p></div></section><section class="grid"><div class="panel controls"><div class="row"><div><label for="distance">Nearest person</label><select id="distance"><option value="1">nowhere close</option><option value="3">approaching visibly</option><option value="5">basically at the door</option></select></div><div><label for="intent">Why you pressed it</label><select id="intent"><option value="1">habit</option><option value="3">mild panic</option><option value="5">self-interest</option></select></div></div><label for="building">Building mood</label><select id="building"><option>normal office</option><option>hotel with witnesses</option><option>apartment with awkward memory</option><option>hospital-level stakes</option></select><label for="regret">Regret level</label><select id="regret"><option value="1">none</option><option value="3">some</option><option value="5">immediate soul recoil</option></select><div style="margin-top:16px"><button class="primary" id="review">Review action</button><button class="secondary" id="villain">Worst-case ethics</button></div></div><div class="panel results"><div id="out"></div></div></section></div><script>
function render(){const score=Number(distance.value)*9+Number(intent.value)*8+Number(regret.value)*5;const ruling=score>=78?'morally compromised press':score>=52?'ethically dubious gesture':score>=32?'symbolic but survivable':'administratively fine';out.innerHTML=`<div class="card"><div class="badge">Board ruling</div><div class="headline">${ruling}</div><p>In a ${building.value}, your action was classified as ${intent.selectedOptions[0].text} under ${distance.selectedOptions[0].text} proximity conditions.</p></div><div class="card"><div class="badge">Mitigation</div><p>Recommended remedy: hold the door next time, make eye contact with reality, and stop pretending the button is purely decorative when it suits you.</p></div><div class="card"><div class="badge">Moral residue</div><p>Self-reported regret remains ${regret.selectedOptions[0].text}.</p></div>`}
review.onclick=render;villain.onclick=()=>{distance.selectedIndex=2;intent.selectedIndex=2;regret.selectedIndex=2;render()};render();
</script></body></html>
