<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breakup Anthem Matcher</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d0b1a;--card:#1a1630;--accent:#9b59b6;--accent2:#3498db;--glow:rgba(155,89,182,0.3);--text:#e8e0f0;--muted:#8878a0;--angry:#e74c3c;--sad:#3498db;--relieved:#2ecc71;--confused:#f39c12;--petty:#e91e63}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--d) ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:.2}50%{opacity:.8}}
.container{max-width:640px;margin:0 auto;padding:20px;position:relative;z-index:1}
h1{text-align:center;font-size:2.2em;margin:30px 0 5px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.subtitle{text-align:center;color:var(--muted);font-size:.95em;margin-bottom:30px}
.input-section{background:var(--card);border-radius:16px;padding:28px;border:1px solid rgba(155,89,182,0.2);box-shadow:0 0 30px var(--glow)}
.input-section h2{font-size:1.1em;margin-bottom:15px;color:var(--accent)}
.word-inputs{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.word-inputs input{flex:1;min-width:80px;padding:14px;background:rgba(255,255,255,0.06);border:2px solid rgba(155,89,182,0.3);border-radius:10px;color:var(--text);font-size:1.05em;text-align:center;transition:all .3s}
.word-inputs input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 15px var(--glow)}
.word-inputs input::placeholder{color:var(--muted);font-size:.85em}
.btn{width:100%;padding:15px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:10px;color:#fff;font-size:1.1em;font-weight:600;cursor:pointer;transition:all .3s;letter-spacing:.5px}
.btn:hover{transform:translateY(-2px);box-shadow:0 5px 20px var(--glow)}
.btn:active{transform:translateY(0)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.result{display:none;margin-top:24px;animation:slideUp .6s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.mood-badge{display:inline-block;padding:6px 16px;border-radius:20px;font-size:.85em;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.mood-angry{background:rgba(231,76,60,0.2);color:var(--angry);border:1px solid var(--angry)}
.mood-sad{background:rgba(52,152,219,0.2);color:var(--sad);border:1px solid var(--sad)}
.mood-relieved{background:rgba(46,204,113,0.2);color:var(--relieved);border:1px solid var(--relieved)}
.mood-confused{background:rgba(243,156,18,0.2);color:var(--confused);border:1px solid var(--confused)}
.mood-petty{background:rgba(233,30,99,0.2);color:var(--petty);border:1px solid var(--petty)}
.stage-box{background:rgba(155,89,182,0.1);border:1px solid rgba(155,89,182,0.25);border-radius:10px;padding:14px;margin:12px 0;text-align:center}
.stage-label{font-size:.8em;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.stage-name{font-size:1.15em;font-weight:600;margin-top:4px;color:var(--accent)}
.stage-advice{font-size:.85em;color:var(--muted);margin-top:6px;font-style:italic}
.song-card{background:var(--card);border-radius:14px;padding:22px;margin-top:16px;border:1px solid rgba(155,89,182,0.2);position:relative;overflow:hidden}
.song-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:14px 14px 0 0}
.song-card.angry::before{background:var(--angry)}
.song-card.sad::before{background:var(--sad)}
.song-card.relieved::before{background:var(--relieved)}
.song-card.confused::before{background:var(--confused)}
.song-card.petty::before{background:var(--petty)}
.song-title{font-size:1.4em;font-weight:700;margin-bottom:2px}
.song-artist{color:var(--muted);font-size:.95em;margin-bottom:14px}
.song-meta{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0}
.meta-item{background:rgba(255,255,255,0.04);padding:10px;border-radius:8px;text-align:center}
.meta-label{font-size:.7em;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:4px}
.meta-value{font-size:1em;font-weight:600}
.healing-bar{height:8px;background:rgba(255,255,255,0.08);border-radius:4px;overflow:hidden;margin-top:4px}
.healing-fill{height:100%;border-radius:4px;transition:width 1s ease}
.why-section{margin-top:14px;padding:14px;background:rgba(155,89,182,0.08);border-radius:8px;border-left:3px solid var(--accent)}
.why-label{font-size:.75em;text-transform:uppercase;letter-spacing:1px;color:var(--accent);margin-bottom:6px}
.why-text{font-size:.92em;line-height:1.5;color:var(--text)}
.play-btn{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:14px;padding:10px;background:rgba(155,89,182,0.15);border:1px solid rgba(155,89,182,0.3);border-radius:8px;cursor:pointer;color:var(--accent);font-size:.9em;transition:all .3s}
.play-btn:hover{background:rgba(155,89,182,0.25)}
.play-btn.playing{background:rgba(155,89,182,0.3);color:#fff}
.share-section{margin-top:20px;text-align:center}
.share-btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;background:rgba(155,89,182,0.15);border:1px solid rgba(155,89,182,0.3);border-radius:8px;cursor:pointer;color:var(--accent);font-size:.9em;transition:all .3s;margin:4px}
.share-btn:hover{background:rgba(155,89,182,0.25)}
.share-copied{color:var(--relieved) !important;border-color:var(--relieved) !important}
.examples{margin-top:20px;text-align:center}
.examples p{color:var(--muted);font-size:.8em;margin-bottom:8px}
.example-chip{display:inline-block;padding:5px 12px;margin:3px;background:rgba(155,89,182,0.1);border:1px solid rgba(155,89,182,0.2);border-radius:15px;font-size:.8em;color:var(--muted);cursor:pointer;transition:all .3s}
.example-chip:hover{background:rgba(155,89,182,0.2);color:var(--text)}
.footer{text-align:center;margin:40px 0 20px;color:var(--muted);font-size:.8em}
@media(max-width:480px){h1{font-size:1.7em}.word-inputs{flex-direction:column}.word-inputs input{min-width:100%}.song-meta{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="container">
  <h1>Breakup Anthem Matcher</h1>
  <p class="subtitle">Describe your breakup in 3 words. We'll find your healing anthem.</p>

  <div class="input-section">
    <h2>How did it feel?</h2>
    <div class="word-inputs">
      <input type="text" id="w1" placeholder="word 1" maxlength="20" autocomplete="off">
      <input type="text" id="w2" placeholder="word 2" maxlength="20" autocomplete="off">
      <input type="text" id="w3" placeholder="word 3" maxlength="20" autocomplete="off">
    </div>
    <button class="btn" id="matchBtn" onclick="findAnthem()">Find My Anthem</button>
  </div>

  <div class="examples">
    <p>Try these:</p>
    <span class="example-chip" onclick="fillExample('betrayed','angry','done')">betrayed angry done</span>
    <span class="example-chip" onclick="fillExample('empty','lost','crying')">empty lost crying</span>
    <span class="example-chip" onclick="fillExample('free','finally','over')">free finally over</span>
    <span class="example-chip" onclick="fillExample('why','confused','hurt')">why confused hurt</span>
    <span class="example-chip" onclick="fillExample('petty','revenge','blocked')">petty revenge blocked</span>
  </div>

  <div class="result" id="result"></div>
</div>

  starField.appendChild(s);
}

const stages = {
  angry: {name:"The Volcano", advice:"Let it erupt. Suppressing anger just delays the healing. Scream into this song."},
  sad: {name:"The Deep Ocean", advice:"You're allowed to drown for a bit. The surface will still be there when you're ready."},
  relieved: {name:"The Butterfly", advice:"You've broken out of the cocoon. Spread those wings -- the sky was always yours."},
  confused: {name:"The Fog", advice:"You can't see clearly yet, and that's okay. Clarity comes after the storm, not during."},
  petty: {name:"The Phoenix (Petty Edition)", advice:"Rise from the ashes, but make sure they see the glow. Self-improvement IS the best revenge."}
};

function detectMood(words) {
  const scores = {angry:0, sad:0, relieved:0, confused:0, petty:0};
  const lower = words.map(w => w.toLowerCase().trim());
  for (const w of lower) {
    for (const [mood, keywords] of Object.entries(moodWords)) {
      if (keywords.includes(w)) scores[mood] += 3;
      else {
        for (const kw of keywords) {
          if (w.includes(kw) || kw.includes(w)) { scores[mood] += 1; break; }
        }
      }
    }
  }
  const max = Math.max(...Object.values(scores));
  if (max === 0) {
    const moods = ['angry','sad','relieved','confused','petty'];
    return moods[Math.floor(Math.random() * moods.length)];
  }
  const top = Object.entries(scores).filter(([,v]) => v === max).map(([k]) => k);
  return top[Math.floor(Math.random() * top.length)];
}

function pickSong(mood) {
  const pool = songs.filter(s => s.mood === mood);
  return pool[Math.floor(Math.random() * pool.length)];
}

// Web Audio melody hints per mood
const melodies = {
  angry: [{f:330,d:.12},{f:392,d:.12},{f:440,d:.15},{f:523,d:.2},{f:440,d:.1},{f:523,d:.25},{f:587,d:.3}],
  sad: [{f:262,d:.4},{f:247,d:.4},{f:220,d:.5},{f:196,d:.6},{f:220,d:.5},{f:196,d:.7}],
  relieved: [{f:330,d:.15},{f:392,d:.15},{f:494,d:.2},{f:587,d:.2},{f:659,d:.15},{f:784,d:.3},{f:659,d:.15},{f:784,d:.4}],
  confused: [{f:330,d:.25},{f:349,d:.25},{f:330,d:.25},{f:294,d:.3},{f:330,d:.2},{f:370,d:.25},{f:330,d:.4}],
  petty: [{f:392,d:.1},{f:392,d:.1},{f:440,d:.12},{f:494,d:.12},{f:523,d:.15},{f:494,d:.1},{f:523,d:.1},{f:587,d:.2},{f:659,d:.3}]
};

let audioCtx = null;
let isPlaying = false;

function playMelody(mood) {
  if (isPlaying) return;
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  isPlaying = true;
  const notes = melodies[mood];
  let t = audioCtx.currentTime + 0.05;
  const gain = audioCtx.createGain();
  gain.connect(audioCtx.destination);
  gain.gain.setValueAtTime(0.15, t);

  const waveforms = {angry:'sawtooth',sad:'sine',relieved:'triangle',confused:'sine',petty:'square'};

  for (const n of notes) {
    const osc = audioCtx.createOscillator();
    const noteGain = audioCtx.createGain();
    osc.type = waveforms[mood];
    osc.frequency.setValueAtTime(n.f, t);
    noteGain.gain.setValueAtTime(0.15, t);
    noteGain.gain.exponentialRampToValueAtTime(0.001, t + n.d);
    osc.connect(noteGain);
    noteGain.connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + n.d + 0.05);
    t += n.d;
  }
  setTimeout(() => { isPlaying = false; }, (t - audioCtx.currentTime) * 1000 + 100);
}

function fillExample(w1, w2, w3) {
  document.getElementById('w1').value = w1;
  document.getElementById('w2').value = w2;
  document.getElementById('w3').value = w3;
  findAnthem();
}

function findAnthem() {
  const words = [
    document.getElementById('w1').value.trim(),
    document.getElementById('w2').value.trim(),
    document.getElementById('w3').value.trim()
  ].filter(Boolean);

  if (words.length < 1) { alert('Enter at least one word!'); return; }

  const mood = detectMood(words);
  const song = pickSong(mood);
  const stage = stages[mood];
  const moodColors = {angry:'#e74c3c',sad:'#3498db',relieved:'#2ecc71',confused:'#f39c12',petty:'#e91e63'};

  const resultEl = document.getElementById('result');
  resultEl.style.display = 'block';
  resultEl.innerHTML = `
    <div style="text-align:center">
      <span class="mood-badge mood-${mood}">${moodEmoji[mood]} ${mood}</span>
    </div>
    <div class="stage-box">
      <div class="stage-label">Your Breakup Stage</div>
      <div class="stage-name">${stage.name}</div>
      <div class="stage-advice">${stage.advice}</div>
    </div>
    <div class="song-card ${mood}">
      <div class="song-title">${song.title}</div>
      <div class="song-artist">${song.artist}</div>
      <div class="song-meta">
        <div class="meta-item">
          <div class="meta-label">Healing Power</div>
          <div class="meta-value">${song.healing}/10</div>
          <div class="healing-bar"><div class="healing-fill" style="width:${song.healing*10}%;background:${moodColors[mood]}"></div></div>
        </div>
        <div class="meta-item">
          <div class="meta-label">Genre</div>
          <div class="meta-value">${song.genre}</div>
        </div>
      </div>
      <div class="meta-item" style="margin-top:8px">
        <div class="meta-label">Recommended Listening Position</div>
        <div class="meta-value" style="font-size:.88em;font-weight:400;margin-top:4px">${song.position}</div>
      </div>
      <div class="why-section">
        <div class="why-label">Why This Song</div>
        <div class="why-text">${song.why}</div>
      </div>
      <div class="play-btn" onclick="this.classList.toggle('playing');playMelody('${mood}')">
        <span>\u266B</span> Play Mood Melody
      </div>
    </div>
    <div class="share-section">
      <div class="share-btn" onclick="shareAnthem('${song.title}','${song.artist}','${mood}',this)">
        \uD83D\uDCCB Copy & Share Your Anthem
      </div>
      <div class="share-btn" onclick="findAnthem()">
        \uD83C\uDFB2 Try Another Match
      </div>
    </div>
  `;

  resultEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function shareAnthem(title, artist, mood, btn) {
  const words = [
    document.getElementById('w1').value.trim(),
    document.getElementById('w2').value.trim(),
    document.getElementById('w3').value.trim()
  ].filter(Boolean).join(', ');
  const text = `My breakup in 3 words: "${words}"\nMy healing anthem: ${title} by ${artist}\nMood: ${mood.toUpperCase()}\n\nFind yours: Breakup Anthem Matcher`;
  navigator.clipboard.writeText(text).then(() => {
    btn.classList.add('share-copied');
    btn.innerHTML = '\u2713 Copied!';
    setTimeout(() => {
      btn.classList.remove('share-copied');
      btn.innerHTML = '\uD83D\uDCCB Copy & Share Your Anthem';
    }, 2000);
  }).catch(() => {
    prompt('Copy your anthem:', text);
  });
}

// Enter key support
document.querySelectorAll('.word-inputs input').forEach((input, i) => {
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      if (i < 2) document.querySelectorAll('.word-inputs input')[i+1].focus();
      else findAnthem();
    }
  });
});
