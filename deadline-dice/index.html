<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Deadline Dice</title>
<style>body{margin:0;font-family:Inter,system-ui,sans-serif;background:#111827;color:#eff6ff}main{max-width:860px;margin:auto;padding:28px}a{color:#93c5fd;text-decoration:none}.card{background:#1f2937;border:1px solid #475569;border-radius:22px;padding:22px;margin-top:18px}.die{font-size:4rem;text-align:center;margin:14px 0}.out{background:#111827;border-radius:16px;padding:16px;line-height:1.6}input,button{font:inherit}input{width:100%;background:#111827;border:1px solid #64748b;color:#eff6ff;border-radius:14px;padding:12px}button{border:none;border-radius:14px;padding:12px 16px;font-weight:800;background:#60a5fa;color:#0b1730;cursor:pointer;margin-top:12px}</style>
</head>
<body><main><a href="../">← Back</a><div class="card"><h1>Deadline Dice</h1><p>Roll for your project destiny.</p><input id="input" value="ship the prototype"><button id="go">Roll</button><div class="die" id="die">⚄</div><div class="out" id="out"></div></div></main>
<script>
const fates=["It ships today, but with one elegant bug.","It slips 24 hours and everyone pretends that was always the plan.","A stakeholder appears from nowhere.","The blocker was in your environment all along.","You finish at 2:13 a.m. and call it strategy.","You pivot the scope and feel powerful again."];
function render(){const r=Math.floor(Math.random()*6);die.textContent=["⚀","⚁","⚂","⚃","⚄","⚅"][r];out.innerHTML=`For <strong>${input.value.trim()}</strong>: ${fates[r]}` }go.onclick=render;render();
</script></body></html>
