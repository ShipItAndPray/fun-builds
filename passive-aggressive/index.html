  footer {

    .style-btn { padding: 6px 12px; font-size: 0.8rem; }
    .output-text { font-size: 0.92rem; }
    body { padding: 12px; }
    .input-section, .output-section { padding: 18px; }
  }
</style>
</head>

      <button class="style-btn" data-style="formal-letter">Formal Letter</button>
      <button class="style-btn" data-style="text-message">Text Message</button>
    </div>

    <button class="generate-btn" id="generateBtn">Make It Passive-Aggressive</button>

</div>

}

function measureAnger(text) {
  let score = 0;
  const upper = (text.match(/[A-Z]/g) || []).length;
  const total = text.replace(/\s/g, '').length || 1;
  score += (upper / total) * 40;
  score += (text.match(/!/g) || []).length * 5;
  score += (text.match(/\?{2,}/g) || []).length * 8;
  score += (text.match(/fuck|shit|damn|hell|ass|stupid|idiot|moron|hate|kill|die|worst|terrible|horrible|disgusting|pathetic/gi) || []).length * 10;
  score += (text.match(/stop|never|always|every time|sick of|tired of|enough/gi) || []).length * 5;
  return Math.min(100, Math.round(score));
}

function transform(rawInput, style) {
  const text = rawInput.trim();
  if (!text) return '';

  // Find matching topic
  let body = null;
  for (const tp of topicPatterns) {
    if (tp.match.test(text)) {
      body = pick(tp.templates);
      break;
    }
  }

  if (!body) {
    body = pick(genericTemplates);
    // Inject context from the original message
    const lowerText = text.toLowerCase().replace(/[^a-z\s]/g, '');
    const words = lowerText.split(/\s+/).filter(w => w.length > 3);
    if (words.length > 0) {
      const insertion = pick(paInsertions);
      const extraLine = `\n\n${insertion.charAt(0).toUpperCase() + insertion.slice(1)} ${pick(smileys)} the situation regarding "${words.slice(0, 4).join(' ')}" is something I'd love for us to address with the grace and maturity I know we're all capable of!`;
      body += extraLine;
    }
  }

  // Add extra passive-aggressive garnish based on anger level
  const anger = measureAnger(text);
  if (anger > 60) {
    body += `\n\nP.S. I'm not upset. Not even a little bit. ${pick(smileys)}`;
  }
  if (anger > 80) {
    body += `\nP.P.S. Truly, genuinely, 100% not bothered. At all. ${pick(smileys)}${pick(smileys)}`;
  }

  const opener = pick(openers[style]);
  const closer = pick(closers[style]);

  return `${opener}\n\n${body}${closer}`;
}

// ============================================================
// UI LOGIC
// ============================================================

// Style selector
document.querySelectorAll('.style-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentStyle = btn.dataset.style;
  });
});

// Generate
document.getElementById('generateBtn').addEventListener('click', generate);
document.getElementById('angryInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) generate();
});

function generate() {
  const input = document.getElementById('angryInput').value;
  if (!input.trim()) return;
  lastInput = input;

  const result = transform(input, currentStyle);
  const outputSection = document.getElementById('outputSection');
  const outputText = document.getElementById('outputText');

  outputSection.style.display = 'block';
  outputSection.className = `output-section style-${currentStyle}`;
  outputText.textContent = result;

  // Anger meter
  const anger = measureAnger(input);
  const meter = document.getElementById('angerMeter');
  const level = anger > 80 ? 'volcanic' : anger > 60 ? 'spicy' : anger > 40 ? 'simmering' : anger > 20 ? 'mildly annoyed' : 'politely perturbed';
  meter.textContent = `Anger detected: ${anger}% (${level}) \u2192 Converted to 100% professional \u2728`;

  outputSection.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function regenerate() {
  if (lastInput) {
    const result = transform(lastInput, currentStyle);
    document.getElementById('outputText').textContent = result;
  }
}

function copyOutput() {
  const text = document.getElementById('outputText').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.classList.add('copied');
    btn.innerHTML = '&#10003; Copied!';
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = '&#128203; Copy';
    }, 2000);
  });
}

function speakOutput() {
  if (speechSynthesis.speaking) {
    speechSynthesis.cancel();
    document.getElementById('speakBtn').innerHTML = '&#128264; Read Aloud';
    return;
  }

  const text = document.getElementById('outputText').textContent;
  // Strip emojis for cleaner speech
  const cleanText = text.replace(/[\u{1F600}-\u{1F64F}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{1F900}-\u{1F9FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}\u{2764}\u{FE0F}\u{FE0E}\u{200D}]/gu, '');

  const utterance = new SpeechSynthesisUtterance(cleanText);
  utterance.rate = 0.85;
  utterance.pitch = 1.3;

  // Try to find a friendly-sounding voice
  const voices = speechSynthesis.getVoices();
  const preferred = voices.find(v => /samantha|karen|victoria|fiona|moira/i.test(v.name))
    || voices.find(v => /female|woman/i.test(v.name))
    || voices.find(v => v.lang.startsWith('en'));
  if (preferred) utterance.voice = preferred;

  utterance.onstart = () => {
    document.getElementById('speakBtn').innerHTML = '&#128263; Stop';
  };
  utterance.onend = () => {
    document.getElementById('speakBtn').innerHTML = '&#128264; Read Aloud';
  };

  speechSynthesis.speak(utterance);
}

// Preload voices
if (speechSynthesis.onvoiceschanged !== undefined) {
  speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
}
</script>
