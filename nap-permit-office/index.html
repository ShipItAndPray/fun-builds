<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Nap Permit Office</title><meta name="description" content="Issue official permits for naps with justification codes, duration limits, and risk warnings."><style>
:root{--ink:#1f2937;--muted:#6b7280;--line:rgba(31,41,55,.12);--accent:#4f46e5;--accent2:#6366f1}*{box-sizing:border-box}body{margin:0;font-family:"Avenir Next","Trebuchet MS",sans-serif;color:var(--ink);background:linear-gradient(180deg,#eef2ff,#f8fafc);padding:24px 18px 48px}.shell{max-width:1040px;margin:0 auto}.back{display:inline-block;margin-bottom:16px;color:var(--ink);text-decoration:none;font-weight:800}.hero,.grid,.row{display:grid;gap:18px}.hero{grid-template-columns:1.06fr .94fr;margin-bottom:18px}.grid{grid-template-columns:.95fr 1.05fr}.row{grid-template-columns:1fr 1fr;gap:12px}.panel{background:rgba(255,255,255,.86);border:1px solid rgba(255,255,255,.8);border-radius:28px;backdrop-filter:blur(14px);box-shadow:0 22px 60px rgba(79,70,229,.1)}.hero-copy,.controls,.results{padding:26px}.eyebrow{display:inline-block;padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.92);font-size:.74rem;letter-spacing:.08em;text-transform:uppercase;font-weight:800;color:var(--muted)}h1{font-size:clamp(2.45rem,5vw,4.1rem);line-height:.95;margin:16px 0 12px;letter-spacing:-.05em}p{color:var(--muted);line-height:1.6}label{display:block;font-weight:800;margin:14px 0 8px}select,input{width:100%;border:1px solid var(--line);border-radius:16px;padding:12px 14px;font:inherit;background:rgba(255,255,255,.92)}button{border:none;border-radius:999px;padding:12px 18px;font:inherit;font-weight:800;cursor:pointer}.primary{color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent2))}.secondary{background:rgba(31,41,55,.08);color:var(--ink);margin-left:10px}.permit{background:rgba(255,255,255,.94);border:1px solid var(--line);border-radius:22px;padding:18px}.badge{display:inline-block;margin-bottom:10px;padding:7px 10px;border-radius:999px;background:rgba(79,70,229,.12);color:#4338ca;font-size:.78rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em}.headline{font-size:1.32rem;font-weight:900;margin-bottom:8px}@media(max-width:900px){.hero,.grid,.row{grid-template-columns:1fr}.secondary{margin-left:0;margin-top:10px}}
</style></head><body><div class="shell"><a class="back" href="../">← Back to Fun Builds</a><section class="hero"><div class="panel hero-copy"><div class="eyebrow">Nap Permit Office</div><h1>Authorized unconsciousness, properly filed.</h1><p>Enter your fatigue grounds and receive a formal nap permit with duration limits and wake-up risks.</p></div><div class="panel hero-copy"><p><strong>Useful output:</strong> a justifiable nap class you can show no one and deeply believe.</p></div></section><section class="grid"><div class="panel controls"><div class="row"><div><label for="reason">Primary reason</label><select id="reason"><option>midday collapse</option><option>bad sleep debt</option><option>post-lunch system error</option><option>emotionally expensive morning</option></select></div><div><label for="urgency">Urgency</label><select id="urgency"><option value="1">optional</option><option value="3">reasonable</option><option value="5">federally necessary</option></select></div></div><label for="minutes">Requested minutes</label><input id="minutes" type="number" min="5" max="180" value="27"><label for="risk">Wake-up risk</label><select id="risk"><option value="1">reliable alarm</option><option value="3">optimistic alarm</option><option value="5">dangerously cozy room</option></select><div style="margin-top:16px"><button class="primary" id="issue">Issue permit</button><button class="secondary" id="emergency">Emergency nap</button></div></div><div class="panel results"><div class="permit" id="out"></div></div></section></div><script>
function render(){const mins=Number(minutes.value);const score=Number(urgency.value)*10+Number(risk.value)*7+Math.min(40,mins);const cls=score>=80?'Priority Recovery Permit':score>=56?'Standard Rest Authorization':score>=34?'Conditional Doze Approval':'Brief Eye-Closure Pass';out.innerHTML=`<div class="badge">Permit issued</div><div class="headline">${cls}</div><p>The office authorizes a nap of ${mins} minutes due to ${reason.value}, with ${risk.selectedOptions[0].text} wake-up conditions.</p><p>Warning: exceeding the permit window may convert this into a sunset-grade mistake.</p>`}
issue.onclick=render;emergency.onclick=()=>{minutes.value=46;urgency.selectedIndex=2;risk.selectedIndex=2;render()};render();
</script></body></html>
