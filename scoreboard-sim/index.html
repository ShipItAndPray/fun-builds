<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Championship Scoreboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Roboto+Condensed:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Oswald', sans-serif;
    background: #0a0a0f;
    color: #fff;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Setup Screen ── */
  #setup {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
    background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a0f 70%);
  }

  #setup h1 {
    font-size: clamp(2rem, 5vw, 3.5rem);
    text-transform: uppercase;
    letter-spacing: 4px;
    margin-bottom: 8px;
    background: linear-gradient(90deg, #ff4444, #ffaa00, #44ff44, #4488ff, #ff44ff);
    background-size: 300% 100%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 3s linear infinite;
  }

  @keyframes shimmer {
    0% { background-position: 0% 50%; }
    100% { background-position: 300% 50%; }
  }

  #setup .subtitle {
    font-family: 'Roboto Condensed', sans-serif;
    color: #888;
    font-size: 0.9rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 40px;
  }

  .setup-form {
    width: 100%;
    max-width: 500px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .setup-form label {
    font-family: 'Roboto Condensed', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #999;
  }

  .setup-form input {
    width: 100%;
    padding: 14px 18px;
    background: #16162a;
    border: 2px solid #333;
    border-radius: 6px;
    color: #fff;
    font-family: 'Oswald', sans-serif;
    font-size: 1.2rem;
    letter-spacing: 1px;
    transition: border-color 0.2s;
  }

  .setup-form input:focus {
    outline: none;
    border-color: #ff4444;
  }

  .setup-form input::placeholder { color: #555; }

  .color-row {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .color-row input[type="color"] {
    width: 50px;
    height: 40px;
    border: none;
    background: none;
    cursor: pointer;
    padding: 0;
  }

  #startBtn {
    margin-top: 20px;
    padding: 16px;
    background: linear-gradient(135deg, #ff4444, #cc0000);
    border: none;
    border-radius: 6px;
    color: #fff;
    font-family: 'Oswald', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }

  #startBtn:hover {
    transform: scale(1.03);
    box-shadow: 0 0 30px rgba(255, 68, 68, 0.4);
  }

  /* ── Broadcast Screen ── */
  #broadcast {
    display: none;
    flex-direction: column;
    min-height: 100vh;
    background: #0a0a0f;
  }

  /* Top bar */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px 16px;
    background: #111;
    border-bottom: 2px solid #222;
    font-family: 'Roboto Condensed', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #666;
    gap: 20px;
  }

  .live-dot {
    width: 8px;
    height: 8px;
    background: #ff0000;
    border-radius: 50%;
    animation: pulse-dot 1s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Competition title banner */
  .competition-banner {
    text-align: center;
    padding: 12px;
    background: linear-gradient(90deg, #1a1a2e, #2a1a3e, #1a1a2e);
    border-bottom: 1px solid #333;
  }

  .competition-banner h2 {
    font-size: clamp(1rem, 3vw, 1.6rem);
    text-transform: uppercase;
    letter-spacing: 3px;
    color: #ffaa00;
  }

  /* Scoreboard */
  .scoreboard {
    display: flex;
    flex: 1;
    min-height: 0;
  }

  .team-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    transition: filter 0.1s;
    min-height: 300px;
  }

  .team-panel:active { filter: brightness(1.3); }

  .team-panel .team-name {
    font-size: clamp(1.2rem, 4vw, 2.5rem);
    text-transform: uppercase;
    letter-spacing: 3px;
    opacity: 0.9;
  }

  .team-panel .score {
    font-size: clamp(5rem, 18vw, 14rem);
    font-weight: 700;
    line-height: 1;
    text-shadow: 0 0 40px currentColor;
    transition: transform 0.15s;
  }

  .team-panel .score.bump {
    transform: scale(1.15);
  }

  .team-panel .score-label {
    font-family: 'Roboto Condensed', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.5;
    margin-top: 8px;
  }

  .team-divider {
    width: 3px;
    background: linear-gradient(to bottom, transparent, #fff3, transparent);
  }

  /* Lower third */
  .lower-third {
    background: #111;
    border-top: 3px solid #ffaa00;
  }

  .ticker-bar {
    display: flex;
    align-items: center;
    padding: 10px 16px;
    gap: 16px;
    flex-wrap: wrap;
  }

  .timer-box, .period-box {
    background: #1a1a2e;
    border: 1px solid #333;
    border-radius: 4px;
    padding: 8px 16px;
    text-align: center;
    min-width: 100px;
  }

  .timer-box .label, .period-box .label {
    font-family: 'Roboto Condensed', sans-serif;
    font-size: 0.6rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #888;
  }

  .timer-box .value {
    font-size: 1.6rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: #fff;
  }

  .period-box .value {
    font-size: 1.2rem;
    font-weight: 600;
    color: #ffaa00;
  }

  .controls {
    display: flex;
    gap: 8px;
    margin-left: auto;
  }

  .ctrl-btn {
    padding: 8px 16px;
    border: 1px solid #444;
    border-radius: 4px;
    background: #1a1a2e;
    color: #ccc;
    font-family: 'Roboto Condensed', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }

  .ctrl-btn:hover {
    background: #2a2a4e;
    border-color: #666;
  }

  .ctrl-btn.danger { border-color: #ff4444; color: #ff4444; }
  .ctrl-btn.danger:hover { background: #ff444422; }

  /* Commentary bar */
  .commentary-bar {
    display: flex;
    align-items: center;
    padding: 8px 16px;
    background: #0d0d1a;
    border-top: 1px solid #222;
    gap: 12px;
    min-height: 40px;
  }

  .commentary-tag {
    background: #ff4444;
    color: #fff;
    font-family: 'Roboto Condensed', sans-serif;
    font-size: 0.6rem;
    letter-spacing: 1px;
    padding: 3px 8px;
    border-radius: 2px;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .commentary-text {
    font-family: 'Roboto Condensed', sans-serif;
    font-size: 0.85rem;
    color: #ccc;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── Final Screen ── */
  #final-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 100;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  #final-overlay.show { display: flex; }

  .final-card {
    background: #16162a;
    border: 2px solid #ffaa00;
    border-radius: 12px;
    padding: 40px;
    text-align: center;
    max-width: 500px;
    width: 100%;
    position: relative;
    overflow: hidden;
  }

  .final-card h2 {
    font-size: 0.8rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #ffaa00;
    margin-bottom: 8px;
  }

  .final-card .competition-name {
    font-family: 'Roboto Condensed', sans-serif;
    font-size: 0.9rem;
    color: #888;
    margin-bottom: 24px;
  }

  .final-scores {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 30px;
    margin-bottom: 24px;
  }

  .final-team {
    text-align: center;
  }

  .final-team .name {
    font-size: 1rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .final-team .fscore {
    font-size: 4rem;
    font-weight: 700;
    line-height: 1;
  }

  .final-team .winner-crown {
    font-size: 2rem;
    display: block;
    margin-bottom: 4px;
  }

  .final-vs {
    font-size: 1.2rem;
    color: #666;
    font-weight: 700;
  }

  .final-time {
    font-family: 'Roboto Condensed', sans-serif;
    font-size: 0.75rem;
    color: #666;
    margin-bottom: 20px;
  }

  .share-btn {
    padding: 12px 24px;
    background: linear-gradient(135deg, #1da1f2, #0d8ecf);
    border: none;
    border-radius: 6px;
    color: #fff;
    font-family: 'Oswald', sans-serif;
    font-size: 1rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    margin: 4px;
    transition: transform 0.15s;
  }

  .share-btn:hover { transform: scale(1.05); }

  .share-btn.restart {
    background: linear-gradient(135deg, #444, #333);
  }

  /* Confetti canvas */
  #confetti-canvas {
    position: fixed;
    inset: 0;
    z-index: 99;
    pointer-events: none;
  }

  /* Score flash */
  .score-flash {
    position: absolute;
    font-size: 3rem;
    font-weight: 700;
    pointer-events: none;
    animation: flash-up 0.8s ease-out forwards;
    z-index: 10;
  }

  @keyframes flash-up {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-80px) scale(1.5); }
  }

  /* Responsive */
  @media (max-width: 600px) {
    .scoreboard { flex-direction: column; }
    .team-divider { width: 100%; height: 3px; background: linear-gradient(to right, transparent, #fff3, transparent); }
    .team-panel { min-height: 200px; }
    .ticker-bar { justify-content: center; }
    .controls { margin-left: 0; }
  }
</style>
</head>
<body>

<!-- ── SETUP SCREEN ── -->
<div id="setup">
  <h1>Life Championship</h1>
  <div class="subtitle">Fake Competitions. Real Glory.</div>
  <div class="setup-form">
    <div>
      <label>The Competition</label>
      <input type="text" id="competitionInput" placeholder="Who can eat more pizza" maxlength="60">
    </div>
    <div>
      <label>Team 1</label>
      <div class="color-row">
        <input type="text" id="team1Input" placeholder="Your name" maxlength="20" style="flex:1">
        <input type="color" id="color1" value="#ff4444" title="Team color">
      </div>
    </div>
    <div>
      <label>Team 2</label>
      <div class="color-row">
        <input type="text" id="team2Input" placeholder="Friend's name" maxlength="20" style="flex:1">
        <input type="color" id="color2" value="#4488ff" title="Team color">
      </div>
    </div>
    <button id="startBtn">GO LIVE</button>
  </div>
</div>

<!-- ── BROADCAST SCREEN ── -->
<div id="broadcast">
  <div class="top-bar">
    <div class="live-dot"></div>
    <span>LIVE</span>
    <span>|</span>
    <span>LIFE CHAMPIONSHIP NETWORK</span>
  </div>

  <div class="competition-banner">
    <h2 id="competitionTitle"></h2>
  </div>

  <div class="scoreboard">
    <div class="team-panel" id="panel1" onclick="addScore(1)">
      <div class="team-name" id="name1"></div>
      <div class="score" id="score1">0</div>
      <div class="score-label">Tap to score</div>
    </div>
    <div class="team-divider"></div>
    <div class="team-panel" id="panel2" onclick="addScore(2)">
      <div class="team-name" id="name2"></div>
      <div class="score" id="score2">0</div>
      <div class="score-label">Tap to score</div>
    </div>
  </div>

  <div class="lower-third">
    <div class="ticker-bar">
      <div class="timer-box">
        <div class="label">Time</div>
        <div class="value" id="timer">00:00</div>
      </div>
      <div class="period-box">
        <div class="label">Period</div>
        <div class="value" id="period">1</div>
      </div>
      <div class="controls">
        <button class="ctrl-btn" onclick="toggleTimer()" id="timerBtn">Start</button>
        <button class="ctrl-btn" onclick="nextPeriod()">Next Period</button>
        <button class="ctrl-btn" onclick="undoScore()">Undo</button>
        <button class="ctrl-btn danger" onclick="endGame()">Final</button>
      </div>
    </div>
    <div class="commentary-bar">
      <div class="commentary-tag">Update</div>
      <div class="commentary-text" id="commentary">Welcome to the Life Championship. Tap a side to score!</div>
    </div>
  </div>
</div>

<!-- ── FINAL OVERLAY ── -->
<div id="final-overlay">
  <canvas id="confetti-canvas"></canvas>
  <div class="final-card">
    <h2>Final Score</h2>
    <div class="competition-name" id="finalCompetition"></div>
    <div class="final-scores">
      <div class="final-team" id="finalTeam1">
        <div class="winner-crown" id="crown1"></div>
        <div class="name" id="finalName1"></div>
        <div class="fscore" id="finalScore1"></div>
      </div>
      <div class="final-vs">VS</div>
      <div class="final-team" id="finalTeam2">
        <div class="winner-crown" id="crown2"></div>
        <div class="name" id="finalName2"></div>
        <div class="fscore" id="finalScore2"></div>
      </div>
    </div>
    <div class="final-time" id="finalTime"></div>
    <button class="share-btn" onclick="shareScore()">Share Result</button>
    <button class="share-btn restart" onclick="restart()">New Game</button>
  </div>
</div>

<script>
// ── Audio Context (Web Audio API for sounds) ──
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;

function ensureAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playBuzzer() {
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(220, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(110, audioCtx.currentTime + 0.4);
  gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.5);
}

function playCrowdRoar() {
  ensureAudio();
  const duration = 1.2;
  const sampleRate = audioCtx.sampleRate;
  const buffer = audioCtx.createBuffer(1, sampleRate * duration, sampleRate);
  const data = buffer.getChannelData(0);
  // Generate filtered noise that sounds like a crowd roar
  let prev = 0;
  for (let i = 0; i < data.length; i++) {
    const t = i / sampleRate;
    const envelope = Math.min(1, t * 8) * Math.max(0, 1 - t / duration);
    const noise = (Math.random() * 2 - 1);
    // Low-pass filter for crowd rumble
    prev = prev * 0.92 + noise * 0.08;
    data[i] = prev * envelope * 0.5;
  }
  const src = audioCtx.createBufferSource();
  src.buffer = buffer;
  src.connect(audioCtx.destination);
  src.start();
}

function playFinalHorn() {
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const osc2 = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  osc2.connect(gain);
  gain.connect(audioCtx.destination);
  osc.type = 'sawtooth';
  osc.frequency.value = 440;
  osc2.type = 'sawtooth';
  osc2.frequency.value = 554;
  gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
  gain.gain.setValueAtTime(0.2, audioCtx.currentTime + 1);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.5);
  osc.start();
  osc2.start();
  osc.stop(audioCtx.currentTime + 1.5);
  osc2.stop(audioCtx.currentTime + 1.5);
}

// ── State ──
let scores = [0, 0];
let period = 1;
let timerRunning = false;
let timerSeconds = 0;
let timerInterval = null;
let scoreHistory = []; // [{team, oldScore}]
let team1Name = '', team2Name = '', competition = '';
let color1 = '#ff4444', color2 = '#4488ff';

// ── Commentary Templates ──
const commentaryGoal = [
  "{name} SCORES! The crowd goes absolutely wild!",
  "AND IT'S IN! {name} extends the lead!",
  "INCREDIBLE effort by {name}! That one counts!",
  "{name} with a MASSIVE play! What a moment!",
  "The judges confirm it! {name} adds another one!",
  "OH MY! {name} is on fire right now!",
  "{name} is absolutely DOMINATING out there!",
  "What technique! {name} makes it look easy!",
  "That's championship-level performance from {name}!",
  "The fans are going NUTS! {name} scores again!",
  "{name} showing WHY they showed up today!",
  "A stunning display of skill from {name}!",
  "Textbook execution by {name}. Truly world-class!",
  "{name} is putting on a CLINIC right now!",
  "History in the making! {name} with another point!",
  "The momentum is firmly with {name}!",
  "{name} answers back! This is a WAR!",
  "A thunderous response from {name}!",
  "You can feel the energy shift! {name} SCORES!",
  "Vintage {name}! They came to WIN today!",
];

const commentaryTied = [
  "We are ALL TIED UP! This is anyone's game!",
  "Dead heat! Neither side is giving an inch!",
  "The tension is PALPABLE. Scores level!",
  "Back to square one! What a contest this is!",
];

const commentaryLead = [
  "{leader} is pulling away! Can {trailer} respond?",
  "{leader} building a commanding lead! The pressure is ON!",
  "It's looking tough for {trailer} as {leader} surges ahead!",
  "{leader} with total control of this competition!",
];

const commentaryPeriod = [
  "New period! Fresh energy, fresh opportunities!",
  "Here we go, period {n}! Everything to play for!",
  "The next chapter begins. Who wants it more?",
];

function randomFrom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function updateCommentary(type, data) {
  const el = document.getElementById('commentary');
  let text = '';
  if (type === 'goal') {
    const name = data.team === 1 ? team1Name : team2Name;
    text = randomFrom(commentaryGoal).replace(/{name}/g, name);
    // Check tie
    if (scores[0] === scores[1]) {
      text += ' ' + randomFrom(commentaryTied);
    } else {
      const leader = scores[0] > scores[1] ? team1Name : team2Name;
      const trailer = scores[0] > scores[1] ? team2Name : team1Name;
      if (Math.abs(scores[0] - scores[1]) >= 3) {
        text += ' ' + randomFrom(commentaryLead).replace(/{leader}/g, leader).replace(/{trailer}/g, trailer);
      }
    }
  } else if (type === 'period') {
    text = randomFrom(commentaryPeriod).replace(/{n}/g, data.n);
  } else if (type === 'undo') {
    text = 'Score correction! The officials have reviewed the play.';
  }
  el.textContent = text;
}

// ── Game Logic ──
function addScore(team) {
  ensureAudio();
  const idx = team - 1;
  scoreHistory.push({ team, oldScore: scores[idx] });
  scores[idx]++;

  const scoreEl = document.getElementById('score' + team);
  scoreEl.textContent = scores[idx];
  scoreEl.classList.add('bump');
  setTimeout(() => scoreEl.classList.remove('bump'), 150);

  // Flash +1
  const panel = document.getElementById('panel' + team);
  const flash = document.createElement('div');
  flash.className = 'score-flash';
  flash.textContent = '+1';
  flash.style.color = team === 1 ? color1 : color2;
  flash.style.left = '50%';
  flash.style.top = '40%';
  flash.style.transform = 'translateX(-50%)';
  panel.appendChild(flash);
  setTimeout(() => flash.remove(), 800);

  // Sound
  playCrowdRoar();

  // Commentary
  updateCommentary('goal', { team });
}

function undoScore() {
  if (scoreHistory.length === 0) return;
  const last = scoreHistory.pop();
  scores[last.team - 1] = last.oldScore;
  document.getElementById('score' + last.team).textContent = last.oldScore;
  updateCommentary('undo', {});
}

function toggleTimer() {
  const btn = document.getElementById('timerBtn');
  if (timerRunning) {
    clearInterval(timerInterval);
    timerRunning = false;
    btn.textContent = 'Resume';
  } else {
    timerRunning = true;
    btn.textContent = 'Pause';
    timerInterval = setInterval(() => {
      timerSeconds++;
      const m = String(Math.floor(timerSeconds / 60)).padStart(2, '0');
      const s = String(timerSeconds % 60).padStart(2, '0');
      document.getElementById('timer').textContent = m + ':' + s;
    }, 1000);
  }
}

function nextPeriod() {
  period++;
  document.getElementById('period').textContent = period;
  playBuzzer();
  updateCommentary('period', { n: period });
}

function endGame() {
  if (timerRunning) toggleTimer();
  playFinalHorn();
  setTimeout(showFinal, 600);
}

function showFinal() {
  const overlay = document.getElementById('final-overlay');
  overlay.classList.add('show');

  document.getElementById('finalCompetition').textContent = competition;
  document.getElementById('finalName1').textContent = team1Name;
  document.getElementById('finalName1').style.color = color1;
  document.getElementById('finalScore1').textContent = scores[0];
  document.getElementById('finalScore1').style.color = color1;
  document.getElementById('finalName2').textContent = team2Name;
  document.getElementById('finalName2').style.color = color2;
  document.getElementById('finalScore2').textContent = scores[1];
  document.getElementById('finalScore2').style.color = color2;

  const m = String(Math.floor(timerSeconds / 60)).padStart(2, '0');
  const s = String(timerSeconds % 60).padStart(2, '0');
  document.getElementById('finalTime').textContent = `Final Time: ${m}:${s}  |  Periods: ${period}`;

  // Crown
  if (scores[0] > scores[1]) {
    document.getElementById('crown1').textContent = '\uD83D\uDC51';
    document.getElementById('crown2').textContent = '';
  } else if (scores[1] > scores[0]) {
    document.getElementById('crown2').textContent = '\uD83D\uDC51';
    document.getElementById('crown1').textContent = '';
  } else {
    document.getElementById('crown1').textContent = '\uD83E\uDD1D';
    document.getElementById('crown2').textContent = '\uD83E\uDD1D';
  }

  launchConfetti();
}

function shareScore() {
  const winner = scores[0] > scores[1] ? team1Name : scores[1] > scores[0] ? team2Name : 'TIE';
  const text = `${competition}\n${team1Name} ${scores[0]} - ${scores[1]} ${team2Name}\n${winner === 'TIE' ? "It's a TIE!" : winner + ' WINS!'}\n\nLife Championship Network`;
  if (navigator.share) {
    navigator.share({ title: 'Life Championship Result', text });
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelector('.share-btn');
      btn.textContent = 'COPIED!';
      setTimeout(() => btn.textContent = 'SHARE RESULT', 1500);
    });
  }
}

function restart() {
  document.getElementById('final-overlay').classList.remove('show');
  document.getElementById('broadcast').style.display = 'none';
  document.getElementById('setup').style.display = 'flex';
  scores = [0, 0];
  period = 1;
  timerSeconds = 0;
  timerRunning = false;
  scoreHistory = [];
  clearInterval(timerInterval);
  document.getElementById('timer').textContent = '00:00';
  document.getElementById('period').textContent = '1';
  document.getElementById('score1').textContent = '0';
  document.getElementById('score2').textContent = '0';
  document.getElementById('timerBtn').textContent = 'Start';

  // Clear confetti
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

// ── Confetti ──
function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');

  const pieces = [];
  const colors = [color1, color2, '#ffaa00', '#fff', '#ff44ff', '#44ff44'];
  for (let i = 0; i < 200; i++) {
    pieces.push({
      x: Math.random() * canvas.width,
      y: Math.random() * -canvas.height,
      w: Math.random() * 10 + 5,
      h: Math.random() * 6 + 3,
      color: colors[Math.floor(Math.random() * colors.length)],
      vx: (Math.random() - 0.5) * 4,
      vy: Math.random() * 4 + 2,
      rotation: Math.random() * 360,
      rotSpeed: (Math.random() - 0.5) * 10,
    });
  }

  let frame = 0;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;
    pieces.forEach(p => {
      if (p.y > canvas.height + 50) return;
      alive = true;
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.05;
      p.rotation += p.rotSpeed;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation * Math.PI / 180);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = Math.max(0, 1 - frame / 300);
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      ctx.restore();
    });
    frame++;
    if (alive && frame < 350) requestAnimationFrame(draw);
  }
  draw();
}

// ── Start ──
document.getElementById('startBtn').addEventListener('click', () => {
  team1Name = document.getElementById('team1Input').value.trim() || 'Team 1';
  team2Name = document.getElementById('team2Input').value.trim() || 'Team 2';
  competition = document.getElementById('competitionInput').value.trim() || 'The Ultimate Showdown';
  color1 = document.getElementById('color1').value;
  color2 = document.getElementById('color2').value;

  // Apply
  document.getElementById('competitionTitle').textContent = competition;
  document.getElementById('name1').textContent = team1Name;
  document.getElementById('name2').textContent = team2Name;

  const panel1 = document.getElementById('panel1');
  const panel2 = document.getElementById('panel2');
  panel1.style.background = `linear-gradient(135deg, ${color1}22, ${color1}08)`;
  panel1.style.color = color1;
  panel2.style.background = `linear-gradient(135deg, ${color2}22, ${color2}08)`;
  panel2.style.color = color2;

  document.getElementById('setup').style.display = 'none';
  document.getElementById('broadcast').style.display = 'flex';
});

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (document.getElementById('setup').style.display !== 'none') return;
  if (e.key === '1' || e.key === 'q') addScore(1);
  else if (e.key === '2' || e.key === 'p') addScore(2);
  else if (e.key === ' ') { e.preventDefault(); toggleTimer(); }
  else if (e.key === 'n') nextPeriod();
  else if (e.key === 'f') endGame();
  else if (e.key === 'z') undoScore();
});
</script>
