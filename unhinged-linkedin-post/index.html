<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Unhinged LinkedIn Post</title>
<style>body{margin:0;font-family:Inter,system-ui,sans-serif;background:#06131f;color:#eff6ff}main{max-width:900px;margin:auto;padding:28px}a{color:#7dd3fc;text-decoration:none}.card{background:#0f2435;border:1px solid #1d4ed8;border-radius:22px;padding:22px;margin-top:18px}.out{background:#081726;border-radius:16px;padding:16px;line-height:1.7;white-space:pre-wrap}input,button{font:inherit}input{width:100%;background:#081726;border:1px solid #2563eb;color:#eff6ff;border-radius:14px;padding:12px}button{border:none;border-radius:14px;padding:12px 16px;font-weight:800;background:#38bdf8;color:#082032;cursor:pointer;margin-top:12px}</style>
</head>
<body><main><a href="../">← Back</a><div class="card"><h1>Unhinged LinkedIn Post</h1><p>Turn any tiny event into a lesson on leadership, resilience, and impossible personal growth.</p><input id="input" value="missing my train"><button id="go">Influence</button><div class="out" id="out"></div></div></main>
<script>
function render(){const t=input.value.trim();out.textContent=`Today, ${t} taught me more about leadership than any boardroom ever could.\n\nSometimes the missed train is not a setback.\nSometimes it is a reminder that velocity without alignment is just panic in business casual.\n\n3 lessons:\n1. Ownership starts before comfort.\n2. Resilience is a calendar discipline.\n3. Great teams do not wait for perfect conditions.\n\nCurious how others are operationalizing this.`}go.onclick=render;render();
</script></body></html>
