<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accidental Offender</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#0a0a14;color:#ddd;min-height:100vh;padding:20px;display:flex;flex-direction:column;align-items:center}
h1{font-size:2em;color:#ff6b6b;margin:15px 0 5px}
.subtitle{color:#777;margin-bottom:25px;text-align:center}
.country-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;max-width:700px;width:100%;margin-bottom:25px}
.country-btn{background:#1a1a2e;border:1px solid #2a2a3e;border-radius:8px;padding:12px;text-align:center;cursor:pointer;transition:all 0.2s;font-size:0.95em}
.country-btn:hover{background:#2a2a3e;border-color:#ff6b6b}
.country-btn.active{background:#2a1a2e;border-color:#ff6b6b;color:#ff6b6b}
.flag{font-size:1.5em;display:block;margin-bottom:4px}
.warnings{max-width:600px;width:100%}
.warning-card{background:#1a1a2e;border-radius:10px;padding:18px;margin-bottom:12px;border-left:4px solid #ff6b6b;opacity:0;transform:translateY(10px);animation:fadeIn 0.4s forwards}
@keyframes fadeIn{to{opacity:1;transform:translateY(0)}}
.phrase{font-size:1.1em;color:#ff9b9b;font-weight:bold;margin-bottom:6px}
.meaning{color:#aaa;font-size:0.9em;line-height:1.4}
.severity{display:inline-block;padding:3px 8px;border-radius:4px;font-size:0.75em;font-weight:bold;margin-top:8px}
.sev-high{background:#4a1020;color:#ff4466}
.sev-med{background:#4a3010;color:#ffaa44}
.sev-low{background:#2a3a10;color:#aacc44}
.counter{color:#555;font-size:0.85em;margin:15px 0}
</style>
</head>
<body>
<h1>Accidental Offender</h1>
<p class="subtitle">Innocent phrases that will get you in trouble abroad</p>
<div class="country-grid" id="grid"></div>
<div class="counter" id="counter"></div>
<div class="warnings" id="warnings"></div>
<script>
const data={
"Japan":{flag:"\ud83c\uddef\ud83c\uddf5",items:[
{phrase:"Tipping your waiter",meaning:"Seen as insulting - implies they need charity or their employer doesn't pay enough.",severity:"high"},
{phrase:"Sticking chopsticks upright in rice",meaning:"Mimics funeral incense rituals. Extremely bad omen at dinner.",severity:"high"},
{phrase:"Blowing your nose at the table",meaning:"Considered deeply disgusting in public. Step away to do this.",severity:"med"},
{phrase:"Pointing at people",meaning:"Very rude. Use an open hand to gesture toward someone.",severity:"med"},
{phrase:"Wearing shoes indoors",meaning:"A serious breach of hygiene etiquette. Always remove shoes.",severity:"high"},
{phrase:"Giving gifts in sets of 4",meaning:"The number 4 sounds like 'death' in Japanese. Avoid it.",severity:"high"},
{phrase:"Pouring your own drink",meaning:"You pour for others, they pour for you. Self-pouring suggests greed.",severity:"low"},
{phrase:"Talking loudly on the train",meaning:"Silence on public transport is sacred. Phone calls are forbidden.",severity:"med"}
]},
"Thailand":{flag:"\ud83c\uddf9\ud83c\udded",items:[
{phrase:"Touching someone's head",meaning:"The head is the most sacred body part. Even patting a child's head is offensive.",severity:"high"},
{phrase:"Pointing your feet at a Buddha statue",meaning:"Feet are the lowest, dirtiest body part. Pointing them at sacred things is deeply disrespectful.",severity:"high"},
{phrase:"Stepping on money",meaning:"Thai currency has the King's image. Stepping on it is illegal - lese majeste.",severity:"high"},
{phrase:"Not removing shoes at temples",meaning:"Shoes in a temple is a major sign of disrespect.",severity:"high"},
{phrase:"Thumbs up gesture",meaning:"Can be interpreted as a mildly rude gesture in some contexts.",severity:"low"},
{phrase:"Losing your temper publicly",meaning:"Showing anger causes 'loss of face' for everyone present. Stay calm always.",severity:"med"}
]},
"UK":{flag:"\ud83c\uddec\ud83c\udde7",items:[
{phrase:"Asking 'What do you do?'",meaning:"Can be seen as gauging social status. Brits find it invasive early in conversation.",severity:"low"},
{phrase:"The V-sign with palm inward",meaning:"The 'peace sign' backwards is equivalent to the middle finger in Britain.",severity:"high"},
{phrase:"Cutting in a queue",meaning:"Possibly the most offensive thing you can do in Britain. Wars have started over less.",severity:"high"},
{phrase:"Saying 'I'm stuffed' after a meal",meaning:"In some British circles, 'stuffed' can mean pregnant. Say 'full' instead.",severity:"low"},
{phrase:"Being overly enthusiastic",meaning:"British reserve means excessive positivity is seen as suspicious or fake.",severity:"low"},
{phrase:"Not buying a round at the pub",meaning:"Skipping your round is social suicide. The group remembers FOREVER.",severity:"med"}
]},
"India":{flag:"\ud83c\uddee\ud83c\uddf3",items:[
{phrase:"Eating with your left hand",meaning:"The left hand is considered unclean. Always eat and pass food with your right.",severity:"high"},
{phrase:"Showing the soles of your feet",meaning:"Feet are considered impure. Pointing soles at people or sacred objects is very rude.",severity:"high"},
{phrase:"Refusing offered food",meaning:"Refusing food from a host is a serious insult. At least taste it.",severity:"med"},
{phrase:"Wearing shoes inside homes or temples",meaning:"Always remove footwear. This is non-negotiable.",severity:"high"},
{phrase:"Public displays of affection",meaning:"Kissing or hugging in public makes people deeply uncomfortable.",severity:"med"},
{phrase:"Head wobble misinterpretation",meaning:"The side-to-side head wobble means 'yes' or 'I understand' - not 'no.'",severity:"low"},
{phrase:"Touching books with your feet",meaning:"Knowledge is sacred. Feet touching books, papers, or instruments is disrespectful.",severity:"med"}
]},
"Brazil":{flag:"\ud83c\udde7\ud83c\uddf7",items:[
{phrase:"The OK hand gesture",meaning:"In Brazil, the OK sign (circle with fingers) is equivalent to the middle finger.",severity:"high"},
{phrase:"Arriving on time to a party",meaning:"Showing up at the stated time suggests desperation. 30-60 minutes late is normal.",severity:"low"},
{phrase:"Calling someone from Argentina 'basically the same'",meaning:"The rivalry runs DEEP. Never conflate the two.",severity:"med"},
{phrase:"Refusing coffee",meaning:"Declining cafezinho is like refusing friendship itself.",severity:"low"},
{phrase:"Wearing green and yellow casually",meaning:"Outside of soccer/patriotic events, it can carry strong political signals.",severity:"med"}
]},
"Germany":{flag:"\ud83c\udde9\ud83c\uddea",items:[
{phrase:"Wishing happy birthday early",meaning:"Saying it before the actual day is considered terrible luck.",severity:"med"},
{phrase:"Jaywalking",meaning:"Even if no cars are in sight, jaywalking is deeply frowned upon. Others will glare.",severity:"med"},
{phrase:"Being late",meaning:"Punctuality is near-sacred. Even 5 minutes late requires an apology.",severity:"high"},
{phrase:"Making the 'thumb between fingers' gesture",meaning:"This is a very vulgar sexual gesture in Germany.",severity:"high"},
{phrase:"Not making eye contact during a toast",meaning:"Looking away while clinking glasses means 7 years of bad luck... in bed.",severity:"med"},
{phrase:"Small talk with strangers",meaning:"Random chatting with strangers makes Germans deeply suspicious of your motives.",severity:"low"}
]},
"China":{flag:"\ud83c\udde8\ud83c\uddf3",items:[
{phrase:"Giving a clock as a gift",meaning:"'Giving a clock' sounds like 'attending a funeral' in Mandarin. Major taboo.",severity:"high"},
{phrase:"Writing someone's name in red ink",meaning:"Red ink names are associated with death. Use any other color.",severity:"high"},
{phrase:"Sticking chopsticks upright in a bowl",meaning:"Resembles incense at a funeral. Extremely bad omen.",severity:"high"},
{phrase:"Wrapping gifts in white paper",meaning:"White is the color of death and mourning. Use red or gold.",severity:"med"},
{phrase:"The number 4 in room/floor numbers",meaning:"4 sounds like 'death.' Many buildings skip the 4th floor entirely.",severity:"med"},
{phrase:"Tapping your bowl with chopsticks",meaning:"This is what beggars do. Implies poverty.",severity:"low"},
{phrase:"Refusing a business card casually",meaning:"Business cards are extensions of identity. Treat them with both hands and respect.",severity:"med"}
]},
"France":{flag:"\ud83c\uddeb\ud83c\uddf7",items:[
{phrase:"Asking for ketchup at a restaurant",meaning:"Implies the chef's food needs fixing. A grave insult to French cuisine.",severity:"med"},
{phrase:"Splitting the bill",meaning:"'Going Dutch' is seen as cheap and graceless. One person pays.",severity:"low"},
{phrase:"Talking about money",meaning:"Discussing salaries or wealth is considered extremely vulgar.",severity:"med"},
{phrase:"Not greeting with 'Bonjour' first",meaning:"Starting any interaction without 'Bonjour' is the height of rudeness.",severity:"high"},
{phrase:"Bringing wine to a dinner party (cheap wine)",meaning:"The host has carefully selected wine. Your cheap bottle is an insult.",severity:"med"},
{phrase:"Smiling at strangers",meaning:"Random smiling is seen as suspicious, insincere, or a sign you want something.",severity:"low"}
]},
"South Korea":{flag:"\ud83c\uddf0\ud83c\uddf7",items:[
{phrase:"Writing someone's name in red",meaning:"Red ink names are associated with death records. Never do this.",severity:"high"},
{phrase:"Pouring your own drink",meaning:"Always pour for others first. They will pour for you.",severity:"med"},
{phrase:"Receiving with one hand",meaning:"Always use two hands when receiving gifts, cards, or items from elders.",severity:"med"},
{phrase:"Not using honorifics",meaning:"Age-based hierarchy in language is strict. Using casual speech with elders is very rude.",severity:"high"},
{phrase:"Blowing your nose at the table",meaning:"Step away to blow your nose. Doing it at the table is disgusting to Koreans.",severity:"med"},
{phrase:"Leaving chopsticks sticking up",meaning:"Same as Japan - resembles funeral rites.",severity:"high"}
]},
"Middle East":{flag:"\ud83c\uddf8\ud83c\udde6",items:[
{phrase:"Thumbs up",meaning:"In some Middle Eastern countries, this is the equivalent of the middle finger.",severity:"high"},
{phrase:"Showing the soles of your shoes",meaning:"The bottom of your shoe is the dirtiest thing. Showing it to someone is a grave insult.",severity:"high"},
{phrase:"Eating with your left hand",meaning:"The left hand is reserved for bathroom hygiene. Never eat or greet with it.",severity:"high"},
{phrase:"Refusing hospitality (tea/coffee)",meaning:"Declining offered refreshment is deeply insulting to Arab hospitality culture.",severity:"med"},
{phrase:"Crossing your legs showing shoe sole",meaning:"A specific insult - famously seen when shoes were thrown at a US president.",severity:"high"},
{phrase:"Public displays of affection",meaning:"Even holding hands can be offensive in conservative areas.",severity:"med"},
{phrase:"Complimenting possessions too much",meaning:"The host may feel obligated to give it to you. Then you must accept.",severity:"low"}
]},
"Italy":{flag:"\ud83c\uddee\ud83c\uddf9",items:[
{phrase:"Ordering cappuccino after 11am",meaning:"Italians consider milk-based coffee a morning-only drink. Afternoon cappuccino is barbaric.",severity:"med"},
{phrase:"Putting parmesan on seafood pasta",meaning:"Cheese on fish pasta is a culinary crime in Italy. You will be judged harshly.",severity:"med"},
{phrase:"The 'corna' hand gesture",meaning:"The 'rock on' sign means you are telling someone their partner is cheating.",severity:"high"},
{phrase:"Breaking spaghetti before cooking",meaning:"A cardinal sin. Italians will physically recoil.",severity:"med"},
{phrase:"Skipping the 'passeggiata'",meaning:"The evening stroll is sacred social time. Staying in is weird.",severity:"low"},
{phrase:"Asking for 'fettuccine alfredo'",meaning:"This dish does not exist in Italy. You will get confused stares.",severity:"low"}
]},
"Australia":{flag:"\ud83c\udde6\ud83c\uddfa",items:[
{phrase:"Not shouting your round",meaning:"If someone buys you a drink, you OWE the group a round. Forgetting is unforgivable.",severity:"med"},
{phrase:"Sitting in the back of a taxi",meaning:"In Australia, sitting in back when the front is free is seen as snobby.",severity:"low"},
{phrase:"Taking the last anything without offering",meaning:"The 'last piece' must be offered around. Taking it is greedy.",severity:"low"},
{phrase:"Being overly formal",meaning:"Australians cut tall poppies. Being too formal or impressive is suspicious.",severity:"low"},
{phrase:"Not saying 'cheers' for everything",meaning:"'Cheers' means thanks, hello, goodbye, and sorry. Not using it is cold.",severity:"low"}
]}
};
const grid=document.getElementById('grid');
Object.entries(data).forEach(([name,d])=>{
const btn=document.createElement('div');
btn.className='country-btn';
btn.innerHTML='<span class="flag">'+d.flag+'</span>'+name;
btn.onclick=()=>showCountry(name,btn);
grid.appendChild(btn);
});
function showCountry(name,btn){
document.querySelectorAll('.country-btn').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
const w=document.getElementById('warnings');
const items=data[name].items;
document.getElementById('counter').textContent=items.length+' ways to accidentally offend in '+name;
w.innerHTML='';
items.forEach((item,i)=>{
const card=document.createElement('div');
card.className='warning-card';
card.style.animationDelay=(i*0.08)+'s';
card.innerHTML='<div class="phrase">'+item.phrase+'</div><div class="meaning">'+item.meaning+'</div><span class="severity sev-'+item.severity+'">'+(item.severity==='high'?'DANGER':item.severity==='med'?'CAUTION':'MILD')+'</span>';
w.appendChild(card);
});
}
</script>
</body>
</html>
