<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Achievement Unlocked</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold: #d4a843;
    --gold-light: #f0d68a;
    --gold-dark: #9a7520;
    --bg-dark: #0d0d0d;
    --bg-card: #1a1a1a;
    --bg-card-hover: #222;
    --text: #e0e0e0;
    --text-dim: #888;
    --common: #8a8a8a;
    --uncommon: #4caf50;
    --rare: #2196f3;
    --epic: #9c27b0;
    --legendary: #ff9800;
    --mythic: #ff1744;
  }

  body {
    background: var(--bg-dark);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 30px 20px 10px;
    border-bottom: 2px solid var(--gold-dark);
    background: linear-gradient(180deg, #1a1510 0%, var(--bg-dark) 100%);
  }
  .header h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 4px;
    text-shadow: 0 0 20px rgba(212,168,67,0.3);
  }
  .header .subtitle {
    color: var(--text-dim);
    font-size: 0.9rem;
    margin-top: 4px;
    letter-spacing: 2px;
  }
  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-top: 14px;
    flex-wrap: wrap;
  }
  .stat {
    text-align: center;
  }
  .stat-value {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.4rem;
    color: var(--gold-light);
  }
  .stat-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  /* Input area */
  .input-area {
    max-width: 640px;
    margin: 24px auto;
    padding: 0 16px;
    display: flex;
    gap: 10px;
  }
  .input-area input {
    flex: 1;
    padding: 14px 18px;
    background: var(--bg-card);
    border: 2px solid #333;
    border-radius: 8px;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.05rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-area input:focus {
    border-color: var(--gold);
  }
  .input-area input::placeholder {
    color: #555;
  }
  .input-area button {
    padding: 14px 24px;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    border: none;
    border-radius: 8px;
    color: #000;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: transform 0.1s, box-shadow 0.2s;
    white-space: nowrap;
  }
  .input-area button:hover {
    transform: scale(1.03);
    box-shadow: 0 0 20px rgba(212,168,67,0.3);
  }
  .input-area button:active { transform: scale(0.97); }

  /* Achievement popup overlay */
  .popup-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    animation: fadeIn 0.3s ease;
  }
  .popup-overlay.active { display: flex; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .popup-card {
    background: linear-gradient(145deg, #1e1b14, #12100a);
    border: 2px solid var(--gold);
    border-radius: 16px;
    padding: 32px 36px;
    max-width: 440px;
    width: 90%;
    text-align: center;
    position: relative;
    animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 0 60px rgba(212,168,67,0.2), inset 0 0 40px rgba(212,168,67,0.05);
  }
  @keyframes popIn {
    0% { transform: scale(0.5) translateY(40px); opacity: 0; }
    100% { transform: scale(1) translateY(0); opacity: 1; }
  }

  .popup-card .ach-unlocked {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 5px;
    color: var(--gold);
    margin-bottom: 8px;
  }
  .popup-card .ach-icon {
    font-size: 3.2rem;
    margin: 10px 0;
    filter: drop-shadow(0 0 10px rgba(212,168,67,0.5));
  }
  .popup-card .ach-name {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.3rem;
    font-weight: 900;
    color: #fff;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .popup-card .ach-desc {
    color: var(--text-dim);
    font-size: 0.95rem;
    margin-bottom: 12px;
    font-style: italic;
  }
  .popup-card .ach-meta {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 16px;
  }
  .popup-card .ach-points {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.4rem;
    color: var(--gold-light);
  }
  .popup-card .ach-points span { font-size: 0.7rem; color: var(--text-dim); }
  .popup-card .ach-rarity {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.75rem;
    padding: 4px 14px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 2px;
    align-self: center;
  }
  .popup-card .ach-category {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-dim);
    margin-bottom: 16px;
  }
  .popup-actions {
    display: flex;
    gap: 10px;
    justify-content: center;
  }
  .popup-actions button {
    padding: 10px 20px;
    border-radius: 8px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: transform 0.1s;
    border: none;
  }
  .popup-actions button:active { transform: scale(0.95); }
  .btn-close-popup {
    background: #333;
    color: var(--text);
  }
  .btn-share {
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    color: #000;
  }

  .rarity-common { background: var(--common); color: #000; }
  .rarity-uncommon { background: var(--uncommon); color: #000; }
  .rarity-rare { background: var(--rare); color: #fff; }
  .rarity-epic { background: var(--epic); color: #fff; }
  .rarity-legendary { background: var(--legendary); color: #000; }
  .rarity-mythic { background: var(--mythic); color: #fff; }

  /* Filter tabs */
  .filter-bar {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin: 16px auto;
    padding: 0 16px;
    flex-wrap: wrap;
  }
  .filter-btn {
    padding: 6px 16px;
    border-radius: 20px;
    background: var(--bg-card);
    border: 1px solid #333;
    color: var(--text-dim);
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--gold-dark);
    color: #000;
    border-color: var(--gold);
  }

  /* Trophy case */
  .trophy-case {
    max-width: 800px;
    margin: 10px auto 40px;
    padding: 0 16px;
  }
  .trophy-case h2 {
    font-family: 'Orbitron', sans-serif;
    font-size: 1rem;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-bottom: 14px;
    text-align: center;
  }
  .trophy-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
  }
  .trophy-card {
    background: var(--bg-card);
    border: 1px solid #2a2a2a;
    border-radius: 10px;
    padding: 16px;
    transition: transform 0.2s, border-color 0.2s;
    cursor: default;
    position: relative;
    overflow: hidden;
  }
  .trophy-card:hover {
    transform: translateY(-2px);
    border-color: #444;
  }
  .trophy-card .tc-icon {
    font-size: 2rem;
    margin-bottom: 6px;
  }
  .trophy-card .tc-name {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.7rem;
    color: #fff;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .trophy-card .tc-desc {
    font-size: 0.8rem;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  .trophy-card .tc-bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .trophy-card .tc-points {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.85rem;
    color: var(--gold-light);
  }
  .trophy-card .tc-points span { font-size: 0.55rem; color: var(--text-dim); }
  .trophy-card .tc-rarity {
    font-size: 0.55rem;
    padding: 2px 8px;
    border-radius: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 600;
  }
  .trophy-card .tc-date {
    font-size: 0.6rem;
    color: #555;
    margin-top: 6px;
  }
  .trophy-card .tc-category-tag {
    position: absolute;
    top: 8px;
    right: 8px;
    font-size: 0.5rem;
    padding: 2px 6px;
    border-radius: 4px;
    background: #2a2a2a;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .trophy-card .tc-share-btn {
    position: absolute;
    bottom: 8px;
    right: 8px;
    background: none;
    border: none;
    color: #555;
    cursor: pointer;
    font-size: 0.9rem;
    padding: 4px;
    transition: color 0.2s;
  }
  .trophy-card .tc-share-btn:hover { color: var(--gold); }

  .empty-case {
    text-align: center;
    padding: 60px 20px;
    color: #444;
    font-size: 1.1rem;
  }
  .empty-case .empty-icon { font-size: 3rem; margin-bottom: 12px; }

  /* Clear button */
  .clear-area {
    text-align: center;
    padding: 20px;
  }
  .clear-btn {
    padding: 8px 20px;
    background: transparent;
    border: 1px solid #333;
    border-radius: 6px;
    color: #555;
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.75rem;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .clear-btn:hover { border-color: #f44336; color: #f44336; }

  /* Share canvas (hidden) */
  .share-canvas-wrap {
    position: fixed;
    left: -9999px;
    top: -9999px;
  }

  /* Particles */
  .particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 999;
  }
  .particle {
    position: absolute;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--gold);
    animation: particleFall 1s ease-out forwards;
    opacity: 0;
  }
  @keyframes particleFall {
    0% { opacity: 1; transform: translate(0, 0) scale(1); }
    100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0); }
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--bg-card);
    border: 1px solid var(--gold-dark);
    color: var(--text);
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 0.85rem;
    z-index: 2000;
    transition: transform 0.3s ease;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Responsive */
  @media (max-width: 480px) {
    .input-area { flex-direction: column; }
    .input-area button { width: 100%; }
    .popup-card { padding: 24px 20px; }
    .trophy-grid { grid-template-columns: 1fr; }
  }
</style>
</head>

<div class="particles" id="particles"></div>

// Fallback templates for unmatched input
const FALLBACKS = [
  { name: "MYSTERY ACHIEVER", icon: "❓", desc: "We don't know what you did, but we're proud.", category: "Survival" },
  { name: "TASK TERMINATOR", icon: "💀", desc: "Another task falls before your unstoppable will.", category: "Adulting" },
  { name: "CHECKBOX CHAMPION", icon: "☑️", desc: "The to-do list trembles at your approach.", category: "Adulting" },
  { name: "GRIND GLADIATOR", icon: "⚡", desc: "The grind never stops. Neither do you.", category: "Survival" },
  { name: "QUEST COMPLETER", icon: "🗡️", desc: "Side quest resolved. Main quest still pending.", category: "Survival" },
  { name: "MUNDANE MASTER", icon: "🏅", desc: "You did a thing. The thing is done. Magnificent.", category: "Adulting" },
  { name: "EFFORT ENGINE", icon: "🔥", desc: "Effort was made. That's more than most can say.", category: "Survival" },
  { name: "DAILY DRIVER", icon: "🚀", desc: "One small step for you. One giant leap for your to-do list.", category: "Adulting" },
];

const RARITIES = [
  { name: "Common", weight: 35, cssClass: "rarity-common", pointRange: [10, 50] },
  { name: "Uncommon", weight: 25, cssClass: "rarity-uncommon", pointRange: [50, 150] },
  { name: "Rare", weight: 18, cssClass: "rarity-rare", pointRange: [150, 350] },
  { name: "Epic", weight: 12, cssClass: "rarity-epic", pointRange: [350, 600] },
  { name: "Legendary", weight: 8, cssClass: "rarity-legendary", pointRange: [600, 900] },
  { name: "Mythic", weight: 2, cssClass: "rarity-mythic", pointRange: [900, 1000] },
];

// ============ AUDIO ============
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;

function playAchievementSound(rarityIndex) {
  if (!audioCtx) audioCtx = new AudioCtx();
  const now = audioCtx.currentTime;
  const baseFreqs = [523, 659, 784, 1047];
  const duration = 0.12 + rarityIndex * 0.02;

  baseFreqs.forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = i < 2 ? 'sine' : 'triangle';
    osc.frequency.setValueAtTime(freq + rarityIndex * 20, now + i * duration);
    gain.gain.setValueAtTime(0, now + i * duration);
    gain.gain.linearRampToValueAtTime(0.15, now + i * duration + 0.03);
    gain.gain.exponentialRampToValueAtTime(0.001, now + i * duration + duration + 0.3);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(now + i * duration);
    osc.stop(now + i * duration + duration + 0.35);
  });

  // Extra shimmer for legendary+
  if (rarityIndex >= 4) {
    for (let i = 0; i < 3; i++) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(1500 + i * 400, now + 0.5 + i * 0.08);
      gain.gain.setValueAtTime(0.08, now + 0.5 + i * 0.08);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.8 + i * 0.08);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(now + 0.5 + i * 0.08);
      osc.stop(now + 1.0 + i * 0.08);
    }
  }
}

// ============ PARTICLES ============
function spawnParticles(count) {
  const container = document.getElementById('particles');
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const x = Math.random() * window.innerWidth;
    const y = Math.random() * window.innerHeight * 0.5 + window.innerHeight * 0.2;
    const dx = (Math.random() - 0.5) * 200;
    const dy = (Math.random() - 0.5) * 200;
    p.style.left = x + 'px';
    p.style.top = y + 'px';
    p.style.setProperty('--dx', dx + 'px');
    p.style.setProperty('--dy', dy + 'px');
    p.style.background = ['#d4a843','#f0d68a','#fff','#ff9800','#ffd700'][Math.floor(Math.random() * 5)];
    p.style.animationDelay = (Math.random() * 0.3) + 's';
    container.appendChild(p);
    setTimeout(() => p.remove(), 1500);
  }
}

// ============ STORAGE ============
function getAchievements() {
  try { return JSON.parse(localStorage.getItem('life_achievements') || '[]'); }
  catch { return []; }
}
function saveAchievements(list) {
  localStorage.setItem('life_achievements', JSON.stringify(list));
}

// ============ MATCHING ============
function matchTemplate(input) {
  const lower = input.toLowerCase();
  let best = null, bestScore = 0;
  for (const t of TEMPLATES) {
    let score = 0;
    for (const kw of t.keywords) {
      if (lower.includes(kw)) score += kw.length;
    }
    if (score > bestScore) { bestScore = score; best = t; }
  }
  if (!best) best = FALLBACKS[Math.floor(Math.random() * FALLBACKS.length)];
  return best;
}

function pickRarity() {
  const total = RARITIES.reduce((s, r) => s + r.weight, 0);
  let roll = Math.random() * total;
  for (let i = 0; i < RARITIES.length; i++) {
    roll -= RARITIES[i].weight;
    if (roll <= 0) return i;
  }
  return 0;
}

function pickPoints(rarityIndex) {
  const [min, max] = RARITIES[rarityIndex].pointRange;
  return Math.floor(Math.random() * (max - min + 1) / 5) * 5 + min;
}

// ============ RENDER ============
let currentFilter = 'all';

function updateStats() {
  const achs = getAchievements();
  document.getElementById('totalG').textContent = achs.reduce((s, a) => s + a.points, 0).toLocaleString();
  document.getElementById('totalAch').textContent = achs.length;
  const rarityOrder = RARITIES.map(r => r.name);
  let highestIdx = -1;
  for (const a of achs) {
    const idx = rarityOrder.indexOf(a.rarity);
    if (idx > highestIdx) highestIdx = idx;
  }
  document.getElementById('rarest').textContent = highestIdx >= 0 ? RARITIES[highestIdx].name : '---';
}

function renderTrophyCase() {
  const achs = getAchievements();
  const grid = document.getElementById('trophyGrid');
  const empty = document.getElementById('emptyCase');
  grid.innerHTML = '';

  const filtered = currentFilter === 'all' ? achs : achs.filter(a => a.category === currentFilter);

  if (filtered.length === 0) {
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  // Show newest first
  [...filtered].reverse().forEach((a, i) => {
    const card = document.createElement('div');
    card.className = 'trophy-card';
    const rClass = RARITIES.find(r => r.name === a.rarity)?.cssClass || 'rarity-common';
    card.innerHTML = `
      <div class="tc-category-tag">${a.category}</div>
      <div class="tc-icon">${a.icon}</div>
      <div class="tc-name">${a.name}</div>
      <div class="tc-desc">${a.desc}</div>
      <div class="tc-bottom">
        <div class="tc-points">${a.points}<span>G</span></div>
        <div class="tc-rarity ${rClass}">${a.rarity}</div>
      </div>
      <div class="tc-date">${a.input} &mdash; ${new Date(a.date).toLocaleDateString()}</div>
      <button class="tc-share-btn" title="Share" data-idx="${achs.length - 1 - i}">📤</button>
    `;
    grid.appendChild(card);
  });

  // Share buttons
  grid.querySelectorAll('.tc-share-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const idx = parseInt(btn.dataset.idx);
      shareAchievement(achs[idx]);
    });
  });
}

// ============ SHARE ============
function shareAchievement(ach) {
  const canvas = document.getElementById('shareCanvas');
  const ctx = canvas.getContext('2d');
  const w = 600, h = 340;
  canvas.width = w; canvas.height = h;

  // Background
  const grad = ctx.createLinearGradient(0, 0, w, h);
  grad.addColorStop(0, '#1e1b14');
  grad.addColorStop(1, '#0d0d0d');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);

  // Border
  ctx.strokeStyle = '#d4a843';
  ctx.lineWidth = 3;
  ctx.strokeRect(6, 6, w - 12, h - 12);

  // Inner glow line
  ctx.strokeStyle = 'rgba(212,168,67,0.2)';
  ctx.lineWidth = 1;
  ctx.strokeRect(14, 14, w - 28, h - 28);

  // "Achievement Unlocked"
  ctx.fillStyle = '#d4a843';
  ctx.font = '600 12px sans-serif';
  ctx.textAlign = 'center';
  ctx.letterSpacing = '4px';
  ctx.fillText('ACHIEVEMENT UNLOCKED', w / 2, 50);

  // Icon
  ctx.font = '52px serif';
  ctx.fillText(ach.icon, w / 2, 115);

  // Name
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 22px sans-serif';
  ctx.fillText(ach.name, w / 2, 155);

  // Description
  ctx.fillStyle = '#888888';
  ctx.font = '14px sans-serif';
  ctx.fillText(ach.desc, w / 2, 185);

  // Points + Rarity
  ctx.fillStyle = '#f0d68a';
  ctx.font = 'bold 28px sans-serif';
  ctx.fillText(ach.points + 'G', w / 2 - 60, 230);

  const rarityColors = { Common: '#8a8a8a', Uncommon: '#4caf50', Rare: '#2196f3', Epic: '#9c27b0', Legendary: '#ff9800', Mythic: '#ff1744' };
  ctx.fillStyle = rarityColors[ach.rarity] || '#888';
  ctx.font = 'bold 14px sans-serif';
  ctx.fillText(ach.rarity.toUpperCase(), w / 2 + 60, 225);

  // Category
  ctx.fillStyle = '#555';
  ctx.font = '11px sans-serif';
  ctx.fillText(ach.category.toUpperCase(), w / 2, 265);

  // Watermark
  ctx.fillStyle = '#333';
  ctx.font = '10px sans-serif';
  ctx.fillText('lifeachievements.lol', w / 2, 310);

  canvas.toBlob(blob => {
    if (navigator.share && navigator.canShare) {
      const file = new File([blob], 'achievement.png', { type: 'image/png' });
      if (navigator.canShare({ files: [file] })) {
        navigator.share({
          title: `Achievement Unlocked: ${ach.name}`,
          text: `${ach.icon} ${ach.name} (${ach.points}G) — ${ach.desc}`,
          files: [file]
        }).catch(() => downloadBlob(blob));
        return;
      }
    }
    // Fallback: copy text or download
    if (navigator.clipboard) {
      navigator.clipboard.writeText(`${ach.icon} ACHIEVEMENT UNLOCKED: ${ach.name} (${ach.points}G, ${ach.rarity})\n${ach.desc}`).then(() => {
        showToast('Achievement copied to clipboard!');
      }).catch(() => downloadBlob(blob));
    } else {
      downloadBlob(blob);
    }
  }, 'image/png');
}

function downloadBlob(blob) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'achievement.png';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Achievement card downloaded!');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ============ UNLOCK ============
function unlockAchievement(input) {
  if (!input.trim()) return;
  const template = matchTemplate(input);
  const rarityIdx = pickRarity();
  const rarity = RARITIES[rarityIdx];
  const points = pickPoints(rarityIdx);

  const achievement = {
    name: template.name,
    icon: template.icon,
    desc: template.desc,
    category: template.category,
    rarity: rarity.name,
    points: points,
    input: input.trim(),
    date: new Date().toISOString(),
  };

  // Save
  const achs = getAchievements();
  achs.push(achievement);
  saveAchievements(achs);

  // Sound + particles
  playAchievementSound(rarityIdx);
  spawnParticles(15 + rarityIdx * 10);

  // Show popup
  const popup = document.getElementById('popup');
  const card = document.getElementById('popupCard');
  card.innerHTML = `
    <div class="ach-unlocked">Achievement Unlocked</div>
    <div class="ach-icon">${achievement.icon}</div>
    <div class="ach-name">${achievement.name}</div>
    <div class="ach-desc">"${achievement.desc}"</div>
    <div class="ach-meta">
      <div class="ach-points">${achievement.points}<span>G</span></div>
      <div class="ach-rarity ${rarity.cssClass}">${rarity.name}</div>
    </div>
    <div class="ach-category">${achievement.category}</div>
    <div class="popup-actions">
      <button class="btn-share" onclick="shareAchievement(${JSON.stringify(achievement).replace(/"/g, '&quot;')})">Share</button>
      <button class="btn-close-popup" onclick="document.getElementById('popup').classList.remove('active')">Nice</button>
    </div>
  `;
  popup.classList.add('active');

  updateStats();
  renderTrophyCase();
}

// ============ EVENTS ============
document.getElementById('unlockBtn').addEventListener('click', () => {
  const input = document.getElementById('taskInput');
  unlockAchievement(input.value);
  input.value = '';
});

document.getElementById('taskInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    unlockAchievement(e.target.value);
    e.target.value = '';
  }
});

document.getElementById('popup').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) e.currentTarget.classList.remove('active');
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderTrophyCase();
  });
});

document.getElementById('clearBtn').addEventListener('click', () => {
  if (confirm('Reset all achievements? This cannot be undone.')) {
    localStorage.removeItem('life_achievements');
    updateStats();
    renderTrophyCase();
    showToast('All achievements cleared.');
  }
});

// Init
updateStats();
renderTrophyCase();
</script>
