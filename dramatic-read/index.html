<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DRAMATIC READ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --curtain-red: #8b0000;
    --gold: #d4af37;
    --gold-light: #f0d060;
    --dark: #1a0a0a;
    --stage: #2a1a1a;
    --velvet: #4a0e0e;
  }

  body {
    background: var(--dark);
    color: #f0e6d3;
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Curtain top border */
  .curtain-top {
    height: 40px;
    background: linear-gradient(180deg, var(--curtain-red) 0%, #6b0000 60%, transparent 100%);
    position: relative;
    z-index: 10;
  }
  .curtain-top::before {
    content: '';
    position: absolute;
    bottom: -20px;
    left: 0; right: 0;
    height: 20px;
    background: repeating-conic-gradient(var(--gold) 0% 25%, transparent 0% 50%) 0 0 / 20px 20px;
    opacity: 0.5;
  }

  /* Stage frame */
  .stage-frame {
    max-width: 900px;
    margin: 0 auto;
    padding: 20px;
    position: relative;
  }

  /* Title */
  .title-area {
    text-align: center;
    padding: 30px 10px 20px;
    position: relative;
  }
  .title-area h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(2rem, 6vw, 3.5rem);
    font-weight: 900;
    background: linear-gradient(135deg, var(--gold), var(--gold-light), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: none;
    letter-spacing: 4px;
    position: relative;
  }
  .title-area .subtitle {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    color: #c0a060;
    margin-top: 8px;
    font-size: 1rem;
  }
  .spotlight {
    position: fixed;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(255,220,100,0.06) 0%, transparent 70%);
    pointer-events: none;
    top: -100px; left: 50%;
    transform: translateX(-50%);
    z-index: 0;
    animation: spotlightPulse 4s ease-in-out infinite;
  }
  @keyframes spotlightPulse {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }

  /* Controls panel */
  .controls {
    background: linear-gradient(135deg, #2a1515, #1f0f0f);
    border: 1px solid #5a3030;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    align-items: center;
    justify-content: center;
  }
  .control-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .control-group label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--gold);
    font-weight: 600;
  }
  select, button {
    font-family: 'Inter', sans-serif;
    border: 1px solid #5a3030;
    border-radius: 8px;
    background: #1a0a0a;
    color: #f0e6d3;
    padding: 8px 14px;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  select:hover, button:hover {
    border-color: var(--gold);
    box-shadow: 0 0 10px rgba(212,175,55,0.2);
  }
  button.primary {
    background: linear-gradient(135deg, var(--curtain-red), #a01010);
    border-color: var(--gold);
    font-weight: 600;
    font-size: 1rem;
    padding: 10px 24px;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  button.primary:hover {
    background: linear-gradient(135deg, #a01010, #c01010);
    transform: scale(1.03);
  }
  button.primary:active { transform: scale(0.98); }

  /* Drama slider */
  .drama-slider-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    min-width: 180px;
  }
  .drama-slider-wrap label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--gold);
    font-weight: 600;
  }
  .slider-row {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
  }
  input[type="range"] {
    -webkit-appearance: none;
    flex: 1;
    height: 6px;
    background: linear-gradient(90deg, #3a2020, var(--curtain-red), var(--gold));
    border-radius: 3px;
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--gold);
    cursor: pointer;
    box-shadow: 0 0 8px rgba(212,175,55,0.5);
  }
  .drama-val {
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: 1.4rem;
    color: var(--gold);
    min-width: 30px;
    text-align: center;
  }

  /* Text input area */
  .input-area {
    position: relative;
    margin-bottom: 20px;
  }
  textarea {
    width: 100%;
    min-height: 160px;
    background: #0f0808;
    border: 2px solid #3a2020;
    border-radius: 12px;
    color: #f0e6d3;
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    line-height: 1.7;
    padding: 20px;
    resize: vertical;
    transition: border-color 0.3s;
  }
  textarea:focus {
    outline: none;
    border-color: var(--gold);
    box-shadow: 0 0 20px rgba(212,175,55,0.15);
  }
  textarea::placeholder {
    color: #6a4a4a;
    font-style: italic;
  }

  /* Performance stage */
  .stage {
    background: linear-gradient(180deg, #1a0a0a 0%, #0d0505 100%);
    border: 2px solid #3a2020;
    border-radius: 12px;
    min-height: 200px;
    padding: 30px;
    position: relative;
    overflow: hidden;
    margin-bottom: 20px;
  }
  .stage::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity: 0.5;
  }
  .stage-label {
    position: absolute;
    top: 10px;
    right: 16px;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: #5a3a3a;
  }
  .performance-text {
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem;
    line-height: 2;
    color: #c0a880;
  }
  .performance-text .word {
    display: inline;
    transition: all 0.15s;
    border-radius: 3px;
    padding: 1px 2px;
  }
  .performance-text .word.active {
    color: #fff;
    background: rgba(212,175,55,0.3);
    text-shadow: 0 0 10px rgba(212,175,55,0.5);
  }
  .performance-text .word.spoken {
    color: #e0d0b0;
  }
  .performance-text .annotation {
    display: inline-block;
    font-family: 'Inter', sans-serif;
    font-size: 0.75rem;
    font-style: italic;
    color: var(--gold);
    opacity: 0.8;
    margin: 0 4px;
    vertical-align: super;
  }
  .performance-text .interjection {
    display: block;
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 1rem;
    color: var(--curtain-red);
    text-align: center;
    padding: 8px 0;
    opacity: 0.9;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  .empty-stage {
    text-align: center;
    color: #4a2a2a;
    font-style: italic;
    padding: 60px 20px;
    font-size: 1.1rem;
  }

  /* Audience reaction bar */
  .audience-bar {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .audience-btn {
    background: #2a1515;
    border: 1px solid #4a2525;
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .audience-btn:hover {
    background: #3a2020;
    transform: scale(1.05);
  }
  .audience-btn.active {
    border-color: var(--gold);
    box-shadow: 0 0 8px rgba(212,175,55,0.3);
  }

  /* Share button */
  .share-area {
    text-align: center;
    margin-bottom: 30px;
  }
  .share-btn {
    background: linear-gradient(135deg, #2a4a2a, #1a3a1a);
    border: 1px solid #4a7a4a;
    padding: 10px 24px;
    font-size: 0.9rem;
    letter-spacing: 1px;
  }
  .share-btn:hover {
    border-color: #80c080;
    box-shadow: 0 0 12px rgba(80,160,80,0.3);
  }

  /* Footer */
  .footer {
    text-align: center;
    padding: 20px;
    color: #4a3030;
    font-size: 0.75rem;
    border-top: 1px solid #2a1515;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #2a1515;
    border: 1px solid var(--gold);
    color: var(--gold);
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 0.9rem;
    transition: transform 0.3s;
    z-index: 100;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Responsive */
  @media (max-width: 600px) {
    .stage-frame { padding: 10px; }
    .controls { padding: 14px; gap: 12px; }
    textarea { min-height: 120px; font-size: 0.95rem; padding: 14px; }
    .performance-text { font-size: 1rem; }
    .stage { padding: 20px; }
  }
</style>
</head>
<body>

<div class="spotlight"></div>
<div class="curtain-top"></div>

<div class="stage-frame">
  <div class="title-area">
    <h1>DRAMATIC READ</h1>
    <div class="subtitle">Where the mundane becomes MAGNIFICENT</div>
  </div>

  <div class="controls">
    <div class="control-group">
      <label>Style Preset</label>
      <select id="presetSelect">
        <option value="shakespeare">Shakespeare</option>
        <option value="movieTrailer" selected>Movie Trailer</option>
        <option value="trueCrime">True Crime Narrator</option>
        <option value="sports">Sports Commentator</option>
        <option value="soapOpera">Soap Opera</option>
      </select>
    </div>

    <div class="control-group">
      <label>Voice</label>
      <select id="voiceSelect">
        <option value="">Default</option>
      </select>
    </div>

    <div class="drama-slider-wrap">
      <label>Drama Level</label>
      <div class="slider-row">
        <span style="font-size:0.8rem">1</span>
        <input type="range" id="dramaSlider" min="1" max="10" value="7">
        <span style="font-size:0.8rem">10</span>
        <span class="drama-val" id="dramaVal">7</span>
      </div>
    </div>

    <button class="primary" id="performBtn">PERFORM</button>
    <button id="stopBtn" style="display:none">STOP</button>
  </div>

  <div class="input-area">
    <textarea id="inputText" placeholder="Paste any boring text here... a grocery list, terms of service, an email from HR... and watch it become THEATER."></textarea>
  </div>

  <div class="stage" id="stage">
    <span class="stage-label">The Stage</span>
    <div class="empty-stage" id="emptyStage">The curtain awaits your words...</div>
    <div class="performance-text" id="performanceText" style="display:none"></div>
  </div>

  <div class="audience-bar">
    <button class="audience-btn" data-sound="gasp">*gasp*</button>
    <button class="audience-btn" data-sound="applause">*applause*</button>
    <button class="audience-btn" data-sound="boo">*boo*</button>
    <button class="audience-btn" data-sound="laugh">*laughter*</button>
    <button class="audience-btn" data-sound="ooh">*ooooh*</button>
    <button class="audience-btn" data-sound="cry">*sobbing*</button>
  </div>

  <div class="share-area">
    <button class="share-btn" id="shareBtn">Copy Dramatic Script</button>
  </div>

  <div class="footer">A production of the DRAMATIC READ Theatre Company</div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// PRESETS
// ============================================================
const PRESETS = {
  shakespeare: {
    name: 'Shakespeare',
    pitchBase: 1.0, rateBase: 0.85,

    interjections: [

      'The very substance of the ambitious is merely the shadow of a dream.',
      'To read, or not to read -- THAT is the question!',
      'Hark! The plot doth thicken!',
      'What fools these mortals be, to write such things!',
      'Now is the winter of our discontent made glorious!',

  },
  movieTrailer: {

    annotations: ['[bass drops]','[explosion]','[slow motion]','[record scratch]','[dramatic zoom]','[title card]','[black screen]','[orchestra swells]','[deep breath]','[fade to black]'],
    interjections: [
      'In a world... where NOTHING is as it seems...',
      'ONE TEXT. ONE CHANCE. NO MERCY.',
      'This summer... everything changes.',
      'From the creators of READING comes... DRAMATIC READING.',
      'They said it couldn\'t be done. They were WRONG.',
      'When destiny calls... you ANSWER.',

      'Coming soon to a browser near you.',
      'You won\'t BELIEVE what happens next.',

    ],
    whisperChance: 0.1, yellChance: 0.25, pauseChance: 0.35,
  },
  trueCrime: {
    name: 'True Crime',
    pitchBase: 0.9, rateBase: 0.75,
    annotations: ['[chilling music]','[door creaks]','[footsteps]','[clock ticking]','[phone rings]','[rain patters]','[silence]','[breath held]','[paper rustles]','[detective sighs]'],
    interjections: [
      'But what they didn\'t know... would change EVERYTHING.',
      'The evidence was right there. Hiding in plain sight.',
      'And that\'s when things took a dark turn.',
      'No one suspected a thing. Not yet.',
      'The question remains... why?',
      'This next part is where it gets disturbing.',
      'Police would later describe the scene as... unprecedented.',
      'But there was one detail that didn\'t add up.',
      'What happened next shocked even the investigators.',
      'To this day, the truth remains... elusive.',
    ],
    whisperChance: 0.25, yellChance: 0.08, pauseChance: 0.3,
  },
  sports: {
    name: 'Sports Commentator',
    pitchBase: 1.1, rateBase: 1.1,
    annotations: ['[crowd roars]','[whistle blows]','[instant replay]','[stands up]','[slams table]','[high five]','[slow clap]','[confetti falls]','[horn blasts]','[flag thrown]'],
    interjections: [
      'AND THE CROWD GOES WILD!',
      'UNBELIEVABLE! Did you SEE that?!',
      'That\'s gonna be on the highlight reel for YEARS!',
      'Ladies and gentlemen, we are witnessing HISTORY!',
      'HE... COULD... GO... ALL... THE... WAY!',
      'What a PLAY! What a MOMENT!',
      'Down to the wire, folks! This is INCREDIBLE!',
      'I have NEVER seen anything like this in my CAREER!',
      'The tension is PALPABLE!',
      'And THAT is why we watch!',
    ],
    whisperChance: 0.05, yellChance: 0.35, pauseChance: 0.15,
  },
  soapOpera: {
    name: 'Soap Opera',
    pitchBase: 1.05, rateBase: 0.8,
    annotations: ['[gasps]','[faints]','[slaps]','[stares into distance]','[dramatic turn]','[tears well up]','[clutches pearls]','[organ plays]','[collapses on sofa]','[whispers passionately]'],
    interjections: [
      'How... COULD you?!',
      'I thought I knew you. I thought I knew EVERYTHING.',
      'The words hung in the air like an accusation.',
      'And in that moment... hearts shattered.',
      'But darling... there\'s something I never told you.',
      'TWINS?! You mean... there were TWINS this whole time?!',
      'Love is a battlefield, and these words are the ammunition.',
      'She turned slowly, a single tear rolling down her cheek.',
      'The truth... always comes out in the end.',
      'And just like that... everything changed. Forever.',
    ],
    whisperChance: 0.2, yellChance: 0.15, pauseChance: 0.3,
  },
};

// Extra interjection pool (shared)
const EXTRA_INTERJECTIONS = [
  'But WAIT... there\'s MORE.',
  'Let that sink in.',
  'Read that again. Slowly.',
  'Yes. You read that correctly.',
  'The implications are... staggering.',
  'Chills. Literal chills.',
  'Are you sitting down? Good.',
  'Nothing would ever be the same.',
  'And NOBODY saw it coming.',
  'The silence that followed was deafening.',
  'Mark this moment.',
  'History was being written.',
  'Breathe. Just... breathe.',
  'This changes EVERYTHING.',
  'Some say it was fate. Others call it madness.',
  'Even now, the echoes remain.',
  'The weight of these words cannot be overstated.',
  'If walls could talk...',
  'The tension could be cut with a knife.',
  'And the world held its breath.',
  'Somewhere, a phone was ringing. No one answered.',
];

// ============================================================
// WEB AUDIO - Audience Reactions
// ============================================================
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playNoise(duration, filterFreq, filterQ, gain) {
  const ctx = getAudioCtx();
  const bufferSize = ctx.sampleRate * duration;
  const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
  const source = ctx.createBufferSource();
  source.buffer = buffer;
  const filter = ctx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = filterFreq;
  filter.Q.value = filterQ;
  const g = ctx.createGain();
  g.gain.setValueAtTime(gain, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
  source.connect(filter).connect(g).connect(ctx.destination);
  source.start();
}

function playTone(freq, duration, type = 'sine', gain = 0.15) {
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  osc.type = type;
  osc.frequency.value = freq;
  const g = ctx.createGain();
  g.gain.setValueAtTime(gain, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
  osc.connect(g).connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + duration);
}

const SOUNDS = {
  gasp: () => {
    playNoise(0.4, 2000, 2, 0.3);
    playTone(800, 0.15, 'sine', 0.1);
  },
  applause: () => {
    for (let i = 0; i < 5; i++) setTimeout(() => playNoise(0.8, 4000, 0.5, 0.15), i * 100);
  },
  boo: () => {
    playTone(150, 0.8, 'sawtooth', 0.12);
    playNoise(0.6, 500, 1, 0.15);
  },
  laugh: () => {
    for (let i = 0; i < 6; i++) setTimeout(() => playTone(300 + Math.random() * 200, 0.12, 'triangle', 0.1), i * 80);
  },
  ooh: () => {
    playTone(400, 0.6, 'sine', 0.15);
    setTimeout(() => playTone(500, 0.4, 'sine', 0.12), 200);
  },
  cry: () => {
    for (let i = 0; i < 4; i++) setTimeout(() => playTone(600 - i * 50, 0.3, 'sine', 0.08), i * 250);
  },
};

// ============================================================
// VOICES
// ============================================================
const voiceSelect = document.getElementById('voiceSelect');
let voices = [];

function loadVoices() {
  voices = speechSynthesis.getVoices();
  voiceSelect.innerHTML = '<option value="">Default</option>';
  voices.forEach((v, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = `${v.name} (${v.lang})`;
    voiceSelect.appendChild(opt);
  });
}
speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

// ============================================================
// DRAMATIZER ENGINE
// ============================================================
function splitSentences(text) {
  return text.match(/[^.!?]+[.!?]+[\s]*/g) || [text];
}

function dramatize(text, preset, dramaLevel) {
  const p = PRESETS[preset];
  const sentences = splitSentences(text);
  const drama = dramaLevel / 10; // 0.1 to 1.0
  const allInterjections = [...p.interjections, ...EXTRA_INTERJECTIONS];
  const result = [];

  sentences.forEach((sentence, si) => {
    const trimmed = sentence.trim();
    if (!trimmed) return;

    // Decide annotations for this sentence
    const words = trimmed.split(/\s+/);
    const annotatedWords = [];

    // Pre-annotation?
    if (Math.random() < p.pauseChance * drama) {
      const ann = p.annotations[Math.floor(Math.random() * p.annotations.length)];
      annotatedWords.push({ type: 'annotation', text: ann });
    }

    // Whisper or yell entire sentence?
    let sentenceMode = 'normal';
    if (Math.random() < p.whisperChance * drama) sentenceMode = 'whisper';
    else if (Math.random() < p.yellChance * drama) sentenceMode = 'yell';

    if (sentenceMode === 'whisper') {
      annotatedWords.push({ type: 'annotation', text: '[whispers]' });
    } else if (sentenceMode === 'yell') {
      annotatedWords.push({ type: 'annotation', text: '[YELLS]' });
    }

    words.forEach((word, wi) => {
      // Dramatic pause mid-sentence
      if (wi > 0 && wi < words.length - 1 && Math.random() < 0.08 * drama) {
        annotatedWords.push({ type: 'annotation', text: '[long pause]' });
      }
      annotatedWords.push({
        type: 'word',
        text: sentenceMode === 'yell' ? word.toUpperCase() : word,
        mode: sentenceMode,
      });
    });

    result.push({ type: 'sentence', words: annotatedWords, mode: sentenceMode });

    // Interjection between sentences
    if (si < sentences.length - 1 && Math.random() < 0.25 * drama) {
      const intj = allInterjections[Math.floor(Math.random() * allInterjections.length)];
      result.push({ type: 'interjection', text: intj });
    }
  });

  return result;
}

// ============================================================
// RENDER & SPEAK
// ============================================================
const performanceText = document.getElementById('performanceText');
const emptyStage = document.getElementById('emptyStage');
const performBtn = document.getElementById('performBtn');
const stopBtn = document.getElementById('stopBtn');
const dramaSlider = document.getElementById('dramaSlider');
const dramaVal = document.getElementById('dramaVal');

dramaSlider.oninput = () => { dramaVal.textContent = dramaSlider.value; };

let isPerforming = false;
let wordElements = [];
let currentWordIndex = 0;

function renderDramatized(dramatized) {
  performanceText.innerHTML = '';
  wordElements = [];

  dramatized.forEach(item => {
    if (item.type === 'interjection') {
      const el = document.createElement('span');
      el.className = 'interjection';
      el.textContent = item.text;
      performanceText.appendChild(el);
    } else if (item.type === 'sentence') {
      item.words.forEach(w => {
        if (w.type === 'annotation') {
          const el = document.createElement('span');
          el.className = 'annotation';
          el.textContent = w.text;
          performanceText.appendChild(el);
        } else {
          const el = document.createElement('span');
          el.className = 'word';
          el.textContent = w.text + ' ';
          el.dataset.mode = w.mode;
          performanceText.appendChild(el);
          wordElements.push(el);
        }
      });
    }
  });
}

function buildSpeechParts(dramatized, preset, dramaLevel) {
  const p = PRESETS[preset];
  const drama = dramaLevel / 10;
  const parts = [];
  let wordIdx = 0;

  dramatized.forEach(item => {
    if (item.type === 'interjection') {
      parts.push({
        text: item.text,
        pitch: p.pitchBase + 0.2,
        rate: Math.max(0.5, p.rateBase - 0.15 * drama),
        volume: 0.9,
        wordIndices: [],
        isInterjection: true,
        pause: 600 * drama,
      });
    } else if (item.type === 'sentence') {
      const textParts = [];
      const indices = [];
      let mode = item.mode;
      let prePause = 0;

      item.words.forEach(w => {
        if (w.type === 'annotation') {
          if (w.text === '[long pause]') prePause += 800 * drama;
          else if (w.text === '[whispers]') mode = 'whisper';
          else if (w.text === '[YELLS]') mode = 'yell';
          else prePause += 300 * drama;
        } else {
          textParts.push(w.text);
          indices.push(wordIdx);
          wordIdx++;
        }
      });

      if (textParts.length === 0) return;

      let pitch = p.pitchBase;
      let rate = p.rateBase;
      let volume = 0.8;

      if (mode === 'whisper') {
        pitch += 0.3;
        rate = Math.max(0.4, rate - 0.3 * drama);
        volume = 0.4;
      } else if (mode === 'yell') {
        pitch -= 0.2;
        rate = Math.max(0.5, rate - 0.1);
        volume = 1.0;
      }

      // Add drama-driven variation
      pitch += (Math.random() - 0.5) * 0.3 * drama;
      rate += (Math.random() - 0.5) * 0.2 * drama;
      rate = Math.max(0.3, Math.min(2.0, rate));
      pitch = Math.max(0.1, Math.min(2.0, pitch));

      parts.push({
        text: textParts.join(' '),
        pitch, rate, volume,
        wordIndices: indices,
        isInterjection: false,
        pause: prePause,
        mode,
      });
    }
  });

  return parts;
}

async function speak(parts) {
  const voiceIdx = voiceSelect.value;
  const dramaLevel = parseInt(dramaSlider.value);
  const drama = dramaLevel / 10;

  for (let pi = 0; pi < parts.length; pi++) {
    if (!isPerforming) return;
    const part = parts[pi];

    // Pre-pause
    if (part.pause > 0) {
      await sleep(part.pause);
      if (!isPerforming) return;
    }

    // Auto audience reaction at high drama
    if (part.isInterjection && drama > 0.5 && Math.random() < 0.3 * drama) {
      const reactions = ['gasp', 'ooh'];
      SOUNDS[reactions[Math.floor(Math.random() * reactions.length)]]();
    }

    await new Promise((resolve) => {
      const utt = new SpeechSynthesisUtterance(part.text);
      if (voiceIdx && voices[voiceIdx]) utt.voice = voices[parseInt(voiceIdx)];
      utt.pitch = part.pitch;
      utt.rate = part.rate;
      utt.volume = part.volume;

      // Word tracking
      const words = part.text.split(/\s+/);
      let localWordIdx = 0;

      utt.onboundary = (e) => {
        if (e.name === 'word' && part.wordIndices[localWordIdx] !== undefined) {
          // Un-highlight previous
          wordElements.forEach(el => el.classList.remove('active'));
          const globalIdx = part.wordIndices[localWordIdx];
          if (wordElements[globalIdx]) {
            wordElements[globalIdx].classList.add('active');
            wordElements[globalIdx].classList.add('spoken');
            wordElements[globalIdx].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
          }
          localWordIdx++;
        }
      };

      utt.onend = () => {
        wordElements.forEach(el => el.classList.remove('active'));
        resolve();
      };
      utt.onerror = () => resolve();

      speechSynthesis.speak(utt);
    });

    // Pause between parts
    if (pi < parts.length - 1) {
      const gap = part.isInterjection ? 500 * drama : 200 * drama;
      await sleep(gap);
    }
  }

  // Finale
  if (isPerforming && drama > 0.5) {
    await sleep(500);
    SOUNDS.applause();
  }
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ============================================================
// PERFORM
// ============================================================
performBtn.addEventListener('click', () => {
  const text = document.getElementById('inputText').value.trim();
  if (!text) {
    showToast('The stage needs words! Paste some text first.');
    return;
  }

  speechSynthesis.cancel();
  isPerforming = true;
  performBtn.style.display = 'none';
  stopBtn.style.display = 'inline-block';

  const preset = document.getElementById('presetSelect').value;
  const dramaLevel = parseInt(dramaSlider.value);
  const dramatized = dramatize(text, preset, dramaLevel);

  emptyStage.style.display = 'none';
  performanceText.style.display = 'block';
  renderDramatized(dramatized);

  const parts = buildSpeechParts(dramatized, preset, dramaLevel);
  speak(parts).then(() => {
    isPerforming = false;
    performBtn.style.display = 'inline-block';
    stopBtn.style.display = 'none';
  });
});

stopBtn.addEventListener('click', () => {
  isPerforming = false;
  speechSynthesis.cancel();
  wordElements.forEach(el => el.classList.remove('active'));
  performBtn.style.display = 'inline-block';
  stopBtn.style.display = 'none';
});

// ============================================================
// AUDIENCE BUTTONS
// ============================================================
document.querySelectorAll('.audience-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const sound = btn.dataset.sound;
    if (SOUNDS[sound]) SOUNDS[sound]();
    btn.classList.add('active');
    setTimeout(() => btn.classList.remove('active'), 300);
  });
});

// ============================================================
// SHARE
// ============================================================
document.getElementById('shareBtn').addEventListener('click', () => {
  const text = document.getElementById('inputText').value.trim();
  if (!text) { showToast('Nothing to share yet!'); return; }

  const preset = document.getElementById('presetSelect').value;
  const dramaLevel = parseInt(dramaSlider.value);
  const dramatized = dramatize(text, preset, dramaLevel);

  let script = `=== DRAMATIC READ: ${PRESETS[preset].name} (Drama Level ${dramaLevel}/10) ===\n\n`;
  dramatized.forEach(item => {
    if (item.type === 'interjection') {
      script += `\n  --- ${item.text} ---\n\n`;
    } else if (item.type === 'sentence') {
      item.words.forEach(w => {
        if (w.type === 'annotation') script += ` ${w.text} `;
        else script += w.text + ' ';
      });
      script += '\n';
    }
  });
  script += '\n=== End of Performance ===';

  navigator.clipboard.writeText(script).then(() => {
    showToast('Dramatic script copied to clipboard!');
  }).catch(() => {
    showToast('Could not copy -- check clipboard permissions.');
  });
});

// ============================================================
// TOAST
// ============================================================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
