<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Puddle Crossing Strategy Board</title><meta name="description" content="Recommend a crossing doctrine based on shoe risk, leap confidence, and public dignity."><style>
:root{--ink:#1f2937;--muted:#6b7280;--line:rgba(31,41,55,.12);--accent:#0284c7;--accent2:#22c55e}*{box-sizing:border-box}body{margin:0;font-family:"Avenir Next","Trebuchet MS",sans-serif;color:var(--ink);background:linear-gradient(180deg,#eff6ff,#f0fdf4);padding:24px 18px 48px}.shell{max-width:1040px;margin:0 auto}.back{display:inline-block;margin-bottom:16px;color:var(--ink);text-decoration:none;font-weight:800}.hero,.grid,.row{display:grid;gap:18px}.hero{grid-template-columns:1.06fr .94fr;margin-bottom:18px}.grid{grid-template-columns:.95fr 1.05fr}.row{grid-template-columns:1fr 1fr;gap:12px}.panel{background:rgba(255,255,255,.86);border:1px solid rgba(255,255,255,.8);border-radius:28px;backdrop-filter:blur(14px);box-shadow:0 22px 60px rgba(2,132,199,.1)}.hero-copy,.controls,.results{padding:26px}.eyebrow{display:inline-block;padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.92);font-size:.74rem;letter-spacing:.08em;text-transform:uppercase;font-weight:800;color:var(--muted)}h1{font-size:clamp(2.45rem,5vw,4.1rem);line-height:.95;margin:16px 0 12px;letter-spacing:-.05em}p{color:var(--muted);line-height:1.6}label{display:block;font-weight:800;margin:14px 0 8px}select{width:100%;border:1px solid var(--line);border-radius:16px;padding:12px 14px;font:inherit;background:rgba(255,255,255,.92)}button{border:none;border-radius:999px;padding:12px 18px;font:inherit;font-weight:800;cursor:pointer}.primary{color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent2))}.secondary{background:rgba(31,41,55,.08);color:var(--ink);margin-left:10px}.card{background:rgba(255,255,255,.94);border:1px solid var(--line);border-radius:22px;padding:18px;margin-bottom:12px}.badge{display:inline-block;margin-bottom:10px;padding:7px 10px;border-radius:999px;background:rgba(2,132,199,.12);color:#0284c7;font-size:.78rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em}.headline{font-size:1.32rem;font-weight:900;margin-bottom:8px}@media(max-width:900px){.hero,.grid,.row{grid-template-columns:1fr}.secondary{margin-left:0;margin-top:10px}}
</style></head><body><div class="shell"><a class="back" href="../">← Back to Fun Builds</a><section class="hero"><div class="panel hero-copy"><div class="eyebrow">Puddle Crossing Strategy Board</div><h1>Not every leap deserves approval.</h1><p>Assess the puddle and get a recommended crossing doctrine before your shoes become a memory.</p></div><div class="panel hero-copy"><p><strong>Board outputs:</strong> crossing method, dignity risk, and whether you should wait six seconds instead.</p></div></section><section class="grid"><div class="panel controls"><div class="row"><div><label for="size">Puddle size</label><select id="size"><option value="1">minor</option><option value="3">annoying</option><option value="5">district-wide</option></select></div><div><label for="shoes">Shoe vulnerability</label><select id="shoes"><option value="1">already doomed</option><option value="3">normal</option><option value="5">absolutely not waterproof</option></select></div></div><label for="confidence">Leap confidence</label><select id="confidence"><option value="1">athletic</option><option value="3">uncertain</option><option value="5">fictional</option></select><label for="audience">Public exposure</label><select id="audience"><option value="0">empty sidewalk</option><option value="2">some witnesses</option><option value="4">too many witnesses</option></select><div style="margin-top:16px"><button class="primary" id="plan">Plan crossing</button><button class="secondary" id="retreat">Retreat</button></div></div><div class="panel results"><div id="out"></div></div></section></div><script>
function render(){const score=Number(size.value)*8+Number(shoes.value)*7+Number(confidence.value)*6+Number(audience.value)*5;const method=score>=78?'strategic reroute':score>=56?'one committed side-step':score>=34?'respectful leap':'casual walk-through';out.innerHTML=`<div class="card"><div class="badge">Board decision</div><div class="headline">${method}</div><p>The board considered a ${size.selectedOptions[0].text} puddle, ${shoes.selectedOptions[0].text} shoes, and ${audience.selectedOptions[0].text}.</p></div><div class="card"><div class="badge">Dignity risk</div><p>${Math.min(98,score)}/100. Current leap confidence is ${confidence.selectedOptions[0].text}, which may not survive contact with reality.</p></div><div class="card"><div class="badge">Recommendation</div><p>If the crossing requires a run-up, it is no longer a crossing. It is a performance.</p></div>`}
plan.onclick=render;retreat.onclick=()=>{size.selectedIndex=2;shoes.selectedIndex=2;confidence.selectedIndex=2;audience.selectedIndex=2;render()};render();
</script></body></html>
