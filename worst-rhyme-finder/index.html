<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Worst Rhyme Finder</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Caveat:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #fdf6e3;
    font-family: 'IM Fell English', serif;
    color: #3c3c3c;
    overflow-x: hidden;
  }

  /* Staff lines background */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      transparent,
      transparent 38px,
      #d4c5a0 38px,
      #d4c5a0 39px,
      transparent 39px,
      transparent 40px,
      #d4c5a0 40px,
      #d4c5a0 41px,
      transparent 41px,
      transparent 42px,
      #d4c5a0 42px,
      #d4c5a0 43px,
      transparent 43px,
      transparent 44px,
      #d4c5a0 44px,
      #d4c5a0 45px,
      transparent 45px,
      transparent 46px,
      #d4c5a0 46px,
      #d4c5a0 47px,
      transparent 47px,
      transparent 80px
    );
    opacity: 0.3;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 30px 20px 60px;
  }

  header {
    text-align: center;
    margin-bottom: 30px;
  }

  h1 {
    font-size: 2.6em;
    color: #2c1810;
    line-height: 1.1;
    margin-bottom: 6px;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.05);
  }

  .music-notes {
    font-size: 1.8em;
    letter-spacing: 8px;
    opacity: 0.5;
    margin-bottom: 4px;
  }

  .subtitle {
    font-style: italic;
    color: #8a7a60;
    font-size: 1.05em;
  }

  .input-area {
    background: #fff9ed;
    border: 2px solid #c9b890;
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 24px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.06);
    position: relative;
  }

  .input-area::before {
    content: '\266B';
    position: absolute;
    top: -14px;
    left: 20px;
    font-size: 1.6em;
    background: #fdf6e3;
    padding: 0 6px;
    color: #c9b890;
  }

  label {
    display: block;
    font-size: 1em;
    margin-bottom: 10px;
    color: #5a4a30;
  }

  textarea {
    width: 100%;
    min-height: 80px;
    padding: 14px;
    font-family: 'Caveat', cursive;
    font-size: 1.35em;
    border: 1px dashed #c9b890;
    border-radius: 8px;
    background: transparent;
    color: #2c1810;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
  }

  textarea:focus {
    border-color: #8a6a40;
  }

  textarea::placeholder {
    color: #c0b090;
    font-style: italic;
  }

  .btn-find {
    display: block;
    width: 100%;
    padding: 16px;
    margin-top: 14px;
    font-family: 'IM Fell English', serif;
    font-size: 1.2em;
    background: #2c1810;
    color: #fdf6e3;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    letter-spacing: 1px;
  }

  .btn-find:hover { background: #4a2e1c; }
  .btn-find:active { transform: scale(0.98); }

  /* Result card */
  .result-card {
    display: none;
    background: #fff9ed;
    border: 2px solid #c9b890;
    border-radius: 12px;
    padding: 28px 24px;
    margin-bottom: 24px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.08);
    animation: slideUp 0.4s ease-out;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-card.visible { display: block; }

  .original-line {
    font-family: 'Caveat', cursive;
    font-size: 1.4em;
    color: #5a4a30;
    margin-bottom: 6px;
    line-height: 1.4;
  }

  .rhyme-line {
    font-family: 'Caveat', cursive;
    font-size: 1.7em;
    font-weight: 700;
    color: #a02020;
    margin-bottom: 18px;
    line-height: 1.3;
    position: relative;
    padding-left: 20px;
  }

  .rhyme-line::before {
    content: '\266A';
    position: absolute;
    left: 0;
    top: 2px;
    font-size: 0.7em;
    color: #c9b890;
  }

  /* Cringe meter */
  .cringe-section {
    margin-bottom: 20px;
  }

  .cringe-label {
    font-size: 0.95em;
    color: #8a7a60;
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .cringe-level {
    font-weight: bold;
    color: #a02020;
  }

  .cringe-bar-outer {
    height: 18px;
    background: #ede3d0;
    border-radius: 9px;
    overflow: hidden;
    border: 1px solid #c9b890;
  }

  .cringe-bar-inner {
    height: 100%;
    border-radius: 9px;
    transition: width 0.8s ease-out;
    background: linear-gradient(90deg, #e8c840, #e87830, #d02020);
  }

  .cringe-emoji {
    font-size: 1.5em;
    text-align: center;
    margin-top: 6px;
    letter-spacing: 4px;

    font-size: 1em;
    border: 2px solid;
    border-radius: 8px;

  .btn-slaps {

  }

    color: #c03020;

    font-size: 0.9em;
    color: #8a7a60;
    margin-bottom: 16px;
    min-height: 1.2em;

    width: 100%;
    padding: 12px;
    font-family: 'IM Fell English', serif;
    font-size: 1em;
    background: transparent;
    border: 1px dashed #c9b890;
    border-radius: 8px;
    color: #8a7a60;
    cursor: pointer;
    transition: all 0.2s;

  .btn-share:hover { background: #f0e8d5; color: #5a4a30; }

  .share-feedback {
    text-align: center;
    font-size: 0.9em;
    color: #2a8a40;
    margin-top: 6px;
    min-height: 1.2em;

    width: 100%;
    padding: 12px;
    margin-top: 10px;
    font-family: 'IM Fell English', serif;
    font-size: 1em;
    background: transparent;
    border: 1px solid #c9b890;
    border-radius: 8px;
    color: #5a4a30;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-another:hover { background: #f0e8d5; }

  .hall-of-shame {
    margin-top: 30px;
    text-align: center;
  }

  .hall-of-shame h2 {
    font-size: 1.3em;
    color: #5a4a30;
    margin-bottom: 14px;
  }

  .shame-entry {
    background: #fff9ed;
    border: 1px solid #d4c5a0;
    border-radius: 8px;
    padding: 14px;
    margin-bottom: 10px;
    text-align: left;
    font-family: 'Caveat', cursive;
    font-size: 1.15em;
    color: #5a4a30;
  }

  .shame-rhyme {
    color: #a02020;
    font-weight: 700;
  }

  footer {
    text-align: center;
    color: #c9b890;
    font-size: 0.85em;
    margin-top: 40px;
    font-style: italic;
  }

  @media (max-width: 500px) {
    h1 { font-size: 2em; }
    .container { padding: 20px 14px 40px; }
    .input-area { padding: 18px; }
    .result-card { padding: 20px 16px; }
    .vote-section { flex-direction: column; gap: 8px; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="music-notes">&sharp;&flat;&sharp;&flat;</div>
    <h1>Worst Rhyme Finder</h1>

    <div id="shame-list"></div>
  </div>

  <footer>No melodies were harmed in the making of this tool. Only dignity.</footer>
</div>

// Fallback: ending-sound templates for words not in the map
const endingSoundMap = {
  'ove': ['my rubber glove', 'a shove from above', 'a cove full of mauve stuff'],
  'oo': ['expired shampoo', 'my left shoe', 'a kangaroo stew'],
  'ee': ['a flea on a spree', 'my HOA fee', 'a manatee'],
  'art': ['a grocery cart', 'a loud public fart', 'a broken Kmart'],
  'ight': ['fluorescent light', 'a termite fight', 'an expired Bud Light'],
  'ay': ['a bale of hay', 'expired sorbet', 'a confusing bidet'],
  'ime': ['a pantomime about slime', 'a tax-deductible crime', 'an aggressive wind chime'],
  'ire': ['a flat tire', 'a suspiciously cheap dryer', 'a liar on a high wire'],
  'ain': ['my bathroom drain', 'a migraine on a train', 'sustained lower back pain'],

  'ow': ['a cow having a row', 'my eyebrow somehow', 'a snowplow pow-wow'],
  'ound': ['a hound at the lost and found', 'a mound of compound', 'a background sound'],
  'ong': ['a gong at a sing-along', 'King Kong in a thong', 'a lifelong ding-dong'],

// Generic completions when nothing matches
const genericBadRhymes = [
  '...but then I stubbed my toe on a Lego.',
  '...and my cat just stared at me disapprovingly.',
  '...which is exactly what my dentist said.',
  '...according to my horoscope, and also my parole officer.',

  '...which honestly explains a lot about my credit score.',

];

const cringePrefixes = [
  'Barely Survived', 'Emotionally Damaged', 'Weapons-Grade Cringe',
  'Geneva Convention Violation', 'Lethal Dose of Cringe', 'Call An Ambulance',
  'Interpol Has Been Notified', 'My Ears Filed a Restraining Order',
  'A Crime Against Music', 'Permanently Unrecoverable'
];

function getLastWord(line) {
  const cleaned = line.replace(/[^a-zA-Z\s'-]/g, '').trim();
  const words = cleaned.split(/\s+/);
  return words[words.length - 1]?.toLowerCase() || '';
}

function getEndingSound(word) {
  if (!word) return null;
  // Try progressively shorter endings
  for (let len = Math.min(word.length, 4); len >= 2; len--) {
    const ending = word.slice(-len);
    if (endingSoundMap[ending]) return ending;
  }
  return null;
}

function pickRandom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function generateWorstRhyme(inputLine) {
  const lastWord = getLastWord(inputLine);

  // Check if line seems to end mid-phrase (trailing ...)
  const isOpenEnded = /\.{2,}$/.test(inputLine.trim()) || inputLine.trim().endsWith('...');
  const cleanInput = inputLine.replace(/\.{2,}$/, '').trim();

  let rhymeCompletion;
  let source = 'none';

  // 1. Direct word match
  if (rhymeMap[lastWord]) {
    rhymeCompletion = pickRandom(rhymeMap[lastWord]);
    source = 'direct';
  }

  // 2. Ending sound match
  if (!rhymeCompletion) {
    const ending = getEndingSound(lastWord);
    if (ending && endingSoundMap[ending]) {
      rhymeCompletion = pickRandom(endingSoundMap[ending]);
      source = 'ending';
    }
  }

  // 3. Generic fallback
  if (!rhymeCompletion) {
    rhymeCompletion = pickRandom(genericBadRhymes);
    source = 'generic';
  }

  // Build the output
  let prefix = isOpenEnded ? '...' : '\n';
  const fullRhyme = prefix + rhymeCompletion;

  // Cringe score: direct rhymes are worse because they technically rhyme
  let cringe = 60 + Math.floor(Math.random() * 35);
  if (source === 'generic') cringe = 40 + Math.floor(Math.random() * 30);

  return { rhyme: fullRhyme, cringe, source };
}

let currentRhyme = '';
let votes = { slaps: 0, kill: 0 };
let shameEntries = [];

function showResult() {
  const input = inputEl.value.trim();
  if (!input) return;

  currentInput = input;
  const result = generateWorstRhyme(input);
  currentRhyme = result.rhyme;

  // Reset votes for new rhyme
  votes = { slaps: 0, kill: 0 };
  btnSlaps.classList.remove('voted');
  btnKill.classList.remove('voted');
  voteCountsEl.textContent = '';
  shareFeedbackEl.textContent = '';

  // Display
  originalLineEl.textContent = currentInput;
  rhymeLineEl.textContent = currentRhyme;

  // Cringe meter
  const cringe = result.cringe;
  const levelIdx = Math.min(Math.floor(cringe / 10), cringePrefixes.length - 1);
  cringeLevelEl.textContent = cringe + '% - ' + cringePrefixes[levelIdx];

  cringeBarEl.style.width = '0%';
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      cringeBarEl.style.width = cringe + '%';
    });
  });

  // Emoji indicator
  const emojiSets = [':-|', ':-/', ':-S', '>_<', 'x_x'];
  const emojiIdx = Math.min(Math.floor(cringe / 20), emojiSets.length - 1);
  cringeEmojiEl.textContent = emojiSets[emojiIdx];

  resultCard.classList.add('visible');
  resultCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

btnFind.addEventListener('click', showResult);

inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    showResult();
  }
});

btnAnother.addEventListener('click', () => {
  // Add current to hall of shame
  if (currentInput && currentRhyme) {
    shameEntries.unshift({ input: currentInput, rhyme: currentRhyme });
    if (shameEntries.length > 5) shameEntries.pop();
    renderShame();
  }
  showResult();
});

function renderShame() {
  if (shameEntries.length === 0) {
    hallOfShame.style.display = 'none';
    return;
  }
  hallOfShame.style.display = 'block';
  shameList.innerHTML = shameEntries.map(e =>
    `<div class="shame-entry">"${e.input}" <span class="shame-rhyme">${e.rhyme}</span></div>`
  ).join('');
}

// Voting
btnSlaps.addEventListener('click', () => {
  if (btnSlaps.classList.contains('voted') || btnKill.classList.contains('voted')) return;
  votes.slaps++;
  btnSlaps.classList.add('voted');
  voteCountsEl.textContent = `Slaps: ${votes.slaps} | Kill: ${votes.kill}`;
});

btnKill.addEventListener('click', () => {
  if (btnSlaps.classList.contains('voted') || btnKill.classList.contains('voted')) return;
  votes.kill++;
  btnKill.classList.add('voted');
  voteCountsEl.textContent = `Slaps: ${votes.slaps} | Kill: ${votes.kill}`;
});

// Share
btnShare.addEventListener('click', async () => {
  const shareText = `${currentInput}\n${currentRhyme}\n\n-- Worst Rhyme Finder`;

  if (navigator.share) {
    try {
      await navigator.share({ title: 'Worst Rhyme Finder', text: shareText });
      shareFeedbackEl.textContent = 'Shared successfully (our condolences to the recipient)';
    } catch { /* cancelled */ }
  } else if (navigator.clipboard) {
    try {
      await navigator.clipboard.writeText(shareText);
      shareFeedbackEl.textContent = 'Copied to clipboard! Now inflict it on someone.';
    } catch {
      fallbackCopy(shareText);
    }
  } else {
    fallbackCopy(shareText);
  }
});

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  try {
    document.execCommand('copy');
    shareFeedbackEl.textContent = 'Copied to clipboard! Now inflict it on someone.';
  } catch {
    shareFeedbackEl.textContent = 'Could not copy. Select and copy manually.';
  }
  document.body.removeChild(ta);
}

// Pre-fill a fun example
inputEl.value = 'I will always love...';
</script>
