<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Niche Hater</title>
<style>body{margin:0;font-family:Inter,system-ui,sans-serif;background:#160d0d;color:#fff7f7}main{max-width:860px;margin:auto;padding:28px}a{color:#fca5a5;text-decoration:none}.card{background:#281515;border:1px solid #6b2121;border-radius:22px;padding:22px;margin-top:18px}.out{display:grid;gap:12px;margin-top:12px}.line{background:#180c0c;border-radius:16px;padding:14px;line-height:1.6}input,button{font:inherit}input{width:100%;background:#180c0c;border:1px solid #7f2d2d;color:#fff7f7;border-radius:14px;padding:12px}button{border:none;border-radius:14px;padding:12px 16px;font-weight:800;background:#ef4444;color:#300909;cursor:pointer;margin-top:12px}</style>
</head>
<body><main><a href="../">← Back</a><div class="card"><h1>Niche Hater</h1><p>Type any obsession. Receive three highly specific reasons a professional hater rejects it.</p><input id="input" value="pour-over coffee"><button id="go">Hate Precisely</button><div class="out" id="out"></div></div></main>
<script>
const frames=["This is just regular behavior wearing a lanyard.","At some point the hobby became a PowerPoint.","You are not enjoying it, you are administrating it.","This could have been simple, but branding got involved."];function render(){const t=input.value.trim();out.innerHTML=Array.from({length:3},(_,i)=>`<div class="line"><strong>Complaint ${i+1}</strong><br>${t} is unacceptable because ${frames[(t.length+i)%frames.length]}</div>`).join('')}go.onclick=render;render();
</script></body></html>
