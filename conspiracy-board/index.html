    left: 50%;

    color: #0f0;
    padding: 12px 24px;
    border-radius: 4px;
    border: 1px solid #0f0;
    font-family: 'Courier Prime', monospace;
    font-size: 0.85rem;
    z-index: 200;
    transition: transform 0.3s;
    pointer-events: none;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
</style>

    rating,
    caseName,
    date: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }),
  };

  cases.unshift(caseObj);
  saveCases();
  renderBoard();

  input.value = '';
  btn.disabled = false;

  // Read aloud in paranoid whisper
  speakTheory(theory);
}

function typewrite(el, text) {
  return new Promise((resolve) => {
    el.innerHTML = '';
    let i = 0;
    const speed = 25 + Math.random() * 15;
    const interval = setInterval(() => {
      el.innerHTML = text.slice(0, i) + '<span class="cursor">|</span>';
      i++;
      if (i > text.length) {
        clearInterval(interval);
        el.innerHTML = text;
        resolve();
      }
    }, speed);
  });
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

// ---- RENDER ----
function renderBoard() {
  const section = document.getElementById('board-section');
  const board = document.getElementById('board');
  const counter = document.getElementById('case-counter');

  if (cases.length === 0) {
    section.style.display = 'none';
    return;
  }

  section.style.display = '';
  counter.textContent = `${cases.length} CASE${cases.length !== 1 ? 'S' : ''} ON THE BOARD`;

  // Clear cards but keep SVG
  const svg = document.getElementById('string-layer');
  board.querySelectorAll('.case-card').forEach(c => c.remove());
  svg.innerHTML = '';

  cases.forEach((c, i) => {
    const card = document.createElement('div');
    card.className = 'case-card';
    card.style.setProperty('--rot', (Math.random() * 4 - 2).toFixed(1) + 'deg');
    card.dataset.id = c.id;
    card.innerHTML = `
      <div class="pin"></div>
      <div class="subject">CASE "${c.caseName}": ${c.subject}</div>
      <div class="theory">${c.theory}</div>
      <span class="evidence-rating ${c.rating.cls}">Evidence: ${c.rating.label}</span>
      <div class="card-footer">
        <span>${c.date}</span>
        <div class="card-actions">
          <button onclick="speakTheory(\`${c.theory.replace(/`/g, "'").replace(/\\/g, '\\\\')}\`)">WHISPER</button>
          <button onclick="shareCase(${c.id})">SHARE</button>
          <button onclick="deleteCase(${c.id})">REDACT</button>
        </div>
      </div>
    `;
    board.appendChild(card);
  });

  // Draw red strings between adjacent cards after layout
  requestAnimationFrame(() => drawStrings());
}

function drawStrings() {
  const svg = document.getElementById('string-layer');
  const cards = document.querySelectorAll('.case-card');
  if (cards.length < 2) return;

  const boardRect = document.getElementById('board').getBoundingClientRect();
  svg.setAttribute('width', boardRect.width);
  svg.setAttribute('height', boardRect.height);
  svg.style.width = boardRect.width + 'px';
  svg.style.height = boardRect.height + 'px';

  for (let i = 0; i < cards.length - 1; i++) {
    const a = cards[i].getBoundingClientRect();
    const b = cards[i + 1].getBoundingClientRect();
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', a.left + a.width / 2 - boardRect.left);
    line.setAttribute('y1', a.top + 10 - boardRect.top);
    line.setAttribute('x2', b.left + b.width / 2 - boardRect.left);
    line.setAttribute('y2', b.top + 10 - boardRect.top);
    svg.appendChild(line);
  }

  // Random extra strings for chaos
  if (cards.length > 2) {
    const extra = Math.min(cards.length - 1, 3);
    for (let n = 0; n < extra; n++) {
      const i = Math.floor(Math.random() * cards.length);
      let j = Math.floor(Math.random() * cards.length);
      if (i === j) j = (j + 1) % cards.length;
      const a = cards[i].getBoundingClientRect();
      const b = cards[j].getBoundingClientRect();
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', a.left + a.width * Math.random() - boardRect.left);
      line.setAttribute('y1', a.top + 10 - boardRect.top);
      line.setAttribute('x2', b.left + b.width * Math.random() - boardRect.left);
      line.setAttribute('y2', b.top + 10 - boardRect.top);
      line.style.opacity = '0.3';
      svg.appendChild(line);
    }
  }
}

window.addEventListener('resize', () => {
  if (cases.length > 0) {
    const svg = document.getElementById('string-layer');
    svg.innerHTML = '';
    requestAnimationFrame(() => drawStrings());
  }
});

// ---- ACTIONS ----
function deleteCase(id) {
  cases = cases.filter(c => c.id !== id);
  saveCases();
  renderBoard();
}

function clearBoard() {
  if (!confirm('Destroy all evidence? This cannot be undone.')) return;
  cases = [];
  saveCases();
  renderBoard();
}

function shareCase(id) {
  const c = cases.find(x => x.id === id);
  if (!c) return;
  const text = `CASE "${c.caseName}": ${c.subject}\n\n${c.theory}\n\nEvidence: ${c.rating.label}\n\n-- Generated by THE BOARD`;
  if (navigator.share) {
    navigator.share({ title: `CASE "${c.caseName}"`, text }).catch(() => {});
  } else {
    navigator.clipboard.writeText(text).then(() => showToast('Evidence copied to clipboard'));
  }
}

function speakTheory(text) {
  if (!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.rate = 0.75;
  utterance.pitch = 0.6;
  utterance.volume = 0.7;
  // Try to pick a deeper / quieter voice
  const voices = speechSynthesis.getVoices();
  const preferred = voices.find(v => /male/i.test(v.name) && !/female/i.test(v.name)) || voices[0];
  if (preferred) utterance.voice = preferred;
  speechSynthesis.speak(utterance);
}

// Preload voices
if ('speechSynthesis' in window) {
  speechSynthesis.getVoices();
  speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function saveCases() {
  localStorage.setItem('conspiracy_cases', JSON.stringify(cases));
}
</script>
