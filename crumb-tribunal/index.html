<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Crumb Tribunal</title><meta name="description" content="Judge the moral history of crumbs found on your desk or couch."><style>:root{--ink:#1f2937;--muted:#6b7280;--line:rgba(31,41,55,.12);--accent:#b45309;--accent2:#f97316}*{box-sizing:border-box}body{margin:0;font-family:"Avenir Next","Trebuchet MS",sans-serif;color:var(--ink);background:linear-gradient(180deg,#fffbeb,#fff7ed);padding:24px 18px 48px}.shell{max-width:1040px;margin:0 auto}.back{display:inline-block;margin-bottom:16px;color:var(--ink);text-decoration:none;font-weight:800}.hero,.grid,.row{display:grid;gap:18px}.hero{grid-template-columns:1.06fr .94fr;margin-bottom:18px}.grid{grid-template-columns:.95fr 1.05fr}.row{grid-template-columns:1fr 1fr;gap:12px}.panel{background:rgba(255,255,255,.86);border:1px solid rgba(255,255,255,.8);border-radius:28px;backdrop-filter:blur(14px)}.hero-copy,.controls,.results{padding:26px}.eyebrow{display:inline-block;padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.92);font-size:.74rem;letter-spacing:.08em;text-transform:uppercase;font-weight:800;color:var(--muted)}h1{font-size:clamp(2.45rem,5vw,4.1rem);line-height:.95;margin:16px 0 12px;letter-spacing:-.05em}p{color:var(--muted);line-height:1.6}label{display:block;font-weight:800;margin:14px 0 8px}select{width:100%;border:1px solid var(--line);border-radius:16px;padding:12px 14px;font:inherit;background:rgba(255,255,255,.92)}button{border:none;border-radius:999px;padding:12px 18px;font:inherit;font-weight:800;cursor:pointer}.primary{color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent2))}.secondary{background:rgba(31,41,55,.08);color:var(--ink);margin-left:10px}.card{background:rgba(255,255,255,.94);border:1px solid var(--line);border-radius:22px;padding:18px;margin-bottom:12px}.badge{display:inline-block;margin-bottom:10px;padding:7px 10px;border-radius:999px;background:rgba(180,83,9,.12);color:#b45309;font-size:.78rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em}.headline{font-size:1.32rem;font-weight:900;margin-bottom:8px}@media(max-width:900px){.hero,.grid,.row{grid-template-columns:1fr}.secondary{margin-left:0;margin-top:10px}}</style></head><body><div class="shell"><a class="back" href="../">← Back to Fun Builds</a><section class="hero"><div class="panel hero-copy"><div class="eyebrow">Crumb Tribunal</div><h1>The crumbs will be heard.</h1><p>Report the evidence and receive a formal ruling on whether the crumb field is innocent, negligent, or ethically indefensible.</p></div><div class="panel hero-copy"><p><strong>Good for:</strong> keyboards, couches, desks, and any area where snack history has become visible policy.</p></div></section><section class="grid"><div class="panel controls"><div class="row"><div><label for="site">Crumb site</label><select id="site"><option>desk</option><option>couch</option><option>keyboard</option><option>bed, unfortunately</option></select></div><div><label for="density">Density</label><select id="density"><option value="1">light</option><option value="3">noticeable</option><option value="5">cultural layer</option></select></div></div><label for="age">Likely age</label><select id="age"><option value="1">today</option><option value="3">unclear</option><option value="5">archaeological</option></select><div style="margin-top:16px"><button class="primary" id="judge">Judge crumbs</button><button class="secondary" id="confess">Confess everything</button></div></div><div class="panel results"><div id="out"></div></div></section></div><script>function render(){const score=Number(density.value)*8+Number(age.value)*7;const ruling=score>=72?'gross negligence':score>=48?'snack malpractice':score>=28?'minor crumb disorder':'administratively forgivable';out.innerHTML=`<div class="card"><div class="badge">Tribunal ruling</div><div class="headline">${ruling}</div><p>The ${site.value} shows ${density.selectedOptions[0].text} crumb density under ${age.selectedOptions[0].text} age conditions.</p></div><div class="card"><div class="badge">Sentence</div><p>Mandatory wipe-down, one public acknowledgment, and a future-snack containment plan are hereby ordered.</p></div><div class="card"><div class="badge">Notes</div><p>Excuses involving “just one bite” have already been entered into evidence and dismissed.</p></div>`}judge.onclick=render;confess.onclick=()=>{density.selectedIndex=2;age.selectedIndex=2;render()};render();</script></body></html>
