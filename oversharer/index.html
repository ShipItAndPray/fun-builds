<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Oversharer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, #fce4ec 0%, #e8eaf6 30%, #e0f7fa 60%, #fff9c4 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    color: #4a4a4a;
  }

  header {
    text-align: center;
    padding: 20px 16px 10px;
    width: 100%;
    max-width: 600px;
  }

  header h1 {
    font-size: 2rem;
    color: #e91e63;
    text-shadow: 1px 1px 0 #fff;
    margin-bottom: 4px;
  }

  header p {
    font-size: 0.85rem;
    color: #999;
    font-style: italic;
  }

  .controls {
    width: 100%;
    max-width: 600px;
    padding: 8px 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
    justify-content: center;
  }

  .controls label {
    font-size: 0.8rem;
    font-weight: 600;
    color: #7e57c2;
  }

  .controls select, .controls input[type="range"] {
    border: 2px solid #ce93d8;
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 0.85rem;
    background: #fff;
    color: #4a4a4a;
    outline: none;
  }

  .controls select:focus { border-color: #e91e63; }

  .tmi-slider-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .tmi-slider-wrap input[type="range"] {
    width: 100px;
    accent-color: #e91e63;
    border: none;
    padding: 0;
  }

  .tmi-label {
    font-size: 0.75rem;
    font-weight: 700;
    min-width: 52px;
    text-align: center;
    padding: 2px 6px;
    border-radius: 10px;
    background: #f8bbd0;
    color: #c62828;
  }

  .meter-wrap {
    width: 100%;
    max-width: 600px;
    padding: 4px 16px 8px;
  }

  .meter-bar {
    height: 14px;
    border-radius: 7px;
    background: #f3e5f5;
    overflow: hidden;
    border: 2px solid #ce93d8;
    position: relative;
  }

  .meter-fill {
    height: 100%;
    width: 0%;
    border-radius: 5px;
    background: linear-gradient(90deg, #f8bbd0, #e91e63, #d50000);
    transition: width 0.8s cubic-bezier(.4,0,.2,1);
  }

  .meter-label {
    font-size: 0.7rem;
    text-align: right;
    color: #e91e63;
    font-weight: 700;
    margin-top: 2px;
  }

  .chat-container {
    flex: 1;
    width: 100%;
    max-width: 600px;
    overflow-y: auto;
    padding: 8px 16px 120px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .msg {
    max-width: 85%;
    padding: 10px 14px;
    border-radius: 18px;
    font-size: 0.92rem;
    line-height: 1.45;
    animation: popIn 0.3s ease;
    word-wrap: break-word;
  }

  @keyframes popIn {
    from { opacity: 0; transform: translateY(8px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .msg.user {
    align-self: flex-end;
    background: #e8eaf6;
    border-bottom-right-radius: 4px;
    color: #3949ab;
  }

  .msg.bot {
    align-self: flex-start;
    background: #fff;
    border: 2px solid #f8bbd0;
    border-bottom-left-radius: 4px;
    color: #4a4a4a;
    position: relative;
  }

  .msg.bot .typing span {
    display: inline-block;
    width: 6px; height: 6px;
    background: #e91e63;
    border-radius: 50%;
    margin: 0 2px;
    animation: bounce 1.2s infinite;
  }
  .msg.bot .typing span:nth-child(2) { animation-delay: 0.2s; }
  .msg.bot .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%,80%,100% { transform: translateY(0); }
    40% { transform: translateY(-6px); }
  }

  .input-area {
    position: fixed;
    bottom: 0;
    width: 100%;
    max-width: 600px;
    padding: 10px 16px;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(8px);
    border-top: 2px solid #f8bbd0;
    display: flex;
    gap: 8px;
  }

  .input-area input {
    flex: 1;
    border: 2px solid #ce93d8;
    border-radius: 24px;
    padding: 10px 16px;
    font-size: 0.95rem;
    outline: none;
    background: #fce4ec20;
  }

  .input-area input:focus { border-color: #e91e63; }

  .input-area button {
    border: none;
    border-radius: 24px;
    padding: 10px 18px;
    font-weight: 700;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-send {
    background: linear-gradient(135deg, #e91e63, #ad1457);
    color: #fff;
  }
  .btn-send:hover { transform: scale(1.05); }
  .btn-send:active { transform: scale(0.95); }

  .btn-abort {
    background: #ff8a80;
    color: #fff;
    display: none;
    animation: shake 0.4s ease;
  }
  .btn-abort.show { display: block; }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    75% { transform: translateX(4px); }
  }

  .share-btn {
    position: fixed;
    top: 12px;
    right: 12px;
    background: linear-gradient(135deg, #ff6f00, #e65100);
    color: #fff;
    border: none;
    border-radius: 20px;
    padding: 8px 14px;
    font-size: 0.75rem;
    font-weight: 700;
    cursor: pointer;
    display: none;
    z-index: 10;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .share-btn.show { display: block; }
  .share-btn:hover { transform: scale(1.05); }

  .welcome {
    text-align: center;
    padding: 40px 20px;
    color: #999;
    font-style: italic;
    font-size: 0.9rem;
  }

  .nuclear-warning {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #d50000;
    color: #fff;
    padding: 24px 32px;
    border-radius: 16px;
    font-size: 1.2rem;
    font-weight: 700;
    text-align: center;
    z-index: 100;
    display: none;
    animation: flashWarn 0.5s ease;
    box-shadow: 0 8px 32px rgba(213,0,0,0.4);
  }

  @keyframes flashWarn {
    0% { opacity: 0; transform: translate(-50%,-50%) scale(0.5); }
    50% { transform: translate(-50%,-50%) scale(1.1); }
    100% { opacity: 1; transform: translate(-50%,-50%) scale(1); }
  }

  .toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: #4caf50;
    color: #fff;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 0.85rem;
    font-weight: 600;
    display: none;
    z-index: 100;
  }
</style>
</head>
<body>

<header>
  <h1>The Oversharer</h1>
  <p>Ask an innocent question. Receive way too much information.</p>
</header>

<div class="controls">
  <label>Who:</label>
  <select id="category">
    <option value="coworker">Coworker</option>
    <option value="date">Date</option>
    <option value="stranger">Stranger</option>
    <option value="family">Family</option>
  </select>
  <div class="tmi-slider-wrap">
    <label>TMI:</label>
    <input type="range" id="tmiSlider" min="1" max="5" value="3">
    <span class="tmi-label" id="tmiLabel">Spicy</span>
  </div>
</div>

<div class="meter-wrap">
  <div class="meter-bar"><div class="meter-fill" id="meterFill"></div></div>
  <div class="meter-label" id="meterLabel">Overshare Meter: 0%</div>
</div>

<div class="chat-container" id="chat">
  <div class="welcome">Type something normal like "How was your weekend?" and watch it go horribly wrong...</div>
</div>

<div class="input-area">
  <input type="text" id="userInput" placeholder="Ask something innocent..." autofocus>
  <button class="btn-send" id="sendBtn">Ask</button>
  <button class="btn-abort" id="abortBtn">TOO MUCH INFO!</button>
</div>

<button class="share-btn" id="shareBtn">Share Worst Overshare</button>
<div class="nuclear-warning" id="nuclearWarn">NUCLEAR OVERSHARE DETECTED</div>
<div class="toast" id="toast">Copied to clipboard!</div>

<script>

const TMI_COLORS = { 1: '#a5d6a7', 2: '#fff59d', 3: '#ffab91', 4: '#ef9a9a', 5: '#e53935' };

const tmiSlider = document.getElementById('tmiSlider');
const tmiLabel = document.getElementById('tmiLabel');
const meterFill = document.getElementById('meterFill');
const meterLabelEl = document.getElementById('meterLabel');
const chat = document.getElementById('chat');
const userInput = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const abortBtn = document.getElementById('abortBtn');
const shareBtn = document.getElementById('shareBtn');
const nuclearWarn = document.getElementById('nuclearWarn');
const toast = document.getElementById('toast');
const categorySelect = document.getElementById('category');

let overshareLevel = 0;
let worstOvershare = '';
let worstScore = 0;
let typing = false;
let aborted = false;

tmiSlider.addEventListener('input', () => {
  const v = +tmiSlider.value;
  tmiLabel.textContent = TMI_NAMES[v];
  tmiLabel.style.background = TMI_COLORS[v];
});

      "I'm not fighting with my sister, Mom. We just have 'differing perspectives.' Her perspective is that I'm a 'chaos agent who ruins every family gathering.' My perspective is that bringing a karaoke machine to Grandpa's wake was EXACTLY what he would have wanted. He loved 'Sweet Caroline.' We ALL know he loved it.",

    ],

      "Funny you should bring up the house, because I'm actually living with 4 roommates now. No wait, 5. One moved in this morning. I don't know her name. She just appeared in the kitchen making eggs and everyone acted like it was normal. I think she might be one of Jake's girlfriends. Or Jake's sister. Or both, honestly, with Jake.",

    ],
    5: [
      "So Mom, you know how you said 'call if you need anything'? Well, I need a lawyer, a new apartment, someone to explain NFTs to a police officer, and maybe a character witness who can convincingly argue that technically I didn't 'start' the fire, I 'facilitated rapid oxidation' near 'flammable materials' that the 'landlord should have stored properly.' Also my therapist quit. She said I was 'too much.' A THERAPIST said I was too much. I didn't even know they could DO that.",

      "Okay so I need everyone to stay calm but I accidentally became a licensed minister online and I married two people at a party last weekend and it MIGHT be legally binding and one of them already wants a divorce and they're asking ME to officiate the divorce too which I don't think is a thing but at this point nothing in my life is 'a thing' that follows normal rules."

};

const SUGGESTIONS = [
  "How was your weekend?",
  "What did you have for lunch?",
  "Nice weather today, huh?",
  "Did you do anything fun recently?",
  "How's it going?",
  "Read any good books lately?",
  "Any plans this weekend?",
  "How's work been?",
  "Do you have any pets?",
  "Seen any good shows?",
  "How are the kids?",
  "What's new with you?",
  "How was your vacation?",
  "Do anything for the holidays?"
];

function getTMI() { return +tmiSlider.value; }
function getCategory() { return categorySelect.value; }

function pickOvershare() {
  const cat = getCategory();
  const level = getTMI();
  const pool = TEMPLATES[cat][level];
  return pool[Math.floor(Math.random() * pool.length)];
}

function addMsg(text, cls) {
  const welcome = chat.querySelector('.welcome');
  if (welcome) welcome.remove();
  const div = document.createElement('div');
  div.className = 'msg ' + cls;
  div.innerHTML = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function updateMeter(amount) {
  overshareLevel = Math.min(100, overshareLevel + amount);
  meterFill.style.width = overshareLevel + '%';
  meterLabelEl.textContent = 'Overshare Meter: ' + Math.round(overshareLevel) + '%';
  if (overshareLevel >= 90) {
    meterLabelEl.textContent += ' CRITICAL';
    meterLabelEl.style.color = '#d50000';
  } else {
    meterLabelEl.style.color = '#e91e63';
  }
}

function typeText(el, text, speed) {
  return new Promise(resolve => {
    let i = 0;
    el.innerHTML = '';
    aborted = false;
    abortBtn.classList.add('show');

    function next() {
      if (aborted) {
        el.innerHTML = text.slice(0, i) + '<br><em style="color:#e91e63; font-weight:700;">[ CONVERSATION ABORTED - TMI LIMIT REACHED ]</em>';
        abortBtn.classList.remove('show');
        resolve();
        return;
      }
      if (i < text.length) {
        el.innerHTML = text.slice(0, i + 1) + '<span style="opacity:0.5">|</span>';
        i++;
        const delay = Math.max(8, speed - (getTMI() * 3));
        setTimeout(next, delay);
        if (i % 10 === 0) updateMeter(1.5);
        chat.scrollTop = chat.scrollHeight;
      } else {
        el.innerHTML = text;
        abortBtn.classList.remove('show');
        resolve();
      }
    }
    next();
  });
}

async function handleSend() {
  const text = userInput.value.trim();
  if (!text || typing) return;
  typing = true;
  sendBtn.disabled = true;
  userInput.value = '';

  addMsg(text, 'user');

  const botMsg = addMsg('<div class="typing"><span></span><span></span><span></span></div>', 'bot');

  await new Promise(r => setTimeout(r, 600 + Math.random() * 800));

  const overshare = pickOvershare();
  const tmi = getTMI();
  const meterIncrease = tmi * 8 + (overshare.length / 15);

  if (tmi === 5) {
    nuclearWarn.style.display = 'block';
    setTimeout(() => { nuclearWarn.style.display = 'none'; }, 1500);
  }

  await typeText(botMsg, overshare, 25);
  updateMeter(meterIncrease);

  const score = overshare.length * tmi;
  if (score > worstScore) {
    worstScore = score;
    worstOvershare = overshare;
    shareBtn.classList.add('show');
  }

  typing = false;
  sendBtn.disabled = false;
  userInput.focus();
}

sendBtn.addEventListener('click', handleSend);
userInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') handleSend();
});

abortBtn.addEventListener('click', () => { aborted = true; });

shareBtn.addEventListener('click', async () => {
  const shareText = 'My worst overshare (' + getCategory() + ', TMI: ' + TMI_NAMES[getTMI()] + '):\n\n"' + worstOvershare + '"\n\nFrom The Oversharer';
  try {
    if (navigator.share) {
      await navigator.share({ title: 'The Oversharer', text: shareText });
    } else {
      await navigator.clipboard.writeText(shareText);
      toast.style.display = 'block';
      setTimeout(() => { toast.style.display = 'none'; }, 2000);
    }
  } catch {
    try {
      await navigator.clipboard.writeText(shareText);
      toast.style.display = 'block';
      setTimeout(() => { toast.style.display = 'none'; }, 2000);
    } catch(e) {}
  }
});

let sugIdx = 0;
setInterval(() => {
  sugIdx = (sugIdx + 1) % SUGGESTIONS.length;
  userInput.placeholder = SUGGESTIONS[sugIdx];
}, 3000);
</script>
