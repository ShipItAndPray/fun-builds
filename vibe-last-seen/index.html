<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Vibe Last Seen</title>
<style>body{margin:0;font-family:Inter,system-ui,sans-serif;background:#08131a;color:#eefbff}main{max-width:900px;margin:auto;padding:28px}a{color:#67e8f9;text-decoration:none}.card{background:#0f1d26;border:1px solid #20414c;border-radius:22px;padding:22px;margin-top:18px}.grid{display:grid;gap:12px}.out{background:#0b171f;border-radius:16px;padding:14px;line-height:1.55}textarea,button{font:inherit}textarea{width:100%;min-height:130px;background:#0b171f;border:1px solid #28505d;color:#eefbff;border-radius:14px;padding:12px}button{border:none;border-radius:14px;padding:12px 16px;font-weight:800;background:#22d3ee;color:#082028;cursor:pointer;margin-top:12px}</style>
</head>
<body><main><a href="../">← Back</a><div class="card"><h1>Vibe Last Seen</h1><p>Paste a message. Get the emotional status light it leaves behind.</p><textarea id="input">“All good if not, just checking in!”</textarea><button id="go">Read Vibe</button></div><div class="card grid" id="out"></div></main>
<script>
const statuses=["green but trying too hard","yellow with hidden panic","blue and disappointingly polite","red but pretending to be chill","gray and spiritually buffering"];
function render(){const t=input.value.trim();const seed=[...t].reduce((a,c)=>a+c.charCodeAt(0),0);out.innerHTML=Array.from({length:4},(_,i)=>`<div class="out"><strong>Status ${i+1}</strong><br>This message reads as <strong>${statuses[(seed+i)%statuses.length]}</strong>. Subtext level: ${(seed*7+i)%89+10}%.</div>`).join('')}
go.onclick=render;render();
</script></body></html>
