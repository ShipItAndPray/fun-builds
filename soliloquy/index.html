<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soliloquy Generator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Cinzel:wght@400;700&family=IM+Fell+English+SC&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --curtain: #6b0f1a;
    --curtain-dark: #3d0a10;
    --gold: #d4a843;
    --gold-light: #f0d68a;
    --stage: #1a0a05;
    --wood: #2a1508;
    --parchment: #f5e6c8;
    --ink: #1a0a05;
  }

  body {
    min-height: 100vh;
    background: var(--stage);
    font-family: 'Playfair Display', serif;
    color: var(--parchment);
    overflow-x: hidden;
  }

  /* Theater frame */
  .theater {
    position: relative;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Curtain top valance */
  .valance {
    width: 100%;
    height: 60px;
    background: linear-gradient(180deg, var(--curtain-dark) 0%, var(--curtain) 40%, var(--curtain-dark) 100%);
    border-bottom: 4px solid var(--gold);
    position: relative;
    z-index: 10;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .valance::before, .valance::after {
    content: '';
    position: absolute;
    bottom: -20px;
    width: 80px;
    height: 20px;
    background: var(--curtain);
    border-radius: 0 0 50% 50%;
    border-bottom: 3px solid var(--gold);
  }
  .valance::before { left: 15%; }
  .valance::after { right: 15%; }
  .valance-center {
    position: absolute;
    bottom: -25px;
    width: 100px;
    height: 25px;
    background: var(--curtain);
    border-radius: 0 0 50% 50%;
    border-bottom: 3px solid var(--gold);
    left: 50%;
    transform: translateX(-50%);
  }

  /* Side curtains */
  .curtain-left, .curtain-right {
    position: fixed;
    top: 0;
    width: 60px;
    height: 100%;
    z-index: 5;
    pointer-events: none;
  }
  .curtain-left {
    left: 0;
    background: linear-gradient(90deg, var(--curtain-dark) 0%, var(--curtain) 60%, transparent 100%);
  }
  .curtain-right {
    right: 0;
    background: linear-gradient(270deg, var(--curtain-dark) 0%, var(--curtain) 60%, transparent 100%);
  }

  /* Stage floor */
  .stage-floor {
    position: fixed;
    bottom: 0;
    width: 100%;
    height: 40px;
    background: linear-gradient(180deg, var(--wood) 0%, #0d0604 100%);
    border-top: 3px solid var(--gold);
    z-index: 5;
    pointer-events: none;
  }

  /* Spotlight effect */
  .spotlight {
    position: fixed;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    height: 100%;
    background: radial-gradient(ellipse 50% 60% at 50% 30%, rgba(255,220,150,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 1;
  }

  /* Main content */
  .stage-content {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 700px;
    padding: 40px 20px 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  h1 {
    font-family: 'Cinzel', serif;
    font-size: 2.2rem;
    color: var(--gold);
    text-align: center;
    text-shadow: 0 0 20px rgba(212,168,67,0.3);
    margin-top: 30px;
    letter-spacing: 3px;
  }
  .subtitle {
    font-family: 'IM Fell English SC', serif;
    font-size: 0.95rem;
    color: var(--gold-light);
    opacity: 0.7;
    text-align: center;
    margin-top: -10px;
  }

  /* Input area */
  .input-section {
    width: 100%;
    background: rgba(245,230,200,0.06);
    border: 1px solid rgba(212,168,67,0.3);
    border-radius: 8px;
    padding: 20px;
  }
  .input-section label {
    display: block;
    font-family: 'Cinzel', serif;
    font-size: 0.85rem;
    color: var(--gold);
    margin-bottom: 8px;
    letter-spacing: 2px;
  }
  textarea {
    width: 100%;
    height: 80px;
    background: rgba(26,10,5,0.6);
    border: 1px solid rgba(212,168,67,0.2);
    border-radius: 6px;
    color: var(--parchment);
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    padding: 12px;
    resize: vertical;
    outline: none;
    transition: border-color 0.3s;
  }
  textarea:focus {
    border-color: var(--gold);
  }
  textarea::placeholder {
    color: rgba(245,230,200,0.3);
    font-style: italic;
  }

  /* Drama slider */
  .drama-section {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .drama-label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'Cinzel', serif;
    font-size: 0.8rem;
    color: var(--gold);
    letter-spacing: 2px;
  }
  .drama-value {
    font-family: 'Playfair Display', serif;
    font-size: 0.9rem;
    font-style: italic;
    color: var(--gold-light);
  }
  .slider-track {
    position: relative;
    width: 100%;
    height: 36px;
    display: flex;
    align-items: center;
  }
  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 6px;
    background: linear-gradient(90deg, rgba(212,168,67,0.2), rgba(212,168,67,0.6));
    border-radius: 3px;
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 24px;
    height: 24px;
    background: var(--gold);
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 0 10px rgba(212,168,67,0.5);
  }
  input[type="range"]::-moz-range-thumb {
    width: 24px;
    height: 24px;
    background: var(--gold);
    border-radius: 50%;
    cursor: pointer;
    border: none;
    box-shadow: 0 0 10px rgba(212,168,67,0.5);
  }
  .slider-labels {
    display: flex;
    justify-content: space-between;
    font-size: 0.7rem;
    color: rgba(245,230,200,0.4);
    margin-top: -4px;
  }

  /* Button */
  .transform-btn {
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    letter-spacing: 3px;
    padding: 14px 40px;
    background: linear-gradient(135deg, var(--curtain) 0%, var(--curtain-dark) 100%);
    color: var(--gold);
    border: 2px solid var(--gold);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.3s;
    text-transform: uppercase;
    position: relative;
    overflow: hidden;
  }
  .transform-btn:hover {
    background: linear-gradient(135deg, #8b1425 0%, var(--curtain) 100%);
    box-shadow: 0 0 20px rgba(212,168,67,0.3);
    transform: scale(1.02);
  }
  .transform-btn:active { transform: scale(0.98); }
  .transform-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }
  .transform-btn .quill {
    margin-right: 8px;
  }

  /* Output */
  .output-section {
    width: 100%;
    display: none;
    animation: fadeUp 0.8s ease;
  }
  .output-section.visible { display: block; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .parchment-scroll {
    background: linear-gradient(135deg, #f5e6c8 0%, #e8d5a8 50%, #f0dbb8 100%);
    border: 3px solid var(--gold);
    border-radius: 8px;
    padding: 30px 24px;
    position: relative;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5), inset 0 0 40px rgba(139,100,40,0.1);
  }
  .parchment-scroll::before {
    content: '';
    position: absolute;
    top: 8px; left: 8px; right: 8px; bottom: 8px;
    border: 1px solid rgba(139,100,40,0.2);
    border-radius: 4px;
    pointer-events: none;
  }
  .scroll-title {
    font-family: 'Cinzel', serif;
    font-size: 1.1rem;
    color: var(--ink);
    text-align: center;
    margin-bottom: 16px;
    letter-spacing: 2px;
  }
  .soliloquy-text {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    line-height: 1.8;
    color: var(--ink);
    font-style: italic;
    white-space: pre-wrap;
    min-height: 100px;
  }
  .soliloquy-text .highlight {
    background: rgba(212,168,67,0.2);
    padding: 0 2px;
    border-radius: 2px;
  }
  .act-direction {
    font-size: 0.85rem;
    color: #666;
    font-style: italic;
    text-align: center;
    margin-top: 12px;
  }

  /* Controls below output */
  .output-controls {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 16px;
  }
  .ctrl-btn {
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    letter-spacing: 1px;
    padding: 10px 18px;
    background: rgba(245,230,200,0.08);
    color: var(--gold);
    border: 1px solid rgba(212,168,67,0.3);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .ctrl-btn:hover {
    background: rgba(245,230,200,0.15);
    border-color: var(--gold);
  }
  .ctrl-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* Speaking indicator */
  .speaking-indicator {
    display: none;
    align-items: center;
    gap: 8px;
    color: var(--gold);
    font-size: 0.85rem;
    font-style: italic;
  }
  .speaking-indicator.active { display: flex; }
  .sound-waves {
    display: flex;
    gap: 2px;
    align-items: center;
  }
  .sound-waves span {
    display: block;
    width: 3px;
    background: var(--gold);
    border-radius: 2px;
    animation: wave 0.8s ease infinite;
  }
  .sound-waves span:nth-child(1) { height: 8px; animation-delay: 0s; }
  .sound-waves span:nth-child(2) { height: 14px; animation-delay: 0.1s; }
  .sound-waves span:nth-child(3) { height: 10px; animation-delay: 0.2s; }
  .sound-waves span:nth-child(4) { height: 16px; animation-delay: 0.3s; }
  .sound-waves span:nth-child(5) { height: 8px; animation-delay: 0.4s; }
  @keyframes wave {
    0%, 100% { transform: scaleY(1); }
    50% { transform: scaleY(0.4); }
  }

  /* Applause overlay */
  .applause-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 100;
    flex-direction: column;
    gap: 20px;
  }
  .applause-overlay.active {
    display: flex;
    animation: fadeIn 0.5s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  .applause-text {
    font-family: 'Cinzel', serif;
    font-size: 2.5rem;
    color: var(--gold);
    text-shadow: 0 0 30px rgba(212,168,67,0.5);
    animation: pulse 1s ease infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }
  .roses {
    font-size: 2rem;
    animation: rosesFall 2s ease infinite;
  }
  @keyframes rosesFall {
    0% { transform: translateY(-10px); opacity: 1; }
    100% { transform: translateY(10px); opacity: 0.7; }
  }
  .dismiss-applause {
    font-family: 'Cinzel', serif;
    padding: 10px 24px;
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold);
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.8rem;
    letter-spacing: 2px;
  }

  /* Examples */
  .examples-section {
    width: 100%;
  }
  .examples-label {
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    color: rgba(212,168,67,0.5);
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .examples-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .example-chip {
    font-family: 'Playfair Display', serif;
    font-size: 0.8rem;
    padding: 6px 14px;
    background: rgba(245,230,200,0.06);
    border: 1px solid rgba(212,168,67,0.15);
    border-radius: 20px;
    color: rgba(245,230,200,0.6);
    cursor: pointer;
    transition: all 0.3s;
    font-style: italic;
  }
  .example-chip:hover {
    background: rgba(245,230,200,0.12);
    border-color: rgba(212,168,67,0.4);
    color: var(--parchment);
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--curtain);
    color: var(--gold);
    padding: 10px 24px;
    border: 1px solid var(--gold);
    border-radius: 6px;
    font-family: 'Cinzel', serif;
    font-size: 0.8rem;
    letter-spacing: 1px;
    opacity: 0;
    transition: all 0.3s;
    z-index: 50;
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Mobile */
  @media (max-width: 600px) {
    h1 { font-size: 1.6rem; }
    .curtain-left, .curtain-right { width: 20px; }
    .stage-content { padding: 30px 16px 80px; }
    .parchment-scroll { padding: 20px 16px; }
    .output-controls { gap: 8px; }
    .ctrl-btn { padding: 8px 12px; font-size: 0.7rem; }
    .valance { height: 40px; }
    .applause-text { font-size: 1.8rem; }
  }
</style>
</head>
<body>
<div class="theater">
  <div class="valance">
    <div class="valance-center"></div>
  </div>
  <div class="curtain-left"></div>
  <div class="curtain-right"></div>
  <div class="spotlight"></div>
  <div class="stage-floor"></div>

  <div class="stage-content">
    <h1>The Soliloquy Generator</h1>
    <p class="subtitle">Transform thy mundane musings into theatrical grandeur</p>

    <div class="input-section">
      <label>Speak thy Grievance</label>
      <textarea id="userInput" placeholder="e.g. I can't find my keys..."></textarea>
    </div>

    <div class="drama-section">
      <div class="drama-label">
        <span>Drama Level</span>
        <span class="drama-value" id="dramaLabel">Theatrical</span>
      </div>
      <div class="slider-track">
        <input type="range" id="dramaSlider" min="1" max="5" value="3">
      </div>
      <div class="slider-labels">
        <span>Mild Concern</span>
        <span>Utter Despair</span>
      </div>
    </div>

    <button class="transform-btn" id="transformBtn" onclick="generateSoliloquy()">
      <span class="quill">&#9998;</span> Transform!
    </button>

    <div class="output-section" id="outputSection">
      <div class="parchment-scroll">
        <div class="scroll-title">~ A SOLILOQUY ~</div>
        <div class="soliloquy-text" id="soliloquyText"></div>
        <div class="act-direction" id="actDirection"></div>
      </div>
      <div class="speaking-indicator" id="speakingIndicator">
        <div class="sound-waves">
          <span></span><span></span><span></span><span></span><span></span>
        </div>
        <span>The player speaks...</span>
      </div>
      <div class="output-controls">
        <button class="ctrl-btn" id="speakBtn" onclick="speakSoliloquy()">&#127917; Perform</button>
        <button class="ctrl-btn" id="stopBtn" onclick="stopSpeaking()" style="display:none">&#9632; Cease</button>
        <button class="ctrl-btn" onclick="shareSoliloquy()">&#128220; Share</button>
        <button class="ctrl-btn" onclick="copySoliloquy()">&#128203; Copy</button>
        <button class="ctrl-btn" onclick="generateSoliloquy()">&#127922; Another!</button>
      </div>
    </div>

    <div class="examples-section">
      <div class="examples-label">Or try these mundane woes:</div>
      <div class="examples-grid" id="examplesGrid"></div>
    </div>
  </div>
</div>

<div class="applause-overlay" id="applauseOverlay">
  <div class="roses">&#127801; &#127801; &#127801;</div>
  <div class="applause-text">BRAVO!</div>
  <div class="roses">&#127801; &#127801; &#127801;</div>
  <button class="dismiss-applause" onclick="dismissApplause()">Take a bow</button>
</div>

<div class="toast" id="toast"></div>

<script>
// Drama level labels
const dramaLabels = {
  1: 'A Mild Concern',
  2: 'Somewhat Vexed',
  3: 'Theatrical',
  4: 'Operatic Despair',
  5: 'Existential Ruin'
};

document.getElementById('dramaSlider').addEventListener('input', e => {
  document.getElementById('dramaLabel').textContent = dramaLabels[e.target.value];
});

// Example inputs
const examples = [
  "I can't find my keys",
  "The WiFi is down",
  "My phone is at 2%",
  "I burned my toast",
  "Someone ate my lunch from the fridge",
  "I have a meeting in 5 minutes",
  "My coffee is cold",
  "I forgot my password",
  "The printer won't work",
  "Traffic is terrible today",
  "I stepped in a puddle",
  "My umbrella broke in the rain",
  "The elevator is broken",
  "I can't open this jar",
  "My headphones are tangled"
];

const grid = document.getElementById('examplesGrid');
examples.forEach(ex => {
  const chip = document.createElement('div');
  chip.className = 'example-chip';
  chip.textContent = ex;
  chip.onclick = () => {
    document.getElementById('userInput').value = ex;
    generateSoliloquy();
  };
  grid.appendChild(chip);
});

// ============================================================
// 50+ TRANSFORMATION TEMPLATES
// ============================================================
// Each template is a function: (subject, verb, object, original) => string
// Drama levels 1-5 control which templates get picked and extra embellishments

const templates = [
  // --- HAMLET STYLE ---
  (s,v,o,orig,d) =>
`To ${v}, or not to ${v} -- that is the question!
Whether 'tis nobler in the mind to suffer
The slings and arrows of outrageous ${o},
Or to take arms against a sea of ${o}s,
And by opposing, end them? To weep, to wail --
No more -- and by a wail to say we end
The heartache and the thousand natural shocks
That ${orig} is heir to.`,

  // --- MACBETH STYLE ---
  (s,v,o,orig,d) =>
`${o}! ${o}! ${o}!
Out, out, brief ${o}!
Life's but a walking shadow, a poor player
That struts and frets upon the stage
And then is heard no more. It is a tale
Told by an idiot, full of ${o} and fury,
Signifying nothing.
For I have looked upon the face of ${o},
And it hath looked back at me with cold disdain.`,

  // --- ROMEO STYLE ---
  (s,v,o,orig,d) =>
`But soft! What ${o} through yonder window breaks?
It is the east, and ${o} is the sun!
Arise, fair ${o}, and slay the envious moon,
Who is already sick and pale with grief
That thou, a ${o}, art far more cruel than she.
O ${o}, ${o}! Wherefore art thou, ${o}?
Deny thy nature and refuse thy name,
Or if thou wilt not, be but sworn my torment,
And I'll no longer be a ${s}.`,

  // --- RICHARD III ---
  (s,v,o,orig,d) =>
`Now is the winter of my discontent
Made glorious summer by this wretched ${o}!
And all the clouds that loured upon our house
Have not departed -- nay, they gather still!
A ${o}! A ${o}! My kingdom for relief from ${o}!
Was ever ${s} in this humour wooed?
Was ever ${s} in this humour won?
I that have neither joy nor peace of mind,
Am curtailed of this fair proportion,
Cheated of ${o} by dissembling nature.`,

  // --- OTHELLO ---
  (s,v,o,orig,d) =>
`O, beware, my lord, of ${o}!
It is the green-eyed monster which doth mock
The meat it feeds on. That ${s} who, poor soul,
Did suffer this, was blessed indeed,
For ${o} is a fate worse than the jealous cuckold's horns.
Put out the light, and then put out the light!
If I quench thee, thou flaming minister of ${o},
I can again thy former light restore
Should I repent me.`,

  // --- KING LEAR ---
  (s,v,o,orig,d) =>
`Blow, winds, and crack your cheeks! Rage! Blow!
You cataracts and hurricanoes, spout
Till you have drenched my very soul with ${o}!
You sulph'rous and thought-executing fires,
Vaunt-couriers of ${o}-cleaving thunderbolts,
Singe my white head! And thou, all-shaking ${o},
Strike flat the thick rotundity of the world!
I am a ${s} more sinned against than sinning.
Howl, howl, howl, howl! O, you are men of stones!`,

  // --- MERCHANT OF VENICE ---
  (s,v,o,orig,d) =>
`Hath not a ${s} eyes? Hath not a ${s} hands, organs,
Dimensions, senses, affections, passions?
Fed with the same food, hurt with the same ${o},
Subject to the same indignities?
If you prick us, do we not bleed?
If you ${v} us, do we not suffer?
If you poison us with ${o}, do we not die?
The quality of mercy is strained,
Most strained, when one cannot even ${v}
Without the universe conspiring against them.`,

  // --- MIDSUMMER NIGHT'S DREAM ---
  (s,v,o,orig,d) =>
`Lord, what fools these mortals be!
To think that one could simply ${v}
Without the merry pranks of Puck himself
Conspiring to turn ${o} to madness!
If we shadows have offended,
Think but this, and all is mended:
That you have but slumbered here
While ${o} did appear.
The course of true ${v}ing never did run smooth,
And lo, today proves that ancient truth.`,

  // --- TEMPEST ---
  (s,v,o,orig,d) =>
`We are such stuff as dreams are made on,
And our little life is rounded with a ${o}.
O brave new world, that has such ${o}s in it!
Full fathom five my patience lies;
Of its bones are coral made;
Those are pearls that were its eyes;
Nothing of it that doth fade,
But doth suffer a sea-change
Into something rich and strange.
Hell is empty, and all the ${o}s are here.`,

  // --- JULIUS CAESAR ---
  (s,v,o,orig,d) =>
`Friends, Romans, countrymen, lend me your ears!
I come to bury ${o}, not to praise it.
The evil that ${o} does lives after it;
The good is oft interred with its bones.

function parseInput(text) {
  const t = text.trim().replace(/[.!?]+$/, '');
  const lower = t.toLowerCase();

  const negatives = ["can't", "cannot", "won't", "couldn't", "shouldn't", "don't", "doesn't", "didn't", "isn't", "aren't", "wasn't", "weren't", "haven't", "hasn't"];

  const verbPatterns = [
    /(?:i |my |the |we )(?:can't|cannot|won't|couldn't|don't|doesn't|didn't) (\w+)\s*(.*)/i,
    /(?:i |my |the |we )(?:am|is|are|was|were) (\w+)\s*(.*)/i,
    /(?:i |my |the |we )(\w+(?:ed|ing|s)?)\s*(.*)/i,
    /(?:the |my |a )(\w+)\s+(?:is|are|was|were)\s+(.*)/i,

    if (m) {

  if (!object || object.length < 2) object = t;
  object = object.replace(/^(the |my |a |an |this |that |these |those )/i, '').trim();
  if (!object) object = t;

  // Truncate long objects
  if (object.length > 30) {
    const words = object.split(' ');
    object = words.slice(0, 4).join(' ');
  }

  // Capitalize first letter
  object = object.charAt(0).toUpperCase() + object.slice(1);

  return { subject, verb, object };
}

let currentSoliloquy = '';
let applauseAudioCtx = null;

function generateSoliloquy() {
  const input = document.getElementById('userInput').value.trim();
  if (!input) {
    showToast('Pray, speak thy grievance first!');
    return;
  }

  const drama = parseInt(document.getElementById('dramaSlider').value);
  const { subject, verb, object } = parseInput(input);

  // Pick random templates (more at higher drama)
  const count = Math.min(1 + Math.floor(drama / 2), 3);
  const used = new Set();
  let soliloquy = '';

  for (let i = 0; i < count; i++) {
    let idx;
    do { idx = Math.floor(Math.random() * templates.length); } while (used.has(idx));
    used.add(idx);

    const piece = templates[idx](subject, verb, object, input, drama);
    soliloquy += (i > 0 ? '\n\n' : '') + piece;
  }

  // Add drama-level embellishments
  const stageDirections = [
    '[The player pauses thoughtfully]',
    '[Clutches heart dramatically]',
    '[Falls to knees]',
    '[Tears garments asunder]',
    '[Collapses upon the stage, weeping]'
  ];

  const endings = [
    '\n\n[Exit, mildly concerned]',
    '\n\n[Exit, shaking fist at the heavens]',
    '\n\n[Exit, pursued by despair]',
    '\n\n[Exit, rending garments and howling at the moon]',
    '\n\n[Dies. Rises. Dies again. The curtain falls upon a scene of utter devastation.]'
  ];

  const direction = stageDirections[drama - 1];
  const ending = endings[drama - 1];

  currentSoliloquy = `${direction}\n\n${soliloquy}${ending}`;

  // Display with typewriter effect
  const textEl = document.getElementById('soliloquyText');
  const outputSection = document.getElementById('outputSection');
  outputSection.classList.add('visible');
  textEl.textContent = '';
  document.getElementById('actDirection').textContent = '';

  // Scroll to output
  outputSection.scrollIntoView({ behavior: 'smooth', block: 'start' });

  let charIdx = 0;
  const speed = Math.max(8, 30 - (drama * 4));

  function typeChar() {
    if (charIdx < currentSoliloquy.length) {
      textEl.textContent += currentSoliloquy[charIdx];
      charIdx++;
      setTimeout(typeChar, speed);
    }
  }
  typeChar();
}

// Speech synthesis
let currentUtterance = null;

function speakSoliloquy() {
  if (!currentSoliloquy) return;
  if (!('speechSynthesis' in window)) {
    showToast('Alas, thy browser lacks the gift of speech!');
    return;
  }

  stopSpeaking();

  const utterance = new SpeechSynthesisUtterance(currentSoliloquy);
  const drama = parseInt(document.getElementById('dramaSlider').value);

  // Theatrical voice settings based on drama level
  utterance.rate = Math.max(0.6, 1.0 - (drama * 0.08));
  utterance.pitch = 0.8 + (drama * 0.1);
  utterance.volume = 0.7 + (drama * 0.06);

  // Try to find an English voice
  const voices = speechSynthesis.getVoices();
  const preferred = voices.find(v => v.lang.startsWith('en') && v.name.includes('Daniel')) ||
                    voices.find(v => v.lang.startsWith('en-GB')) ||
                    voices.find(v => v.lang.startsWith('en'));
  if (preferred) utterance.voice = preferred;

  utterance.onstart = () => {
    document.getElementById('speakBtn').style.display = 'none';
    document.getElementById('stopBtn').style.display = 'flex';
    document.getElementById('speakingIndicator').classList.add('active');
  };

  utterance.onend = () => {
    document.getElementById('speakBtn').style.display = 'flex';
    document.getElementById('stopBtn').style.display = 'none';
    document.getElementById('speakingIndicator').classList.remove('active');
    triggerApplause();
  };

  utterance.onerror = () => {
    document.getElementById('speakBtn').style.display = 'flex';
    document.getElementById('stopBtn').style.display = 'none';
    document.getElementById('speakingIndicator').classList.remove('active');
  };

  currentUtterance = utterance;
  speechSynthesis.speak(utterance);
}

function stopSpeaking() {
  speechSynthesis.cancel();
  document.getElementById('speakBtn').style.display = 'flex';
  document.getElementById('stopBtn').style.display = 'none';
  document.getElementById('speakingIndicator').classList.remove('active');
}

// Applause sound using Web Audio API
function triggerApplause() {
  const overlay = document.getElementById('applauseOverlay');
  overlay.classList.add('active');

  // Generate applause-like noise
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    applauseAudioCtx = ctx;
    const duration = 3;
    const sampleRate = ctx.sampleRate;
    const bufferSize = sampleRate * duration;
    const buffer = ctx.createBuffer(2, bufferSize, sampleRate);

    for (let ch = 0; ch < 2; ch++) {
      const data = buffer.getChannelData(ch);
      for (let i = 0; i < bufferSize; i++) {
        const t = i / sampleRate;
        // Layered noise bursts to simulate clapping
        let sample = 0;
        // Random clap bursts
        const burstRate = 12 + Math.random() * 8;
        const burstPhase = (t * burstRate) % 1;
        if (burstPhase < 0.15) {
          sample = (Math.random() * 2 - 1) * 0.6;
        }
        // Add crowd ambience
        sample += (Math.random() * 2 - 1) * 0.15;
        // Envelope: fade in then fade out
        const env = t < 0.3 ? t / 0.3 : t > (duration - 0.8) ? (duration - t) / 0.8 : 1;
        data[i] = sample * env * 0.5;
      }
    }

    // Bandpass filter for more realistic sound
    const source = ctx.createBufferSource();
    source.buffer = buffer;
    const filter = ctx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 2000;
    filter.Q.value = 0.5;
    const gain = ctx.createGain();
    gain.gain.value = 0.6;
    source.connect(filter);
    filter.connect(gain);
    gain.connect(ctx.destination);
    source.start();
    source.onended = () => ctx.close();
  } catch (e) {
    // Audio not supported, visual only
  }
}

function dismissApplause() {
  document.getElementById('applauseOverlay').classList.remove('active');
  if (applauseAudioCtx && applauseAudioCtx.state !== 'closed') {
    applauseAudioCtx.close();
  }
}

// Share
function shareSoliloquy() {
  if (!currentSoliloquy) return;

  if (navigator.share) {
    navigator.share({
      title: 'A Soliloquy Most Grand',
      text: currentSoliloquy
    }).catch(() => copySoliloquy());
  } else {
    copySoliloquy();
  }
}

function copySoliloquy() {
  if (!currentSoliloquy) return;
  navigator.clipboard.writeText(currentSoliloquy).then(() => {
    showToast('Soliloquy copied to thy clipboard!');
  }).catch(() => {
    showToast('Alas, the clipboard resists!');
  });
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

// Pre-load voices
if ('speechSynthesis' in window) {
  speechSynthesis.getVoices();
  speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
}
