<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Desk Crumb Cartographer</title><meta name="description" content="Map the tiny civilization of crumbs on your desk and classify its dominant provinces."><style>:root{--ink:#1f2937;--muted:#6b7280;--line:rgba(31,41,55,.12);--accent:#92400e;--accent2:#d97706}*{box-sizing:border-box}body{margin:0;font-family:"Avenir Next","Trebuchet MS",sans-serif;color:var(--ink);background:linear-gradient(180deg,#fffbeb,#fff7ed);padding:24px 18px 48px}.shell{max-width:1040px;margin:0 auto}.back{display:inline-block;margin-bottom:16px;color:var(--ink);text-decoration:none;font-weight:800}.hero,.grid{display:grid;gap:18px}.hero{grid-template-columns:1.06fr .94fr;margin-bottom:18px}.grid{grid-template-columns:.95fr 1.05fr}.panel{background:rgba(255,255,255,.86);border:1px solid rgba(255,255,255,.8);border-radius:28px;backdrop-filter:blur(14px)}.hero-copy,.controls,.results{padding:26px}.eyebrow{display:inline-block;padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.92);font-size:.74rem;letter-spacing:.08em;text-transform:uppercase;font-weight:800;color:var(--muted)}h1{font-size:clamp(2.45rem,5vw,4.1rem);line-height:.95;margin:16px 0 12px;letter-spacing:-.05em}p{color:var(--muted);line-height:1.6}label{display:block;font-weight:800;margin:14px 0 8px}select{width:100%;border:1px solid var(--line);border-radius:16px;padding:12px 14px;font:inherit;background:rgba(255,255,255,.92)}button{border:none;border-radius:999px;padding:12px 18px;font:inherit;font-weight:800;cursor:pointer}.primary{color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent2))}.map{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}.tile{padding:24px 8px;border-radius:18px;background:rgba(146,64,14,.08);text-align:center;font-weight:800}.card{background:rgba(255,255,255,.94);border:1px solid var(--line);border-radius:22px;padding:18px}.badge{display:inline-block;margin-bottom:10px;padding:7px 10px;border-radius:999px;background:rgba(146,64,14,.12);color:#92400e;font-size:.78rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em}.headline{font-size:1.32rem;font-weight:900;margin-bottom:8px}@media(max-width:900px){.hero,.grid,.map{grid-template-columns:1fr}}</style></head><body><div class="shell"><a class="back" href="../">← Back to Fun Builds</a><section class="hero"><div class="panel hero-copy"><div class="eyebrow">Desk Crumb Cartographer</div><h1>Map the snack provinces.</h1><p>Choose the desk conditions and produce an unnecessary geographic survey of crumb settlements, hazards, and border tensions.</p></div><div class="panel hero-copy"><p><strong>Output:</strong> a crumb map with named regions and one recommended cleanup campaign.</p></div></section><section class="grid"><div class="panel controls"><label for="origin">Primary crumb source</label><select id="origin"><option>chips</option><option>cookie fragments</option><option>crackers</option><option>mystery keyboard dust</option></select><label for="spread">Spread level</label><select id="spread"><option value="1">contained</option><option value="3">regional</option><option value="5">continental drift</option></select><div style="margin-top:16px"><button class="primary" id="mapIt">Draw map</button></div></div><div class="panel results"><div class="map" id="map"></div><div class="card" id="out"></div></div></section></div><script>function render(){const names=['Upper Crumbia','Keyboard Steppe','Mug Coast','Trackpad Ridge','Snack Delta','Cable Wastes'];map.innerHTML=names.slice(0,6).map((n)=>`<div class="tile">${n}</div>`).join('');out.innerHTML=`<div class="badge">Survey report</div><div class="headline">${origin.value} province map</div><p>Spread has reached ${spread.selectedOptions[0].text} levels. The densest settlement is near the area you swore was “not that bad.”</p><p>Recommended campaign: one wipe, one upside-down keyboard shake, and a constitutional ban on desk-side grazing for six minutes.</p>`}mapIt.onclick=render;render();</script></body></html>
