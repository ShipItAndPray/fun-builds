<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Bottle Cap Destiny Wheel</title><meta name="description" content="Turn opening a drink into a prophecy engine with tiny rewards and warnings."><style>
:root{--ink:#1f2937;--muted:#6b7280;--line:rgba(31,41,55,.12);--accent:#0f766e;--accent2:#f59e0b}*{box-sizing:border-box}body{margin:0;font-family:"Avenir Next","Trebuchet MS",sans-serif;color:var(--ink);background:linear-gradient(180deg,#ecfeff,#fff7ed);padding:24px 18px 48px}.shell{max-width:1040px;margin:0 auto}.back{display:inline-block;margin-bottom:16px;color:var(--ink);text-decoration:none;font-weight:800}.hero,.grid,.row{display:grid;gap:18px}.hero{grid-template-columns:1.06fr .94fr;margin-bottom:18px}.grid{grid-template-columns:.95fr 1.05fr}.panel{background:rgba(255,255,255,.86);border:1px solid rgba(255,255,255,.8);border-radius:28px;backdrop-filter:blur(14px);box-shadow:0 22px 60px rgba(15,118,110,.1)}.hero-copy,.controls,.results{padding:26px}.eyebrow{display:inline-block;padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.92);font-size:.74rem;letter-spacing:.08em;text-transform:uppercase;font-weight:800;color:var(--muted)}h1{font-size:clamp(2.45rem,5vw,4.1rem);line-height:.95;margin:16px 0 12px;letter-spacing:-.05em}p{color:var(--muted);line-height:1.6}label{display:block;font-weight:800;margin:14px 0 8px}select{width:100%;border:1px solid var(--line);border-radius:16px;padding:12px 14px;font:inherit;background:rgba(255,255,255,.92)}button{border:none;border-radius:999px;padding:12px 18px;font:inherit;font-weight:800;cursor:pointer}.primary{color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent2))}.wheel{height:240px;border-radius:50%;background:conic-gradient(#0f766e 0 25%,#f59e0b 25% 50%,#0ea5e9 50% 75%,#a855f7 75% 100%);display:grid;place-items:center;color:#fff;font-weight:900;font-size:1.8rem;margin-bottom:14px}.card{background:rgba(255,255,255,.94);border:1px solid var(--line);border-radius:22px;padding:18px}.badge{display:inline-block;margin-bottom:10px;padding:7px 10px;border-radius:999px;background:rgba(15,118,110,.12);color:#0f766e;font-size:.78rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em}.headline{font-size:1.32rem;font-weight:900;margin-bottom:8px}@media(max-width:900px){.hero,.grid{grid-template-columns:1fr}}
</style></head><body><div class="shell"><a class="back" href="../">← Back to Fun Builds</a><section class="hero"><div class="panel hero-copy"><div class="eyebrow">Bottle Cap Destiny Wheel</div><h1>Every cap opens a minor fate.</h1><p>Choose the drink mood and spin a prophecy wheel for tiny omens, rewards, and warnings.</p></div><div class="panel hero-copy"><p><strong>Use when:</strong> you want hydration with an unnecessary sense of destiny.</p></div></section><section class="grid"><div class="panel controls"><label for="drink">Drink</label><select id="drink"><option>sparkling water</option><option>soda</option><option>cold brew</option><option>mysterious fridge beverage</option></select><label for="mood">Current vibe</label><select id="mood"><option value="0">steady</option><option value="1">hopeful</option><option value="2">chaotic</option><option value="3">overthinking</option></select><div style="margin-top:16px"><button class="primary" id="spin">Spin destiny</button></div></div><div class="panel results"><div class="wheel" id="wheel">SPIN</div><div class="card" id="out"></div></div></section></div><script>
const outcomes=['An easy win is nearby.','Do not text first today.','You may buy the snack.','Avoid dramatic shortcuts.','A small compliment is coming.','Stall one impulsive decision.','Trust the boring option.','Proceed with tiny swagger.'];
function render(){const i=(Math.floor(Math.random()*outcomes.length)+Number(mood.value))%outcomes.length;wheel.style.transform=`rotate(${i*45+720}deg)`;out.innerHTML=`<div class="badge">Prophecy</div><div class="headline">${drink.value}</div><p>${outcomes[i]}</p><p>Cap note: this omen was issued under ${mood.selectedOptions[0].text} conditions.</p>`}
spin.onclick=render;render();
</script></body></html>
