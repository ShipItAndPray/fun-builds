    font-family: 'Righteous', cursive;
    min-height: 100vh;
    overflow-x: hidden;
    color: #fff;
    background: #1a0a2e;
  }

    position: fixed;
    inset: 0;
    z-index: -1;
    background:

      radial-gradient(ellipse at 80% 20%, rgba(120, 0, 255, 0.3) 0%, transparent 50%),

    animation: bgShift 12s ease-in-out infinite alternate;
  }

  @keyframes bgShift {
    0% { filter: hue-rotate(0deg); }
    50% { filter: hue-rotate(30deg); }
    100% { filter: hue-rotate(-20deg); }
  }

  .container {
    max-width: 480px;
    margin: 0 auto;
    padding: 20px;
    text-align: center;
    position: relative;
  }

  h1 {
    font-family: 'Pacifico', cursive;
    font-size: 2.4em;
    background: linear-gradient(90deg, #ff6ec7, #ffd700, #7fff00, #00ffff, #ff6ec7);
    background-size: 300% 100%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: rainbowText 4s linear infinite;
    margin-bottom: 5px;
    text-shadow: none;
    filter: drop-shadow(0 0 10px rgba(255, 110, 199, 0.5));
  }

  @keyframes rainbowText {
    0% { background-position: 0% 50%; }
    100% { background-position: 300% 50%; }
  }

  .subtitle {
    font-family: 'Permanent Marker', cursive;
    font-size: 0.9em;
    color: rgba(255,255,255,0.6);
    margin-bottom: 20px;
    letter-spacing: 2px;
  }

  /* Camera viewport */
  .camera-wrapper {
    position: relative;
    width: 280px;
    height: 280px;
    margin: 0 auto 20px;
    border-radius: 50%;
    overflow: hidden;
    border: 4px solid rgba(255,255,255,0.2);
    box-shadow: 0 0 30px rgba(128, 0, 255, 0.4), inset 0 0 20px rgba(0,0,0,0.3);
  }

  #video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
    display: block;
  }

  #canvas {
    display: none;
  }

  /* Aura scan rings overlay */
  .scan-rings {
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.5s;
  }

  .scan-rings.active {
    opacity: 1;
  }

  .scan-ring {
    position: absolute;
    border-radius: 50%;
    border: 3px solid transparent;
    animation: none;
  }

  .scan-rings.active .scan-ring {
    animation: ringPulse 2s ease-in-out infinite;
  }

  .scan-ring:nth-child(1) {
    inset: 5%; border-color: rgba(255, 0, 0, 0.6);
    animation-delay: 0s !important;
  }
  .scan-ring:nth-child(2) {
    inset: 12%; border-color: rgba(255, 165, 0, 0.6);
    animation-delay: 0.15s !important;
  }
  .scan-ring:nth-child(3) {
    inset: 19%; border-color: rgba(255, 255, 0, 0.6);
    animation-delay: 0.3s !important;
  }
  .scan-ring:nth-child(4) {
    inset: 26%; border-color: rgba(0, 255, 0, 0.6);
    animation-delay: 0.45s !important;
  }
  .scan-ring:nth-child(5) {
    inset: 33%; border-color: rgba(0, 128, 255, 0.6);
    animation-delay: 0.6s !important;
  }
  .scan-ring:nth-child(6) {
    inset: 40%; border-color: rgba(128, 0, 255, 0.6);
    animation-delay: 0.75s !important;
  }
  .scan-ring:nth-child(7) {
    inset: 47%; border-color: rgba(255, 0, 255, 0.6);
    animation-delay: 0.9s !important;
  }

  @keyframes ringPulse {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.05); }
  }

  /* Scan line */
  .scan-line {
    position: absolute;
    left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, rgba(0,255,200,0.8), transparent);
    box-shadow: 0 0 15px rgba(0,255,200,0.6);
    opacity: 0;
    top: 0;
  }

  .scan-rings.active .scan-line {
    opacity: 1;
    animation: scanDown 1.5s ease-in-out infinite;
  }

  @keyframes scanDown {
    0% { top: 10%; }
    100% { top: 90%; }
  }

  /* Buttons */
  .btn {
    display: inline-block;
    padding: 14px 36px;
    border: none;
    border-radius: 50px;
    font-family: 'Righteous', cursive;
    font-size: 1.1em;
    cursor: pointer;
    transition: all 0.3s;
    text-transform: uppercase;
    letter-spacing: 2px;
    position: relative;
    overflow: hidden;
  }

  .btn-scan {
    background: linear-gradient(135deg, #ff6ec7, #7873f5);
    color: white;
    box-shadow: 0 4px 20px rgba(255, 110, 199, 0.4);
  }

  .btn-scan:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 30px rgba(255, 110, 199, 0.6);
  }

  .btn-scan:active {
    transform: translateY(0);
  }

  .btn-scan:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  .btn-scan::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    transform: translateX(-100%);
    animation: shimmer 2s infinite;
  }

  @keyframes shimmer {
    100% { transform: translateX(100%); }
  }

  /* Status text */
  .status {
    font-size: 0.85em;
    color: rgba(255,255,255,0.5);
    margin-top: 10px;
    min-height: 1.2em;
  }

  /* Result card */
  .result-card {
    display: none;
    margin-top: 25px;
    padding: 30px 20px;
    border-radius: 24px;
    background: rgba(255,255,255,0.07);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);

  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .aura-label {
    font-family: 'Permanent Marker', cursive;
    font-size: 0.75em;
    color: rgba(255,255,255,0.5);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  /* Mood ring animation */

    width: 160px;
    height: 160px;
    border-radius: 50%;
    margin: 10px auto 20px;
    position: relative;
    transition: all 1s ease;

  .mood-ring-display .ring-outer {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 8px solid;
    animation: ringGlow 2s ease-in-out infinite alternate;
  }

  .mood-ring-display .ring-inner {
    position: absolute;
    inset: 15px;
    border-radius: 50%;
    border: 5px solid;
    animation: ringGlow 2s ease-in-out 0.5s infinite alternate;
  }

  .mood-ring-display .ring-core {
    position: absolute;
    inset: 30px;
    border-radius: 50%;
    animation: coreGlow 3s ease-in-out infinite alternate;
  }

  @keyframes ringGlow {
    0% { opacity: 0.6; filter: brightness(0.8); }
    100% { opacity: 1; filter: brightness(1.3); }
  }

  @keyframes coreGlow {
    0% { opacity: 0.8; transform: scale(0.95); }
    100% { opacity: 1; transform: scale(1.05); }
  }

  .mood-name {
    font-family: 'Pacifico', cursive;
    font-size: 1.8em;
    margin-bottom: 5px;
  }

  .mood-meaning {
    font-size: 0.9em;
    color: rgba(255,255,255,0.7);
    margin-bottom: 20px;

    background: rgba(0,0,0,0.2);
    border-radius: 16px;
    padding: 20px;
    margin: 15px 0;
    border-left: 4px solid;

    inset: 0;
    z-index: -1;

    height: 2px;

    width: 80%;
    height: 6px;
    margin: 10px auto;
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
    overflow: hidden;

  .progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #ff6ec7, #7873f5, #00ffff);
    border-radius: 3px;
    transition: width 0.3s;

  .scan-step {
    font-size: 0.8em;
    color: rgba(255,255,255,0.6);
    font-style: italic;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: rgba(0,0,0,0.8);
    color: white;
    padding: 12px 24px;
    border-radius: 30px;
    font-family: 'Righteous', cursive;
    font-size: 0.85em;
    transition: transform 0.3s ease;
    z-index: 999;
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
  }

  /* No camera fallback styling */
  .camera-wrapper.no-camera {
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle, rgba(128,0,255,0.2), rgba(0,0,0,0.4));
  }

  .no-camera-icon {
    font-size: 4em;
    opacity: 0.5;
  }
</style>

    star.style.animationDuration = (2 + Math.random() * 3) + 's';
    star.style.width = star.style.height = (1 + Math.random() * 2) + 'px';
    container.appendChild(star);
  }
}

createStars();

// Initialize camera
async function initCamera() {
  const video = document.getElementById('video');
  const status = document.getElementById('status');

  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 480 }, height: { ideal: 480 } }
    });
    video.srcObject = stream;
    status.textContent = 'Camera ready. Let the cosmos see you.';

    // Initialize MediaPipe Face Mesh
    initFaceMesh();
  } catch (err) {
    console.log('Camera error:', err);
    status.textContent = 'No camera? No problem. We will read your digital aura.';
    const wrapper = document.getElementById('cameraWrapper');
    wrapper.classList.add('no-camera');
    wrapper.innerHTML = '<div class="no-camera-icon">&#10024;</div>';
  }
}

function initFaceMesh() {
  try {
    faceMesh = new FaceMesh({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
    });

    faceMesh.setOptions({
      maxNumFaces: 1,
      refineLandmarks: false,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });

    faceMesh.onResults(onFaceMeshResults);

    // Use MediaPipe Camera utility
    const videoEl = document.getElementById('video');
    camera = new Camera(videoEl, {
      onFrame: async () => {
        if (faceMesh) {
          await faceMesh.send({ image: videoEl });
        }
      },
      width: 480,
      height: 480
    });
    camera.start();
  } catch (e) {
    console.log('MediaPipe init error:', e);
  }
}

function onFaceMeshResults(results) {
  faceDetected = results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0;
}

// Generate mood from face landmarks (pseudo-biometric)
function generateMoodFromFace() {
  // Use current timestamp + random for variety, seeded by detection state
  const now = Date.now();
  const seed = now ^ (faceDetected ? 42 : 7);
  const index = Math.abs(seed) % MOOD_KEYS.length;
  return MOOD_KEYS[index];
}

// Scan steps for the fake aura scan
const SCAN_STEPS = [
  'Calibrating aura sensors...',
  'Detecting electromagnetic field...',
  'Reading chakra frequencies...',
  'Analyzing emotional wavelengths...',
  'Mapping spiritual resonance...',
  'Decoding cosmic vibrations...',
  'Channeling astral energy...',
  'Consulting the universe...',
  'Crystallizing your reading...'
];

async function startScan() {
  const scanBtn = document.getElementById('scanBtn');
  const scanRings = document.getElementById('scanRings');
  const scanProgress = document.getElementById('scanProgress');
  const progressFill = document.getElementById('progressFill');
  const scanStep = document.getElementById('scanStep');
  const resultCard = document.getElementById('resultCard');

  scanBtn.disabled = true;
  resultCard.classList.remove('show');
  scanRings.classList.add('active');
  scanProgress.classList.add('active');
  progressFill.style.width = '0%';

  // Animate through scan steps
  for (let i = 0; i < SCAN_STEPS.length; i++) {
    scanStep.textContent = SCAN_STEPS[i];
    progressFill.style.width = ((i + 1) / SCAN_STEPS.length * 100) + '%';
    await sleep(400 + Math.random() * 300);
  }

  // Final flash
  scanStep.textContent = 'Aura captured!';
  progressFill.style.width = '100%';
  await sleep(500);

  // Determine mood
  const moodKey = generateMoodFromFace();
  currentMood = { key: moodKey, ...MOODS[moodKey] };
  const prophecy = currentMood.prophecies[Math.floor(Math.random() * currentMood.prophecies.length)];

  // Hide scan UI
  scanRings.classList.remove('active');
  scanProgress.classList.remove('active');
  scanBtn.disabled = false;

  // Show result
  showResult(currentMood, prophecy);
}

function showResult(mood, prophecy) {
  const resultCard = document.getElementById('resultCard');
  const moodRing = document.getElementById('moodRingDisplay');
  const moodName = document.getElementById('moodName');
  const moodMeaning = document.getElementById('moodMeaning');
  const prophecyText = document.getElementById('prophecyText');
  const prophecyBox = document.getElementById('prophecyBox');
  const dateDisplay = document.getElementById('dateDisplay');

  // Set ring colors
  const outer = moodRing.querySelector('.ring-outer');
  const inner = moodRing.querySelector('.ring-inner');
  const core = moodRing.querySelector('.ring-core');

  outer.style.borderColor = mood.hex;
  outer.style.boxShadow = `0 0 20px ${mood.hex}40, inset 0 0 20px ${mood.hex}20`;
  inner.style.borderColor = mood.hexDark;
  inner.style.boxShadow = `0 0 15px ${mood.hexDark}40`;
  core.style.background = `radial-gradient(circle, ${mood.hex}, ${mood.hexDark})`;
  core.style.boxShadow = `0 0 30px ${mood.hex}60`;

  moodName.textContent = mood.name;
  moodName.style.color = mood.hex;
  moodMeaning.textContent = mood.meaning;

  prophecyBox.style.borderLeftColor = mood.hex;
  prophecyText.textContent = prophecy;

  // Date
  const now = new Date();
  const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
  dateDisplay.textContent = now.toLocaleDateString('en-US', options);

  resultCard.classList.add('show');

  // Scroll to result
  setTimeout(() => {
    resultCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 300);
}

async function shareResult() {
  if (!currentMood) return;

  const text = `My cosmic aura today is ${currentMood.name}! "${currentMood.meaning}" -- Mood Ring Aura Reader`;

  if (navigator.share) {
    try {
      await navigator.share({ title: 'My Mood Ring Reading', text });
    } catch (e) {
      fallbackShare(text);
    }
  } else {
    fallbackShare(text);
  }
}

function fallbackShare(text) {
  navigator.clipboard.writeText(text).then(() => {
    showToast('Aura copied to clipboard!');
  }).catch(() => {
    showToast('Could not copy. Share the vibes manually.');
  });
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}

// Init
initCamera();
</script>
