<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Soup Temperature Court</title><meta name="description" content="Hold a hearing on whether your soup is ready, reckless, or actively plotting against your tongue."><style>:root{--ink:#1f2937;--muted:#6b7280;--line:rgba(31,41,55,.12);--accent:#dc2626;--accent2:#f59e0b}*{box-sizing:border-box}body{margin:0;font-family:"Avenir Next","Trebuchet MS",sans-serif;color:var(--ink);background:linear-gradient(180deg,#fef2f2,#fff7ed);padding:24px 18px 48px}.shell{max-width:1040px;margin:0 auto}.back{display:inline-block;margin-bottom:16px;color:var(--ink);text-decoration:none;font-weight:800}.hero,.grid,.row{display:grid;gap:18px}.hero{grid-template-columns:1.06fr .94fr;margin-bottom:18px}.grid{grid-template-columns:.95fr 1.05fr}.row{grid-template-columns:1fr 1fr;gap:12px}.panel{background:rgba(255,255,255,.86);border:1px solid rgba(255,255,255,.8);border-radius:28px;backdrop-filter:blur(14px)}.hero-copy,.controls,.results{padding:26px}.eyebrow{display:inline-block;padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.92);font-size:.74rem;letter-spacing:.08em;text-transform:uppercase;font-weight:800;color:var(--muted)}h1{font-size:clamp(2.45rem,5vw,4.1rem);line-height:.95;margin:16px 0 12px;letter-spacing:-.05em}p{color:var(--muted);line-height:1.6}label{display:block;font-weight:800;margin:14px 0 8px}select{width:100%;border:1px solid var(--line);border-radius:16px;padding:12px 14px;font:inherit;background:rgba(255,255,255,.92)}button{border:none;border-radius:999px;padding:12px 18px;font:inherit;font-weight:800;cursor:pointer}.primary{color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent2))}.secondary{background:rgba(31,41,55,.08);color:var(--ink);margin-left:10px}.card{background:rgba(255,255,255,.94);border:1px solid var(--line);border-radius:22px;padding:18px;margin-bottom:12px}.badge{display:inline-block;margin-bottom:10px;padding:7px 10px;border-radius:999px;background:rgba(220,38,38,.12);color:#dc2626;font-size:.78rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em}.headline{font-size:1.32rem;font-weight:900;margin-bottom:8px}@media(max-width:900px){.hero,.grid,.row{grid-template-columns:1fr}.secondary{margin-left:0;margin-top:10px}}</style></head><body><div class="shell"><a class="back" href="../">← Back to Fun Builds</a><section class="hero"><div class="panel hero-copy"><div class="eyebrow">Soup Temperature Court</div><h1>This spoonful is now evidence.</h1><p>Submit the soup case and receive a judicial ruling on whether it is ready, reckless, or tongue-hostile.</p></div><div class="panel hero-copy"><p><strong>Case types:</strong> tomato incidents, noodle deception, and steam that lied about being harmless.</p></div></section><section class="grid"><div class="panel controls"><div class="row"><div><label for="steam">Steam level</label><select id="steam"><option value="1">gentle</option><option value="3">serious</option><option value="5">ominous</option></select></div><div><label for="sip">Test sip result</label><select id="sip"><option value="1">fine</option><option value="3">borderline</option><option value="5">betrayal</option></select></div></div><label for="hunger">Hunger pressure</label><select id="hunger"><option value="1">patient</option><option value="3">hungry</option><option value="5">making poor decisions</option></select><div style="margin-top:16px"><button class="primary" id="hear">Hear case</button><button class="secondary" id="reckless">Proceed anyway</button></div></div><div class="panel results"><div id="out"></div></div></section></div><script>function render(){const score=Number(steam.value)*8+Number(sip.value)*9-Number(hunger.value)*3;const ruling=score>=70?'culpable heat level':score>=48?'careful waiting advised':score>=26?'ready with caution':'safe to proceed';out.innerHTML=`<div class="card"><div class="badge">Court ruling</div><div class="headline">${ruling}</div><p>Evidence shows ${steam.selectedOptions[0].text} steam and a ${sip.selectedOptions[0].text} test sip under ${hunger.selectedOptions[0].text} appetite conditions.</p></div><div class="card"><div class="badge">Order</div><p>The court recommends one stir, one honest pause, and zero heroic mouth burns performed for schedule reasons.</p></div>`}hear.onclick=render;reckless.onclick=()=>{steam.selectedIndex=2;sip.selectedIndex=2;hunger.selectedIndex=2;render()};render();</script></body></html>
