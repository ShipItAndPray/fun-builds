<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Microwave Diplomacy</title><meta name="description" content="Broker peace between leftovers with a fake treaty generator for reheating conflicts."><style>
:root{--ink:#1f2937;--muted:#6b7280;--line:rgba(31,41,55,.12);--accent:#dc2626;--accent2:#f97316}*{box-sizing:border-box}body{margin:0;font-family:"Avenir Next","Trebuchet MS",sans-serif;color:var(--ink);background:linear-gradient(180deg,#fff1f2,#fff7ed);padding:24px 18px 48px}.shell{max-width:1040px;margin:0 auto}.back{display:inline-block;margin-bottom:16px;color:var(--ink);text-decoration:none;font-weight:800}.hero,.grid,.row{display:grid;gap:18px}.hero{grid-template-columns:1.06fr .94fr;margin-bottom:18px}.grid{grid-template-columns:.95fr 1.05fr}.row{grid-template-columns:1fr 1fr;gap:12px}.panel{background:rgba(255,255,255,.86);border:1px solid rgba(255,255,255,.8);border-radius:28px;backdrop-filter:blur(14px);box-shadow:0 22px 60px rgba(220,38,38,.1)}.hero-copy,.controls,.results{padding:26px}.eyebrow{display:inline-block;padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.92);font-size:.74rem;letter-spacing:.08em;text-transform:uppercase;font-weight:800;color:var(--muted)}h1{font-size:clamp(2.45rem,5vw,4.1rem);line-height:.95;margin:16px 0 12px;letter-spacing:-.05em}p{color:var(--muted);line-height:1.6}label{display:block;font-weight:800;margin:14px 0 8px}input,select{width:100%;border:1px solid var(--line);border-radius:16px;padding:12px 14px;font:inherit;background:rgba(255,255,255,.92)}button{border:none;border-radius:999px;padding:12px 18px;font:inherit;font-weight:800;cursor:pointer}.primary{color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent2))}.secondary{background:rgba(31,41,55,.08);color:var(--ink);margin-left:10px}.card{background:rgba(255,255,255,.94);border:1px solid var(--line);border-radius:22px;padding:18px;margin-bottom:12px}.badge{display:inline-block;margin-bottom:10px;padding:7px 10px;border-radius:999px;background:rgba(220,38,38,.12);color:#dc2626;font-size:.78rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em}.headline{font-size:1.32rem;font-weight:900;margin-bottom:8px}@media(max-width:900px){.hero,.grid,.row{grid-template-columns:1fr}.secondary{margin-left:0;margin-top:10px}}
</style></head><body><div class="shell"><a class="back" href="../">← Back to Fun Builds</a><section class="hero"><div class="panel hero-copy"><div class="eyebrow">Microwave Diplomacy</div><h1>Leftovers deserve a treaty.</h1><p>Negotiate the conflict between cold center, blazing edge, and your limited patience with an official reheating accord.</p></div><div class="panel hero-copy"><p><strong>Output:</strong> heat strategy, peace terms, and sanctions against overconfidence.</p></div></section><section class="grid"><div class="panel controls"><label for="meal">Primary leftover</label><select id="meal"><option>pasta</option><option>rice bowl</option><option>pizza slice</option><option>soup in a dangerous container</option></select><div class="row"><div><label for="center">Center temperature</label><select id="center"><option value="5">icy</option><option value="3">cool</option><option value="1">mostly fine</option></select></div><div><label for="edge">Edge condition</label><select id="edge"><option value="1">peaceful</option><option value="3">too hot</option><option value="5">surface lava</option></select></div></div><label for="patience">Your patience</label><select id="patience"><option value="1">measured</option><option value="3">hungry now</option><option value="5">already making bad choices</option></select><div style="margin-top:16px"><button class="primary" id="treaty">Draft treaty</button><button class="secondary" id="disaster">Microwave recklessly</button></div></div><div class="panel results"><div id="out"></div></div></section></div><script>
function render(){const score=Number(center.value)*7+Number(edge.value)*7+Number(patience.value)*6;const status=score>=76?'reheating ceasefire collapsed':score>=54?'fragile thermal accord':score>=34?'negotiable heat dispute':'stable meal governance';out.innerHTML=`<div class="card"><div class="badge">Treaty status</div><div class="headline">${status}</div><p>The ${meal.value} enters negotiation with a ${center.selectedOptions[0].text} center and ${edge.selectedOptions[0].text} perimeter.</p></div><div class="card"><div class="badge">Terms</div><p>Recommended doctrine: shorter intervals, strategic stirring, and one mandatory dignity pause between cycles.</p></div><div class="card"><div class="badge">Warning</div><p>Current operator condition is ${patience.selectedOptions[0].text}. This increases the odds of declaring “good enough” during active internal coldness.</p></div>`}
treaty.onclick=render;disaster.onclick=()=>{center.selectedIndex=0;edge.selectedIndex=2;patience.selectedIndex=2;render()};render();
</script></body></html>
