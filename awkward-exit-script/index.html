<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Awkward Exit Script</title>
<style>body{margin:0;font-family:Inter,system-ui,sans-serif;background:#0f1218;color:#f8fafc}main{max-width:860px;margin:auto;padding:28px}a{color:#cbd5e1;text-decoration:none}.card{background:#171c24;border:1px solid #374151;border-radius:22px;padding:22px;margin-top:18px}.out{display:grid;gap:12px;margin-top:12px}.line{background:#11161d;border-radius:16px;padding:14px;line-height:1.6}input,button{font:inherit}input{width:100%;background:#11161d;border:1px solid #475569;color:#f8fafc;border-radius:14px;padding:12px}button{border:none;border-radius:14px;padding:12px 16px;font-weight:800;background:#cbd5e1;color:#111827;cursor:pointer;margin-top:12px}</style>
</head>
<body><main><a href="../">← Back</a><div class="card"><h1>Awkward Exit Script</h1><p>Describe the setting. Get three socially survivable ways to leave.</p><input id="input" value="I am trapped in a conversation at a networking event."><button id="go">Generate Exit</button><div class="out" id="out"></div></div></main>
<script>
function render(){const t=input.value.trim();out.innerHTML=[
`<div class="line"><strong>Polite</strong><br>This was great, but I need to go say hi to someone before the night escapes me.</div>`,
`<div class="line"><strong>Practical</strong><br>I need to step away for a quick logistics reset, but good talking with you.</div>`,
`<div class="line"><strong>For ${t.toLowerCase()}</strong><br>I'm going to circulate before I accidentally become furniture here.</div>`
].join('')}go.onclick=render;render();
</script></body></html>
