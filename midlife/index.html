// State
let currentQ = 0;
let scores = {};

function startQuiz() {
  currentQ = 0;
  scores = {};
  document.getElementById('results').style.display = 'none';
  renderQuestion();
}

function renderQuestion() {
  const area = document.getElementById('quizArea');
  const q = questions[currentQ];
  const pct = ((currentQ) / questions.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';

  area.innerHTML = '<div class="question-card active">' +
    '<div class="q-number">Question ' + (currentQ + 1) + ' of ' + questions.length + '</div>' +
    '<div class="q-text">' + q.text + '</div>' +
    '<div class="options">' +
    q.options.map(function(o, i) {
      return '<button class="option-btn" onclick="answer(' + i + ')">' + o.text + '</button>';
    }).join('') +
    '</div></div>';
}

function answer(idx) {
  const tags = questions[currentQ].options[idx].tags;
  for (const [k, v] of Object.entries(tags)) {
    scores[k] = (scores[k] || 0) + v;
  }
  currentQ++;
  if (currentQ < questions.length) {
    renderQuestion();
  } else {
    document.getElementById('progressFill').style.width = '100%';
    showResults();
  }
}

function showResults() {
  document.getElementById('quizArea').innerHTML = '';
  const crisis = matchCrisis();
  const res = document.getElementById('results');
  const sev = crisis.severity;
  const meterColor = sev < 40 ? '#4caf50' : sev < 65 ? '#f5c542' : sev < 80 ? '#d4883a' : '#c0392b';
  const severityLabel = sev < 40 ? 'Mild Wobble' : sev < 65 ? 'Moderate Recalibration' : sev < 80 ? 'Full Crisis Mode' : 'Existential Emergency';

  let roadmapHTML = '';
  for (const [phase, steps] of Object.entries(crisis.roadmap)) {
    roadmapHTML += '<div class="roadmap-section"><h3>' + phase + '</h3><ul>' +
      steps.map(function(s) { return '<li>' + s + '</li>'; }).join('') +
      '</ul></div>';
  }

  res.innerHTML = '<div class="result-header">' +
    '<div class="result-emoji">' + crisis.emoji + '</div>' +
    '<div class="result-type">' + crisis.name + '</div>' +
    '<div class="result-tagline">' + crisis.tagline + '</div>' +
    '</div>' +
    '<div class="severity-meter">' +
    '<div class="label">Crisis Severity: ' + severityLabel + ' (' + sev + '%)</div>' +
    '<div class="meter-bar"><div class="meter-fill" id="meterFill" style="width:0%;background:' + meterColor + '"></div></div>' +
    '</div>' +
    '<h3 style="color:#f5c542;margin:24px 0 12px;text-align:center;">Your Personalized Roadmap</h3>' +
    roadmapHTML +
    '<div class="share-section">' +
    '<button class="share-btn" onclick="shareResult()">Copy Result to Share</button><br>' +
    '<button class="share-btn secondary" onclick="shareTwitter()">Share on X</button><br>' +
    '<button class="retake-btn" onclick="startQuiz()">Retake Quiz</button>' +
    '</div>';

  res.style.display = 'block';
  // Store for sharing
  res.dataset.crisisName = crisis.name;
  res.dataset.crisisEmoji = crisis.emoji;

  setTimeout(function() {
    document.getElementById('meterFill').style.width = sev + '%';
  }, 100);
  res.scrollIntoView({ behavior: 'smooth' });
}

function matchCrisis() {
  let bestMatch = null;
  let bestScore = -1;

  for (const c of crisisTypes) {
    let score = 0;
    let met = true;
    for (const [tag, min] of Object.entries(c.requires)) {
      const actual = scores[tag] || 0;
      if (actual < min * 0.5) { met = false; }
      score += Math.min(actual, min * 2);
    }
    if (met && score > bestScore) {
      bestScore = score;
      bestMatch = c;
    }
  }

  // Fallback: if no match, find closest
  if (!bestMatch) {
    for (const c of crisisTypes) {
      let score = 0;
      for (const [tag] of Object.entries(c.requires)) {
        score += (scores[tag] || 0);
      }
      if (score > bestScore) {
        bestScore = score;
        bestMatch = c;
      }
    }
  }

  return bestMatch || crisisTypes[crisisTypes.length - 1];
}

function shareResult() {
  const res = document.getElementById('results');
  const name = res.dataset.crisisName;
  const emoji = res.dataset.crisisEmoji;
  const text = emoji + ' My midlife crisis type: ' + name + '\n\nTake the quiz and find your crisis roadmap:\n' + window.location.href;
  navigator.clipboard.writeText(text).then(function() {
    const toast = document.getElementById('copiedToast');
    toast.classList.add('show');
    setTimeout(function() { toast.classList.remove('show'); }, 2000);
  });
}

function shareTwitter() {
  const res = document.getElementById('results');
  const name = res.dataset.crisisName;
  const emoji = res.dataset.crisisEmoji;
  const text = encodeURIComponent(emoji + ' My midlife crisis type: ' + name + '\n\nTake the quiz and find your crisis roadmap:');
  const url = encodeURIComponent(window.location.href);
  window.open('https://twitter.com/intent/tweet?text=' + text + '&url=' + url, '_blank');
}

// Start
startQuiz();
