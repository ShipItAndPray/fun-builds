    desc: "This isn't garden-variety 'what's it all about.' This is thick, heavy fog. You've lost the plot and you know it. Nothing feels urgent because nothing feels like it matters. This is the crisis that doesn't look like a crisis from the outside, which makes it worse. People keep telling you you're 'doing great' and every time they say it, the gap between appearance and reality gets wider.",
    roadmap: ["This is above quiz-grade. Talk to a professional this week. Not next month. This week.","Tell one person the real truth. The full truth. Pick someone who can hold it.","Small physical goals daily. Walk. Move. The body can lead the mind out when the mind is stuck.","Reduce decisions. Simplify everything you can. Decision fatigue deepens fog.","Remember: the fog is not permanent. It is not you. It is weather. Weather changes."]
  },
  { id: "extreme-escape", emoji: "\u{1F334}\u{1F334}", title: "The Full Departure", subtitle: "Crisis Type: Exit Strategy: Life",
    desc: "You're not daydreaming about leaving. You're PLANNING it. Browser tabs: visa requirements, shipping containers, pet import rules. This has gone from fantasy to logistics. Either you're about to make the most transformative decision of your life, or you're about to learn that running away is a full-time job that follows you everywhere. The wanting is so loud you can't hear anything else.",
    roadmap: ["You're past the 'should I?' phase. You need the 'how, exactly?' phase.","3-month trial run. Not a vacation. Move there. Work there. Pay bills there.","Solve the money question BEFORE you go. Adventure without income is just expensive anxiety.","Build community at the destination BEFORE you cut ties at home. Loneliness abroad is next-level.","Keep a return ticket for the first year. Not as failure insurance -- as freedom insurance."]
  },
  { id: "extreme-reinvention", emoji: "\u{1F525}\u{1F525}", title: "The Total Metamorphosis", subtitle: "Crisis Type: Identity Supernova",
    desc: "You don't want to tweak. You want to TRANSFORM. New career, new body, new habits, new wardrobe, new friends, possibly new name. You've been watching videos titled 'How I Completely Changed My Life in One Year' and you believe every single one. Your crisis has evolved past crisis into a full-blown personal revolution. The ambition is staggering. The risk of burning out in month two is also staggering.",
    roadmap: ["You have the energy. Now you need the sequence. What changes FIRST?","The body is the fastest win and the best foundation. Start there.","Career change takes 18 months minimum. Start the groundwork NOW, but don't quit yet.","Document the transformation. Not for Instagram. For yourself. You'll need proof it's working on bad days.","Accept that some people from your current life won't come with you. That's the real cost. Decide if you can pay it."]
  }
];

let answers = new Array(10).fill(-1);
let currentQ = 0;

function startQuiz() {
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('quiz-screen').classList.remove('hidden');
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentQ];
  const area = document.getElementById('question-area');
  area.innerHTML = `
    <div class="question-card">
      <div class="q-number">Question ${currentQ+1} of 10</div>
      <div class="q-text">${q.q}</div>
      <div class="options">
        ${q.options.map((o,i) => `<button class="option ${answers[currentQ]===i?'selected':''}" onclick="selectOption(${i})">${o.text}</button>`).join('')}
      </div>
    </div>
  `;
  document.getElementById('progress-fill').style.width = ((currentQ+1)/10*100)+'%';
  document.getElementById('btn-next').disabled = answers[currentQ] === -1;
  document.getElementById('btn-next').textContent = currentQ === 9 ? 'See My Crisis' : 'Next';
  const backBtn = document.getElementById('btn-back');
  if(currentQ > 0) backBtn.classList.remove('hidden'); else backBtn.classList.add('hidden');
}

function selectOption(i) {
  answers[currentQ] = i;
  document.querySelectorAll('.option').forEach((el,idx) => {
    el.classList.toggle('selected', idx===i);
  });
  document.getElementById('btn-next').disabled = false;
}

function nextQuestion() {
  if(answers[currentQ] === -1) return;
  if(currentQ < 9) { currentQ++; renderQuestion(); }
  else showResult();
}

function prevQuestion() {
  if(currentQ > 0) { currentQ--; renderQuestion(); }
}

function showResult() {
  const totals = [0,0,0,0,0];
  answers.forEach((ans, qi) => {
    if(ans >= 0) {
      questions[qi].options[ans].score.forEach((s,si) => totals[si] += s);
    }
  });

  const max = Math.max(...totals);
  const sorted = totals.map((v,i)=>({v,i})).sort((a,b)=>b.v-a.v);
  const topIndices = totals.map((v,i) => v===max ? i : -1).filter(v => v>=0);
  const catNames = ['Entrepreneurial','Nostalgic','Existential','Escapist','Reinvention'];
  const catIds = ['entrepreneur','nostalgia','existential','escape','reinvention'];

  let result;

  if(topIndices.length === 1 && totals[topIndices[0]] >= 12) {
    result = extremeTypes.find(t => t.id === 'extreme-'+catIds[topIndices[0]]) || crisisTypes[topIndices[0]];
  } else if(topIndices.length >= 2) {
    const combo = [Math.min(topIndices[0],topIndices[1]), Math.max(topIndices[0],topIndices[1])];
    result = hybridTypes.find(h => h.combo[0]===combo[0] && h.combo[1]===combo[1]) || crisisTypes[topIndices[0]];
  } else {
    // Check if second place is close (within 2)
    if(sorted[1].v >= sorted[0].v - 2 && sorted[0].v < 12) {
      const combo = [Math.min(sorted[0].i, sorted[1].i), Math.max(sorted[0].i, sorted[1].i)];
      result = hybridTypes.find(h => h.combo[0]===combo[0] && h.combo[1]===combo[1]) || crisisTypes[sorted[0].i];
    } else {
      result = crisisTypes[sorted[0].i];
    }
  }

  const totalScore = sorted.reduce((a,b)=>a+b.v,0) || 1;
  const primaryPct = Math.round(sorted[0].v / totalScore * 100);
  const secondaryPct = Math.round(sorted[1].v / totalScore * 100);

  const shareText = encodeURIComponent(`I took the Midlife Crisis Quiz and I'm "${result.title}" (${primaryPct}% ${catNames[sorted[0].i]}). What's YOUR crisis type?`);

  document.getElementById('quiz-screen').classList.add('hidden');
  const rs = document.getElementById('result-screen');
  rs.classList.remove('hidden');
  rs.innerHTML = `
    <div class="result-card">
      <div class="result-emoji">${result.emoji}</div>
      <div class="result-label">${result.subtitle}</div>
      <div class="result-title">${result.title}</div>
      <p style="color:#b89860;font-size:.85rem;margin-bottom:20px">${primaryPct}% ${catNames[sorted[0].i]} | ${secondaryPct}% ${catNames[sorted[1].i]} undertone</p>
      <div class="result-desc">${result.desc}</div>
      <div class="roadmap">
        <h3>Your 5-Step Roadmap</h3>
        <ol>${result.roadmap.map(r => '<li>'+r+'</li>').join('')}</ol>
      </div>
      <div class="share-row">
        <button class="share-btn" onclick="window.open('https://twitter.com/intent/tweet?text=${shareText}','_blank')">Share on X</button>
        <button class="share-btn" id="copy-btn" onclick="copyResult()">Copy Result</button>
      </div>
      <button class="btn-restart" onclick="restart()">Retake Quiz</button>
    </div>
  `;

  window._shareText = decodeURIComponent(shareText);
}

function copyResult() {
  navigator.clipboard.writeText(window._shareText).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy Result', 2000);
  });
}

function restart() {
  answers = new Array(10).fill(-1);
  currentQ = 0;
  document.getElementById('result-screen').classList.add('hidden');
  document.getElementById('start-screen').classList.remove('hidden');
}
</script>
