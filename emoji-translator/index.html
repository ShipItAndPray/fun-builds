    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Noise overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px

    pointer-events: none;
    z-index: 1000;
  }

  .container {
    max-width: 700px;
    margin: 0 auto;
    padding: 16px;
  }

  .masthead {
    text-align: center;
    border-bottom: 4px double var(--gold);
    padding-bottom: 12px;
    margin-bottom: 20px;
  }

  .masthead-rule {
    border: none;
    border-top: 1px solid var(--gold-dim);
    margin: 6px 0;
  }

  .masthead h1 {
    font-family: 'UnifrakturMaguntia', cursive;
    font-size: clamp(2rem, 8vw, 3.5rem);
    color: var(--gold);
    letter-spacing: 2px;
    line-height: 1.1;
    text-shadow: 0 0 20px rgba(212,168,67,0.3);

  .masthead-sub {
    font-family: 'Playfair Display', serif;
    font-size: 0.7rem;
    color: var(--text-dim);
    letter-spacing: 6px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .masthead-meta {
    display: flex;
    justify-content: space-between;
    font-size: 0.65rem;
    color: var(--text-dim);
    margin-top: 8px;
    padding: 0 4px;
  }

  .decode-counter {
    color: var(--gold);
    font-weight: bold;
    font-size: 0.75rem;
  }

    background: var(--bg-card);
    border: 1px solid var(--gold-dim);
    padding: 16px;
    margin-bottom: 20px;
    position: relative;
  }

  .input-section::before {
    content: 'INCOMING TRANSMISSION';
    position: absolute;
    top: -10px;
    left: 16px;
    background: var(--bg-card);
    padding: 0 8px;
    font-size: 0.6rem;
    color: var(--gold);
    letter-spacing: 3px;
  }

  .input-area {
    width: 100%;
    min-height: 120px;
    background: var(--bg-input);
    border: 1px solid #333;
    color: var(--text);
    font-family: 'Special Elite', monospace;
    font-size: 1.1rem;
    padding: 12px;
    resize: vertical;
    outline: none;
    transition: border-color 0.3s;
  }

  .input-area:focus {
    border-color: var(--gold-dim);
  }

  .input-area::placeholder {
    color: var(--text-dim);
    font-style: italic;
  }

  .controls {
    display: flex;
    gap: 10px;
    margin-top: 12px;
    flex-wrap: wrap;
  }

  .btn {
    flex: 1;
    min-width: 140px;
    padding: 12px 20px;
    font-family: 'Special Elite', monospace;
    font-size: 0.95rem;
    border: none;
    cursor: pointer;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: all 0.2s;
  }

  .btn-translate {
    background: var(--gold);
    color: #000;
    font-weight: bold;
  }

  .btn-translate:hover {
    background: var(--gold-light);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(212,168,67,0.3);
  }

  .btn-translate:active {
    transform: translateY(0);
  }

  .btn-speak {
    background: transparent;
    color: var(--gold);
    border: 1px solid var(--gold-dim);
  }

  .btn-speak:hover {
    background: rgba(212,168,67,0.1);
  }

  .btn-speak.speaking {
    animation: pulse-gold 1s ease-in-out infinite;
  }

  @keyframes pulse-gold {
    0%, 100% { border-color: var(--gold-dim); }
    50% { border-color: var(--gold); box-shadow: 0 0 10px rgba(212,168,67,0.3); }
  }

  .btn-sample {
    flex: 0;
    min-width: auto;
    padding: 12px 16px;
    background: transparent;
    color: var(--text-dim);
    border: 1px solid #333;
    font-size: 0.75rem;
  }

  .btn-sample:hover {
    border-color: var(--text-dim);
    color: var(--text);
  }

  /* OUTPUT SECTION */
  .output-section {
    display: none;
  }

  .output-section.visible {
    display: block;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .breaking-banner {
    background: var(--red);
    color: white;
    text-align: center;
    padding: 8px;
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 0.85rem;
    letter-spacing: 6px;
    text-transform: uppercase;

    0%, 100% { background: var(--red); }
    50% { background: var(--red-bright); }
  }

  .broadcast-card {
    background: var(--bg-card);
    border: 1px solid var(--gold-dim);
    border-top: none;
    padding: 20px;

    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid #333;

  .broadcast-dot {
    width: 8px;
    height: 8px;
    background: var(--red-bright);
    border-radius: 50%;
    animation: blink-dot 1.5s ease-in-out infinite;
  }

  @keyframes blink-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  .broadcast-label {
    font-size: 0.7rem;
    color: var(--red-bright);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .broadcast-time {
    margin-left: auto;
    font-size: 0.65rem;
    color: var(--text-dim);

    font-family: 'Playfair Display', serif;
    font-size: 1.15rem;
    line-height: 1.8;
    color: var(--text);

    color: var(--gold);
    font-weight: 700;
  }

  .cursor-blink {
    display: inline-block;
    width: 2px;
    height: 1.1em;
    background: var(--gold);
    vertical-align: text-bottom;
    animation: cursor-blink 0.7s step-end infinite;
  }

    0%, 100% { opacity: 1; }

    justify-content: space-between;
    font-size: 0.65rem;

  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--gold-dim); }

  'This correspondent will now take a moment to recover. Good evening.',
  'End of transmission. The record shall reflect the gravity of these symbols.',
];

const TRANSITIONS = [
  'Furthermore,',
  'In a stunning development,',
  'But wait -- there is more.',
  'As if this were not enough,',
  'The plot, as they say, thickens.',
  'And then, dear listeners,',
  'What follows next defies ordinary description.',
  'The narrative takes a turn:',
  'Witness now the next chapter:',
];

// ─── STATE ───
let decodeCount = parseInt(localStorage.getItem('emojiDispatchCount') || '0');
let currentTranslation = '';
let isSpeaking = false;
document.getElementById('decodeCount').textContent = decodeCount;

// ─── EMOJI DETECTION ───
const emojiRegex = /(?:\p{Emoji_Presentation}|\p{Emoji}\uFE0F)(?:\u200D(?:\p{Emoji_Presentation}|\p{Emoji}\uFE0F))*/gu;

function extractEmojis(text) {
  return [...text.matchAll(emojiRegex)].map(m => m[0]);
}

function findCombos(emojis) {
  const results = [];
  const used = new Set();

  // Try combos (longest first)
  const sorted = [...COMBOS].sort((a, b) => b.pattern.length - a.pattern.length);

  for (const combo of sorted) {
    for (let i = 0; i <= emojis.length - combo.pattern.length; i++) {
      if (used.has(i)) continue;
      let match = true;
      const indices = [];
      let pos = i;
      for (const p of combo.pattern) {
        while (pos < emojis.length && used.has(pos)) pos++;
        if (pos >= emojis.length || emojis[pos] !== p) { match = false; break; }
        indices.push(pos);
        pos++;
      }
      if (match) {
        indices.forEach(idx => used.add(idx));
        results.push({ type: 'combo', emojis: combo.pattern.join(''), text: combo.text, index: indices[0] });
      }
    }
  }

  // Remaining singles
  for (let i = 0; i < emojis.length; i++) {
    if (used.has(i)) continue;
    const e = emojis[i];
    if (SINGLE[e]) {
      results.push({ type: 'single', emojis: e, text: SINGLE[e], index: i });
      used.add(i);
    }
  }

  results.sort((a, b) => a.index - b.index);
  return results;
}

function buildNarration(inputText) {
  const emojis = extractEmojis(inputText);
  if (emojis.length === 0) {
    return { text: 'Our analysts have examined this communiqu\u00e9 with great care and found... no emojis whatsoever. The subject communicates with the restraint of a Victorian-era telegraph operator. We salute their discipline, even as we question their vitality.', count: 0 };
  }

  const decoded = findCombos(emojis);
  const opener = OPENERS[Math.floor(Math.random() * OPENERS.length)];
  const closer = CLOSERS[Math.floor(Math.random() * CLOSERS.length)];

  let parts = [opener, ''];

  // Weave the plain text context
  const plainText = inputText.replace(emojiRegex, '').replace(/\s+/g, ' ').trim();
  if (plainText.length > 2) {
    parts.push(`The subject writes, and I quote: "${plainText}"`);
    parts.push('');
    parts.push('But it is the hieroglyphs that tell the true story:');
    parts.push('');
  }

  decoded.forEach((d, i) => {
    if (i > 0 && i % 3 === 0) {
      parts.push('');
      parts.push(TRANSITIONS[Math.floor(Math.random() * TRANSITIONS.length)]);
      parts.push('');
    }
    parts.push(`[${d.emojis}] -- ${d.text}.`);
  });

  parts.push('');
  parts.push(closer);

  return { text: parts.join('\n'), count: emojis.length };
}

// ─── TYPEWRITER ───
async function typewrite(element, text, speed = 18) {
  element.innerHTML = '';
  const lines = text.split('\n');
  let fullHTML = '';

  for (let li = 0; li < lines.length; li++) {
    const line = lines[li];
    if (line === '') {
      fullHTML += '<br>';
      element.innerHTML = fullHTML + '<span class="cursor-blink"></span>';
      await sleep(80);
      continue;
    }

    // Style emoji references
    const styled = line.replace(/\[([^\]]+)\]/g, '<span class="emoji-ref">[$1]</span>')
                       .replace(/^(Ladies and gentlemen|This just in|A communiqu|We bring you|The following|Attention all|From the frontlines|Our analysts|This has been|The full emotional|Thus concludes|We remind|This correspondent|End of transmission|The record)/, '<span class="dramatic">$&</span>');

    for (let ci = 0; ci < styled.length; ci++) {
      // Skip HTML tags in typing
      if (styled[ci] === '<') {
        const closeIdx = styled.indexOf('>', ci);
        if (closeIdx !== -1) {
          fullHTML += styled.substring(ci, closeIdx + 1);
          ci = closeIdx;
          continue;
        }
      }
      fullHTML += styled[ci];
      // Only update DOM every few chars for performance
      if (ci % 2 === 0 || ci === styled.length - 1) {
        element.innerHTML = fullHTML + '<span class="cursor-blink"></span>';
      }
      await sleep(speed);
    }
    if (li < lines.length - 1) fullHTML += '<br>';
    element.innerHTML = fullHTML + '<span class="cursor-blink"></span>';
  }

  // Remove cursor after typing
  await sleep(800);
  element.innerHTML = fullHTML;
}

function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}

// ─── SPEECH ───
function speakText(text) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();

  const clean = text.replace(/\[([^\]]+)\]/g, '').replace(/--/g, ',').replace(/<[^>]*>/g, '');
  const utterance = new SpeechSynthesisUtterance(clean);

  // Try to find a deep/formal voice
  const voices = speechSynthesis.getVoices();
  const preferred = voices.find(v => /Daniel|James|Thomas|Google UK English Male|Arthur/i.test(v.name))
    || voices.find(v => /English.*Male|en.*GB/i.test(v.name) && /Male/i.test(v.name))
    || voices.find(v => /en/i.test(v.lang));
  if (preferred) utterance.voice = preferred;

  utterance.rate = 0.82;
  utterance.pitch = 0.75;
  utterance.volume = 1;

  const speakBtn = document.getElementById('speakBtn');
  utterance.onstart = () => { isSpeaking = true; speakBtn.classList.add('speaking'); speakBtn.textContent = 'Stop'; };
  utterance.onend = () => { isSpeaking = false; speakBtn.classList.remove('speaking'); speakBtn.textContent = 'Read Aloud'; };
  utterance.onerror = () => { isSpeaking = false; speakBtn.classList.remove('speaking'); speakBtn.textContent = 'Read Aloud'; };

  speechSynthesis.speak(utterance);
}

// ─── EVENT HANDLERS ───
const inputArea = document.getElementById('inputArea');
const translateBtn = document.getElementById('translateBtn');
const speakBtn = document.getElementById('speakBtn');
const clearBtn = document.getElementById('clearBtn');
const outputSection = document.getElementById('outputSection');
const translationOutput = document.getElementById('translationOutput');
const broadcastTime = document.getElementById('broadcastTime');
const emojiDecodedCount = document.getElementById('emojiDecodedCount');

translateBtn.addEventListener('click', async () => {
  const text = inputArea.value.trim();
  if (!text) { inputArea.focus(); return; }

  translateBtn.disabled = true;
  translateBtn.textContent = 'Decoding...';

  const result = buildNarration(text);
  currentTranslation = result.text;

  // Update counter
  decodeCount++;
  localStorage.setItem('emojiDispatchCount', decodeCount);
  document.getElementById('decodeCount').textContent = decodeCount;

  // Show output
  broadcastTime.textContent = new Date().toLocaleTimeString('en-US', { hour12: false });
  emojiDecodedCount.textContent = result.count;
  outputSection.classList.add('visible');

  // Scroll to output
  setTimeout(() => outputSection.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);

  await typewrite(translationOutput, currentTranslation);

  translateBtn.disabled = false;
  translateBtn.textContent = 'Translate';
  speakBtn.disabled = false;
});

speakBtn.addEventListener('click', () => {
  if (isSpeaking) {
    speechSynthesis.cancel();
    return;
  }
  if (currentTranslation) speakText(currentTranslation);
});

clearBtn.addEventListener('click', () => {
  inputArea.value = '';
  outputSection.classList.remove('visible');
  currentTranslation = '';
  speakBtn.disabled = true;
  speechSynthesis.cancel();
  inputArea.focus();
});

// Example chips
document.querySelectorAll('.example-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    inputArea.value = chip.dataset.text;
    inputArea.focus();
  });
});

// Ctrl+Enter to translate
inputArea.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    translateBtn.click();
  }
});

// Load voices
if ('speechSynthesis' in window) {
  speechSynthesis.getVoices();
  speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
}
</script>
</body>
</html>
