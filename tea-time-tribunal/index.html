<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Tea Time Tribunal</title><meta name="description" content="A fake courtroom that rules on whether your pause for tea was justified."><style>:root{--ink:#1f2937;--muted:#6b7280;--line:rgba(31,41,55,.12);--accent:#0f766e;--accent2:#14b8a6}*{box-sizing:border-box}body{margin:0;font-family:"Avenir Next","Trebuchet MS",sans-serif;color:var(--ink);background:linear-gradient(180deg,#ecfdf5,#ecfeff);padding:24px 18px 48px}.shell{max-width:1040px;margin:0 auto}.back{display:inline-block;margin-bottom:16px;color:var(--ink);text-decoration:none;font-weight:800}.hero,.grid,.row{display:grid;gap:18px}.hero{grid-template-columns:1.06fr .94fr;margin-bottom:18px}.grid{grid-template-columns:.95fr 1.05fr}.row{grid-template-columns:1fr 1fr;gap:12px}.panel{background:rgba(255,255,255,.86);border:1px solid rgba(255,255,255,.8);border-radius:28px;backdrop-filter:blur(14px)}.hero-copy,.controls,.results{padding:26px}.eyebrow{display:inline-block;padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.92);font-size:.74rem;letter-spacing:.08em;text-transform:uppercase;font-weight:800;color:var(--muted)}h1{font-size:clamp(2.45rem,5vw,4.1rem);line-height:.95;margin:16px 0 12px;letter-spacing:-.05em}p{color:var(--muted);line-height:1.6}label{display:block;font-weight:800;margin:14px 0 8px}select{width:100%;border:1px solid var(--line);border-radius:16px;padding:12px 14px;font:inherit;background:rgba(255,255,255,.92)}button{border:none;border-radius:999px;padding:12px 18px;font:inherit;font-weight:800;cursor:pointer}.primary{color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent2))}.secondary{background:rgba(31,41,55,.08);color:var(--ink);margin-left:10px}.card{background:rgba(255,255,255,.94);border:1px solid var(--line);border-radius:22px;padding:18px;margin-bottom:12px}.badge{display:inline-block;margin-bottom:10px;padding:7px 10px;border-radius:999px;background:rgba(15,118,110,.12);color:#0f766e;font-size:.78rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em}.headline{font-size:1.32rem;font-weight:900;margin-bottom:8px}@media(max-width:900px){.hero,.grid,.row{grid-template-columns:1fr}.secondary{margin-left:0;margin-top:10px}}</style></head><body><div class="shell"><a class="back" href="../">← Back to Fun Builds</a><section class="hero"><div class="panel hero-copy"><div class="eyebrow">Tea Time Tribunal</div><h1>Your break will be judged.</h1><p>Explain the tea pause and receive a courtroom-style ruling on whether it was restorative, tactical, or suspiciously well-timed.</p></div><div class="panel hero-copy"><p><strong>Verdict format:</strong> admissible tea, emotional necessity, or unauthorized beverage delay.</p></div></section><section class="grid"><div class="panel controls"><div class="row"><div><label for="work">What you were avoiding</label><select id="work"><option>email backlog</option><option>one difficult task</option><option>general existence</option><option>nothing, allegedly</option></select></div><div><label for="urgency">Task urgency</label><select id="urgency"><option value="1">low</option><option value="3">real</option><option value="5">staring at you</option></select></div></div><label for="brew">Tea seriousness</label><select id="brew"><option value="1">bag, no ceremony</option><option value="3">full steeping ritual</option><option value="5">ceremonial escape operation</option></select><div style="margin-top:16px"><button class="primary" id="rule">Issue ruling</button><button class="secondary" id="acquit">Automatic acquittal</button></div></div><div class="panel results"><div id="out"></div></div></section></div><script>function render(){const score=Number(urgency.value)*8+Number(brew.value)*6;const verdict=score>=72?'unauthorized tea adjournment':score>=48?'justified emotional recess':score>=28?'lawful break activity':'fully admissible hydration';out.innerHTML=`<div class="card"><div class="badge">Tribunal ruling</div><div class="headline">${verdict}</div><p>The court finds that the tea pause occurred during ${work.value} under ${urgency.selectedOptions[0].text} urgency conditions.</p></div><div class="card"><div class="badge">Sentence</div><p>No further punishment beyond returning to the task with slightly improved posture and a believable sense of peace.</p></div>`}rule.onclick=render;acquit.onclick=()=>{urgency.selectedIndex=0;brew.selectedIndex=0;render()};render();</script></body></html>
