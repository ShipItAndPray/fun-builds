<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAGE QUIT DETECTOR</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    color: white;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* START SCREEN */
  #start-screen {
    text-align: center;
  }
  #start-screen h1 {
    font-size: 28px;
    margin-bottom: 12px;
    color: #ccc;
  }
  #start-btn {
    font-size: 24px;
    padding: 20px 50px;
    border: none;
    border-radius: 16px;
    background: #2a2;
    color: white;
    cursor: pointer;
    font-weight: 700;
    margin-top: 20px;
  }
  #start-btn:hover { background: #3b3; }

  /* DETECTION SCREEN */
  #detect-screen {
    display: none;
    width: 100%;
    height: 100%;
    flex-direction: column;
    align-items: center;
    position: relative;
  }

  /* Webcam */
  #webcam {
    width: 280px;
    height: 210px;
    border-radius: 16px;
    object-fit: cover;
    transform: scaleX(-1);
    margin-top: 20px;
    border: 3px solid #333;
  }

  /* Big emoji */
  #emoji {
    font-size: 80px;
    margin: 10px 0 0 0;
    transition: transform 0.2s;
  }

  /* Big rage number */
  #rage-number {
    font-size: 120px;
    font-weight: 900;
    line-height: 1;
    transition: color 0.3s;
  }
  #rage-label {
    font-size: 20px;
    color: #888;
    margin-top: -8px;
  }

  /* Spike counter */
  #spike-counter {
    font-size: 22px;
    color: #aaa;
    margin-top: 12px;
  }
  #spike-counter span {
    color: #f44;
    font-weight: 700;
  }

  /* Calm button */
  #calm-btn {
    display: none;
    font-size: 28px;
    padding: 16px 48px;
    border: none;
    border-radius: 16px;
    background: #07f;
    color: white;
    cursor: pointer;
    font-weight: 700;
    margin-top: 16px;
    animation: pulse 1s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  /* Red flash overlay */
  #flash {
    position: fixed;
    inset: 0;
    background: rgba(255, 0, 0, 0.5);
    pointer-events: none;
    z-index: 100;
    display: none;
    animation: flash-anim 0.3s ease-in-out infinite;
  }
  @keyframes flash-anim {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }
</style>
</head>
<body>

<!-- SCREEN 1: Start -->
<div id="start-screen">
  <h1>Allow your camera to start</h1>
  <button id="start-btn">Start Rage Detection</button>
</div>

<!-- SCREEN 2: Detection -->
<div id="detect-screen">
  <video id="webcam" autoplay playsinline></video>
  <div id="emoji">😊</div>
  <div id="rage-number" style="color: #2a2;">0%</div>
  <div id="rage-label">RAGE LEVEL</div>
  <div id="spike-counter">Rage spikes: <span id="spike-count">0</span></div>
  <button id="calm-btn">I'M CALM</button>
</div>

<!-- Red flash overlay -->
<div id="flash"></div>

<!-- MediaPipe Face Mesh -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

<script>
// --- STATE ---
let rageLevel = 0;
let spikeCount = 0;
let isRaging = false;
let alarmPlaying = false;
let audioCtx = null;
let alarmOsc = null;
let alarmGain = null;
let baselineMouthOpen = null;
let baselineBrowDist = null;
let samples = 0;

// --- DOM ---
const startScreen = document.getElementById('start-screen');
const detectScreen = document.getElementById('detect-screen');
const startBtn = document.getElementById('start-btn');
const webcam = document.getElementById('webcam');
const emojiEl = document.getElementById('emoji');
const rageNumber = document.getElementById('rage-number');
const spikeCountEl = document.getElementById('spike-count');
const calmBtn = document.getElementById('calm-btn');
const flashEl = document.getElementById('flash');

// --- START ---
startBtn.addEventListener('click', async () => {
  startScreen.style.display = 'none';
  detectScreen.style.display = 'flex';
  initAudio();
  startCamera();
});

// --- AUDIO (Web Audio API) ---
function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function startAlarm() {
  if (alarmPlaying) return;
  alarmPlaying = true;

  alarmOsc = audioCtx.createOscillator();
  alarmGain = audioCtx.createGain();
  alarmOsc.type = 'sawtooth';
  alarmOsc.frequency.value = 440;
  alarmGain.gain.value = 0.3;
  alarmOsc.connect(alarmGain);
  alarmGain.connect(audioCtx.destination);
  alarmOsc.start();

  // Siren effect
  const siren = () => {
    if (!alarmPlaying) return;
    alarmOsc.frequency.setValueAtTime(440, audioCtx.currentTime);
    alarmOsc.frequency.linearRampToValueAtTime(880, audioCtx.currentTime + 0.5);
    alarmOsc.frequency.linearRampToValueAtTime(440, audioCtx.currentTime + 1.0);
    setTimeout(siren, 1000);
  };
  siren();
}

function stopAlarm() {
  if (!alarmPlaying) return;
  alarmPlaying = false;
  if (alarmOsc) {
    alarmOsc.stop();
    alarmOsc.disconnect();
    alarmOsc = null;
  }
}

// --- CAMERA + FACE MESH ---
function startCamera() {
  const faceMesh = new FaceMesh({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
  });

  faceMesh.setOptions({
    maxNumFaces: 1,
    refineLandmarks: true,
    minDetectionConfidence: 0.5,
    minTrackingConfidence: 0.5
  });

  faceMesh.onResults(onFaceResults);

  const camera = new Camera(webcam, {
    onFrame: async () => {
      await faceMesh.send({ image: webcam });
    },
    width: 640,
    height: 480
  });
  camera.start();
}

// --- FACE ANALYSIS ---
function onFaceResults(results) {
  if (!results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0) return;
  const lm = results.multiFaceLandmarks[0];

  // Mouth openness (top lip to bottom lip)
  const upperLip = lm[13];
  const lowerLip = lm[14];
  const mouthOpen = Math.abs(upperLip.y - lowerLip.y);

  // Brow distance (brow to eye — furrowed = smaller distance)
  const leftBrow = lm[105];
  const leftEye = lm[159];
  const rightBrow = lm[334];
  const rightEye = lm[386];
  const browDist = ((leftBrow.y - leftEye.y) + (rightBrow.y - rightEye.y)) / 2;

  // Eye wideness (how wide eyes are open)
  const leftEyeTop = lm[159];
  const leftEyeBot = lm[145];
  const rightEyeTop = lm[386];
  const rightEyeBot = lm[374];
  const eyeOpen = ((Math.abs(leftEyeTop.y - leftEyeBot.y)) + (Math.abs(rightEyeTop.y - rightEyeBot.y))) / 2;

  // Jaw clench detection (jaw width relative to face height)
  const jawLeft = lm[234];
  const jawRight = lm[454];
  const jawWidth = Math.abs(jawLeft.x - jawRight.x);
  const faceTop = lm[10];
  const chin = lm[152];
  const faceHeight = Math.abs(faceTop.y - chin.y);
  const jawRatio = jawWidth / Math.max(faceHeight, 0.001);

  // Calibrate baseline from first 30 frames
  samples++;
  if (samples <= 30) {
    if (baselineMouthOpen === null) {
      baselineMouthOpen = mouthOpen;
      baselineBrowDist = browDist;
    } else {
      baselineMouthOpen = baselineMouthOpen * 0.9 + mouthOpen * 0.1;
      baselineBrowDist = baselineBrowDist * 0.9 + browDist * 0.1;
    }
    return;
  }

  // Rage signals (0-1 each)
  const mouthSignal = Math.min(1, Math.max(0, (mouthOpen - baselineMouthOpen * 1.5) / (baselineMouthOpen * 2)));
  const browSignal = Math.min(1, Math.max(0, (baselineBrowDist - browDist) / (Math.abs(baselineBrowDist) * 0.5 + 0.001)));
  const eyeSignal = Math.min(1, Math.max(0, (eyeOpen - 0.015) / 0.02));

  // Combined rage score
  const rawRage = (mouthSignal * 0.4 + browSignal * 0.35 + eyeSignal * 0.25) * 100;

  // Smooth it
  rageLevel = rageLevel * 0.7 + rawRage * 0.3;
  rageLevel = Math.min(100, Math.max(0, rageLevel));

  updateUI();
}

// --- UPDATE UI ---
function updateUI() {
  const pct = Math.round(rageLevel);
  rageNumber.textContent = pct + '%';

  // Color: green -> yellow -> red
  let r, g;
  if (pct < 50) {
    r = Math.round((pct / 50) * 255);
    g = 255;
  } else {
    r = 255;
    g = Math.round((1 - (pct - 50) / 50) * 255);
  }
  rageNumber.style.color = `rgb(${r}, ${g}, 0)`;

  // Emoji
  if (pct < 25) emojiEl.textContent = '😊';
  else if (pct < 50) emojiEl.textContent = '😐';
  else if (pct < 80) emojiEl.textContent = '😤';
  else emojiEl.textContent = '🤬';

  // Rage spike at 80%
  if (pct >= 80 && !isRaging) {
    isRaging = true;
    spikeCount++;
    spikeCountEl.textContent = spikeCount;
    flashEl.style.display = 'block';
    calmBtn.style.display = 'block';
    startAlarm();
  }

  if (pct < 80 && isRaging && !alarmPlaying) {
    // Auto-clear flash if rage drops and alarm already stopped
    isRaging = false;
    flashEl.style.display = 'none';
  }
}

// --- CALM BUTTON ---
calmBtn.addEventListener('click', () => {
  rageLevel = 0;
  isRaging = false;
  flashEl.style.display = 'none';
  calmBtn.style.display = 'none';
  stopAlarm();
  updateUI();
});
</script>
</body>
</html>
