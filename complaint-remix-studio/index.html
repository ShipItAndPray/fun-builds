<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Complaint Remix Studio</title>
<style>body{margin:0;font-family:Inter,system-ui,sans-serif;background:#120a18;color:#faf5ff}main{max-width:920px;margin:auto;padding:28px}a{color:#d8b4fe;text-decoration:none}.card{background:#1c1027;border:1px solid #4c1d95;border-radius:22px;padding:22px;margin-top:18px}.out{display:grid;gap:12px;margin-top:12px}.line{background:#120a18;border-radius:16px;padding:14px;line-height:1.6}textarea,button{font:inherit}textarea{width:100%;min-height:110px;background:#120a18;border:1px solid #6d28d9;color:#faf5ff;border-radius:14px;padding:12px}button{border:none;border-radius:14px;padding:12px 16px;font-weight:800;background:#a78bfa;color:#1e1034;cursor:pointer;margin-top:12px}</style>
</head>
<body><main><a href="../">← Back</a><div class="card"><h1>Complaint Remix Studio</h1><p>Take one complaint. Hear it in multiple genres.</p><textarea id="input">This meeting could have been an email and possibly a shrug.</textarea><button id="go">Remix</button><div class="out" id="out"></div></div></main>
<script>
function render(){const t=input.value.trim();out.innerHTML=[
`<div class="line"><strong>Corporate</strong><br>There may be an opportunity to streamline this format in future iterations.</div>`,
`<div class="line"><strong>Poetic</strong><br>${t} Like rain falling on a spreadsheet no one truly asked for.</div>`,
`<div class="line"><strong>Petty</strong><br>${t} Respectfully, we all lost a portion of our souls here.</div>`
].join('')}go.onclick=render;render();
</script></body></html>
